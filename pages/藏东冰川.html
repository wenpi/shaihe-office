<script id="noteData" type="application/json">[{"id":"69527184000000002103302f","title":"今年的西藏冰川旅行，祥格拉冰川封神！","content":"藏东南环线第二期，天气很好！然后就在祥格拉冰川拍到封神照片，绝了！\n继续出发去看冰洞，目前贡嘎冰洞、来古冰川已经不让进！其他冰川相继管控中！\n\t\n第一天，拉萨＞林芝＞色季拉山>鲁朗\n第二天，鲁朗>则普冰川>波密\n第三天，波密>来古冰川>打弄冰川>然乌镇\n第四天，然乌镇>松宗镇>洛隆县>边坝县\n第五天，边坝＞祥格拉冰川＞三色湖＞边坝县\n第六天，边坝>贡嘎冰洞>白嘎乡\n第七天，白嘎乡＞萨普神山＞比如县\n第八天，比如县＞那曲>拉萨\n#来古冰川#祥格拉冰川#藏东南冰川 #西藏蓝冰 #西藏蓝冰洞 #西藏蓝冰季 #西藏冰川 #西藏冰川旅游路线 #西藏小众路线 #西藏小众景点","type":"normal","author":"川藏广哥01-26","authorId":"5c832db30000000010025143","url":"https://www.xiaohongshu.com/explore/69527184000000002103302f?xsec_token=AB0amJncAYr9W6orpBpz-Zcyff2cyxG8pC1hWJCFePLJI=&xsec_source=pc_search&source=web_search_result_notes","likes":1644,"collects":1192,"comments_count":282,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031049/2268c9adf6b9c60ba625f10705f9b46a/notes_pre_post/1040g3k031qm6iebcng5g5n435mpk4ka3db8lcq8!nd_dft_wlteh_webp_3","keyword":"藏东冰川","commentList":[{"user":"爱咸鱼的猫","userId":"5ab48354db2e60617447bcf0","text":"今年的祥格拉冰川确实好看","likes":16},{"user":"晚安 计划一直在路上","userId":"5c832db30000000010025143","text":"去年更好看","likes":8},{"user":"momo（极限版）","userId":"5e1eb2b70000000001005eb4","text":"太好看啦","likes":0},{"user":"晚安 计划一直在路上","userId":"5c832db30000000010025143","text":"安排了啊","likes":0},{"user":"天高云淡","userId":"59e5fa194eacab6d65ceab2e","text":"领队吗？带游吗？","likes":0},{"user":"天高云淡","userId":"59e5fa194eacab6d65ceab2e","text":"这条线就是我的看冰川的计划路线","likes":0},{"user":"SunnyK🔆💟","userId":"57e3fbfa6a6a690da671b3fe","text":"大概多少度？[笑哭了R]","likes":0},{"user":"晚安 计划一直在路上","userId":"5c832db30000000010025143","text":"目前夜里最低零下15度，早晚零下七八度，中午十来度","likes":0},{"user":"管管","userId":"5655264be00dd8107f3a22a3","text":"留着明年 这个行程🉑","likes":0},{"user":"晚安 计划一直在路上","userId":"5c832db30000000010025143","text":"好滴","likes":0}]},{"id":"6788682c000000001802c646","title":"三张图感受❗️悬冰川的冲击力😱😱","content":"#运动万粉助力计划\n\t\n🏔布加雪山，一个藏区最著名的苯教圣山，坐落在丁青西部，是藏东最高的山峰…图中南坡发育的 约雄冰川（坡戈冰川），悬挂在天空的冰川尾部坍塌后坠向湖面，形成了巨大的冲击波，从天空俯视好似大自然的神奇画作…\n\t\n#布加雪山冰川 #坡戈冰川 #约雄冰川 #藏东冰川环线 #西藏蓝冰 #悬冰川 #西部探索户外 #徒步踏雪去 #人生地点收藏机","type":"normal","author":"川藏广哥01-26","authorId":"5b2a5ca4f7e8b9545fa1a120","url":"https://www.xiaohongshu.com/explore/6788682c000000001802c646?xsec_token=ABkrLuhc7rtXgILPLbzXRJ8q11FQ61tlkcouVqf5JR-yE=&xsec_source=pc_search&source=web_search_result_notes","likes":256,"collects":156,"comments_count":37,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031049/236c7ba3de817f047e12c3ae85aa8f41/1040g2sg31cmsune80c104a6eaoea9890s2vuac8!nd_dft_wlteh_webp_3","keyword":"藏东冰川","commentList":[{"user":"p.p","userId":"600448de000000000100ba0c","text":"这条不是悬冰川,是标准的山谷冰川,悬冰川是悬挂在山壁上短而小的冰川.","likes":15},{"user":"奇变偶不变","userId":"5c612b21000000001b00a8cc","text":"对头","likes":4},{"user":"朗朗在西藏","userId":"5e5b5f9300000000010013d9","text":"10月底的时候","likes":2},{"user":"李子园","userId":"626d6e8c00000000210283e1","text":"这条冰川我爬上去过，这是在顶上的视角超级震撼。","likes":2},{"user":"西部探索-菜刀（桃花带队版）","userId":"5b2a5ca4f7e8b9545fa1a120","text":"1月30号 萨普南线还有一个空位","likes":1},{"user":"小蓉","userId":"5d0c977400000000160193da","text":"大自然的鬼斧神工","likes":0},{"user":"归鸿72mx","userId":"5d282682000000001002376c","text":"时间漩涡🌀","likes":0},{"user":"等风来(互关)","userId":"609a3a2e000000000100ac5f","text":"漂亮","likes":0},{"user":"山茶阿鱿","userId":"5ab4b427b1da140424b05204","text":"拍的真好","likes":0},{"user":"文意咩啊","userId":"579b3042bd0da508b1c52a1c","text":"好震撼啊","likes":0}]},{"id":"6964a7d70000000022032417","title":"抱歉了南极，蓝冰我已另有它选","content":"📍藏东南的昌都市\n冬游西藏——雅隆冰川\n1️⃣2️⃣远观宏大的冰川地貌 幽蓝的秘境就在眼前\n海拔爬升至4200多米，抵达冰湖的边缘，接下来还要戴上冰爪徒步20分钟左右才能接近蓝冰墙。绵延的雪山浩瀚无垠，在巨大的冰川裙角下，已抵达冰墙前的人格外渺小。\n3️⃣打卡王一博攀冰的蓝冰墙\n4️⃣蓝冰洞内，上午我们幸运地遇上了极为晴朗的天气，阳光透过冰层散射出深邃而梦幻的蓝光，冰面呈现优美的波浪形态。\n5️⃣ 眼前蓝冰折射出贝母的光晕，可能已经静静存在了上万年。最初的积雪缓慢积压成冰，经过漫长的岁月，冰内气泡在压力作用下逐渐减少，冰体变得致密而呈现纯净如蓝水晶般的色彩。\n6️⃣ 12公里绵延而下的冰川S弯\n\t\n🚗 交通：跟小团越野车\n飞机抵达林芝/拉萨后驾车前往，进入景区后路况复杂，非越野车非老司机很难顺利到达。\n\t\n🔹出行建议：\n1️⃣ 冬季12～2月份是最佳观赏期，此时湖面冻结可徒步走近蓝冰。其它季节只能远观且水体混有泥沙，比较浑浊。\n2️⃣ 景区海拔4200米左右，需穿冰爪走碎石山路，带氧气以备不时之需，选择舒适耐脏的鞋子，安全第一。\n3️⃣ 宜在早晨到达，光线好天气稳定。\n（照片拍摄的时间在8点-11点）\n4️⃣ 注意脚下⚠️ 部分区域冰层因温度融化，一定远离，安全第一。\n5️⃣ 冰川美丽而脆弱，希望在近距离观赏拍摄时尽量减少不必要的接触，不遗留任何物品，避免对环境造成破坏。\n\t\n#春节反向旅游 #来古冰川\n#西藏旅行攻略 #冬游西藏\n#冰川\n#王一博探索新境","type":"normal","author":"川藏广哥01-26","authorId":"5d78c02c000000000100141a","url":"https://www.xiaohongshu.com/explore/6964a7d70000000022032417?xsec_token=ABhJKwqeKbQ96dcF0m_QoW3gnP1pXUhTkNYz9fEv4atSo=&xsec_source=pc_search&source=web_search_result_notes","likes":236,"collects":223,"comments_count":47,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031048/6887a9967a0184dc88081a037b388686/notes_uhdr/1040g3qo31r7vnb8jng705nboo0m0850qfbn0mro!nd_dft_wlteh_webp_3","keyword":"藏东冰川","commentList":[{"user":"风前叙M","userId":"5d78c02c000000000100141a","text":"小红书选择很多[棒R]","likes":2},{"user":"游千百遍千万遍快乐人间_","userId":"5c428479000000000600bf91","text":"听说进雅隆要买来古的人门票然后再加一百吗","likes":1},{"user":"岁月静好","userId":"5b9f8fb187015a000172cf6f","text":"你好 麻烦咨询一下 你是报团去的吗？","likes":1},{"user":"小红薯681F15DD","userId":"681eba86000000000e0101b7","text":"怎么跟小团","likes":1},{"user":"风前叙M","userId":"5d78c02c000000000100141a","text":"具体我忘了 没印象加收钱啊","likes":1},{"user":"风前叙M","userId":"5d78c02c000000000100141a","text":"那必然，是加了点的 iPhone直出发两张","likes":1},{"user":"风前叙M","userId":"5d78c02c000000000100141a","text":"是的 最好跟个小团领队，那边路况一般人一般车开不了","likes":0},{"user":"辰尘","userId":"5ef18f770000000001002a6a","text":"原图直出还是加了滤镜美颜","likes":0},{"user":"哼哼","userId":"5a92add4e8ac2b1f4661ae7f","text":"有推荐团吗 春节想去","likes":0},{"user":"郭凇男","userId":"61a0452e000000002102090c","text":"跟的哪个团啊","likes":0}]},{"id":"69401202000000000d035711","title":"这绝对是我在西藏见过最美的冰洞","content":"为了来这儿早上6点就起床了\n今天的徒步不是冰就是碎石子，还是有难度的，本人还从冰滑坡上打滑溜下去了，幸好穿的多，没啥事，然后继续往上爬，我感觉我又厉害了一点✌️\n但是真的超值，这绝对是我目前为止见过最美最美的冰洞，没有之一，拍了一吨照片和视频。\n冰墙巨大，晶莹剔透，形状也很好看。\n我们很幸运，见过这么美的它。\n#藏东南冰川 #藏东南徒步 #西藏冰川 #来古冰川 #雅隆冰川#西藏旅行 #西藏自驾游","type":"normal","author":"川藏广哥01-26","authorId":"56c92f6334609461e874a069","url":"https://www.xiaohongshu.com/explore/69401202000000000d035711?xsec_token=ABm2e8xP1si52etd-l-HFI2jZqroGiNo8vJO7KvUJvmS4=&xsec_source=pc_search&source=web_search_result_notes","likes":107,"collects":58,"comments_count":36,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031048/a434aa813d5a2b411eef2384eb34f146/notes_pre_post/1040g3k831q48a95l7u1g45opcdnm7839qbu537g!nd_dft_wlteh_webp_3","keyword":"藏东冰川","commentList":[{"user":"C姐和Mia的播客","userId":"56c92f6334609461e874a069","text":"就只能进的到我拍照的地方了，太阳一出来几年就哗哗的水","likes":1},{"user":"C姐和Mia的播客","userId":"56c92f6334609461e874a069","text":"因为不是来古","likes":1},{"user":"小霁鱼","userId":"66766fd8000000000303137a","text":"这是哪里？","likes":0},{"user":"是车厘子呀","userId":"592efaf85e87e762b5e6a329","text":"好美啊","likes":0},{"user":"C姐和Mia的播客","userId":"56c92f6334609461e874a069","text":"真的，震撼人心的美","likes":0},{"user":"蓝","userId":"5cd31f2c000000001201d2ec","text":"来古冰川","likes":0},{"user":"上班摸余女士","userId":"5653b52e62a60c738f909448","text":"这跟我去的来古不一样耶","likes":0},{"user":"种无花果的嘉陵江庄稼汉","userId":"55e31870a75c9501f3a14ca7","text":"请问能进去吗","likes":0},{"user":"海清海蓝","userId":"60eb04060000000001005e04","text":"请问你这是哪个冰川？","likes":0},{"user":"宓🐟","userId":"5b9f483af6dfa80001eeba5d","text":"请问冰川景色都是领队带去的吗？","likes":0}]},{"id":"682e8990000000002202e054","title":"【藏东自驾】第五站：详格拉冰川、贡嘎冰洞","content":"一早从边坝出发，导航普玉一村，路修的非常好，路上会经过三色湖，村子的尽头就是祥格拉冰川，车可以停在村里党群服务驿站门口，对面就是去冰洞四轮摩托车，三色湖，祥格拉冰川目前都是免费，去冰川的车费是300，本来还觉得贵，用无人机飞了一下到冰洞的路，索性还是放弃了徒步，相信每个从冰洞回来的人经过一路颠簸都觉得这300花的不亏。\n\t\n其实真正的贡嘎蓝冰洞已经塌了，现在看到的冰洞是后来发现的新冰洞（出来冰洞不远还能看到原来冰洞的遗址），整体上不如原来的贡嘎蓝冰洞出片，但也非常好看，从外面看着洞口都是沙土看起来脏了吧唧的，里面也是别有洞天啊，洞顶是大片大片漂亮的鱼鳞纹，对于第一次见冰洞的人来说，也是超级震撼。\n\t\n冰洞还是要尽量早点去，去晚了人就多了。洞内建议穿上冰爪，背着三脚架，洞内非常滑，且路面不平，冰爪能避免滑倒，头灯戴不戴都行，手机灯光也可以，两边洞口也都很亮，三脚架是因为洞内光线较暗，要出片需要长曝光，很多带了单反没带三脚架的人都后悔不已。\n\t\n从冰洞回来的路上会路过一个大冰瀑（图6），从下面看蔚为壮观，时间充裕可以打个卡。从普玉一村回去的路上，还可以打卡三色湖，下午的景色比一早要好，阳光没有那么强，色彩更柔和。\n\t\n#边坝县#普玉一村  #冰洞#蓝冰洞 #冰瀑  #孔嘎冰洞 #贡嘎冰洞 #贡嘎蓝冰洞 #详格拉冰川 #冰川","type":"normal","author":"川藏广哥01-26","authorId":"57a5631b6a6a69012df8204e","url":"https://www.xiaohongshu.com/explore/682e8990000000002202e054?xsec_token=ABOOXbjIyhHvhmKpbiiOIjq5GVAo2QFuuj5-8YQTYNF58=&xsec_source=pc_search&source=web_search_result_notes","likes":95,"collects":130,"comments_count":15,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031049/aee16aa7fefc72b39fd81b3bf94fc17f/spectrum/1040g0k031hokovdg423048k5k0hhm82ecfn9j2o!nd_dft_wlteh_webp_3","keyword":"藏东冰川","commentList":[{"user":"怒海孤帆","userId":"5fffdfb80000000001009f58","text":"还真有缘。","likes":1},{"user":"Uloeys","userId":"5afab4bbe8ac2b558e34507b","text":"请问图1-3主要是贡嘎冰洞，后面几张图是冰川是吗？","likes":1},{"user":"小刘同学","userId":"57a5631b6a6a69012df8204e","text":"后面就是旁边的祥格拉冰川","likes":1},{"user":"开始懂了","userId":"5e3d5e210000000001000ba9","text":"你与冰洞已融为一体","likes":0},{"user":"💝sky","userId":"54ad087ae77989118d7b3f0c","text":"请问您什么去的贡嘎冰川?","likes":0},{"user":"小刘同学","userId":"57a5631b6a6a69012df8204e","text":"今年4月1号","likes":0},{"user":"小刘同学","userId":"57a5631b6a6a69012df8204e","text":"还真是，咱们应该是一条线，这一路基本没同行的人","likes":0},{"user":"旅居阁","userId":"5f993b38000000000101c7bc","text":"6月初去，还能看到嘛","likes":0},{"user":"长寿湖","userId":"60cc7294000000000100b22c","text":"夏季估计看不见","likes":0},{"user":"榜首","userId":"5fe72739000000000101dd0f","text":"请问如果自驾的话去冰川路好走吗 两驱suv","likes":0}]},{"id":"67479d78000000000703b897","title":"每年仅3个月能靠近❗️藏东祖母绿冰川","content":"#旅行随手拍\n✅深藏藏东，名气完全不及来古冰川、萨普神山…甚至连它隔壁的祥格拉冰川、贡嘎冰洞都比它声名远扬…然而见识了它绝美的风光后，我甚至一度将它排进藏东冰川榜首位置…\n\t\n📝庚东冰川为何如此诱人？\n 隐秘小众：养在深闺，由于道路车辆无法到达，使得每年前往这里的游人极少，加之湖面长度3km，及时抵达湖边，也未必能欣赏到深处的绝美风光…\n\t\n纯净的冰湖：不同于其他冰川的冰湖，这里由于时常大风，每年有2个月左右的时间，在冰面上是完全无雪状态（有雪覆盖的冰面没法观看蓝冰），使得这里的冰湖如同一块天然的祖母绿镶嵌山间…\n\t\n超级冰洞：从2021年年底发现的护目镜冰洞（图一）再到2022年满是宝石的洞府（图三），再到2023洞厅坍塌形成的U型冰洞（图八），庚东冰川每年都在给我们惊喜\n\t\n极易出片：湖面的纯净加之方位的独特，这里不管是在冰湖或是冰洞，都极其容易出片…\n\t\n🔷观赏时间：庚东冰川每年仅12月中下旬至次年3月中旬可以上到冰湖接近冰川尾部…其中12月下旬~2月上旬为最佳观赏时间…\n\t\n庚东冰川推荐行程安排：\nDay1：拉萨集合\nDay2：拉萨-林芝-索松村（观赏南迦巴瓦日落金山）\nDay3：索松村-色季拉山口-通麦大桥-波密-然乌湖\nDay4：然乌湖-来古冰川（或雅隆冰川）-波密县\nDay5：波密县-易贡藏布大峡谷-金岭乡/尼屋乡\nDay6：金岭乡-贡嘎冰洞-祥格拉冰川-边坝县\nDay7：边坝县-阵木措-庚东冰川-白嘎乡（或萨普大本营）\nDay8：萨普大本营-萨普神山-内湖徒步-边坝县\nDay9：边坝县-孜珠寺-丁青县\nDay10：丁青县-坡戈冰川-索县\nDay11：索县-赞丹寺-拉萨\n\t\n关注我，带你了解更多小众密地…\n#我的小众旅行攻略 #冰川 #西藏蓝冰 #藏东冰川环线 #萨普神山 #庚东冰川 #来古冰川 #贡嘎冰洞 #祥格拉冰川","type":"normal","author":"川藏广哥01-26","authorId":"5b2a5ca4f7e8b9545fa1a120","url":"https://www.xiaohongshu.com/explore/67479d78000000000703b897?xsec_token=ABHBdS6wJtMbYtPLCYoBjTeQ4mP9cGPxyAfVKL9zx2HnY=&xsec_source=pc_search&source=web_search_result_notes","likes":74,"collects":99,"comments_count":20,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031049/484602587ec51071c30114dea506618a/1040g00831ank6q427i404a6eaoea9890tcl304o!nd_dft_wlteh_webp_3","keyword":"藏东冰川","commentList":[{"user":"Amy Liu米甦","userId":"5f81adab000000000100bf5a","text":"1月25日价格","likes":2},{"user":"白晓Cindy","userId":"59e26f936b64550b10521c7b","text":"太酷了","likes":1},{"user":"西部探索-菜刀（桃花带队版）","userId":"5b2a5ca4f7e8b9545fa1a120","text":"","likes":1},{"user":"薇薇安","userId":"566ac59082718c79dc5783d8","text":"去年三月初去的，只能无人机飞过去拍冰洞了，最后五百米都完全化了，走在冰面上就持续听到湖面下传来一声声巨大的冰裂声音。好看也是真好看的。","likes":0},{"user":"✩小奶油✩","userId":"5654383a03eb847e1f84dfb4","text":"之前刷到好像说塌了？还在吗？","likes":0},{"user":"西部探索-菜刀（桃花带队版）","userId":"5b2a5ca4f7e8b9545fa1a120","text":"毁灭与创造","likes":0},{"user":"豆豆","userId":"56397197e00dd86f42e01cc2","text":"咨询价格","likes":0},{"user":"夏梦玫珑","userId":"5da3058e0000000001003389","text":"当时去还看得到蓝冰吗","likes":0},{"user":"明的视界","userId":"65673e84000000001c01abe9","text":"去过冰洞一次，好壮观！","likes":0},{"user":"步履不停。","userId":"5f832a8d0000000001008de8","text":"庚东冰川的导航地点是","likes":0}]},{"id":"680f01040000000023010723","title":"藏东南秘境～尼屋、边坝","content":"周末，以嘉黎县尼屋乡为中心，来一场特种兵式的旅游：\n✨【周末特种兵攻略｜36小时闯入藏东南冰川秘境！雪山峡谷+蓝冰奇观，附避坑指南】🏔️\n**🚗Day1：周五下班即出发！拉萨→尼屋乡极限冲关\n⏰ 19:00 拉萨夜奔，G349国道一路狂飙（轿车友好！）\n❌ 避雷：嘉黎县城（4500m）海拔劝退！多开2小时直抵尼屋乡（2795m），住宿二选一：\n✅易贡藏布大酒店：标间400元，条件朴素\n**🌄Day2：周六暴走冰川群！尼屋乡→三色湖→祥格拉冰川→贡嘎蓝冰洞\n🚗 8:00民宿早餐后出发，三色湖（门票🆓）打卡30分钟——别期待过高，但作为冰川前菜刚刚好\n💎重头戏：祥格拉冰川（冬季/夏季限定）\n⚠️ 划重点：10月后冰面禁入！蓝冰墙最佳观景期在12-2月（冰裂纹+气泡冰绝美）\n🌌隐藏彩蛋：贡嘎蓝冰洞（需徒步30分钟）\n❄️ 洞内幽蓝冰晶折射出《星际穿越》既视感，冬季洞内冰柱高达10米！\n**🚙Day3：周日终极挑战！尼屋乡→依噶冰川（地狱级路况）\n🛣️ 50公里非铺装路=14个村庄穿越+悬崖发卡弯+炮弹坑暴击（单程2小时，会车全靠胆量）\n📸出片预警：沿途雪山瀑布+原始森林=《指环王》中土世界既视感\n⚠️ 血泪教训：阴天别放无人机！冰川顶峰云雾笼罩，白跑一趟（留白式遗憾美学get√）\n💡特种兵生存指南\n1️⃣高反急救包：葡萄糖口服液+布洛芬（尼屋乡无医院，备足氧气瓶！）\n2️⃣路况情报站：关注「西藏交通」公众号，依噶冰川修路进度每日更新\n3️⃣穿搭公式：硬壳冲锋衣+防滑登山靴（冰川碎石路+溪流穿越场景全覆盖）\n📌Tips：冰川摄影黄金时段为日出后2小时（冰面反光率爆表，原图直出生图感！）\n💬评论区互动：\n“冬季三色湖会结冰吗？”\n“非铺装路四驱车能否硬刚？”\n🔥点击收藏，这个周末就出发！在藏东南的冰川褶皱里，捡一片属于自己的星辰大海～#尼屋乡 #边坝三色湖 #依噶冰川 #祥格拉冰川","type":"normal","author":"川藏广哥01-26","authorId":"5e70c769000000000100239c","url":"https://www.xiaohongshu.com/explore/680f01040000000023010723?xsec_token=ABhtKfniOAspl8ETyxnFk4jbCGnI1_TWDI7YYqGbCmI28=&xsec_source=pc_search&source=web_search_result_notes","likes":51,"collects":66,"comments_count":15,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031048/a40ef06f8869e9262774b0b47ca28e51/1040g2sg31gq8ohoij4cg5njgotkg88ss82id3t0!nd_dft_wgth_webp_3","keyword":"藏东冰川","commentList":[{"user":"点茶","userId":"562d7fcef53ee075220ecbb6","text":"依噶冰川最近有看头吗？","likes":0},{"user":"逍遥庄子","userId":"5e70c769000000000100239c","text":"看好天气，有看头","likes":0},{"user":"momo","userId":"5b1a4cdde8ac2b59173afccb","text":"请问嘉黎嘎玛溪卡如何订房呀","likes":0},{"user":"逍遥庄子","userId":"5e70c769000000000100239c","text":"打电话，携程有","likes":0},{"user":"楠","userId":"6466125f000000000f004910","text":"你好，请问图15是哪里？","likes":0},{"user":"逍遥庄子","userId":"5e70c769000000000100239c","text":"依噶冰川","likes":0},{"user":"Roiu","userId":"61b6e8f00000000010005221","text":"你好请问图12是哪","likes":0},{"user":"逍遥庄子","userId":"5e70c769000000000100239c","text":"祥格拉冰川","likes":0},{"user":"健康顺利","userId":"5fe9d5fc0000000001002189","text":"你好，我想问一下尼屋乡的住宿怎么订啊？我看平台上都没有","likes":0},{"user":"逍遥庄子","userId":"5e70c769000000000100239c","text":"平台有的啊","likes":0}]},{"id":"6946545f000000001b020f52","title":"西藏藏东南冰川，最好看的应该是这里","content":"这里的蓝冰是藏东冬季最惊艳的景观，有一整面的冰墙。每年12月至次年2月，湖面完全封冻，冰层厚实安全，可徒步至冰川脚下，近距离欣赏晶莹剔透的蓝冰墙。阳光照射下冰体呈现梦幻般的蒂芙尼蓝。景区免费开放，自驾可直达湖边，从边坝县城出发约1.5小时车程。必备装备包括冰爪、防寒衣物、雪镜和手套，与三色湖相邻，可串联游览，住宿可选择边坝县城或普玉一村民宿。旅行线路可以从拉萨出发走9或10天线路\n第一天，拉萨＞林芝＞色季拉山>鲁朗\n第二天，鲁朗>则普冰川>波密\n第三天，波密>来古冰川>星空西桥>八盖乡\n第四天，八盖乡>易贡乡>穷木打支冰川>尼屋乡\n第五天，尼屋乡＞金岭乡＞囧拉错>边坝县\n第六天，边坝＞祥格拉冰川＞三色湖＞边坝县\n第七天，边坝>贡嘎冰洞>白嘎乡\n第八天，白嘎乡＞萨普神山＞比如县\n第九天，比如县＞那曲>拉萨\n\t\nDay1.拉萨-林芝-索松村\nDay2.索松村-色季拉山-波密-然乌湖\nDay3.然乌镇-来古冰川-仁龙巴冰川（雅隆冰川）-波密\nDay4.波密-易贡藏布大峡谷-八盖乡-尼屋乡\nDay5.尼屋乡-依噶冰川-穷木打支冰川-金岭乡\nDay6.金岭乡-边坝-萨普-白嘎乡\nDay7.白嘎乡-贡嘎冰洞（祥格拉冰川）-边坝县\nDay8.边坝-穿越怒江峡谷-孜珠寺-丁青\nDay9.丁青-坡戈冰川-巴青/索县\nDay10.巴青/索县-赞丹寺(藏东小布达拉宫)-拉萨\n#来古冰川 #雅隆冰川 #冬游西藏 #西藏蓝冰洞  #西藏冰川 #藏东南环线#藏东南冰川 #西藏旅行 #世界的尽头是雪山和大海 #祥格拉冰川","type":"normal","author":"川藏广哥01-26","authorId":"5c832db30000000010025143","url":"https://www.xiaohongshu.com/explore/6946545f000000001b020f52?xsec_token=ABUVijgpV8umG8nDwoc9aOdwgqRpD9LjlsCqYk3R7a8Xg=&xsec_source=pc_search&source=web_search_result_notes","likes":16,"collects":19,"comments_count":1,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031048/cba96d55e8ae496b2231f9dd0641d9c1/notes_pre_post/1040g3k831qaalun9nu9g48lgjelv44ggc649iso!nd_dft_wlteh_webp_3","keyword":"藏东冰川","commentList":[{"user":"IEW","userId":"58ce704c5e87e76498e8ad26","text":"礼貌问价","likes":0}]},{"id":"6955c12b000000002103d8c5","title":"西藏冰川拍照打卡机位汇总，原图直出","content":"西藏冰川旅行最近很火，分享下自己走过的冰川拍照机位。这里是6个冰川，分别则普冰川、来古冰川、依噶冰川、祥格拉冰川、贡嘎冰川、仁龙巴冰川、共9个冰洞2面冰墙！\n依噶冰川徒步距离长就不把做在线路里了，所以8天行程可以走遍这几个冰川打卡机位！线路如下:\n第一天，拉萨＞林芝＞色季拉山>鲁朗\n第二天，鲁朗>则普冰川>波密\n第三天，波密>来古冰川>打弄冰川>然乌镇\n第四天，然乌镇>松宗镇>洛隆县>边坝县\n第五天，边坝＞祥格拉冰川＞三色湖＞边坝县\n第六天，边坝>贡嘎冰洞>白嘎乡\n第七天，白嘎乡＞萨普神山＞比如县\n第八天，比如县＞那曲>拉萨\n#来古冰川 #祥格拉冰川#藏东南冰川 #西藏蓝冰季 #西藏冰川#西藏冰川旅游线路#西藏小众线路#西藏小众景点 #冬游西藏","type":"normal","author":"川藏广哥01-26","authorId":"5c832db30000000010025143","url":"https://www.xiaohongshu.com/explore/6955c12b000000002103d8c5?xsec_token=ABp1Q4pTfcMJyichQP-JrvFDo5fkUcKfDTuyu4iikXjhQ=&xsec_source=pc_search&source=web_search_result_notes","likes":16,"collects":13,"comments_count":6,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031049/5e658ddf088a58bdfda32ae80bafec6d/notes_pre_post/1040g3k831qpe219bg0005n435mpk4ka31rr145g!nd_dft_wlteh_webp_3","keyword":"藏东冰川","commentList":[{"user":"思嘉","userId":"5e885cc30000000001008816","text":"好漂亮吖，图九是哪里吖","likes":0},{"user":"小臭","userId":"57fb867350c4b46222978239","text":"请问一下然乌到边坝的路是走的哪一条，最近结冰情况怎么样啊","likes":0},{"user":"晚安 计划一直在路上","userId":"5c832db30000000010025143","text":"小众冰洞","likes":0},{"user":"咦","userId":"5b90daa06b58b743d2f670ff","text":"请问您带队吗还是自己玩","likes":0},{"user":"晚安 计划一直在路上","userId":"5c832db30000000010025143","text":"dai","likes":0},{"user":"晚安 计划一直在路上","userId":"5c832db30000000010025143","text":"跟着导航走","likes":0}]},{"id":"6970ba7200000000220387b5","title":"藏东冰川&孜珠寺","content":"布加雪山冰川悬垂高山冰峰\n孜珠寺天空之城，象雄文明的遗存！","type":"normal","author":"川藏广哥01-26","authorId":"5bf9380d969bbf0001ea2e31","url":"https://www.xiaohongshu.com/explore/6970ba7200000000220387b5?xsec_token=ABFVDD751v3XlwDK1KHFsFR2ghMYNzn_FQkwm_Nutuy0o=&xsec_source=pc_search&source=web_search_result_notes","likes":15,"collects":15,"comments_count":13,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031049/0b0878fb8ae29b4b14f02c6d8eb15a48/1040g2sg31rjosa50334g4bthbds0qbhh60ht390!nd_dft_wgth_webp_3","keyword":"藏东冰川","commentList":[{"user":"如期旅行","userId":"5bf9380d969bbf0001ea2e31","text":"布加雪山冰川","likes":1},{"user":"啦啦啦","userId":"5eb4cb6700000000010055d0","text":"哇塞，这个冰川我都不敢走过去，他冻的结实吗？","likes":0},{"user":"如期旅行","userId":"5bf9380d969bbf0001ea2e31","text":"现在结实了，没问题","likes":0},{"user":"momo","userId":"5835b0d06a6a695d76dc0545","text":"这是哪个冰川","likes":0},{"user":"momo","userId":"660c0dd5000000000b00de08","text":"哇 求导航点","likes":0},{"user":"如期旅行","userId":"5bf9380d969bbf0001ea2e31","text":"布加雪山冰川","likes":0},{"user":"和光同晨","userId":"62f907af000000001e01df5f","text":"你没上山吗？","likes":0},{"user":"如期旅行","userId":"5bf9380d969bbf0001ea2e31","text":"带的客人爬不动！","likes":0},{"user":"蒙檬朦","userId":"64f2d9e600000000040245b0","text":"去年天不好","likes":0}]},{"id":"6943c7d5000000000d03eb47","title":"8天穿越易贡藏布，看尽雪山、峡谷、森林","content":"还在找人挤人的网红打卡地？这次带你去真正的荒野——易贡藏布大峡谷。这里是雅鲁藏布江一条狂野的支流，藏着西藏最原始、最完整的森林河谷之一，被誉为顶级品质的峡谷森林。\n\t\n✨ 为什么是易贡藏布大峡谷？\n它绝不仅仅是一个路过看一眼的峡谷。当你驱车深入，你会发现自己正穿行在一座 “活着的地质博物馆” 里。\n地球的伤疤，自然的奇迹：峡谷里遍布着2000年那场震惊世界的特大山体崩塌遗迹。高达2580米的崩塌落差，3亿立方米的堆积体，让你亲眼目睹自然毁灭与重建的磅礴力量。沿途的高速滑擦痕、喷水冒砂坑，像是地球皮肤上新鲜的印记。\n\t\n垂直的景观带，一天过四季：从终年积雪的冰川带，到高山草甸、温带森林，再到峡谷底部的亚热带风光，气候和植被垂直变化极其鲜明。你可能刚刚还在欣赏雪山，转眼就驶入了郁郁葱葱的森林河谷。\n🚗 8日藏东秘境环线核心亮点速览\nD1-2：拉萨 - 林芝 - 雅鲁藏布大峡谷\n适应高原，沿尼洋河风光东行。在索松村直面“羞女峰”南迦巴瓦，为接下来的荒野之旅热身。\nD3：穿越色季拉山 - 波密 - 然乌湖\n翻越垭口，抵达藏东明珠然乌湖。冬春季湖水澄澈如镜，是拍摄雪山倒影的绝佳时机。\nD4：然乌湖-来古冰川 - 波密古乡湖\n上午近距离接触蓝冰秘境来古冰川，下午抵达静谧的古乡湖，享受帕隆藏布江畔的宁静。\n🌟 D5：行程核心日 - 古乡湖 - 易贡藏布大峡谷 - 尼屋乡/金岭乡\n今天的主角登场！从波密出发，正式进入易贡国家地质公园范围。沿着易贡藏布江前行，一路皆是震撼的地质遗迹和丰富的植被景观。峡谷深处的忠玉乡，被形容为“世外桃源”，四周雪峰环绕，景色层次分明。夜宿峡谷中的尼屋乡或金岭乡，感受真正的与世隔绝。\nD6：尼屋乡/金岭乡 - 祥格拉冰川 - 边坝县\n继续探访小众冰川，祥格拉冰川的幽蓝纯净，往往能让你独享一片安宁。\nD7：边坝 - 萨普神山 - 比如县\n全天沉浸于萨普神山的震撼之中。金字塔形的山体和脚下的圣湖，构成超现实的绝美画面。\nD8：比如县 - 拉萨\n带着满心的震撼与回忆，穿越藏北草原，返回圣城拉萨。\n\t\n💡 旅行家贴心提示\n最佳季节：12月到次年3月\n交通方式：必须越野车+经验丰富的司机。峡谷内部分路段为非铺装路面，穿越夏贡拉山等垭口对车辆和驾驶技术都是考验。\n#西藏旅行 #藏东环线 #易贡藏布大峡谷 #西藏自驾 #小众旅行地 #地质奇观 #西藏秘境 #旅行攻略 #人生旅途中的美景 #易贡藏布大峡谷","type":"normal","author":"川藏广哥01-26","authorId":"5e1439fe00000000010046bf","url":"https://www.xiaohongshu.com/explore/6943c7d5000000000d03eb47?xsec_token=ABcZsuEmZLDneTBtYg5rKShMq7bf9EHCHblV4yiTfb0eU=&xsec_source=pc_search&source=web_search_result_notes","likes":14,"collects":21,"comments_count":8,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031048/28e36e91fd7ae4ea0cf1f2dd9faa5940/notes_pre_post/1040g3k031q7s93nuno5g5ngk77v08hlvth1jeso!nd_dft_wlteh_webp_3","keyword":"藏东冰川","commentList":[{"user":"水红西三","userId":"562079083f95a35fd202e528","text":"问下价格","likes":0},{"user":"川藏广哥","userId":"5e1439fe00000000010046bf","text":"关注丝","likes":0},{"user":"momo","userId":"5bfd30d651783a47780847b1","text":"请问五一假期能走吗？","likes":0},{"user":"爱吃酸奶的向日葵🌻","userId":"6422710700000000120128bf","text":"礼貌问价","likes":0},{"user":"川藏广哥","userId":"5e1439fe00000000010046bf","text":"冬天行程，最近一个拉萨出发","likes":0}]},{"id":"69c1cec900000000230234f9","title":"春节花6天，追三场“世界尽头的蓝冰”","content":"航拍布加雪山冰川位于西藏藏东地区，是一处集世界级悬冰川奇观与完整原始生态于一体的自然秘境。布加雪山海拔6328米，藏东最高峰，发育124条现代冰川，总面积184.28平方公里，5条发育完整的巨型悬冰川，构成世界上最密集的悬冰川群。布加雪山拥有深厚的文化底蕴，山脚下的“绿玉湖”被视为冰川之“魂”。","type":"video","author":"川藏广哥01-26","authorId":"624c6b70000000001000eca9","url":"https://www.xiaohongshu.com/explore/69c1cec900000000230234f9?xsec_token=ABTRZsHxRJ6zt9p3Kx51oQdKKKN6dI19uNzXc35Nj3NMA=&xsec_source=pc_search&source=web_search_result_notes","likes":6,"collects":1,"comments_count":0,"shares":0,"cover":"","keyword":"藏东冰川","commentList":[]},{"id":"69709d8e000000000b010d5d","title":"藏东终极环线 从雨林秘境到蓝冰净土","content":"南迦巴瓦 墨脱 白普隆沟 来古冰川 祥格拉冰川 萨普神山8天时间装满整个世界\n这条路线把西藏的极致反差美焊死了！前一天还在墨脱的热带峡谷里吸氧，下一秒就闯进来古冰川的亿年冰封世界，从20°C暖冬直接坠入零度秘境，这场跨越3000米海拔的穿越，眼睛和灵魂都被狠狠拿捏~\n先闯“莲花秘境”墨脱：扎墨公路的58年天堑通途名不虚传，嘎隆拉隧道一头是冰雪，一头是芭蕉丛生的雨林，沿途飞瀑叠翠，空气里满是湿润的草木香。果果塘大拐弯的江水碧绿如玉，莲花阁上能俯瞰整座藏地小城，傍晚的石锅鸡炖着松茸，暖汤下肚驱散一路风尘。\n再赴来古冰川的蓝冰之约：作为中国最美冰川群，6条冰川如巨龙盘踞，冰舌直探冰湖，浅蓝与乳白交织的冰面刻满时光纹路。钻进蓝冰洞的瞬间像闯入水晶宫殿，幽蓝光芒如梦似幻；站在数米高的冰墙下，踩雪的咯吱声是大自然最纯粹的回响，没有人工雕琢的粗粉与壮阔，足以让所有浮躁沉淀。\n白天追冰川光影，夜晚枕星河入眠，这趟旅程既有雨林的灵秀，又有冰川的苍茫，堪称藏东旅行的天花板～\n#墨脱#西藏小众秘境#蓝冰#来古冰川#白普隆沟","type":"normal","author":"川藏广哥01-26","authorId":"5b681733e382950001cffc32","url":"https://www.xiaohongshu.com/explore/69709d8e000000000b010d5d?xsec_token=ABFVDD751v3XlwDK1KHFsFR-ly-5plhBtw7RzALGlTdeU=&xsec_source=pc_search&source=web_search_result_notes","likes":5,"collects":2,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031048/11993be5a63623ad3c3159b64dce8af4/1040g00831rjif4m226104aa7bhbj7v1ipopmamo!nd_dft_wlteh_webp_3","keyword":"藏东冰川","commentList":[]},{"id":"6976d64500000000220097fe","title":"春节花6天，追三场“世界尽头的蓝冰”","content":"有人说，看过了西藏的冰川，其他地方的冰都成了将就。\n这次走的藏东环线，像是把“冰川星球”最精华的篇章，一次翻完。\n❶ 第一抹蓝 · 来古冰川\n走进它的时候，世界突然安静。\n时间在这里被冻住，形成了巨大的蓝色琥珀。\n阳光透过冰壁，折射出幽幽的蓝光，我站在冰洞前，渺小得像一粒尘埃。\n📌 玩法：一定要深入冰洞！听脚下冰裂的清脆回响，那是地球的心跳。\n❷ 野生的蓝 · 祥格拉冰川\n没有路，只有车辙和勇气。\n它像一位隐士，藏在群山深处。\n这里没有游客，只有矗立了万年的冰塔林，尖锐、沉默，带着一种末日般的科幻感。\n📌 感受：这是全程最“野”的一段，颠簸抵达后，你会觉得一切都值得。\n❸ 神圣的蓝 · 萨普神山\n当萨普群峰出现在眼前时，我差点哭出来。\n金字塔状的山体下，冰川沁入碧绿的湖中，边缘是梦幻的蒂芙尼蓝。\n傍晚，金山倒映在冰湖上，那是语言无法形容的神圣。\n📌 瞬间：在湖边守一次日落，你会明白什么是“人间值得”。\n—— 6天，我们是这样追冰的 ——\nD1：拉萨出发，与南迦巴瓦的日落撞个满怀，宿鲁朗小镇。\nD2：沿帕隆藏布江疾行，直奔来古，住然乌镇。\nD3：翻越果藏拉垭口，抵达低调的洛隆县。\nD4：越野+轻徒步，朝拜野生祥格拉冰川，宿白嘎乡。\nD5：全天献给萨普！与神山冰川独处，夜宿那曲。\nD6：纳木错依依惜别，回到拉萨圆满收官。\n一些冰冷的实话：\n▪️ 蓝冰最佳观赏期是2-4月，湖面结实，蓝色最浓。\n▪️ 海拔全程4000+，敬畏自然，量力而行。\n▪️ 这条线适合“野孩子”，部分路段颠簸且无信号，但风景绝密。\n最后：\n冰川在缓慢后退，\n有些风景，真的需要一点决心，才能抵达。\n这片极致的蓝，不是终点，是让我们重新爱上世界的起点。\n#西藏蓝冰季 #此生必去冰川 #来古冰川 #萨普神山 #祥格拉冰川 #西藏小众环线 #2026冬冬冬动 #萨普冰川","type":"normal","author":"川藏广哥01-26","authorId":"5e1439fe00000000010046bf","url":"https://www.xiaohongshu.com/explore/6976d64500000000220097fe?xsec_token=ABs_K7eZjQU5JvqxrQZ8r4crSndFg0Hmoao6gZpA6tw-o=&xsec_source=pc_search&source=web_search_result_notes","likes":3,"collects":1,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031048/5a412a0a5d4d3a31fd15349aa103c7ac/notes_pre_post/1040g3k031rpnrfulim705ngk77v08hlv5iuusu0!nd_dft_wgth_webp_3","keyword":"藏东冰川","commentList":[]},{"id":"69ca37f6000000002003a563","title":"DAY10｜雪后初晴的藏地蓝冰秘境","content":"川藏线 16 天繁花之旅第十天，今天一头扎进然乌湖的雪后仙境，再奔赴来古冰川的蓝冰世界，才算懂了什么叫「西天瑶池」的极致浪漫\n🌊 然乌湖｜雪后初晴的藏东第一堰塞湖\n春天里突然折返的冬日，给然乌湖镀上了一层圣洁的白！\n作为藏东第一大堰塞湖、G318 的视觉盛宴，3-4 月本就是然乌湖的颜值巅峰，雪后初晴更是美到失语。\n岗日嘎布雪山的融水滋养着这片串珠状湖泊，湖水从奶白浅碧晕染成深邃蒂芙尼蓝，岸边的岩石、森林都覆着薄雪，雪山在云间若隐若现，连倒影都美得像一幅流动的画。\n沿着湖畔漫步，看阳光在湖面洒下碎金，雪后的草甸、森林与湖水相映，忍不住感叹：这就是「西天瑶池」的模样啊💙\n❄️ 来古冰川｜藏东蓝冰的终极浪漫\n从然乌湖出发，直奔来古冰川！作为藏东知名的海洋性冰川，这里以绝美的蓝冰墙、蓝冰洞闻名，3 月正是赏蓝冰的尾巴期，今天更是幸运值拉满 —— 景区门口还飘着雪，我们下车就停雪放晴，连太阳都出来捧场！\n站在冰川脚下，眼前是层层叠叠的蓝冰崖，冰裂纹里藏着万年的时光，阳光穿透冰体，泛着梦幻的蒂芙尼蓝。团友们在冰前堆起玛尼堆，对着雪山冰川打卡，把这份藏地冰雪的震撼，永远定格在镜头里。\n从然乌湖的澄澈到冰川的壮阔，雪山、森林、蓝冰、草甸，所有藏地的美好，都在今天撞了个满怀。\n#川藏线 #带团日记 #然乌湖 #来古冰川 #蓝冰","type":"normal","author":"川藏广哥01-26","authorId":"69a8d697000000003202b839","url":"https://www.xiaohongshu.com/explore/69ca37f6000000002003a563?xsec_token=AB-TzZCzi29onM8uExlqjXM9KRLAW0oT6PGa4XbYrOVTc=&xsec_source=pc_search&source=web_search_result_notes","likes":3,"collects":1,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031049/6d2c52c6a906cd4c472ef67fa68702f1/spectrum/1040g34o31ub54ps1341g5qd8qqbsle1p1o6kuv8!nd_dft_wgth_webp_3","keyword":"藏东冰川","commentList":[]},{"id":"6940c827000000000d03b01e","title":"藏东冰川探险7日｜闯入异星蓝冰洞与雪山圣","content":"如果说西藏是「人间最后一片净土」\n那藏东，就是净土中尚未被喧嚣触及的晶莹心脏\n\t\n这里汇集了西藏最震撼的冰川奇观：\n✨来古冰川 触摸远古蓝冰\n✨祥格拉 钻进梦幻蓝冰洞\n✨萨普神山 倒映在寂静冰湖\n每一天，都是向着冰川之王的一次朝圣！\n\t\n🧊 𝐃𝐀𝐘 𝟏-𝟐｜拉萨 - 索松村 - 南迦巴瓦\n▪️ 雅鲁藏布大峡谷 中等待「羞女峰」露出真容\n▪️ 宿 索松村，如果运气够好——\n南迦巴瓦的日照金山 会将整片天空染成金红色🗻\n“十人九不遇”的传说，让见到它的每一眼都像神赐\n🧊 𝐃𝐀𝐘 𝟑｜来古冰川 · 走进巨型蓝冰之境\n🌟 今日高光：触摸千年蓝冰\n冬季的 来古冰川 仿佛被施了魔法：\n✔️ 湖面结冰后可直接步行至冰川脚下\n✔️ 冰川断面露出 蒂芙尼蓝、翡翠蓝 的冰层\n✔️ 钻进 冰裂隙 或 小型冰洞，光线在冰中流转如星河\n📸 建议下午抵达，光线柔和明亮，冰的蓝色更纯粹\n\t\n🧊 𝐃𝐀𝐘 𝟒｜波密 - 易贡藏布大峡谷\n穿越几乎无人知晓的 易贡藏布峡谷，沿途：\n▪️ 雪山森林相伴，偶有藏式村落点缀\n▪️ 春季桃花盛开时，宛如秘境桃源\n\t\n🧊 𝐃𝐀𝐘 𝟓｜祥格拉冰川 · 钻进蓝色水晶宫\n🌟 今日高光：蓝冰洞探秘\n祥格拉冰川 末端的 冰洞 不大，却极为惊艳——\n💎 冰壁呈现出通透的 琉璃蓝，如同走入水晶宫殿\n💎 冰顶渗下的光柱，让洞内像一场安静的蓝光梦境\n⚠️ 冰洞结构不稳定，必须在向导带领下进入\n\t\n🧊 𝐃𝐀𝐘 𝟔｜萨普冰川 · 神山与冰湖的倒影诗\n🌟 今日高光：萨普冰湖幻镜\n萨普 的震撼，一半在冰川，一半在 冰湖：\n✔️ 金字塔状的主峰倒映在湖面，对称如神迹\n✔️ 湖面常覆薄冰，倒影朦胧如油画\n✔️ 若湖面未冻，碧蓝湖水映着雪山，静谧至极\n🦌 湖边常有藏原羚走过，像闯入神话世界\n\t\n🧊 𝐃𝐀𝐘 𝟕｜那曲 - 纳木错 - 拉萨\n在 纳木错 岸边告别西藏，\n经幡飘扬，湖水深蓝，\n所有冰川记忆在此刻沉淀成一场不愿醒来的梦\n\t\n⚠️ 𝐓𝐈𝐏𝐒：\n❶ 蓝冰最佳观赏期：12月-次年3月（湖面结冰可走近）\n❷ 冰洞内部温度极低，穿戴防水防滑的鞋与保暖衣物\n❸ 部分路段海拔较高（如萨普4900m），行动放缓，备好氧气\n❹ 尊重当地信仰，不破坏冰川生态，带走所有垃圾，不要靠近投喂野生动物。\n#藏东冰川环线 #来古冰川 #祥格拉冰川蓝冰洞 #萨普冰川 #西藏蓝冰 #冰川徒步 #小众旅行天花板 #雪一落就美成了诗 #最美雪山挑战","type":"normal","author":"川藏广哥01-26","authorId":"5e1439fe00000000010046bf","url":"https://www.xiaohongshu.com/explore/6940c827000000000d03b01e?xsec_token=ABm2e8xP1si52etd-l-HFI2qkv3ogT9rb3Fxr9PReNlG4=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":1,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031049/319d9a09cee6362746249dee4fe3e5e9/notes_pre_post/1040g3k031q4uj5h47u005ngk77v08hlv67a71e0!nd_dft_wgth_webp_3","keyword":"藏东冰川","commentList":[]}]</script>
<script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');
    const cms=(n.commentList||[]).slice(0,5).map(c=>
      '<div class="comment-item"><span class="user">'+esc(c.user)+'</span><span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    ).join('');
    return '<div class="card"><div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div><div class="card-author">@'+esc(n.author)+'</div>'+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
