\n\t\n3️⃣ 广西·南宁\n真的好好吃🤤\n冬暖夏凉，气候温和；绿化覆盖率超40%，2025水质和空气都是全国前20；物价低，5块钱能买一斤水果，还个大新鲜！早餐桂林米粉5-6块。\n中山路、建政路、农院路……夜市各异，10块钱能吃到扶墙出门。生榨粉、老友粉、酸嘢、柠檬鸭……青秀山20块门票，山顶能俯瞰整座城市；\"三街两巷\"是骑楼老街，烟火气和文艺感同时存在。\n交通便利，配套设施齐全，医疗不错🏥\n🥘 吃：中山路/建政路夜市；老友粉、酸嘢、柠檬鸭\n🏠 住：100-200/晚，租房月均1000-2000。预算高选青秀区，环境好、医疗便利；想深入本地生活去江南区；看江景去柳沙半岛\n📌 缺点：夏天闷热；语言外地人友好，但本地白话听不太懂\n#旅游万粉扶持计划 #旅居 #躺平 #小众城市 #国内旅游 #数字游民 #霞浦 #六盘水 #南宁 #避暑", "type": "normal", "author": "点点万事屋02-14", "authorId": "5d03b83c000000001000c3d6", "url": "https://www.xiaohongshu.com/explore/69cdf2d2000000001f002904?xsec_token=ABEZoY-YmrjekRsIUPS1mN7q3CKfzuW5PpKDhOKPXI924=&xsec_source=pc_search&source=web_search_result_notes", "likes": 12, "collects": 9, "comments_count": 0, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604071845/9a6e9672cfdf5347f766e097a03efb1e/notes_pre_post/1040g3k031ueps9kl2g505n83n0u41gum7g5j52g!nd_dft_wlteh_webp_3", "keyword": "旅居最好的城市", "commentList": []}, {"id": "69b14b7b0000000026031e62", "title": "适合旅居的中国长寿之乡排行榜前5", "content": "中国长寿之乡有100多个，但真正排名靠前且适合旅居的是哪5个呢？#长寿之乡 #养老 #旅居 #旅居城市 #巴马 #如皋 #澄迈 #养老城市 #旅居养老", "type": "video", "author": "点点万事屋02-14", "authorId": "68767ac4000000000d02e7a3", "url": "https://www.xiaohongshu.com/explore/69b14b7b0000000026031e62?xsec_token=ABKR3j0rSoN3txz1sg2NoPY6t0fG8gf4rrB9EjtR0yICs=&xsec_source=pc_search&source=web_search_result_notes", "likes": 58, "collects": 84, "comments_count": 7, "shares": 0, "cover": "", "keyword": "旅居最好的城市", "commentList": [{"user": "山川锦鸿", "userId": "66cb68db000000001d0219a7", "text": "广东佛山市三水，海南省澄迈，湖南怀化麻阳，广西巴马，江苏南通如皋。", "likes": 3}, {"user": "老吾及人", "userId": "68767ac4000000000d02e7a3", "text": "谢谢课代表", "likes": 0}, {"user": "小红薯678A84A1", "userId": "678a45aa000000000d00aa7f", "text": "我国的长寿之乡（县），主要聚集在广西区、广东省。据我所知，官方（民政部）最新认定的一个长寿县是（广东）阳西县。", "likes": 0}, {"user": "老吾及人", "userId": "68767ac4000000000d02e7a3", "text": "长寿县的认定在不断增加，但民政部不会做这样的认定", "likes": 0}, {"user": "第三极", "userId": "5b950a13f6a6a1000193d576", "text": "钟祥，国家认证的", "likes": 0}]}, {"id": "69577fea000000001e030597", "title": "云南过冬到底哪里合适？躺平旅居心得小结", "content": "从12.1到昆明，今天还在西双版纳，这次的暖冬考察也快结束了。先说结论吧：\n非常怕冷，选普洱，芒市。\n早晚不爱出门，又对温泉有喜好，选腾冲。\n高性价比选昆明。\n耐得住寂寞，直接冲潞江坝。\n现在分维度说：\n【温度】西双版纳最暖和，然后是普洱，芒市和瑞丽，差不多，潞江坝早晚再凉一点，腾冲和大理早晚的体感再凉一点。\n【旅居服务成熟度】腾冲，潞江坝最高直接有面向旅居的成熟社区，昆明、西双版纳、大理都有大部分是服务旅居人群的小区，小区内服务不成套，但该有的都有了。瑞丽、芒市、普洱的旅居还比较早期，有专门做这种的有但不多。\n【物价】昆明物价最美好，芒市，腾冲，大理大差不差，西双版纳我体感比前三个贵点，普洱最贵。\n剩下就是我的其他维度：\n1.腾冲和潞江坝的温泉资源最好，住温泉小区的话每天游完泳可以泡温泉的那种爽。\n2.洱海和滇池其实玩起来差不多，但洱海有半边是不能自驾的，大理比昆明还冷一点，昆明想玩的话，还有相应的城市配套，我会更喜欢昆明一点。\n3.潞江坝勐赫小镇，是个独立的康养旅居项目。建了完整的配套，在怒江边上，有温泉，有绿地，运动场地。但潞江坝镇上是没有什么东西的，可以认为除了康园小区无其他外围配套。所以整体项目非常孤，如果喜欢避世生活，这个地方很舒服。\n4.普洱的旅游资源很一般，腾冲的景点如果形容为食之无味的话，那普洱就是弃之也不可惜。城市规划不太好，很多城乡结合部，城市也没有腾冲干净。但气候比腾冲好得很明显。\n5.西双版纳是我印象最差的一个地方，但我计划住10天，因为我爸真的很怕冷（我每天中午一件衬衫都要穿不住）。优势是澜沧江江景房，看着江从眼前而过，每天还是挺舒服的。但是整体的商业化很严重，而且堵车非常厉害，很难打车。每天电驴大军熙熙攘攘，我住告庄商圈，全程靠走。\n6.云南的口味整体偏咸，傣味酸辣口，炸物烧烤多。吃得清淡养生的人在这里，每天除了米线，石锅鱼，菌菇火锅就没什么可以吃的。如果要住超过10天，尽量找个能做饭的，不然每天吃饭都是大问题。西双版纳会好点，这里非常多东北人，所以有很多东北菜馆，至少不辣，过下水就能吃。昆明因为是省会，什么菜系都有，食物丰富度相对来讲，也会比较友好。\n7.瑞丽城市太小了，综合配套不行。\n【打个补丁】一家之言，欢迎讨论\n#旅居  #云南旅居 #昆明 #腾冲 #大理  #芒市  #云南旅游 #大理 #西双版纳 #普洱", "type": "normal", "author": "点点万事屋02-14", "authorId": "57e8b48650c4b4540b746e6b", "url": "https://www.xiaohongshu.com/explore/69577fea000000001e030597?xsec_token=ABWWdvpGyKtWNK8vkBCRK_fP12VFheTRSFRLcDPtVoVZg=&xsec_source=pc_search&source=web_search_result_notes", "likes": 1499, "collects": 2046, "comments_count": 684, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604071846/831e026f4200218da2da4d0c5b0b7f55/notes_pre_post/1040g3k831qr4jgan0a0048nejmq8crjbput2ee0!nd_dft_wlteh_webp_3", "keyword": "旅居最好的城市", "commentList": [{"user": "雄健", "userId": "613892e50000000002026074", "text": "还有两年退休，打算卖了杭州房子到云南定居养老！一辈子住大城市里不想选昆明，想找个安逸的小城市，目前看好腾冲！想知道有什么缺点除了交通？", "likes": 10}, {"user": "兴兴向荣", "userId": "650c58990000000012007c6d", "text": "卖了杭州的房子（500w）去云南县城生活（50w房），（450w养老）一天三顿饭一顿十个菜，那不天天过皇帝的生活…", "likes": 38}, {"user": "赵", "userId": "5d6bd9640000000001008fbf", "text": "嗯嗯，和我的感觉一样，云南转了一圈，就昆明的性价比最高了，吃的便宜，住的便宜，玩的好，其他的地方一言难尽。云南我去了昆明、元谋、普洱、建水、西双版纳，我推荐昆明", "likes": 35}, {"user": "🍓のBB", "userId": "5990e7255e87e77e019d8ecc", "text": "真的嘛！我刚刚还在考虑弥勒和西双版纳选一个", "likes": 4}, {"user": "市井凡人", "userId": "5c7e023d000000001600097a", "text": "看来你是白考察了，没有抓到重点。", "likes": 2}]}, {"id": "69b048b4000000002203a014", "title": "中国适合的旅居城市", "content": "中国最适合穷人旅居城市 TOP10\n1️⃣ 曲靖\n综合最适合长期生活\n优点\n•夏天凉快（20-27℃）\n•房租便宜\n•城市比较干净\n•交通方便（离昆明近）\n房租\n•单间：400–700\n•一室一厅：700–1200\n生活费\n👉 1500–2500/月\n⸻\n2️⃣ 普洱\n冬天非常舒服\n优点\n•冬天暖和\n•空气好\n•森林多\n缺点\n•夏天湿热\n•城市比较小\n房租\n•400–900\n生活费\n👉 1800–2600/月\n⸻\n3️⃣ 玉溪\n气候非常好的城市\n优点\n•四季温差小\n•空气好\n•靠近昆明\n缺点\n•房租比曲靖略贵\n房租\n•700–1200\n生活费\n👉 2000–3000/月\n⸻\n4️⃣ 阳朔\n中国最有名的旅居小镇\n优点\n•风景非常好\n•外国人多\n•生活节奏慢\n缺点\n•夏天湿热\n房租\n•500–1000\n生活费\n👉 2000–3000/月\n⸻\n5️⃣ 建水\n云南隐藏旅居城市\n优点\n•古城生活\n•房租极低\n•生活节奏慢\n房租\n•300–600\n生活费\n👉 1500–2200/月\n⸻\n6️⃣ 兴义\n优点\n•气候不错\n•房价很低\n•瀑布很多\n房租\n•400–800\n生活费\n👉 1800–2500/月\n⸻\n7️⃣ 芒市\n优点\n•东南亚风格\n•冬天暖和\n缺点\n•夏天比较热\n房租\n•500–900\n生活费\n👉 2000–2800/月\n⸻\n8️⃣ 北海\n优点\n•海边城市\n•冬天不冷\n缺点\n•夏天湿热\n房租\n•600–1200\n生活费\n👉 2200–3200/月\n⸻\n9️⃣ 个旧\n优点\n•云南小城\n•房租极低\n房租\n•300–600\n生活费\n👉 1500–2000/月\n⸻\n🔟 普者黑\n优点\n•山水漂亮\n•很安静\n缺点\n•城市小\n房租\n•400–800\n生活费\n👉 1800–2500/月\n⸻\n最适合你的组合旅居\n很多旅居的人其实这样安排：\n夏天\n👉 曲靖 / 兴义\n冬天\n👉 普洱 / 北海\n基本可以做到：\n全年20-28℃生活", "type": "normal", "author": "点点万事屋02-14", "authorId": "60b08705000000000101db39", "url": "https://www.xiaohongshu.com/explore/69b048b4000000002203a014?xsec_token=ABH4m7BN7_zfH00vUWjUyQfbsOIB_6GWz_iYhgt6ujl3k=&xsec_source=pc_search&source=web_search_result_notes", "likes": 254, "collects": 225, "comments_count": 10, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604071846/c387e8fecf267f04da0595db27207311/1040g2sg31thr2i0vlac05o5ggs2gbmpp8a8nc6o!nd_dft_wlteh_webp_3", "keyword": "旅居最好的城市", "commentList": [{"user": "今日头条：成都雪燕", "userId": "5f6fdbde0000000001007bd6", "text": "你把价格考查的有点高了，云南租房旅居一个月：1800-2500就OK。今日头条搜成都雪燕，一个人在云南四个多月了，走了20座大小不一的城市，附消费清单……", "likes": 1}, {"user": "璞缘", "userId": "60b08705000000000101db39", "text": "好的，收藏您清单了，等有机会实地去考察", "likes": 2}, {"user": "今夜又在", "userId": "5b5161204eacab624df49b8b", "text": "都可以啊", "likes": 0}, {"user": "璞缘", "userId": "60b08705000000000101db39", "text": "", "likes": 0}, {"user": "。。", "userId": "5e952b6f0000000001007792", "text": "元江", "likes": 4}]}, {"id": "69ac0898000000001a031b30", "title": "我心中适合躺平旅居的城市（一）", "content": "作为一个从上大学开始就到处旅行，不爱打卡拍照但是极度喜欢体验当地风土人情的人，因为大二就想做数字游民自由职业，所以记录下自己体验的城市感受，也给其他gap躺平/数字游民等提供参考\n1️⃣大理\n大理是旅居初心之地，在这里见到了太多从天南海北来这旅行结果就留下的人。因此也有非常多民宿/98🍷等招义工提供食宿。\n苍山洱海天天看着心情好。气候舒服，冬暖夏凉，物价也友好，一个月三四千能过得挺滋润。哪怕你喜欢网红美食也没有很贵（没错我说的就是你——烤乳扇😭）。\n大理有很多数字游民和DAO，社区氛围很好。全是全国各地来的新大理人，开店、做自由职业的都有，咖啡馆、酒吧坐一下午就能交到新朋友。游学项目也多，英语角、瑜伽课、手工艺坊啥的都有。\n🌞淡旺季比较明显，缺点是旺季游客多有点吵。还有就是在云南得注意防晒，蓝天白云非常漂亮，但要是不注意防晒会分分钟被晒伤。\n\t\n2️⃣昆明\n☁️春城不是白叫的，2025年空气质量优良率99.7%，我从初中开始鼻炎就很严重，到这基本没犯过\n🏠生活成本比大理（古城附近）还低，房租1500-2000一个月，3000块能过得很舒服。吃饭也便宜，好吃的很多。城市配套也齐全，医院商场地铁都有。我在翠湖附近住了半个月，后面又去呈贡住了一个月，哪怕是相对偏僻的呈贡，医院商场等配套设施也是很完善方便的\n🚄昆明是今天推荐的三个城市中交通最好的，算是云南旅游城市的交通枢纽：不管是去北线大理-丽江-香格里拉，还是去南线普洱-西双版纳-芒市，基本都要从昆明出发。而且市内交通也很棒，地铁四通八达，还有共享电驴\n缺点就是没有海，夏天雨太多\n3️⃣惠州\n🌊气候不错，靠海但不像三亚那么卷。巽寮湾、双月湾海水和海滩质量不错。\n🌆最大优点是离深圳近，高铁半小时，房价却只有深圳三分之一。很多深圳人周末来度假。\n文化底蕴也深，苏轼被贬到惠州写了400多首诗，西湖、罗浮山适合周末逛。\n🏠房租1500-2500一个月，双月湾甚至能到650就是有点荒，不过比深圳便宜太多。节奏慢，适合想躺平看海不想社交，或偶尔要去大湾区的人。\n#旅游万粉扶持计划 #冷门又有趣的城市 #宜居城市 #适合生活的城市 #松弛感旅游 #旅居 #大理旅居 #昆明旅居 #惠州旅居 #适合躺平的城市", "type": "normal", "author": "点点万事屋02-14", "authorId": "5d03b83c000000001000c3d6", "url": "https://www.xiaohongshu.com/explore/69ac0898000000001a031b30?xsec_token=ABQARlzvGKvxHLYq1QQwmFcaNrCjuru8xFGjSUBPu_fWg=&xsec_source=pc_search&source=web_search_result_notes", "likes": 68, "collects": 49, "comments_count": 6, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604071846/d7813ee10cd4a5156cdf6290ce8bd41f/note_pre_post_uhdr/1040g3r831tdlejer5k6g5n83n0u41gumnf9be8g!nd_dft_wgth_webp_3", "keyword": "旅居最好的城市", "commentList": [{"user": "小七吖～", "userId": "5e5b2c730000000001000602", "text": "惠州租哪里方便呢", "likes": 0}, {"user": "小浛游玩日记🍧", "userId": "5d03b83c000000001000c3d6", "text": "看个人需求啦，我不爱逛景点在海边一坐一天，所以选的双月湾", "likes": 0}, {"user": "欣欣", "userId": "5dd6bd530000000001002f84", "text": "请问这个季节有一个星期的时间建议去哪？谢谢了", "likes": 0}, {"user": "小浛游玩日记🍧", "userId": "5d03b83c000000001000c3d6", "text": "我写的这仨都是适合长期旅居的，如果是7天旅游的话看你想去哪种地方喽：特种兵可以速通云南昆大丽香线（不过我还是建议待时间长点），趁着还没特别热可以去三亚、新马泰，时间合适；也可以去重庆及周边，最近是淡季 还可以赏花。想躺平的话可以坐邮轮", "likes": 1}, {"user": "花语溪岸·四季艺术康养度假区", "userId": "674d6be4000000001d02c480", "text": "攀枝花的冬天也很好啊", "likes": 0}]}, {"id": "", "title": "逃离大城市！2026全年低成本旅居攻略🏠", "content": "", "type": "normal", "author": "点点万事屋02-14", "authorId": "", "url": "https://www.xiaohongshu.com/search_result?keyword=%E6%97%85%E5%B1%85%E6%9C%80%E5%A5%BD%E7%9A%84%E5%9F%8E%E5%B8%82&source=web_search_result_notes&type=51", "likes": 183, "collects": 0, "comments_count": 0, "shares": 0, "cover": "", "keyword": "旅居最好的城市", "commentList": []}, {"id": "696f7871000000000903861b", "title": "旅居2年，盘点我心目中最佳旅居躺平地Top5", "content": "这两年去了12个国家，30+城市旅行生活，分享心中5个最适合的海外旅居目的地\n\t\n里斯本（p2-p4）⭐️ ⭐️ ⭐️ ⭐️ ⭐️\nPros：\n-阳光充足天气好，好吃好玩，海上项目多\n-物价低，打车价格低到和上海差不多\n-周围的地区也好玩，可以去周围城市波尔图or海边小镇Lagos\nCons：\n-交通没有欧洲其他国家便利\n-老城区的地面有点滑😅\n\t\n尼泊尔（p5-p7）⭐️ ⭐️ ⭐️ ⭐️\nPros：\n-英语普及度高\n-可以低价买到很多手工产品\n-精神乐园，人文氛围温和自由，当地人都比较知足常乐。喜欢博卡拉，有雪山有小湖适合慢生活\n-喜马拉雅山的徒步路线\n-释迦牟尼出生地在尼泊尔境内，佛教氛围独特\nCons：\n-加德满都空气很差，出门一圈鼻子都是黑的\n-境内交通不方便，只有飞机或大巴，飞机容易坠机，大巴要十小时\n-好吃的东西没那么多\n\t\n清迈（p8-p9）⭐️ ⭐️ ⭐️ ⭐️ ⭐️\nPros：\n-便利，适合生活，办公场所多，数字游民后花园\n-比较好吃，泰餐中餐711\n-可玩性高，爬山射击瀑布公园寺庙\n-可以抽几天去附近的pai县，嬉皮丛林\nCons：\n-消费比想象中贵\n-雨季会有一周几乎天天都下雨\n-白人太多\n\t\n埃及（p11）⭐️ ⭐️ ⭐️ ⭐️\nPros：\n-我评为最适合旅游的国家，推荐海边小镇dahab，首都开罗，沙漠绿洲siwa\n-文化属性强，穆斯林旅游国家，除了独特的景观，每天都会被动接触极友好or极不友好的埃及人，导致体验感很强\n-物价低\nCons：\n-容易被偶尔骗个三瓜两枣的\n-女性独行不友好，容易遇到xsr\n\t\n巴厘岛（p12）⭐️ ⭐️ ⭐️ ⭐️\nPros：\n-见到多次漂亮的日出日落\n-灵性相关的活动丰富，冥想瑜伽等等\n-四季的夏天，怕冷人友好\n-有些不错的餐厅和cafe，有人说商业化严重，有人说这是便利的象征\nCons：\n-生物物种太丰富\n-有时候会感觉像人造的数字游民乌托邦，新型殖民地\n\t\n巴塞罗那（p13）⭐️ ⭐️ ⭐️ ⭐️\n-典型欧洲城市之一，西班牙餐还不错，火腿和churros美味\n-旅游业发达，博物馆公园海边等等\n-可以去周边小城or西班牙小岛玩，推荐Mallorca\n-境内境外交通便利\nCons：\n-很多地方需要提前预约\n\t\n#旅居 #旅居生活 #宜居城市 #退休计划  #数字游民", "type": "normal", " ext": "关键是医疗有无保障", "likes": 0}, {"user": "犬如主义💘", "userId": "5cb5a7e600000000100233c0", "text": "旅居平台有没有那个推荐的呀？专业的", "likes": 0}, {"user": "花语溪岸·四季艺术康养度假区", "userId": "674d6be4000000001d02c480", "text": "很负责任的告诉大家，攀枝花气候真的适合宜居养老", "likes": 0}, {"user": "莓烦恼星球", "userId": "610a61d2000000000101c68a", "text": "这些哪个地方比较更推荐去呀", "likes": 0}]}, {"id": "692ea861000000001d03e51e", "title": "旅居世界3️⃣年反复回住的真爱宝地top3", "content": "最近回顾过去3年旅居生活去过的那些国家和城市，我们非常默契地选出了心目中的TOP3👇🏻\n1️⃣ 泰国·帕岸岛\n不只是满月派对，更是数字游民快乐老家！\n🏝️ 椰林沙滩+高速网络，海边办公日常\n👯 数字游民社群超成熟，很容易找到同频伙伴\n🍜 吃喝按摩又便宜又赞，性价比之王（但听说疫情后涨价了，最近去过的宝子可以留言分享一下吗？）\n📌 提示：建议避开满月派对期间，平时更清净宜居\n（之前发过好几期帕岸岛攻略视频，可以翻看哦～）\n2️⃣ 印尼·巴厘岛\n乌布——精神充电圣地\n🌿 住在雨林梯田边，瑜伽、冥想、吃素喝咖\n🌋 Amed——潜水爱好者的秘密基地，海水清人少，还能看火山景\n✨ Lovina——潜在的好去处，可以看海豚，游客相比其他地方要少，更安静。\n3️⃣ 墨西哥·San Cristóbal de las Casas\n小众却惊艳的高山小镇！有着200多个国家的旅居者\n⛰️ 海拔2000+米，气候常年像秋天\n🎨 色彩斑斓的殖民建筑，土著文化浓厚\n💻 安静宜居，生活成本低，适合深度创作\n\t\n这三个地方是我们旅居时间蕞长、反复回去的“家”。没有绝对完美的地方，看更适合阶段的归宿。\n如果你正要出发或者已经在路上，不妨可以去看看～\n✨ 下一站，也许是西班牙、葡萄牙、大理？\n\t\n你们心中的TOP 1是哪里呢？欢迎推荐你的宝藏旅居地 👇\n\t\n#数字游民 #旅居生活 #远程工作 #旅居推荐 #泰国旅居 #巴厘岛旅居 #墨西哥旅行 #生活方式 #旅居 #慢慢游世界", "type": "normal", "author": "点点万事屋02-14", "authorId": "5c4fff960000000011035905", "url": "https://www.xiaohongshu.com/explore/692ea861000000001d03e51e?xsec_token=ABS3UNbAUIaTo0v-aUH2SP3upL7sl1wBi1d_rjRYEiPqo=&xsec_source=pc_search&source=web_search_result_notes", "likes": 101, "collects": 124, "comments_count": 36, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604071846/e063cd8ac350e9a9bd1f3a9e7b666def/notes_uhdr/1040g3qg31pj8973fk0ag5n2fvub4em85k8bkuao!nd_dft_wlteh_webp_3", "keyword": "旅居最好的城市", "commentList": [{"user": "数字游民埃莉", "userId": "5c4fff960000000011035905", "text": "尼泊尔的博卡拉也很推荐，尤其是喜欢徒步的小伙伴", "likes": 4}, {"user": "甜七岁", "userId": "5f21a161000000000100bea5", "text": "负重徒步吗", "likes": 0}, {"user": "Mmmm", "userId": "619e12ca000000001000d9f5", "text": "我在San Cris 原本计划一个月 现在打算呆四个月 很爱", "likes": 3}, {"user": "数字游民埃莉", "userId": "5c4fff960000000011035905", "text": "我们当时也是！住了将近五个月，后来又去住了三个月😄", "likes": 0}, {"user": "爱睡觉爱晒太阳的毛毛虫", "userId": "57dde7025e87e73f0878bd02", "text": "目前正在san Cristobal, 舍不得走了...", "likes": 1}]}, {"id": "68351cd600000000230036cf", "title": "逃离大城市！2026全年低成本旅居攻略🏠", "content": "中国最适合旅居的城市 四季如春 消费亲民#旅居 #旅居养老度假 #旅行推荐官 #腾冲#养老", "type": "video", "author": "点点万事屋02-14", "authorId": "679db08f000000000a03d66e", "url": "https://www.xiaohongshu.com/explore/68351cd600000000230036cf?xsec_token=AB-Ii1L8wC7xgwBYXCMM49bBCSWZmxKoqBgJRBZtRhjo8=&xsec_source=pc_search&source=web_search_result_notes", "likes": 600, "collects": 414, "comments_count": 25, "shares": 0, "cover": "", "keyword": "旅居最好的城市", "commentList": [{"user": "大宝贝", "userId": "589d1d217fc5b80ce8ccdb28", "text": "请问具体位置？", "likes": 0}, {"user": "小红薯6902B1A5", "userId": "690214eb0000000037002cf6", "text": ".", "likes": 0}, {"user": "好男人", "userId": "653f59f00000000006006639", "text": "腾冲哪里，如何联系，有没有祥细地址", "likes": 1}, {"user": "灯火阑珊", "userId": "5ee8d2aa00000000010040f4", "text": "腾冲就那么大", "likes": 0}, {"user": "无肉确实不欢", "userId": "59dcf75fde5fb40c3dc98e11", "text": "我再熬十五年之后退休金正好两千", "likes": 11}]}, {"id": "69ad15fb000000001a024666", "title": "我心中适合躺平旅居的国内城市（二）｜gap", "content": "上篇写国内旅居城市大理昆明惠州，再补充几个现在相对小众没那么多人去的👇\n1⃣普洱\n我是从昆明出发四处逛逛到了普洱，绝对是云南被严重低估的宝藏城市，明明离大理不远，但游客少太多了。普洱茶盛名在外，走在街上随处可见茶馆咖啡馆，左手茶叶右手咖啡真的不是梗。\n☁️气候也舒服，亚热带气候温暖宜人，夏天不热冬天不冷。物价也友好，房租500-1000一个月就能租到不错的民宿或公寓，生活成本比大理低。\n⛰️周边玩法也多，普洱茶山、景迈山、那柯里茶马古道，周末随便找个茶山住一晚，满眼绿色很治愈🍜美食也多，菌子鲜米线香，整体待着舒服\n\t\n2⃣陵水\npyq不少web3从业者 数字游民在这旅居，算是海南的小众海岛天堂，就在三亚旁边，海水质量一点不输三亚，但物价比三亚低多了。冬天过来避寒的人比三亚少太多，享受的是真正清静的海滩。县城租房1300-1800一个月就能住得不错，海景房会贵一些但也能接受。\n🌊景点也不错：分界洲岛的海水蓝得不真实，南湾猴岛可以看猴子，清水湾的沙滩又白又细。消费方面日常吃饭比三亚便宜很多，海鲜新鲜又不贵，特别是英州和新村两大夜市很有烟火气。很适合赶海\n🔥缺点是夏天太热，而且得注意防晒。交通不是很便利，需要租三轮或小电驴。\n\t\n3⃣西昌\n西昌是四川人私藏的\"小春城\"，位于凉山州首府（夏天可以去参加火把节），全年日照300多天，年均气温18℃，冬天不冷夏天不热，比成都舒服不少（挺喜欢成都的，就是去了几次 夏天去下雨闷热冬天去灰蒙蒙的有点受不了）\n🐚最出圈的是邛海 —— 冬天可以喂海鸥看落日，夏天骑行环湖，生态很好有各种小动物。遛娃的话金麟沙滩、滨海乐园、星月湖公园都很合适。喜欢文化古迹的话可以逛建昌古城。\n🏠淡季房租市区500-800一个月，2000块能过得还不错。这边美食特色是烧烤，可以尝试火烧猪。\n缺点是位置偏一些，景点比较分散需要打车。城市小 节假日会人多挤，而且物价有争议，有人会觉得高一些\n#旅游万粉扶持计划 #旅居 #大学生旅居 #宜居城市 #数字游民生活方式 #松弛感旅游 #逃离一线城市 #旅居生活 #小众旅游目的地 #适合生活的城市", "type": "normal", "author": "点点万事屋02-14", "authorId": "5d03b83c000000001000c3d6", "url": "https://www.xiaohongshu.com/explore/69ad15fb000000001a024666?xsec_token=AB6l85gsuO6_f8udszwd2zFcB8D0TuStcT9kPycJ26Z98=&xsec_source=pc_search&source=web_search_result_notes", "likes": 26, "collects": 28, "comments_count": 0, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604071846/0c6a787fc66e3cb2f546e00f4be31ab9/notes_pre_post/1040g3k831ten299m5sa05n83n0u41gumtovn0a0!nd_dft_wlteh_webp_3", "keyword": "旅居最好的城市", "commentList": []}, {"id": "694962ef000000001e010f86", "title": "逃离大城市！2026全年低成本旅居攻略🏠", "content": "国内最松弛的旅居地是哪里，来点推荐\n准备明年离职后彻底开始旅居生活。想认识一点志同道合的人", "type": "normal", "author": "点点万事屋02-14", "authorId": "5aafa1944eacab3fe7cacb44", "url": "https://www.xiaohongshu.com/explore/694962ef000000001e010f86?xsec_token=ABsB0RxGcJBXnt-DL6JMfiec_y6xzeqPVs6MPq0DwXFGk=&xsec_source=pc_search&source=web_search_result_notes", "likes": 167, "collects": 100, "comments_count": 240, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604071846/8e9886a13959bba71f3d738952a07057/1040g2sg31qdbhnnbn46g4a3nkagp9iq4os1e298!nd_dft_wlteh_webp_3", "keyword": "旅居最好的城市", "commentList": [{"user": "光束一夜黑", "userId": "66e08c49000000000b0307bd", "text": "大理啊，每年都来两次。。一次2-3个月。昨天刚刚到。打算带到明年4月回。。", "likes": 49}, {"user": "不吃炸物", "userId": "5aafa1944eacab3fe7cacb44", "text": "每次都租房吗", "likes": 1}, {"user": "小红薯69682735", "userId": "5e0040cd00000000010077af", "text": "我的IP我的家", "likes": 12}, {"user": "Lisee", "userId": "63b672630000000026010c76", "text": "是大理吗", "likes": 2}, {"user": "白羊", "userId": "5c3c80a500000000060130a6", "text": "大家都推荐大理，但是我觉得大理有一种刻意的松弛，类似上海。（仅代表个人感觉）", "likes": 22}]}, {"id": "69897c6f000000000a03cc78", "title": "贵州旅居｜给愿意慢下来玩 · 学 · 养 的人", "content": "走到这个阶段，\n很多人都会发现：\n.\n热闹的旅行，越来越累😮‍💨\n真正想要的，是舒服地生活一段时间。\n.\n不是打卡📌\n不是赶路🚶‍♀️\n而是在一个合适的地方，把节奏彻底慢下来⏳\n.\n这也是我们选择贵州，用一个月，认真完成一次玩·学·养的原因。\n—\n很多人问：一个月，会不会太久？🤔\n.\n其实恰恰相反。\n只有时间够长，\n身体才会真正放松😌\n情绪才会真正安静🧘‍♀️\n生活原本的质感，才会慢慢回来。\n—\n在贵州的这一个月，我们不赶景点、不追热闹，只专注三件事：\n.\n🎈 玩｜把自己重新打开\n走进山里⛰️，在村子慢慢走🚶，和当地人闲聊👥，看云卷云舒☁️，静静感受时间流淌。\n.\n不为刻意“好玩”，只为找回久违的——活在当下的感觉。\n.\n慢慢的，笑声多了😄，人与人的连接也自然发生。\n—\n📚 学｜让人重新亮起来\n.\n深入接触贵州本土文化与非遗🎭，不只是拍照打卡，而是真正理解、沉浸式学习。\n.\n学一门手艺✂️，懂一段历史📜，习得与自然共处的方式。\n.\n你会发现，开始学习的人，眼睛更亮👀，表达更丰富，心也慢慢打开。\n—\n🌿 养｜很多修复，是自然发生的\n.\n贵州的夏天，最珍贵的就是“不过度”☀️。\n.\n不过度炎热、不过度刺激、不过度打扰🔕。\n.\n在这里，睡眠会变安稳🛌，呼吸更顺畅🍃，饮食也变得简单干净🥗。\n.\n有些治愈，从来不是刻意做什么，而是终于不用再硬撑。\n—\n为什么一定要一整个月？🗓️\n.\n一周是新鲜，两周是习惯，一个月，生活才会真正悄悄改变你。\n.\n人会变松弛🧶，说话会放缓🫧，表情会柔软，慢慢靠近最真实的自己。\n—\n✨ 谁会喜欢这样的旅居？\n.\n✔ 不再迷恋热闹🎉\n✔ 更在意生活质量🧺\n✔ 愿意为身体负责💪\n✔ 希望长期保持好状态🌟\n✔ 喜欢和同频人一起生活的你🤝\n—\n📅 时间\n2026年5月–10月，贵州最适合长住的季节。\n小规模、慢节奏，静静生活。\n—\n也许我们需要的，从不是更多旅行，\n而是一个地方，让身体、情绪、节奏，重新对齐。\n.\n对这样的贵州旅居感兴趣，欢迎留言💬，或联系我们详细了解。\n.\n接下来的事，我们可以慢慢…⏸️\n\t\n.\n#旅居生活 #贵州 #贵州旅居 #避暑 #乡村生活 #苗寨 #非遗体验 #无龄岛", "type": "normal", "author": "点点万事屋02-14", "authorId": "67ea5a4d000000000e02d2c9", "url": "https://www.xiaohongshu.com/explore/69897c6f000000000a03cc78?xsec_token=ABD7KxkrvMtYcTXbGIQBCwx4ewRjF-5ltJGmo-qN2ssMU=&xsec_source=pc_search&source=web_search_result_notes", "likes": 81, "collects": 128, "comments_count": 167, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604071846/8b94362df384e302d1a0c7976bc8a1a5/notes_pre_post/1040g3k031sbt7ac4l8e05pvab96jlkm9jptvkvg!nd_dft_wgth_webp_3", "keyword": "旅居最好的城市", "commentList": [{"user": "无龄岛", "userId": "67ea5a4d000000000e02d2c9", "text": "很多朋友会关心居住环境、日常节奏、适合什么样的人，我们都会慢慢介绍，欢迎来聊。\n\n如果你已经不再喜欢赶路，而更在意真实的生活体验，这个计划可能很适合你。", "likes": 0}, {"user": "小红薯60ABF013", "userId": "60ab6c050000000001002bb0", "text": "怎么收费", "likes": 0}, {"user": "偶尔变成老虎的乖乖猫", "userId": "581c8d7982ec3925b8f91085", "text": "想了解具体内容", "likes": 1}, {"user": "无龄岛", "userId": "67ea5a4d000000000e02d2c9", "text": "我私您", "likes": 0}, {"user": "老张", "userId": "5f899130000000000100b4a2", "text": "60多可以参加吗？", "likes": 0}]}, {"id": "698c19ae000000002800955f", "title": "旅居海南：放弃三亚，选了更小众的澄迈值了", "content": "今年反向过年，不回老家\n来到了最南端的海南，没有去三亚\n而是来到了靠近海口的宝藏小城：📍澄迈\n\t\n这里是世界长寿之乡，人少景美\n🏖️有沙滩，可以带娃去躺平\n🌇也有古村，可以感受不一样的人文\n🌴还有自然美景，椰林、瀑布，美不胜收\n如果你刚好来海南，这份游玩攻略，请收好～\n\t\n✅盈滨半岛：琼北超干净超美的海滩，这里可以度假休养，也有很多老人来这里养老，距离海口半个小时车程，去机场火车站也很方便\n✅永庆寺：建在海边的寺庙，海南规模zui大的宋代风格禅宗寺院，三面环海\n✅福山咖啡：被誉为“中国咖啡第一镇”，非常海南本土的咖啡风味，也很适合遛娃\n✅罗驿古村：800多年历史的古村，苏东坡被贬海南在此休息，建筑是火山岩石🪨，跟大陆的古村很不一样\n✅美榔双塔：被誉为“海南小吴哥窟”，也叫姐妹塔。这里不仅有800多年的历史，还有着感人的故事\n✅大泻瀑布：藏在火山岩地缝中的瀑布，很有原生热带风情\n\t\n这次来海南澄迈旅居，整体真的很舒服\n🌬️不过住在海边，早晚海风还是挺大的，体感温差明显，尤其风大的时候，爸妈还是会觉得凉～\n幸好带了我上次送他们的过冬礼物：ororo加热服\n\t\n不管是在北方的低温天气，还是这次在海南的海边风里，都挺实用的。冷的时候开一下加热，暖得很快；热了关掉也不闷\n爸妈自己穿着也觉得方便，而且日常打理很省心，直接水洗就行，不用特别护理\n对他们来说，舒服、简单、实用，可能比什么都重要\n\t\n❤️游玩tips\n1️⃣注意防晒，看人注意保暖\n2️⃣澄迈景点都🆓，但公共交通不太方便，自驾最佳\n3️⃣美食推荐当地的烤乳猪、白莲鹅，以及糟粕醋火锅\n\t\n#旅游编辑部 #旅居 #海南旅游 #亲子带娃度假 #澄迈 #新年旅行第一站 #我是春节主理人 #去温暖的地方过冬#被低估的宝藏小城#带着父母去旅行#长辈友好旅行地#和爸妈的第一次旅行#和爸妈的旅行日记#镜头里的爸妈 #智能穿戴 #寒冬穿搭神器 #ororo加热衣", "type": "normal", "author": "点点万事屋02-14", "authorId": "66a0d5f1000000002401d7e9", "url": "https://www.xiaohongshu.com/explore/698c19ae000000002800955f?xsec_token=ABkAl_lDNfb4mr1Q8UtoKNIkeESYZYEIzyNXEAJUta9c8=&xsec_source=pc_search&source=web_search_result_notes", "likes": 1277, "collects": 1121, "comments_count": 131, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604071847/90e95fb24b21969ff92e63c8ce04e663/notes_pre_post/1040g3k031segb5m6lk405pl0qnop3lv96rmcnqg!nd_dft_wlteh_webp_3", "keyword": "旅居最好的城市", "commentList": [{"user": "手撕鸡魔人", "userId": "60ffddd2000000000100978b", "text": "那边租房贵不贵", "likes": 2}, {"user": "白日梦想家王小异", "userId": "66a0d5f1000000002401d7e9", "text": "我们提前租的，三居室，2000多点", "likes": 7}, {"user": "IMP--姚志文", "userId": "62777a5a00000000210287f1", "text": "别奶澄迈，我呆最舒服的地方之一，你奶多了，去了人多了，就没啥意思了", "likes": 20}, {"user": "白日梦想家王小异", "userId": "66a0d5f1000000002401d7e9", "text": "有道理", "likes": 3}, {"user": "郑大钱💰", "userId": "599fa6a36a6a694aab3c4f23", "text": "坐飞机坐到哪里呀，一个人去好玩吗，打算年后去", "likes": 0}]}, {"id": "", "title": "逃离大城市！2026全年低成本旅居攻略🏠", "content": "", "type": "normal", "author": "点点万事屋02-14", "authorId": "", "url": "https://www <script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');
    const cover=n.cover?'<div class="card-cover"><a href="'+esc(n.url)+'" target="_blank"><img src="'+esc(n.cover)+'" alt="'+esc(n.title)+'" loading="lazy"></a></div>':'';
    const authorLink=n.authorId?'<a href="https://www.xiaohongshu.com/user/profile/'+esc(n.authorId)+'" target="_blank">@'+esc(n.author)+'</a>':'@'+esc(n.author);
    const cms=(n.commentList||[]).slice(0,5).map(c=>
      '<div class="comment-item">'+(c.userId?'<a class="user" href="https://www.xiaohongshu.com/user/profile/'+esc(c.userId)+'" target="_blank">'+esc(c.user)+'</a>':'<span class="user">'+esc(c.user)+'</span>')+'<span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    ).join('');
    return '<div class="card">'+cover+'<div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div><div class="card-author">'+authorLink+'</div>'+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
