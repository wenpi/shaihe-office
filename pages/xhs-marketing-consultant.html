去，才能给有需求的你提供有质量的服务。\n-\n我们团队请人，从来不请小白，基本上都要有一年以上工作经验。太有经验的也请不到，我们请70分以上的人，进来培训再慢慢上手。\n·\n目前团队两年以上运营经验的同事超过60%。我和合伙人都是运营出身，所以我们属于技术型公司，不是销售型公司，销售就只有一个。\n·\n我也希望通过这条帖子，能遇到真正懂我们价值、懂我们团队的伯乐。\n·\n当然，无论你是哪个赛道的，只要在小红书获客上有疑惑，都可以和我交流，知无不言，言无不尽。\n#小红书运营 #新媒体运营 #工作使我开心 #创业 #创业者 #爱上工作的瞬间 #小红书运营 #小红书代运营 #代运营 #小红书代运营公司","type":"normal","author":"小红书生态营销顾问-野茜","authorId":"5e3a520500000000010063a2","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31dsej6dfgm005poacujnedg0mmcecp8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69bd3052000000002100745c?xsec_token=ABa8NoqgBhEJW0PaLMsuv7pVCiGj6c_rUsSNAa5ASsqP0=&xsec_source=pc_search&source=web_search_result_notes","likes":7,"collects":7,"comments_count":44,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604230904/9a14dd37e1f60fe0b46e5364b2c31b6b/notes_pre_post/1040g3k831tuec1iags005nhqa82g8ot2lijjf90!nd_dft_wlteh_webp_3","keyword":"小红书营销顾问","commentList":[{"user":"孜孜不倦.","userId":"62aaa8c6000000001b025749","text":"怎么联系","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo319t5em09nc0g5olal336slq9pmckaig?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"灵兮.SpiritOh","userId":"632da7f8000000002303cff8","text":"你好","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31sj0l2gq626g5opdkvs8vjvomv5tbq8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"K哥-联诺咨询","userId":"5e3a520500000000010063a2","text":"来了","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/68be9e511a868b0001ca1437.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"K哥-联诺咨询","userId":"5e3a520500000000010063a2","text":"来了","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/68be9e511a868b0001ca1437.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"秋天的神话","userId":"6474aa0b0000000012034fe0","text":"想合作？","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1000g2jo2ir3n6tgim06g5p3kl85kmjv0dq5kr70?i <script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');

    // 作者链接
    const authorLink=n.authorId?'https://www.xiaohongshu.com/user/profile/'+n.authorId:'#';
    const authorHtml='<div class="card-author">@<a href="'+authorLink+'" target="_blank">'+esc(n.author)+'</a></div>';

    // 评论（带作者链接）
    const cms=(n.commentList||[]).slice(0,5).map(c=>{
      const cLink=c.userId?'https://www.xiaohongshu.com/user/profile/'+c.userId:'#';
      return '<div class="comment-item"><span class="user"><a href="'+cLink+'" target="_blank" style="color:#667eea;text-decoration:none">'+esc(c.user)+'</a></span><span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    }).join('');

    return '<div class="card"><div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div>'+authorHtml+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
