gr2/strip"},{"user":"slskkk","userId":"610550bf0000000001015f73","text":"西湖dd正经182小帅 平时工作没社交想认识新朋友","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31unaib502i005o85a2vganrjgnn16u0?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"自分","userId":"66210d080000000007006600","text":"06富阳","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31g4musu6hk005ph11k41opg0tenpg9o?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"今天也要早睡","userId":"5926e3f950c4b44eb878c761","text":"萧山d","likes":32,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t2460lkm87049hcrbhvjhr1dvffbbg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"赤翼","userId":"65ba2d42000000000903d89c","text":"d d","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo310mgtuvgmo705pdq5l12fm4st132lb0?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"一颗土豆🥔","userId":"64d980630000000001013a7c","text":"杭州","likes":7,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ua02vsnj4105p6pg1hgaejst29etug?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69d68d5e000000001d01c2fe","title":"【滴滴】找个电影搭子线下或线上","content":"原因是今晚下班又开始打游戏，然后发现，也并不快乐，我有很多想做的事但没做，睡前反思\n最近回到杭州下班很空，不能再被没营养的事占据我的精力了，想要打开社交，第一件想到的事，今天被同事安利了电影《我，许可》所以我打算去看，然后发现又又又是一个人！虽然一个人常看电影，但是看完无法交流，很难受，我一般会分享观后感在自己朋友圈，但我发现我喜欢的电影很冷门吗？还是扩列的朋友不够多，很难共鸣！\n一般线下电影我想看的，当天有空说走就走，一般不看搞笑片和合家欢，我只是想了解不同的故事，倾听不同声音，带来一些思考，最喜欢科幻片，恐怖片，偶尔文艺片，历史剧情，感觉现在电影质量一个月最多1-2次线下，基本都是一个人(我也偶尔会和我妈一起看电影，但素很受限会特地选电影，可能我不喜欢)\n翻了以前记录，原来从22年开始，单休周末我都是一个人去看电影，但那时我还挺享受一个人的孤独和思考，现在不行了，那年我还很忧郁，现在我话唠又犯了。\n其实电影，纪录片，动漫线上给我推荐我是来者不拒的，前提是吸引我，所以我想由这个契机去找搭子或者朋友都行，在看电影和影视剧方面我和以前的同学还有能聊的朋友真的很不重合，谁懂，理科生当时找不到一个人陪我一起看奥本海默。。。\n所以找个搭子或者兴趣相近的朋友，哈哈哈哈，男女老少不限，前提是都是正常人，我不想跟超绝内向和三无小号打交道，因为又要礼貌的社交照顾又害怕骗子？\n如果线下的话，那就是杭州了，but杭州太大了，应该余杭合适，一般是不忙的工作日，6点就下班了，周末的话看情况，线上无所谓了，你愿意一起看然后讨论，讨厌提前剧透人！\n#电影搭子 #蹲一个搭子 #一起看电影 #扩列 #电影分享 #影评人请就位","type":"normal","author":"乱七八糟的垃圾怪物","authorId":"5f368a6a000000000100be94","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ndhhtsc6g5g5q502qs6a8fh712rp7o?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d68d5e000000001d01c2fe?xsec_token=ABkGOhsyvJPTvSuWhDrxLIAi10kjUFxyhGqUzy2xf7_1Q=&xsec_source=pc_search&source=web_search_result_notes","likes":12,"collects":1,"comments_count":30,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604101202/d4a9002e25dad8ff2bb54843ddf1bbe1/1040g00831un676fa3m2g5npmh9l09fkka9hhfe0!nd_dft_wlteh_webp_3","keyword":"杭州周末搭子","commentList":[{"user":"momo","userId":"63180a18000000000f00647f","text":"很难，比找对象难多了，因为电影看多了就看疲了，可能没有任何想跟别人说的，看了如看，过了两周就忘得差不多了。如果你喜欢的是高分电影，其实还不如在豆瓣上面刷刷短评、长评，如果你喜欢分享的是看电影的真实感受，爱吐槽，你其实爱的不是电影，是跟你朋友在一起点评宇宙的自由，而且讨论电影很容易讨论到价值观和立场，一旦讨论到这么深入，就很容易吵起来，只要你是一个认真对待这个世界的人的话。即便彼此非常包容，方法得当，也很伤感情。我的经验是，没有任何人值得深聊，无论是出于过程还是出于结果。","likes":1,"avatar":""},{"user":"老子是老大","userId":"5f368a6a000000000100be94","text":"非常赞同！所以电影真的不能看太多，还好我只是有兴趣才会看。我本身思维就比较活跃，经常跳来跳去。之前有过采访经历，更明显感受到：不同人生经历的人，对同一件事的看法天很不一样，但有意思，一部电影，一段人生，我们反正已经摆不开桎梏，其实多个角度理解挺好的。有些深度对话能带来很多思考，会觉得特别有意思。但如果对方观点过于偏激，甚至影响到你对这个人的整体评价，那其实也说明你们本就不是一路人，萍水相逢、不必强求就好。所以一般科幻片对我来说就刚好吧， 可以暂时抛开生活里的琐碎鸡毛，抬头去触摸星辰，现在很火的那些观察类综艺，更容易让人吵起来，因为太贴近现实，不知道在干嘛。","likes":1,"avatar":""},{"user":"饿必吃困必睡","userId":"6039eff80000000001007364","text":"啊哈 前两天刚一个人看了两部","likes":1,"avatar":""},{"user":"老子是老大","userId":"5f368a6a000000000100be94","text":"挽救计划是真不错，标准美式科幻片，挺浪漫的，但是怎么热度不高，真包场看的。河狸变身计划推荐不，因为我看到评论是褒贬不一诶","likes":1,"avatar":""},{"user":"能量可乐","userId":"627a1e990000000021020c4a","text":"别去了，昨天刚看完，不值个票价，虽然我也是一张票包场，这个电影等着在手机上看就行","likes":1,"avatar":""},{"user":"老子是老大","userId":"5f368a6a000000000100be94","text":"我就了解大概，关于女性话题，不想深入了解，不然看电影没期待，主要是挺喜欢文琪的，不推荐指的剧情完整性还是传达的价值观？","likes":1,"avatar":""},{"user":"罟霖（见过徐佳莹版）","userId":"65e02e95000000000500b772","text":"你好，我很爱科幻片，最爱的的是《这个男人来地球》还有《宇宙探索编辑部》这种神叨叨的，其他类型很有意思也都会看，很杂食来着。我工作日要加班，但周末挺空的，可以一起看电影。","likes":0,"avatar":""},{"user":"老子是老大","userId":"5f368a6a000000000100be94","text":"可以啊，宇宙探索编 <script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');

    // 作者链接
    const authorLink=n.authorId?'https://www.xiaohongshu.com/user/profile/'+n.authorId:'#';
    const authorHtml='<div class="card-author">@<a href="'+authorLink+'" target="_blank">'+esc(n.author)+'</a></div>';

    // 评论（带作者链接）
    const cms=(n.commentList||[]).slice(0,5).map(c=>{
      const cLink=c.userId?'https://www.xiaohongshu.com/user/profile/'+c.userId:'#';
      return '<div class="comment-item"><span class="user"><a href="'+cLink+'" target="_blank" style="color:#667eea;text-decoration:none">'+esc(c.user)+'</a></span><span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    }).join('');

    return '<div class="card"><div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div>'+authorHtml+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
