活动，还有室外音乐会等；\n\t\n📦包装(Packaging): 环境+价格应该是贵妇的选择哈哈，但是如果在杭州旅游，从灵隐寺下来去体验一节课挺好的，净化身心；\n#瑜伽 #瑜伽服 #户外瑜伽 #狗狗瑜伽 #孕妇瑜伽  #杭州旅游 #西湖 #灵隐寺","type":"normal","author":"Abby上门私教","authorId":"600ffd4c000000000100144b","url":"https://www.xiaohongshu.com/explore/66800b96000000001f0062be?xsec_token=ABLVPHH2_SZPIPUWmvhywbp3Ss1wr6Gcgh8ImISTyD760=&xsec_source=pc_search&source=web_search_result_notes","likes":53,"collects":40,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031741/b73dae07f560ca6ac96e4f6e56c070a1/1040g008314knks4074205o0fvl60852bs2uubc0!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽","commentList":[{"user":"小红薯64E3233F","userId":"64e1bd61000000000100dd30","text":"怎么联系","likes":1},{"user":"香菜蓝莓","userId":"6059f9f7000000000101c14e","text":"私教价格？","likes":0}]},{"id":"685a064c0000000022032577","title":"杭州绝美瑜伽练习地","content":"在我们店里@汐上 练习瑜伽也是绝美的～面朝茂密的绿，听着淅沥沥的雨声和小鸟的叫声，无比专注的练习瑜伽🧘‍♀️整个空间的能量场无需刻意寻找，就能感受到被轻松，平静的氛围拥抱着，带着感恩的心情度过了一个多小时，一天当中剩下的时间里，整个人也是柔软的，回到家翻看新到的书：“佛陀将开悟简单定义为【受苦的终结～】”\n人真的会变，现在每天一睁开眼，就会喝口水，站在瑜伽垫上开始拉伸，冥想，练习，会有意无意的找更多瑜伽有关的东西学习，看的书大多也是佛教相关的，心性慢慢在转变，大概是瑜伽的功劳～～\n《瑜伽经》里好像有一句话：“瑜伽是止息心的波动”，和佛陀箴言形成东西方智慧的回响～～\n#汐上茶室 #瑜伽 #平静 #佛学 #开悟","type":"normal","author":"Abby上门私教","authorId":"5b68510ef7e8b90a3dcf4505","url":"https://www.xiaohongshu.com/explore/685a064c0000000022032577?xsec_token=ABl433Dxa-HEbMKEzyGcnUAkScm3PVtnQb5zBVaURt644=&xsec_source=pc_search&source=web_search_result_notes","likes":36,"collects":18,"comments_count":19,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031740/32aee6516a55bed84a5791f2642b59e4/notes_pre_post/1040g3k831j3jeq8ohg8g4aabf68gsh855ognfu8!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽","commentList":[{"user":"是王炸","userId":"594795475e87e71ff0a60d7c","text":"哇想去","likes":1},{"user":"Sr. Photography","userId":"5ca683e1000000001103db3b","text":"回杭州了？","likes":0},{"user":"sophie贺老板","userId":"5b68510ef7e8b90a3dcf4505","text":"欢迎欢迎 可以约瑜伽体验课","likes":0},{"user":"李容淼","userId":"54cc5375b4c4d615fb2c698f","text":"这是瑜伽馆吗？","likes":0},{"user" :"这里的人都比较安逸","likes":0},{"user":"一言不荷包蛋","userId":"616ad1fc0000000002024522","text":"私教吗","likes":0}]},{"id":"68c69fec000000001d01e572","title":"出差杭州 瑜伽体验","content":"其实本科读书时就在杭州\n但已经快十年没有再回去了\n这次过去出差两天\n活动范围是杭州未来科技城附近\n时间很紧张也没什么特别想去的地方\n于是找了两家瑜伽馆上了两节课\n1️⃣A.T yoga（天目里）图1-3\n因为喜欢阿汤所以之前刷到过汤婆的账号\n有个之前一起练瑜伽的姐姐好像也定期在这里练习\n于是点评上买了体验券打了电话\n天目里还是非常好逛的 汇集了餐厅书店美术馆\n瑜伽馆公用垫是蛙蛙垫\n课程时长好像有1小时15分钟\n强度不是很大 课程重点在呼吸\n遗憾没有上到阿汤 如果有机会下次来\n（现在也有普拉提）\n2️⃣yoga corner（西溪馆）图4-7\n据说是杭州最美咖啡馆\n也是点评上买了体验券打了电话\n小姐姐态度特别好 加了weixin课表发来让我选课\n微信沟通非常顺畅 位置注意事项都有提醒\n迟到绝对不可以进教室\n见面后跟我联系的前台小姐姐给人的感觉也非常舒服\n环境的确非常好\n换衣间每个都是独立带门帘的\n很多人都夸这里露台好看但天黑了看不太出来\n公用垫也是蛙蛙\n小姐姐提前帮我把垫子辅具都准备好了\n上了一节哈他 强度不大相对基础\n老师详细讲解肩倒立\n走的时候聊了几句才知道老师竟然也是宁夏人\n多么奇妙的缘分\n（好像没有普拉提）\n\t\n#杭州瑜伽馆","type":"normal","author":"Abby上门私教","authorId":"57ccf43abd0da5117cc8b7b5","url":"https://www.xiaohongshu.com/explore/68c69fec000000001d01e572?xsec_token=ABAU5vfuV5rQT3OBN6YLIFttpkHwJXUYlPAHUDXciGtdE=&xsec_source=pc_search&source=web_search_result_notes","likes":19,"collects":9,"comments_count":5,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031739/c68e436e979165eeede6035d4a14e40c/1040g00831mdl69kvl83048m2k4q3ldtl104qhb0!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽","commentList":[{"user":"银川李婶婶","userId":"5485810bd6e4a92d737be4d6","text":"竟然出差去杭州了[棒R]我还在剪后面去杭州的视频 摆烂ing","likes":0},{"user":"今天要不要洗头","userId":"57ccf43abd0da5117cc8b7b5","text":"去的时候还看了下你发的探店哈哈哈 但是太远了 吃不了一点 就去吃了个一直想吃的旋转寿司🍣","likes":0},{"user":"YogaCorner瑜伽角","userId":"5dfb6253000000000100a5b8","text":"欢迎你再来 我已知道有2个同事都是西北人","likes":0},{"user":"今天要不要洗头","userId":"57ccf43abd0da5117cc8b7b5","text":"","likes":0}]},{"id":"67ebb9d2000000001d016e70","title":"天呢 能量场太好了","content":"打卡一下杭州最美瑜伽馆Met yoga\n\t\n🍃\n\t\n足弓好的人多是走了很多不平凡的路\n\t\n👣\n\t\n#吸收好的能量 #心灵的净化\n#metyoga #杭州最美瑜伽馆","type":"normal","author":"Abby上门私教","authorId":"5c96043c000000001100a6f6","url":"https://www.xiaohongshu.com/explore/67ebb9d2000000001d016e70?xsec_token=ABVte5rH2uP88Llr7-JNx47yhPo6zipkkNm0btS6aKs88=&xsec_source=pc_search&source=web_search_result_notes","likes":14,"collects":4,"comments_count":5,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031741/614e03fcd8dd61a3b7963ef647a7952d/1040g2sg31fnsin0hg2cg5n4m0gu499nmqr1qtm8!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽","commentList":[{"user":"111","userId":"5c96043c000000001100a6f6","text":"去上课呀","likes":1},{"user":"Huang.","userId":"67b0c9e8000000000a03e0c1","text":"怎么打卡的啊  是在里面学习了吗？","likes":0},{"user":"乌梅子酱","userId":"690ef03b000000003202bf60","text":"这个文案很好。","likes":0}]},{"id":"693bfcbd000000001f004784","title":"杭州最美瑜伽馆｜inward Pilates","content":"环境超级超级好～很静谧很疗愈\n挖到宝啦～主理人小姐姐超贴心，手把手教我凹造型，原片直出都巨好看，出片率💯，烦恼瞬间全飞走～ 📷\n出片真像呼吸一样简单～#普拉提打卡 #普拉提 #把时间花在自己身上 #温柔与力量 #yaga #瑜伽探店 #宝藏瑜伽馆 #氛围感瑜伽馆 #美女主理人 #拍照出片 #松弛感拍照 #同城瑜伽推荐","type":"normal","author":"Abby上门私教","authorId":"597c028c5e87e76785a2e79d","url":"https://www.xiaohongshu.com/explore/693bfcbd000000001f004784?xsec_token=ABIEr7GA_CETzd9rPevXAfbfT3CNQlxoTed8B6xuI_vGk=&xsec_source=pc_search&source=web_search_result_notes","likes":13,"collects":4,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031741/2c63348759c06afccbf7305948b60a5b/notes_pre_post/1040g3k031q06r831g03g49n15818ppstch8n258!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽","commentList":[{"user":"驼驼乳酪面包🍞","userId":"5b420c704eacab6d4c14476a","text":"你好软啊","likes":1},{"user":"椰几","userId":"597c028c5e87e76785a2e79d","text":"","likes":0}]},{"id":"68d6384c000000001003d141","title":"杭州瑜伽环境这么好那我在北京练的算什么❓","content":"从北京搬到杭州一个月啦❗\n\t\n最大的感受就是杭州好热🥵环境好棒👍🏻物价好高\n\t\n窗外的风景从小区里的大爷大妈变成了钱塘江，最近在看各种瑜伽馆和健身房，游泳馆🏊🏻‍♀️无一例外的环境都超级好\n\t\n顿时就心生感慨，原来大家锻炼的环境都这么好！！之前的瑜伽馆，健身房无一例外的外面全是高楼林立，从来没有这种绿树🌲江边🏞️黄昏🌆的感觉，练完都忍不住的身心舒畅，这种情况下感觉锻炼频率都会增加\n\t\n都说有水的城市都会格外浪漫，不光是海水还是江水，杭州的浪漫我正在慢慢体会，你们的锻炼环境是不是都这么美，分享出来让我一起感受一下吧[心心眼R]\n#瑜伽馆 #普拉提 #普拉提打卡 #北京到杭州 #瑜伽日常 #一种很新的健身方式 #零基础瑜伽入门 @日常薯 @小红书成长助手","type":"normal","author":"Abby上门私教","authorId":"56554d0c484fb6090789f188","url":"https://www.xiaohongshu.com/explore/68d6384c000000001003d141?xsec_token=ABRPKOh4wtUPQRWHbeILRZwrWGP9FFxYVBiy31Ype_ivA=&xsec_source=pc_search&source=web_search_result_notes","likes":8,"collects":1,"comments_count":3,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031740/f74fd58c43a7a53329eab5f0643c7062/notes_pre_post/1040g3k831mss5tm6lma0431dj26gpsc8o58lrho!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽","commentList":[{"user":"应姐姐","userId":"6105344f000000000100a3b9","text":"背影好美 风景好治愈疲劳的双眼","likes":0},{"user":"max伦","userId":"56554d0c484fb6090789f188","text":"教练下次能把我背影拍的再唯美点就更好了哈哈哈爱您","likes":0}]},{"id":"689eec73000000001d0242bc","title":"杭州瑜伽馆个人体验分享｜城北旅程瑜伽","content":"练习瑜伽好几年了，在杭州去过不少瑜伽馆。\n今年发现，想找到一家真正满意的馆挺难的，也不知道是我太挑剔，还是现在瑜伽馆不好经营，好的馆越来越少。所以想写一个系列，记录一下我去过的杭州瑜伽馆\n\t\n第一篇，先说说城北的旅程瑜伽。\n它在花园岗地铁站B出口出来，交通很方便。旅程瑜伽以流瑜伽为主，整体风格比较专注体式。这里的会员普遍体式水平很高，很多高难度动作大家都能做，是我去过的馆里体式难度最高的。不过也有偏基础的课，所以初学者来也不会太有压力。老师会很认真地辅助，长期在这里练习，体式进步很快。\n\t\n馆里就两位老师，没有其他工作人员，氛围很简单。两位老师都特别好说话，有需要都会帮忙。比如我有一次约了课但没去，老师直接帮我取消了，没有扣卡；临时改课、约课，在群里随便@一下就行，不会有负担。Edern老师几乎全年无休，每天都在馆里带课，很用心地守着这个空间，让人想来的时候随时都能上到她的课。细节也很周到，比如更衣室的小黑板上会写停车指南，还有直接交停车费的二维码。也正因为这样，这几年我一直在这里练，也明显感觉会员越来越多。\n\t\n🧡缺点的话，这里基本只做体式，课程强度偏大，一节课下来会很累。我现在大多白天去练，晚上就不太适合上强度高的课了。如果最近状态不好，在这里练会觉得有点耗气血。另外，它不是那种节奏慢、强调向内探索或冥想的风格，和瑜伽精神的连接感相对弱一些，更像是身体层面的锻炼。\n\t\n总的来说，如果你想提升体式水平、喜欢挑战自己，这里会很适合；但如果你更想在瑜伽里找安静、慢节奏的状态，可能会觉得强度有点高。\n📷如侵，可联系删除。\n#杭州瑜伽馆 #杭州瑜伽探店 #瑜伽","type":"normal","author":"Abby上门私教","authorId":"66af3bdb000000001d020acf","url":"https://www.xiaohongshu.com/explore/689eec73000000001d0242bc?xsec_token=AB4E33ylsjuGkUxg-s187dUeI-NjVhjilZg_fiTNUESrs=&xsec_source=pc_search&source=web_search_result_notes","likes":8,"collects":3,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031740/4253bb6a6dab601a7e6494a33373a02f/1040g2sg31l6lk1lmj2gg5n1skl71fkf1dkget08!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽","commentList":[{"user":"锦渔🐟","userId":"63de4f6d000000002601332f","text":"说的很对啊，有参考到","likes":0},{"user":"反击的葫芦小金刚","userId":"66af3bdb000000001d020acf","text":"谢谢","likes":0}]},{"id":"68bd14d5000000001d01a52c","title":"杭州上门私教","content":"【在杭州虎跑公园拍瑜伽照，这地方也太仙了吧！🧘‍♀️】\n终于来虎跑公园打卡了！不愧是隐藏在市区的“绿野仙踪”，随便一拍都是禅意大片～🍃\n推荐理由：\n1️⃣ 人少景美：工作日基本包场，怎么拍都不怕尴尬，竹林、古亭、苔藓阶梯，每个角落都像自带滤镜！\n2️⃣ 灵气十足：虎跑泉是杭州三大名泉之一，水质清冽，据说泡茶🍵一绝！泉边取水的人络绎不绝。用虎跑泉水冲泡一杯龙井，“龙虎斗”听说是“西湖双绝”极致搭配。美哉美哉～\n3️⃣ 弘一法师与济公的禅意足迹\n\t\n李叔同曾在此断食出家，此处也有李叔同纪念馆，在这儿感受弘一法师从才子到高僧的传奇一生。\n馆内陈列的书法、绘画、音乐作品，无一不在诉说着大师的才与情，心与境的转变～\n济公传说更是为古寺添了神秘感。塔院墙壁的石刻济公形象，神还原游本昌老师的经典造型\n济公圆寂于此，园内济公塔院静静伫立，诉说济公心怀慈悲、惩恶扬善的传奇故事，漫步塔院，仿佛能看到济公摇着破扇，在山林间行侠仗义的身影，为这座江南园林增添了几分神奇色彩。\n4️⃣ 森系拍照·出片率100\n📸拍照Tips：\n· 建议穿白色/浅灰色系服饰，和绿色背景绝配！\n· 利用泉水、石阶做前景，层次感秒升～\n· 动作以舒展、静心为主，侧脸、背影也超有氛围！\n📍定位：杭州虎跑公园（门票15）\n#瑜伽拍照 #杭州小众打卡 #虎跑公园 #瑜伽女孩 #户外瑜伽 #瑜伽与大自然 #绿树阴浓夏日长 #光影落在绿意里 #万物静观皆自得","type":"normal","author":"Abby上门私教","authorId":"5b6ec23e38a9800001276797","url":"https://www.xiaohongshu.com/explore/68bd14d5000000001d01a52c?xsec_token=ABK1Ik3pL8AZ_U0Oz5DeeOlhAvQfqLqpmqo88fkHGN4pU=&xsec_source=pc_search&source=web_search_result_notes","likes":5,"collects":7,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031740/ac03a89ff2f679e60af10a3835a77d33/1040g2sg31m4ahvu058704ackgj13spsnheu3o0o!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽","commentList":[]},{"id":"69aa7442000000002202dbc2","title":"杭州上门私教✌️出发上课啦|杭州全城🉑上门","content":"教练小鹿🦌开启早出晚归全城跑第三天。\n今天上门私教的顾客，是住在杭州萧山区的全职宝妈，她说过年回老家吃吃喝喝，胖了七八斤，主要想减脂塑形，恢复到年前体重。\n前一天就和宝妈沟通，了解了基本情况及诉求，并和她预约了第二天上课的时间⌚️所以第二天就带了针对她上课需要用到的所有辅助练习的道具。\n杭州上门私教顾客需要准备什么❓\n1.有一个场地，能摆下一张瑜伽垫的地方即可（场地可以是家里或者办公室，也🉑在小区公共健身区）\n2.准备一件稍微有点紧身，有弹性，伸展的开的瑜伽服或者运动服（方便教练首次上门评估身体，体测）其他无需准备任何！\n为什么做上门❓什么人适合上门私教❓\n因为见过太多杭州人：\n👉 西湖边的宝妈抱着娃说，想去健身房但没人带娃；\n👉 滨江的程序员加班到8点叹气，回家只想躺平；\n👉 拱墅区的姐姐对着镜子皱眉，动作总做错，越练越焦虑……\n所以我想：把瑜伽普拉提馆，健身房‘搬’到你家楼下，用早起晚归换你‘不用出门就能变好’的底气。”\n👉没时间外出锻炼或者自律性比较差的小姐姐，以及特殊时期的孕妈妈和产后妈妈，提供一对一的上门私教方案。\n课程主要针对女性！课程内容包含:\n精准塑型，普拉提小工具训练，维密瘦身，减压，呼吸冥想，颂钵疗愈，声音疗愈，传统哈他瑜伽，艾扬格椅子瑜伽，产后恢复，私密修炼，备孕，孕期瑜伽普拉提，骨盆矫正纯手法，脊柱正位，肩颈康复，筋膜松解疼痛纯手法处理，一节课时间75/分钟 教练自带健身器材（瑜伽垫，瑜伽砖，普拉提小工具，小哑铃，筋膜枪，理疗床等都会带，根据顾客上课内容带相对应的工具）如果你也是在健身房和瑜伽馆办了卡，不想出门，想要每周规律的锻炼请上门私教，只要您家里有3~5平米的空间，早7点到晚9都可以上门私教～\n杭州全城🉑 上门，希望我的上门私教能让你坚持锻炼，从身材焦虑和不自信的状态中走出来✌️ #杭州上门私教#私教 #上 <script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');
    const cover=n.cover?'<div class="card-cover"><a href="'+esc(n.url)+'" target="_blank"><img src="'+esc(n.cover)+'" alt="'+esc(n.title)+'" loading="lazy"></a></div>':'';
    const authorLink=n.authorId?'<a href="https://www.xiaohongshu.com/user/profile/'+esc(n.authorId)+'" target="_blank">@'+esc(n.author)+'</a>':'@'+esc(n.author);
    const cms=(n.commentList||[]).slice(0,5).map(c=>
      '<div class="comment-item">'+(c.userId?'<a class="user" href="https://www.xiaohongshu.com/user/profile/'+esc(c.userId)+'" target="_blank">'+esc(c.user)+'</a>':'<span class="user">'+esc(c.user)+'</span>')+'<span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    ).join('');
    return '<div class="card">'+cover+'<div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div><div class="card-author">'+authorLink+'</div>'+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
