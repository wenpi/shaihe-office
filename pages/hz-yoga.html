0000000032026981", "text": "蹲一套", "likes": 0}, {"user": "Zhangziii", "userId": "593a252550c4b4421a0c3a01", "text": "FBB宝", "likes": 0}, {"user": "ZZ~🐬", "userId": "5b3f74d7e8ac2b72326a8929", "text": "宝贝手机壳有链接吗喜欢喜欢", "likes": 3}, {"user": "Zhangziii", "userId": "593a252550c4b4421a0c3a01", "text": "Case的贝贝", "likes": 1}, {"user": "似乎", "userId": "67affd50000000000601ee07", "text": "我想咨询一下私教", "likes": 0}]}, {"id": "69aa7442000000002202dbc2", "title": "杭州上门私教✌️出发上课啦|杭州全城🉑上门", "content": "教练小鹿🦌开启早出晚归全城跑第三天。\n今天上门私教的顾客，是住在杭州萧山区的全职宝妈，她说过年回老家吃吃喝喝，胖了七八斤，主要想减脂塑形，恢复到年前体重。\n前一天就和宝妈沟通，了解了基本情况及诉求，并和她预约了第二天上课的时间⌚️所以第二天就带了针对她上课需要用到的所有辅助练习的道具。\n杭州上门私教顾客需要准备什么❓\n1.有一个场地，能摆下一张瑜伽垫的地方即可（场地可以是家里或者办公室，也🉑在小区公共健身区）\n2.准备一件稍微有点紧身，有弹性，伸展的开的瑜伽服或者运动服（方便教练首次上门评估身体，体测）其他无需准备任何！\n为什么做上门❓什么人适合上门私教❓\n因为见过太多杭州人：\n👉 西湖边的宝妈抱着娃说，想去健身房但没人带娃；\n👉 滨江的程序员加班到8点叹气，回家只想躺平；\n👉 拱墅区的姐姐对着镜子皱眉，动作总做错，越练越焦虑……\n所以我想：把瑜伽普拉提馆，健身房‘搬’到你家楼下，用早起晚归换你‘不用出门就能变好’的底气。”\n👉没时间外出锻炼或者自律性比较差的小姐姐，以及特殊时期的孕妈妈和产后妈妈，提供一对一的上门私教方案。\n课程主要针对女性！课程内容包含:\n精准塑型，普拉提小工具训练，维密瘦身，减压，呼吸冥想，颂钵疗愈，声音疗愈，传统哈他瑜伽，艾扬格椅子瑜伽，产后恢复，私密修炼，备孕，孕期瑜伽普拉提，骨盆矫正纯手法，脊柱正位，肩颈康复，筋膜松解疼痛纯手法处理，一节课时间75/分钟 教练自带健身器材（瑜伽垫，瑜伽砖，普拉提小工具，小哑铃，筋膜枪，理疗床等都会带，根据顾客上课内容带相对应的工具）如果你也是在健身房和瑜伽馆办了卡，不想出门，想要每周规律的锻炼请上门私教，只要您家里有3~5平米的空间，早7点到晚9都可以上门私教～\n杭州全城🉑 上门，希望我的上门私教能让你坚持锻炼，从身材焦虑和不自信的状态中走出来✌️ #杭州上门私教#私教 #上门私教 #普拉提 #瑜伽\n#产后康复#杭州#产后康复#健身", "type": "normal", "author": "Abby上门私教", "authorId": "66576c9700000000070060a4", "url": "https://www.xiaohongshu.com/explore/69aa7442000000002202dbc2?xsec_token=AB6M4LklTcY9iKPzHFK5473SUJk-ABo6z7FqKTd9E5vrk=&xsec_source=pc_search&source=web_search_result_notes", "likes": 2, "collects": 2, "comments_count": 7, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031740/7b52cbac43c10908d67343da905b9fff/1040g00831tc10tnlle105pindibhoo54v9gg2t8!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽", "commentList": [{"user": "💞宝宝💞Angela小白甜👄", "userId": "5d213e0a000000001202d634", "text": "价格", "likes": 0}, {"user": "禾鹿-🦌杭州上门私教", "userId": "66576c9700000000070060a4", "text": "私信你啦宝宝，可以看下后台哟", "likes": 0}, {"user": "momo", "userId": "57c022376a6a69274870f977", "text": "多少钱", "likes": 0}, {"user": "琳达", "userId": "5b2b6d46e8ac2b11656ce59b", "text": "价格？", "likes": 0}, {"user": "禾鹿-🦌杭州上门私教", "userId": "66576c9700000000070060a4", "text": "私信你啦宝宝，可以看下后台哟", "likes": 0}]}, {"id": "", "title": "杭州上门私教", "content": "", "type": "normal", "author": "Abby上门私教", "authorId": "", "url": "https://www.xiaohongshu.com/search_result?keyword=%E6%9D%AD%E5%B7%9E%E7%91%9C%E4%BC%BD&source=web_search_result_notes&type=51", "likes": 86, "collects": 0, "comments_count": 0, "shares": 0, "cover": "", "keyword": "杭州瑜伽", "commentList": []}, {"id": "67d14516000000000903b54e", "title": "避雷愈伽普拉提 这个男老师（上）", "content": "19年开业的时候上过体验课，之前还有空中瑜伽。后面产后就买了私教课和小班课穿插着练。\n我这个人是兴趣爱好很广泛，瑜伽普拉提报了有三家，艾扬格流瑜伽什么都上，街舞和油画也会去。所以这两年过去也只能抽时间上了几十节普拉提小班课。\n里面的女老师也都挺nice，知道我基础还算可以，上课对我也很友好。哪怕我不是规律频繁地来，大家也都是相互尊重，有说有笑。\n但是这家存在三个让消费者无法忍受的情况\n1️⃣高高在上的“男性老师”\nAman是个男老师，说话带着不知道从哪来的优越感。上过他的两节私教体验课，专业能力不知道强在哪里，倒是嘴强王者了，所谓的让你找本体感啊，不要代偿。一个小时五个动作，毫无体验，刷一下一节课过去了。效果？几乎也零。之前去试过元一的私教，有些老师讲的很细，但是不会这么水。太讲究动作的标准性，而忽略了运动本身的目的就是“动”啊。他的课主打一个他嘴累了，你康复训练了。。\n2️⃣管理混乱\n①是销售价格不一致，调价随意。\n频繁的节日活动价，每场都宣称价格最低，老板亏本大买卖？其实就是在疯狂融资。所有的赠卡，是可以商议的，只要你会还价，你就可以多几节课。这样就会导致大家的购价是不一致的，不会谈价的就会吃亏。\n② 课程取消规则混乱。\n在我已预约课程的情况下，我经常会在中午十一点十分接到电话，问我来不来中午十二点十分的小班课。约课系统显示4-6人左右，但是实际来了以后发现只有两个人，还有一次只有我一个人。那这是是代表着会员们经常会出现在一小时内临时取消的情况。但是这个馆对我个人一直宣称，必须开课一小时以上才能取消。这项严格的规则，是对所有会员执行吗？如果是这样，那为什么出现多次，约课系统显示多人，最后实际上课的只有两人甚至我一个人？\n③课前提醒不到位。微信公众号无提醒，短信功能也时常崩溃。23年产后恢复练习的时候，公众号是有提醒功能的，那时候觉得很方便。后面那个公众号就突然停用了。短信也一直是被我手机直接拦截的状态。直到有一次我排队一节课，结果课程排上了，我没有收到信息，也没有任何人通知我这节课开课。后面发现这节课被扣了，我才知道原来是发短信的，而短信被我手机拦截为垃圾短信了。于是我就建议继续恢复微信公众号功能，因为微信使用频率更高更主流，也不会被屏蔽。现在半年过去了，并没有任何改善。\n#普拉提教练培训 #普拉提 #杭州普拉提馆避雷", "type": "normal", "author": "Abby上门私教", "authorId": "5a8f05144eacab4ea4916207", "url": "https://www.xiaohongshu.com/explore/67d14516000000000903b54e?xsec_token=ABpYka5Ues_IrjbGxY76rv5BwoZjF56z1ZRGmpUDFX81o=&xsec_source=pc_search&source=web_search_result_notes", "likes": 66, "collects": 9, "comments_count": 18, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031740/accb816bac144fa6657dbd71b5dff8ab/1040g00831eu1tkm6mi6g4a1mga2h8og7sv568jo!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽", "commentList": [{"user": "Ts.藤溯普拉提", "userId": "62b6cb40000000001902b906", "text": "如果你是想练普拉提就应该先专业普拉提馆，不要找瑜伽普拉提，你们都别以为瑜伽就是普拉提，普拉提也不等于瑜伽！让你们尽量不要找瑜伽普拉提馆上普拉提是为了尽可能避免有瑜伽老师来跟你上普拉提，她们之间学的专业是不一样的，理念也不一样，学费更是不一样！", "likes": 10}, {"user": "一只特立独行的猪🐷", "userId": "5a8f05144eacab4ea4916207", "text": "别这么激动，不管是什么体系的，北极星也好 斯多特也罢 现在市场价都是营销出来的高价。就像最开始的健身和瑜伽一样，价格也应该逐渐趋于合理。而不是拿着所谓的证书说，我比其他运动高级，我就该多赚你们的米。那如果论体系正规和学习成本，还得是芭蕾基训。所以别再宣扬什么普拉提就该学费高了，能带来多么“奇迹”般的身体变化了。现在市场上大多数老师都是什么水平 自己心理真的没点数吗？消费者来付费上课，对情绪价值的要求远远大于你的真实水平。", "likes": 32}, {"user": "Xuxu*", "userId": "5b16958911be100576eed724", "text": "说得好 运动首先得动", "likes": 0}, {"user": "一只特立独行的猪🐷", "userId": "5a8f05144eacab4ea4916207", "text": "是呀", "likes": 1}, {"user": "贝米普拉提", "userId": "5c769116000000001202ab83", "text": "运动不分高低，都是同等的，瑜伽，普拉提，健身都是可以的，喜欢什么合适什么就去做就行了只要正确练习都是好的", "likes": 6}]}, {"id": "68d6384c000000001003d141", "title": "杭州瑜伽环境这么好那我在北京练的算什么❓", "content": "从北京搬到杭州一个月啦❗\n\t\n最大的感受就是杭州好热🥵环境好棒👍🏻物价好高\n\t\n窗外的风景从小区里的大爷大妈变成了钱塘江，最近在看各种瑜伽馆和健身房，游泳馆🏊🏻‍♀️无一例外的环境都超级好\n\t\n顿时就心生感慨，原来大家锻炼的环境都这么好！！之前的瑜伽馆，健身房无一例外的外面全是高楼林立，从来没有这种绿树🌲江边🏞️黄昏🌆的感觉，练完都忍不住的身心舒畅，这种情况下感觉锻炼频率都会增加\n\t\n都说有水的城市都会格外浪漫，不光是海水还是江水，杭州的浪漫我正在慢慢体会，你们的锻炼环境是不是都这么美，分享出来让我一起感受一下吧[心心眼R]\n#瑜伽馆 #普拉提 #普拉提打卡 #北京到杭州 #瑜伽日常 #一种很新的健身方式 #零基础瑜伽入门 @日常薯 @小红书成长助手", "type": "normal", "author": "Abby上门私教", "authorId": "56554d0c484fb6090789f188", "url": "https://www.xiaohongshu.com/explore/68d6384c000000001003d141?xsec_token=ABRPKOh4wtUPQRWHbeILRZwrWGP9FFxYVBiy31Ype_ivA=&xsec_source=pc_search&source=web_search_result_notes", "likes": 8, "collects": 1, "comments_count": 3, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031740/f74fd58c43a7a53329eab5f0643c7062/notes_pre_post/1040g3k831mss5tm6lma0431dj26gpsc8o58lrho!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽", "commentList": [{"user": "应姐姐", "userId": "6105344f000000000100a3b9", "text": "背影好美 风景好治愈疲劳的双眼", "likes": 0}, {"user": "max伦", "userId": "56554d0c484fb6090789f188", "text": "教练下次能把我背影拍的再唯美点就更好了哈哈哈爱您", "likes": 0}, {"user": "应姐姐", "userId": "6105344f000000000100a3b9", "text": "背影好美 风景好治愈疲劳的双眼", "likes": 0}, {"user": "max伦", "userId": "56554d0c484fb6090789f188", "text": "教练下次能把我背影拍的再唯美点就更好了哈哈哈爱您", "likes": 0}]}, {"id": "689eec73000000001d0242bc", "title": "杭州瑜伽馆个人体验分享｜城北旅程瑜伽", "content": "练习瑜伽好几年了，在杭州去过不少瑜伽馆。\n今年发现，想找到一家真正满意的馆挺难的，也不知道是我太挑剔，还是现在瑜伽馆不好经营，好的馆越来越少。所以想写一个系列，记录一下我去过的杭州瑜伽馆\n\t\n第一篇，先说说城北的旅程瑜伽。\n它在花园岗地铁站B出口出来，交通很方便。旅程瑜伽以流瑜伽为主，整体风格比较专注体式。这里的会员普遍体式水平很高，很多高难度动作大家都能做，是我去过的馆里体式难度最高的。不过也有偏基础的课，所以初学者来也不会太有压力。老师会很认真地辅助，长期在这里练习，体式进步很快。\n\t\n馆里就两位老师，没有其他工作人员，氛围很简单。两位老师都特别好说话，有需要都会帮忙。比如我有一次约了课但没去，老师直接帮我取消了，没有扣卡；临时改课、约课，在群里随便@一下就行，不会有负担。Edern老师几乎全年无休，每天都在馆里带课，很用心地守着这个空间，让人想来的时候随时都能上到她的课。细节也很周到，比如更衣室的小黑板上会写停车指南，还有直接交停车费的二维码。也正因为这样，这几年我一直在这里练，也明显感觉会员越来越多。\n\t\n🧡缺点的话，这里基本只做体式，课程强度偏大，一节课下来会很累。我现在大多白天去练，晚上就不太适合上强度高的课了。如果最近状态不好，在这里练会觉得有点耗气血。另外，它不是那种节奏慢、强调向内探索或冥想的风格，和瑜伽精神的连接感相对弱一些，更像是身体层面的锻炼。\n\t\n总的来说，如果你想提升体式水平、喜欢挑战自己，这里会很适合；但如果你更想在瑜伽里找安静、慢节奏的状态，可能会觉得强度有点高。\n📷如侵，可联系删除。\n#杭州瑜伽馆 #杭州瑜伽探店 #瑜伽", "type": "normal", "author": "Abby上门私教", "authorId": "66af3bdb000000001d020acf", "url": "https://www.xiaohongshu.com/explore/689eec73000000001d0242bc?xsec_token=AB4E33ylsjuGkUxg-s187dUeI-NjVhjilZg_fiTNUESrs=&xsec_source=pc_search&source=web_search_result_notes", "likes": 8, "collects": 3, "comments_count": 2, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031740/4253bb6a6dab601a7e6494a33373a02f/1040g2sg31l6lk1lmj2gg5n1skl71fkf1dkget08!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽", "commentList": [{"user": "锦渔🐟", "userId": "63de4f6d000000002601332f", "text": "说的很对啊，有参考到", "likes": 0}, {"user": "反击的葫芦小金刚", "userId": "66af3bdb000000001d020acf", "text": "谢谢", "likes": 0}]}, {"id": "68bd14d5000000001d01a52c", "title": "杭州上门私教", "content": "【在杭州虎跑公园拍瑜伽照，这地方也太仙了吧！🧘‍♀️】\n终于来虎跑公园打卡了！不愧是隐藏在市区的“绿野仙踪”，随便一拍都是禅意大片～🍃\n推荐理由：\n1️⃣ 人少景美：工作日基本包场，怎么拍都不怕尴尬，竹林、古亭、苔藓阶梯，每个角落都像自带滤镜！\n2️⃣ 灵气十足：虎跑泉是杭州三大名泉之一，水质清冽，据说泡茶🍵一绝！泉边取水的人络绎不绝。用虎跑泉水冲泡一杯龙井，“龙虎斗”听说是“西湖双绝”极致搭配。美哉美哉～\n3️⃣ 弘一法师与济公的禅意足迹\n\t\n李叔同曾在此断食出家，此处也有李叔同纪念馆，在这儿感受弘一法师从才子到高僧的传奇一生。\n馆内陈列的书法、绘画、音乐作品，无一不在诉说着大师的才与情，心与境的转变～\n济公传说更是为古寺添了神秘感。塔院墙壁的石刻济公形象，神还原游本昌老师的经典造型\n济公圆寂于此，园内济公塔院静静伫立，诉说济公心怀慈悲、惩恶扬善的传奇故事，漫步塔院，仿佛能看到济公摇着破扇，在山林间行侠仗义的身影，为这座江南园林增添了几分神奇色彩。\n4️⃣ 森系拍照·出片率100\n📸拍照Tips：\n· 建议穿白色/浅灰色系服饰，和绿色背景绝配！\n· 利用泉水、石阶做前景，层次感秒升～\n· 动作以舒展、静心为主，侧脸、背影也超有氛围！\n📍定位：杭州虎跑公园（门票15）\n#瑜伽拍照 #杭州小众打卡 #虎跑公园 #瑜伽女孩 #户外瑜伽 #瑜伽与大自然 #绿树阴浓夏日长 #光影落在绿意里 #万物静观皆自得", "type": "normal", "author": "Abby上门私教", "authorId": "5b6ec23e38a9800001276797", "url": "https://www.xiaohongshu.com/explore/68bd14d5000000001d01a52c?xsec_token=ABK1Ik3pL8AZ_U0Oz5DeeOlhAvQfqLqpmqo88fkHGN4pU=&xsec_source=pc_search&source=web_search_result_notes", "likes": 5, "collects": 7, "comments_count": 0, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031740/ac03a89ff2f679e60af10a3835a77d33/1040g2sg31m4ahvu058704ackgj13spsnheu3o0o!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽", "commentList": []}, {"id": "69b28fdc0000000028008c09", "title": "一个小县城女孩在杭州瓜沥镇已经碎掉了", "content": "事情是这样子的，\n一个90后女生，不顾家人反对，独自一人来到瓜沥小镇，做瑜伽普拉提工作，每天因为完不成任务加班到12点，真的快要坚持不下去了\n瓜沥的小仙女到底在哪里啊\n#100 /五节普拉提，真的没人练吗？\n#瑜伽 #普拉提 #瑜伽馆 #杭州 #家人们谁懂 #日常 #小县城女孩", "type": "normal", "author": "Abby上门私教", "authorId": "6732271a000000001c01a4c3", "url": "https://www.xiaohongshu.com/explore/69b28fdc0000000028008c09?xsec_token=ABM9JerqYtTGh6C1t8aPqcJv731v26Id-jevudEwrtmpc=&xsec_source=pc_search&source=web_search_result_notes", "likes": 29, "collects": 34, "comments_count": 113, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031740/162e5b650131c31d26a4954403d84b35/1040g00831ua48rfa2a705ppi4sd73963o89ala0!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽", "commentList": [{"user": "解惑大师", "userId": "63887660000000001f014cba", "text": "你已经是我刷到的第二个破碎的了可惜我是个男的", "likes": 0}, {"user": "解惑大师", "userId": "63887660000000001f014cba", "text": "我觉得瓜沥这个有点难", "likes": 0}, {"us  "Abby上门私教", "authorId": "5b68510ef7e8b90a3dcf4505", "url": "https://www.xiaohongshu.com/explore/685a064c0000000022032577?xsec_token=ABl433Dxa-HEbMKEzyGcnUAkScm3PVtnQb5zBVaURt644=&xsec_source=pc_search&source=web_search_result_notes", "likes": 36, "collects": 18, "comments_count": 19, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031740/32aee6516a55bed84a5791f2642b59e4/notes_pre_post/1040g3k831j3jeq8ohg8g4aabf68gsh855ognfu8!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽", "commentList": [{"user": "是王炸", "userId": "594795475e87e71ff0a60d7c", "text": "哇想去", "likes": 1}, {"user": "sophie贺老板", "userId": "5b68510ef7e8b90a3dcf4505", "text": "欢迎欢迎 可以约瑜伽体验课", "likes": 0}, {"user": "李容淼", "userId": "54cc5375b4c4d615fb2c698f", "text": "这是瑜伽馆吗？", "likes": 0}, {"user": "sophie贺老板", "userId": "5b68510ef7e8b90a3dcf4505", "text": "多功能空间", "likes": 0}, {"user": "Becoming Flowers", "userId": "61496ad1000000000201fc01", "text": "请问咋预约啊", "likes": 0}]}, {"id": "", "title": "杭州上门私教", "content": "", "type": "normal", "author": "Abby上门私教", "authorId": "", "url": "https://www.xiaohongshu.com/search_result?keyword=%E6%9D%AD%E5%B7%9E%E7%91%9C%E4%BC%BD&source=web_search_result_notes&type=51", "likes": 86, "collects": 0, "comments_count": 0, "shares": 0, "cover": "", "keyword": "杭州瑜伽", "commentList": []}, {"id": "67f8e780000000001e0089f4", "title": "🌳户外瑜伽初体验！我与自然的深度连接", "content": "2023年开始接触瑜伽🧘🏻‍\n这项运动一直给我一种看不见的能量💪🏻与自信\n🔕外界的声音太多，关闭👀双眼，沉浸到每一次练习中\n\t\n好幸运参加杭州植物园plantb森林瑜伽活动\n体验了人生第一次的户外瑜伽\n感受着🌲树林 阳光 微风风 还有“好望水”的配合\n适配度100％呀\n💦及时补充能量又0负担\n\t\n最后还是想说\n练瑜伽最美的不是瑜伽体式 而是每次坚持的你\n没有人可以替代你用汗水和坚持换来的健康与自信\n勇敢去做\n\t\n#瑜伽#户外#运动#好望水薏米水#plantb城市森林计划#plantb#瑜伽是一种生活方式 #户外松弛感#哭喊中心#暴肌独角兽 #徒步", "type": "normal", "author": "Abby上门私教", "authorId": "61cd5e9c000000001000723e", "url": "https://www.xiaohongshu.com/explore/67f8e780000000001e0089f4?xsec_token=ABsXtJLZc2rx9xdVqB0CO4hFEJQi8ldjWTx8v4A6IW6C0=&xsec_source=pc_search&source=web_search_result_notes", "likes": 262, "collects": 86, "comments_count": 27, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031741/7b73401dc02843341747102ca7093803/notes_pre_post/1040g3k031g4oeji41u5g5oedbqe40shurh2q2a0!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽", "commentList": [{"user": "米饭", "userId": "5b4588014eacab206d2319df", "text": "水能送我一箱么", "likes": 0}, {"user": "晚", "userId": "61cd5e9c000000001000723e", "text": "你也要养生了咯", "likes": 0}, {"user": "3211", "userId": "5acf22bfe8ac2b4a169bbc86", "text": "薏米水 看着就很健康了", "likes": 0}, {"user": "晚", "userId": "61cd5e9c000000001000723e", "text": "给你买一箱", "likes": 0}, {"user": "慕斯先森丶", "userId": "5b67081ca559a5000153364c", "text": "和你同款饮料", "likes": 0}]}, {"id": "693bfcbd000000001f004784", "title": "杭州最美瑜伽馆｜inward Pilates", "content": "环境超级超级好～很静谧很疗愈\n挖到宝啦～主理人小姐姐超贴心，手把手教我凹造型，原片直出都巨好看，出片率💯，烦恼瞬间全飞走～ 📷\n出片真像呼吸一样简单～#普拉提打卡 #普拉提 #把时间花在自己身上 #温柔与力量 #yaga #瑜伽探店 #宝藏瑜伽馆 #氛围感瑜伽馆 #美女主理人 #拍照出片 #松弛感拍照 #同城瑜伽推荐", "type": "normal", "author": "Abby上门私教", "authorId": "597c028c5e87e76785a2e79d", "url": "https://www.xiaohongshu.com/explore/693bfcbd000000001f004784?xsec_token=ABIEr7GA_CETzd9rPevXAfbfT3CNQlxoTed8B6xuI_vGk=&xsec_source=pc_search&source=web_search_result_notes", "likes": 13, "collects": 4, "comments_count": 2, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031741/2c63348759c06afccbf7305948b60a5b/notes_pre_post/1040g3k031q06r831g03g49n15818ppstch8n258!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽", "commentList": [{"user": "驼驼乳酪面包🍞", "userId": "5b420c704eacab6d4c14476a", "text": "你好软啊", "likes": 1}, {"user": "椰几", "userId": "597c028c5e87e76785a2e79d", "text": "", "likes": 0}]}, {"id": "661c99b3000000001b011129", "title": "通过自己，认识瑜伽。", "content": "#认识瑜伽工作坊\n#每月一期\n#60%理论➕40%练习\n一期比一期人多的课程，昨天很多朋友从外地赶过来，有瑜伽小白也有10年左右教学经验的老师，我们交流的很痛快。\n现代人为什么需要练习瑜伽？\n瑜伽“上瘾”的原因原来在这里。\n体态和情绪能量的关系。\n……\n瑜伽老师总觉得没什么可教的了？是技术不够还是没用上“心”。\n\t\n#吴孟大孟孟 #瑜伽日常 #瑜伽 #杭州瑜伽馆 #瑜伽体式 #ryt200 #ryt200全美瑜伽联盟认证 #瑜伽行业", "type": "normal", "author": "Abby上门私教", "authorId": "5cb1c2f7000000001603179c", "url": "https://www.xiaohongshu.com/ 西湖森林瑜伽馆测评", "content": "今天打卡了西湖附近的一家瑜伽馆，献上6P测评！\n\t\n🧘‍♀️定位(Propodition): 高端瑜伽馆，主打6人小课和RYT教培，坐落在杭州西湖附近，风景超美，还有户外瑜伽课，感觉像是在森林里瑜伽；\n\t\n📖产品(Product): 课程非常全面，除了传统的哈达瑜伽/流瑜伽等，还有一些完成高阶体式的建立过程训练(比如: 后弯/ 开髋/ 开肩等)，理疗课，冥想课等；排课比较多，但是都集中在8PM之前，上班族可能不大友好；\n\t\n🏠环境(Place):\n1/ 西湖附近，很安静，有一整栋四层瑜伽普拉提教室，还有很大的户外区域可以做瑜伽；\n2/ 瑜伽教室超干净，地板瑜伽垫以及各种辅具一丝不苟，有大镜子可以观察动作，落地窗看到窗外郁郁葱葱；\n3/ 更衣室，洗漱间，化妆间一应俱全，还有毛巾提供，满足练习完直接约会需求；\n\t\n💰价格(Price): 450元/节 (6人小课) ，只有储值卡，无月卡年卡等；\n\t\n📺推广(Promotion): 经常会举办宠物/贵妇级月子中心等联名瑜伽活动，还有室外音乐会等；\n\t\n📦包装(Packaging): 环境+价格应该是贵妇的选择哈哈，但是如果在杭州旅游，从灵隐寺下来去体验一节课挺好的，净化身心；\n#瑜伽 #瑜伽服 #户外瑜伽 #狗狗瑜伽 #孕妇瑜伽  #杭州旅游 #西湖 #灵隐寺", "type": "normal", "author": "Abby上门私教", "authorId": "600ffd4c000000000100144b", "url": "https://www.xiaohongshu.com/explore/66800b96000000001f0062be?xsec_token=ABLVPHH2_SZPIPUWmvhywbp3Ss1wr6Gcgh8ImISTyD760=&xsec_source=pc_search&source=web_search_result_notes", "likes": 53, "collects": 40, "comments_count": 2, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031741/b73dae07f560ca6ac96e4f6e56c070a1/1040g008314knks4074205o0fvl60852bs2uubc0!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽", "commentList": [{"user": "小红薯64E3233F", "userId": "64e1bd61000000000100dd30", "text": "怎么联系", "likes": 1}, {"user": "香菜蓝莓", "userId": "6059f9f7000000000101c14e", "text": "私教价格？", "likes": 0}, {"user": "小红薯64E3233F", "userId": "64e1bd61000000000100dd30", "text": "怎么联系", "likes": 1}, {"user": "香菜蓝莓", "userId": "6059f9f7000000000101c14e", "text": "私教价格？", "likes": 0}]}, {"id": "67ebb9d2000000001d016e70", "title": "天呢 能量场太好了", "content": "打卡一下杭州最美瑜伽馆Met yoga\n\t\n🍃\n\t\n足弓好的人多是走了很多不平凡的路\n\t\n👣\n\t\n#吸收好的能量 #心灵的净化\n#metyoga #杭州最美瑜伽馆", "type": "normal", "author": "Abby上门私教", "authorId": "5c96043c000000001100a6f6", "url": "https://www.xiaohongshu.com/explore/67ebb9d2000000001d016e70?xsec_token=ABVte5rH2uP88Llr7-JNx47yhPo6zipkkNm0btS6aKs88=&xsec_source=pc_search&source=web_search_result_notes", "likes": 14, "collects": 4, "comments_count": 5, "shares": 0, "cover": "https://sns-webpic-qc.xhs 1ck7hinpogl121ino!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "云吃吃(爱吃拍纸本版", "userId": "54831d17e779891841b68ab0", "text": "我一月五千生活费都敢报报了25节私教+30小班的套餐，一万出头。私教负责任的话，一定有效果。私教可以帮你纠正各种动作，小班一般强度大，私教上完去小班也很好，你这个30节完全够了", "likes": 42}, {"user": "🍃🍃🍃", "userId": "5ac5de4ce8ac2b144995a29e", "text": "你的太划算了吧", "likes": 8}, {"user": "in宁", "userId": "670b7d54000000001d0316f0", "text": "十节私教都没上完的效果", "likes": 2}, {"user": "生椰拿铁plc", "userId": "565171e7a75c95562603c11d", "text": "你的效果好明显哦", "likes": 1}, {"user": "没有年龄的仙女（装修备婚ing", "userId": "663d875f0000000007005417", "text": "我也是备婚在练体态，让我报10节就够，而且才300一节，在黄龙这边，如果你不嫌远的话，很推荐", "likes": 3}]}, {"id": "6895aca90000000025013a1a", "title": "📍杭州天目里｜超美的普拉提馆🩰🤍！", "content": "hi～初次见面 我想和你介绍一下我们\n这里是RepoPilates 乐朴普拉提馆\n藏在杭州天目里的治愈空间🏠\n在这里 我们希望不同身份的女性都能做回自己\n在忙碌与疲惫中找回自己的光芒和自信\n在运动中唤醒身体潜能 重塑健康生活 ✨\n\t\n✔️我们有专业精湛的教练团队\n经验丰富的国际体系认证教练\n精通普拉提原理与各类教学体系\n\t\n✔️专业的器械保障\n器械是普拉提练习效果与安全性的基石\n我们斥资引进国际一线品牌 Balanced Body的全套进口器械\n为您的练习提供多样化选择与强有力的支撑\n确保动作标准到位 训练效果更大化💗\n\t\n✔️专业服务\n首次体验即享专业身体评估，清晰了解您的起点与需求\n根据评估结果与个人目标（塑形、康复、提升运动表现等），量身设计专属课程\n小班精品教学严格控制班级人数，确保教练能关注到每位学员的动作细节与安全\n私教会员一对一专属服务课前评估、课后总结跟踪，让你的每一次训练都更加科学高效📝\n\t\n✔️舒适空间\n提供单间私教教室 配备高级休息区 更衣室👗\n每日深度清洁与消毒 私密性与通透感并存\n提供茶歇点心 低卡零食\n希望可以为您提供舒适放松的空间🍃\n\t\n邀请您 一起享受普拉提带来的改变\n重新定义新的生活方式🫧\n\t\n📍 门店地址:杭州市西湖区云州国际中心\n#杭州 #普拉提 #杭州普拉提 #杭州探店 #高级感健身房 #体态管理 #杭州健身空间推荐 #杭州普拉提馆", "type": "normal", "author": "Zhangziii01-13", "authorId": "5c9b5bec000000001002eaad", "url": "https://www.xiaohongshu.com/explore/6895aca90000000025013a1a?xsec_token=ABZJXRlZFCkR3dhTmyLfHfNNesEFho9QRh3CnNJ75RKMw=&xsec_source=pc_search&source=web_search_result_notes", "likes": 225, "collects": 92, "comments_count": 58, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031742/3db4c7a8b6f1fa5e25b6336a02bb474e/notes_pre_post/1040g3k831ktrfajj2ggg5n4rbfm45qldiu4gog0!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "QQin韩国", "userId": "6615a1eb0000000007006ba0", "text": "还有吗", "likes": 0}, {"user": "RepoPilates 乐朴普拉提", "userId": "5c9b5bec000000001002eaad", "text": "哈喽宝 si", "likes": 0}, {"user": "小小雅玲", "userId": "5d3ed725000000001003f6a0", "text": "怎么收费", "likes": 0}, {"user": "RepoPilates 乐朴普拉提", "userId": "5c9b5bec000000001002eaad", "text": "已经私您啦", "likes": 0}, {"user": "是16哇", "userId": "5880436650c4b46a023d5cc1", "text": "怎么收费", "likes": 0}]}, {"id": "663c981e000000001e02614b", "title": "为什么劝你别轻易报普拉提私教？", "content": "在小红书上发现了一个奇怪的现象，为什么现在很多普拉提老师会让学员在普拉提核心床上玩一些瑜伽动作，做超大幅的拉伸、后弯。然后号称普拉提—减脂瘦身、打造蜜桃臀的效果多好多好。\n\t\n我的评论和私信经常受到大家的咨询，我虽然是普拉提老师，也经常分享普拉提的好处。但是！我也是要真实客观的评价普拉提这项运动，并且考虑每个人当下的需求。不是随便什么情况，都推荐你马上报普拉提的。\n\t\n想快速减肥减脂的，不要指望普拉提。\n普拉提大部分训练不能快速提高心率，燃脂效率就不高。如果你已经在练普拉提了，那就一定配合有氧，而且三分练七分吃，管住嘴最重要。\n想要增肌(比如练出蜜桃臀），劝你别选普拉提。\n肌肉增长需要更大阻力刺激，真的要明显的大肌肉，不如上健身房找个好私教，可能见效快一点。普拉提最多增加肌肉分离度，小线条明显一点。\n\t\n想纯粹放松不动脑子，普拉提不适合。\n普拉提先生提出的原则之一“全人投入”，必须要全神贯注，你还要调动你的运动控制神经去指挥你的身体，你做不到的话教练一直让你调整。如果只想简单动一动，跳操可能更加适合。\n\t\n总之，普拉提某种程度上也算网红运动，明星效应也很足。大家要想清楚当下的主要需求，选择自己最合适的。每分钱，都花在刀刃上。\n\t\n今日训练👕\n裤子：Lululemon throw back背心：feikamoli\n\t\n#见人不如健身 #动起来更有趣 #普拉提 #减肥经验分享 #普拉提私教 #普拉提核心床 #普拉提打卡 #笔记灵感 #我的普拉提日常 #杭州普拉提 #因为热爱所以坚持 #lululemon #健身穿搭 #普拉提穿什么", "type": "normal", "author": "Zhangziii01-13", "authorId": "61a44eb300000000210279d5", "url": "https://www.xiaohongshu.com/explore/663c981e000000001e02614b?xsec_token=AB0FsIBVxdB4OLUxsy_Kq0VrR8j3NP0xqCn9qFRT8iFes=&xsec_source=pc_search&source=web_search_result_notes", "likes": 726, "collects": 378, "comments_count": 182, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031742/f4fd86be3d3162608891b73adb500165/1040g008312irq01i0e1g5od49qpocueln7perd0!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "Joy健康普拉提", "userId": "61a44eb300000000210279d5", "text": "博主是个宝，丢了不好找", "likes": 15}, {"user": "一个骨灰盒就哭他", "userId": "64a89411000000001001f4ea", "text": "想练主要是奔着练体態去的", "likes": 1}, {"user": "爱笑的屎", "userId": "5cdfbd97000000001801aecf", "text": "只改善体态呢 毕竟我真的很瘦 80斤", "likes": 13}, {"user": "Joy健康普拉提", "userId": "61a44eb300000000210279d5", "text": "普拉提 合适", "likes": 4}, {"user": "说好不搞抽象的呢", "userId": "5f7dd7ab000000000101ff8d", "text": "第一节课教了呼吸➕盆骨前后倾供背的那个练习，但是上完我完全是懵的，感觉没怎么学会，跟老师说还是不太理解，她说不用理解练就行，但问题我也没学会不知道练的对不对不知道怎么练，感觉上完很挫败，本来想好好练改善驼背改善体态的结果呼吸都没整明白，我真的觉得我太鲁莽了，就不该听人家的三言两语就买课，我就该坚持一开始的态度，然后上别家看看，多对比对比", "likes": 21}]}, {"id": "", "title": "滨江漂亮普拉提馆🧘🏻‍♀️⁺₊⁺♡₊⁺🤳", "content": "", "type": "normal", "author": "Zhangziii01-13", "authorId": "", "url": "https://www.xiaohongshu.com/search_result?keyword=%E6%9D%AD%E5%B7%9E%E6%99%AE%E6%8B%89%E6%8F%90&source=web_search_result_notes&type=51", "likes": 81, "collects": 0, "comments_count": 0, "shares": 0, "cover": "", "keyword": "杭州普拉提", "commentList": []}, {"id": "67cff765000000001201d253", "title": "杭州普拉提", "content": "现在的普拉提都太贵了 真的上不起#普拉提 #杭州", "type": "normal", "author": "Zhangziii01-13", "authorId": "5a101b864eacab6eaa108e8c", "url": "https://www.xiaohongshu.com/explore/67cff765000000001201d253?xsec_token=AB5E8EFvmvKv2SRPjC70yavpeHelodMt7KUoAUa2wKLsE=&xsec_source=pc_search&source=web_search_result_notes", "likes": 266, "collects": 230, "comments_count": 253, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031742/a8ec0b4ddd80567fc1854c4eddabefec/1040g00831esp676tma0049vmjddod3kcjbh0dho!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "Miya普拉提私教", "userId": "555abb5e3397db299fed6e46", "text": "余杭未科", "likes": 1}, {"user": "又又不吃啦", "userId": "6440d8250000000014010a0f", "text": "什么价格", "likes": 0}, {"user": "隐形的稻草人", "userId": "5a793bad11be1024e9254ee5", "text": "在三墩上的还可以", "likes": 1}, {"user": "妙脆脆脆鲨l8n", "userId": "5d05d6f5000000001200917c", "text": "哪里", "likes": 0}, {"user": "王富贵体态体能", "userId": "64eebb5b0000000001007256", "text": "多试课多对比，拥有合适的", "likes": 0}]}, {"id": "67d14516000000000903b54e", "title": "避雷愈伽普拉提 这个男老师（上）", "content": "19年开业的时候上过体验课，之前还有空中瑜伽。后面产后就买了私教课和小班课穿插着练。\n我这个人是兴趣爱好很广泛，瑜伽普拉提报了有三家，艾扬格流瑜伽什么都上，街舞和油画也会去。所以这两年过去也只能抽时间上了几十节普拉提小班课。\n里面的女老师也都挺nice，知道我基础还算可以，上课对我也很友好。哪怕我不是规律频繁地来，大家也都是相互尊重，有说有笑。\n但是这家存在三个让消费者无法忍受的情况\n1️⃣高高在上的“男性老师”\nAman是个男老师，说话带着不知道从哪来的优越感。上过他的两节私教体验课，专业能力不知道强在哪里，倒是嘴强王者了，所谓的让你找本体感啊，不要代偿。一个小时五个动作，毫无体验，刷一下一节课过去了。效果？几乎也零。之前去试过元一的私教，有些老师讲的很细，但是不会这么水。太讲究动作的标准性，而忽略了运动本身的目的就是“动”啊。他的课主打一个他嘴累了，你康复训练了。。\n2️⃣管理混乱\n①是销售价格不一致，调价随意。\n频繁的节日活动价，每场都宣称价格最低，老板亏本大买卖？其实就是在疯狂融资。所有的赠卡，是可以商议的，只要你会还价，你就可以多几节课。这样就会导致大家的购价是不一致的，不会谈价的就会吃亏。\n② 课程取消规则混乱。\n在我已预约课程的情况下，我经常会在中午十一点十分接到电话，问我来不来中午十二点十分的小班课。约课系统显示4-6人左右，但是实际来了以后发现只有两个人，还有一次只有我一个人。那这是是代表着会员们经常会出现在一小时内临时取消的情况。但是这个馆对我个人一直宣称，必须开课一小时以上才能取消。这项严格的规则，是对所有会员执行吗？如果是这样，那为什么出现多次，约课系统显示多人，最后实际上课的只有两人甚至我一个人？\n③课前提醒不到位。微信公众号无提醒，短信功能也时常崩溃。23年产后恢复练习的时候，公众号是有提醒功能的，那时候觉得很方便。后面那个公众号就突然停用了。短信也一直是被我手机直接拦截的状态。直到有一次我排队一节课，结果课程排上了，我没有收到信息，也没有任何人通知我这节课开课。后面发现这节课被扣了，我才知道原来是发短信的，而短信被我手机拦截为垃圾短信了。于是我就建议继续恢复微信公众号功能，因为微信使用频率更高更主流，也不会被屏蔽。现在半年过去了，并没有任何改善。\n#普拉提教练培训 #普拉提 #杭州普拉提馆避雷", "type": "normal", "author": "Zhangziii01-13", "authorId": "5a8f05144eacab4ea4916207", "url": "https://www.xiaohongshu.com/explore/67d14516000000000903b54e?xsec_token=ABpYka5Ues_IrjbGxY76rv5BwoZjF56z1ZRGmpUDFX81o=&xsec_source=pc_search&source=web_search_result_notes", "likes": 66, "collects": 9, "comments_count": 18, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031742/6654c8abf96c07577fb4c67aa34da384/1040g00831eu1tkm6mi6g4a1mga2h8og7sv568jo!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "Ts.藤溯普拉提", "userId": "62b6cb40000000001902b906", "text": "如果你是想练普拉提就应该先专业普拉提馆，不要找瑜伽普拉提，你们都别以为瑜伽就是普拉提，普拉提也不等于瑜伽！让你们尽量不要找瑜伽普拉提馆上普拉提是为了尽可能避免有瑜伽老师来跟你上普拉提，她们之间学的专业是不一样的，理念也不一样，学费更是不一样！", "likes": 10}, {"user": "一只特立独行的猪🐷", "userId": "5a8f05144eacab4ea4916207", "text": "别这么激动，不管是什么体系的，北极星也好 斯多特也罢 现在市场价都是营销出来的高价。就像最开始的健身和瑜伽一样，价格也应该逐渐趋于合理。而不是拿着所谓的证书说，我比其他运动高级，我就该多赚你们的米。那如果论体系正规和学习成本，还得是芭蕾基训。所以别再宣扬什么普拉提就该学费高了，能带来多么“奇迹”般的身体变化了。现在市场上大多数老师都是什么水平 自己心理真的没点数吗？消费者来付费上课，对情绪价值的要求远远大于你的真实水平。", "likes": 32}, {"user": "Xuxu*", "userId": "5b16958911be100576eed724", "text": "说得好 运动首先得动", "likes": 0}, {"user": "一只特立独行的猪🐷", "userId": "5a8f05144eacab4ea4916207", "text": "是呀", "likes": 1}, {"user": "贝米普拉提", "userId": "5c769116000000001202ab83", "text": "运动不分高低，都是同等的，瑜伽，普拉提，健身都是可以的，喜欢什么合适什么就去做就行了只要正确练习都是好的", "likes": 6}]}, {"id": "69be5c930000000021013ba4", "title": "📍坐标：杭州·拱墅区普拉提工作室", "content": "💰关于价格：大家帮我看一下\n\t\n🤔可能会有人觉得这是“普拉提刺客”，但我还是想解释一下为什么我敢这么定：\n1️⃣ 关于我：斯多特国际认证全系列体系老师\n不是速成班出身，斯多特（Stott）是普拉提界的“黄埔军校”，全系列代表我从垫上到所有大器械都经过了严格的解剖学和动作分析考核。你上的不是一节体验课，而是一个康复级专业教练的脑子和经验。\n2️⃣ 关于设备：（曼丽丘）原装进口，全新不是二手\n懂行的姐妹一看就知道，这是普拉提器械里的“爱马仕”。弹簧的精准度、滑轨的流畅度，直接决定了体感安全和效果。为了这份“丝滑”和“安全”，投入成本就在这里摆着。\n💬大家实话实话，你们觉得在拱墅区，这样的配置和价格，到底是“贵了”，还是“值了”？\n（评论区等大家来评评理🤔）\n\t\n#普拉提 #杭州普拉提 #拱墅区普拉提 #斯多特普拉提 #曼丽丘 #普拉提器械 #我的普拉提日\n常", "type": "normal", "author": "Zhangziii01-13", "authorId": "5a9c24c511be1027d8bfdaa2", "url": "https://www.xiaohongshu.com/explore/69be5c930000000021013ba4?xsec_token=ABXMEk1deqWOqlt556J2TuPZayU-wxwJEbGx_B1fHIrzg=&xsec_source=pc_search&source=web_search_result_notes", "likes": 24, "collects": 9, "comments_count": 18, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031742/785c834f8e6822cff340ae2b51939c85/1040g2sg31tvishnd78e04a33iqicbml2dhrd44g!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "野旷天低树--", "userId": "65e2dd2e0000000005008966", "text": "产后肚子大可以瘦吗？", "likes": 0}, {"user": "雷雷的普拉提教室", "userId": "5a9c24c511be1027d8bfdaa2", "text": "可以呀", "likes": 0}, {"user": "木易小姐", "userId": "656947ec000000003d035de1", "text": "产后一般多久建议开始呀", "likes": 1}, {"user": "雷雷的普拉提教室", "userId": "5a9c24c511be1027d8bfdaa2", "text": "看清况", "likes": 0}, {"user": "A蛋蛋_59356915", "userId": "59354cc85e87e72e147161b1", "text": "真贵 我们这里私教一对一288我都觉得贵", "likes": 0}]}, {"id": "6901f5480000000003019c21", "title": "🧘‍♂️｜杭州瑜伽馆体验 001", "content": "人物背景：4个月瑜伽练习时长的瑜伽小白\n\t\n今天来记录一下第一家瑜伽馆体验\n\t\n🏠 店名：YOU妳瑜伽·普拉提（宸北店）\n📍 地址：余杭区良渚街道通运街217-20号（我爱我家楼上）\n💵 人均：体验课11.8元，瑜伽普拉提半年卡不到8k\n\t\n【我的体验报告】\n✨ 环境：米色奶油风，私教室比较多，除了瑜伽普拉提还有器械课。教室有一整面落地窗，能看到街景，练习时心情超舒畅！\n🧘‍♀️ 课程：我上的是垫上瑜伽小班课，只有4个人。老师很热情，每个体式都会下来细心辅助，纠正体式。\n🛁 设施：更衣室有淋浴间、衣柜但没有独立的换衣间（店里有卫生间）；瑜伽教室里有地暖，冬天上课也完全不会冷。\n💁 服务：老师很热情，会提前了解学员情况，练习后会主动递上温水。会主动介绍优惠但不会push买课，体验感还不错！\n\t\n✅ 优点：\n1.小班教学，老师关注度高\n2.环境私密安静，少推销\n3.教室有地暖，冬天不冷\n4.瑜伽馆内有卫生间\n❌ 缺点：\n1.瑜伽课排课不如普拉提多（对于想要专注瑜伽的会有点不够合适）\n2.价格在同类里算中上的\n3.没有独立更衣室\n\t\n总的来说，这家更适合想同时上普拉提及瑜伽课，且预算充足的姐妹，这两项与我都不适配[呃R]。\n\t\n#普拉提瑜伽 #杭州瑜伽馆测评 #杭州瑜伽 #普拉提 #瑜伽探店", "type": "normal", "author": "Zhangziii01-13", "authorId": "684cfb16000000001d0170fd", "url": "https://www.xiaohongshu.com/explore/6901f5480000000003019c21?xsec_token=AByW0jt46xyPYOU8R0BzQsOdmtUWKj1N_d2e2234p2rfU=&xsec_source=pc_search&source=web_search_result_notes", "likes": 15, "collects": 6, "comments_count": 4, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031743/2bf23fc8a202fb9bb136c97057895e2c/notes_pre_post/1040g3k831o7is4qlmmc05q2cvcb7as7totqtmeo!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "夏天天", "userId": "6549fd8e000000000301f743", "text": "", "likes": 0}, {"user": "小红薯6953DC0F", "userId": "695347890000000003011db6", "text": "", "likes": 0}, {"user": "司南", "userId": "698d3a25000000001d0075ab", "text": "", "likes": 0}, {"user": "Born Design瑜伽设计", "userId": "5f9cf0ed00000000010053ac", "text": "", "likes": 0}, {"user": "夏天天", "userId": "6549fd8e000000000301f743", "text": "", "likes": 0}]}, {"id": "6977a6070000000021029e5a", "title": "避雷杭州101普拉提所有店", "content": "杭州101普拉提馆，半年同一时间注册十几家店，同时开张十几家101普拉提分店。其中一家北软店开业不到三个月，极速闭店。会员充的钱不退。还不承认自己是同一个老板，并且偷偷在工商上注销自己的公司。明明一个老板注册了十几家店，却黑着我们的钱不退。#普拉提瑜伽 #普拉提 #杭州普拉提 #杭州 #瑜伽馆 #维护消费者权益 #消费者维护权益", "type": "normal", "author": "Zhangziii01-13", "authorId": "6642f9d40000000003033377", "url": "https://www.xiaohongshu.com/explore/6977a6070000000021029e5a?xsec_token=AB7EbHBDZRa7kDmSF8CfMaNI0K7_deK_WG1BaHTQsxGDY=&xsec_source=pc_search&source=web_search_result_notes", "likes": 10, "collects": 1, "comments_count": 10, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031743/acecb17ddc020f37c8ee08a0b876680f/notes_pre_post/1040g3k831rqgt9v832ag5pi2v7a0ucrnhoas47g!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "Jenny", "userId": "59b382eb50c4b45fb6115d5f", "text": "前几天还刷到她们彭埠这边店低价引流呢，188十节私教课", "likes": 1}, {"user": "七卿", "userId": "5a1947164eacab4a24c330a4", "text": "金沙湖也有", "likes": 1}, {"user": "摸鱼摸的是水煮🐟", "userId": "5df3af2c000000000100018a", "text": "我也是10节课1000多块钱呢", "likes": 0}, {"user": "Twilight", "userId": "602a37580000000001007b68", "text": "私教吗宝", "likes": 0}, {"user": "爱翻腾的小迷糊", "userId": "6356206b000000001802a2be", "text": "姐妹，我也是店里会员有没有维权群呀，有的话拉我下", "likes": 0}]}, {"id": "671a227c000000001402fe92", "title": "上了500节课普拉提课 我给新手选馆的小建议", "content": "作为一个练习普拉提4年，上了500节课的资深普拉提爱好者，经常被身边朋友问到，新手该如何选馆？尤其是作新手手很难判断老师是不是专业，就很容易踩坑而不自知。所以我总结了一些新手选馆小tips给大家参考~\n场馆选择\n现在不要脸的跑路机构太多，所以选择一个靠谱的场馆变成了最重要的因素。如果有机会认识一下合伙人团队可以帮助判断他们是否是靠谱的人，但是如果没有这个机会，也可以从以下几个方面来辅助判断：\n设备投入：是否愿意花钱投入好的进口设备，而不是只搞一些花里胡哨的表面装修用于拍照，但是却不愿意投资设备\n最资深的教练的数量和在馆年限：如果有多个资深教练在馆里待了很多年，能一定程度说明场馆的经营理念和稳定性\n会员质量：你可以看一下这个馆正在训练的会员大概是什么样的气质和风格，物以类聚人以群分这个话还是不无道理\n\n教练选择：\n\t教练的体系背景：各个教练的学习体系最好相对统一，包括但不限于BC，北极星，中瑛普拉提；尽可能选择完成全系列培训的教练。\n试课：可以多尝试几个教练的试课，更好的帮助自己找到最适合自己的教练。而且每个阶段可能也会适配不同的教练，可以根据自己的变化来适配。\n课程逻辑：上课的时候教练给你的课程设计是否让你觉得有逻辑，还是只是简单的学习几个动作而已\n教练自我训练：好的教练也是需要进行频繁地进行自我训练和提升课程。\n\n私教or团课\n初学者我一定建议先私教：磨刀不误砍柴工，你要先了解自己的身体能力和注意点，才能在团课上找到自己的度，不会受伤\n团课的优势是氛围，但是缺点是人数多老师没有办法照顾到每一个人。我经常在团课看到老师提供了一个动作的进阶版和基础版两个选择，一些会员追求进阶版，但是她的普拉提的中轴和核心原则完全都失控了，这样是非常容易受伤的\n在有了对自己的一定认知的基础上，可以尝试私教和团课穿插进行。普拉提都是跟自己比，不需要跟别人比，不用盲目追求动作的外观达到而失去排列或者原则。\n最重要的—你的喜好\n个人喜好很重要，所有的训练都要建立在你喜欢并且能坚持的基础上，如果你能在精准的肌肉控制中找到快乐那恭喜你，可能这个是适合你的运动\n#普拉提 #杭州普拉提", "type": "normal", "author": "Zhangziii01-13", "authorId": "5764b25c6a6a694560e41f22", "url": "https://www.xiaohongshu.com/explore/671a227c000000001402fe92?xsec_token=ABLOyV1VfLdLW0_UFa-meePQWUyj_l4LZbMX4-9Lvefv8=&xsec_source=pc_search&source=web_search_result_notes", "likes": 43, "collects": 30, "comments_count": 27, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031743/19ce2a29e7e6083e97c141037afac6cd/1040g2sg319b6ugp8me7g48go9qp5o7p2dciid7o!nd_dft_wgth_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": 860a0000000027010016?xsec_token=ABRQduqap9iA8i7sCC1CfdskS471IPNvh42W8jrrKMjPg=&xsec_source=pc_search&source=web_search_result_notes", "likes": 15, "collects": 11, "comments_count": 86, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031743/0b5b80cffc15fdaaa506888860a824c8/1040g2sg315kejdvg0q6g5n6c1lp5s5pobicn1p8!nd_dft_wgth_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "momo", "userId": "56dbba341c07df0c583a0792", "text": "大悦城附近可以给你推荐我的教练", "likes": 1}, {"user": "美丽的珍妮玛士多", "userId": "5c4b390c0000000012012ddf", "text": "求推荐？我在附近大悦城停车也还方便", "likes": 0}, {"user": "普拉提老师Carina", "userId": "5a07d13ae8ac2b4b5c8a13af", "text": "看老师资质哦，小白真的不建议跟团课", "likes": 1}, {"user": "大米粒的成长之路", "userId": "5ccc0d720000000017021738", "text": "纯小白还是建议私教是吧", "likes": 0}, {"user": "一条鱼", "userId": "5b6c5b57712fdf0001d00e0c", "text": "有滨江的吗", "likes": 0}]}, {"id": "67b7dc33000000002900f8fe", "title": "新手学习普拉提", "content": "本人久坐腰肌劳损，听说普拉提康复训练可以改善腰疼，但是！\n为什么杭州的普拉提私教这么贵啊啊啊啊\n400+一节课打工人真的承受不起\n有没有便宜点的普拉提私教推荐啊#普拉提教练培训 #私教 #普拉提 #体态调整 #普拉提瑜伽 #适合女孩的运动项目 #普拉提私教一对一 #普拉提杭州 #杭州普拉提私教", "type": "normal", "author": "Zhangziii01-13", "authorId": "5dcd4b350000000001003b2d", "url": "https://www.xiaohongshu.com/explore/67b7dc33000000002900f8fe?xsec_token=ABGINVfUJzOj8YZS8Q0Nk2-_vmLAWBnhBukDVcNr9PbvQ=&xsec_source=pc_search&source=web_search_result_notes", "likes": 264, "collects": 272, "comments_count": 449, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031743/ca6cc61813e3c6767c2bea78f535d75c/1040g2sg31e57rvqm0kcg5ned9cqg8epde4mli78!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "小Y", "userId": "5b54567111be104067465333", "text": "我找了一个开在家里的普拉提，一人一节课的，140一节一个小时，我觉得挺好的，最重要的是，上一节课付一节费就行了。现在赚钱那么难，让我一次付个小一万，我不舍得的。", "likes": 12}, {"user": "柠檬不萌🌞", "userId": "5a1cae144eacab2f77e60a83", "text": "请问地址是哪？", "likes": 2}, {"user": "肉肉女孩百元快乐屋", "userId": "6030f78b000000000101f41b", "text": "我们店萧山宝龙和滨江宝龙通用 我们店在做周年庆的活动100元包含可以体验一节私教～", "likes": 0}, {"user": "文", "userId": "6030a714000000000100ae84", "text": "我在滨江宝龙城  想问一下你们普拉提私教多少钱一节", "likes": 0}, {"user": "《     》", "userId": "5de3687e0000000001001722", "text": "我在上城区上的258，今年涨价了，去年更便宜", "likes": 1}]}, {"id": "67d161ed000000001201cb4d", "title": "避雷杭州上城区愈+普拉提 男老师（下）", "content": "接上一篇\n2️⃣管理混乱：会员权益和义务不对等，约课混乱。告知我如果没有在一小时内取消，那节课就必须被扣掉。但我在24年5月约的第一节瑜伽私教，老师忘了，到馆后人不在。其他老师都在上课，只有他空，给我上一节康复训练。大中午饭也没吃，跑来练瑜伽，被一个讨厌的老师上了敷衍的课。消费者的钱不是钱，时间不是时间\n3️⃣服务态度极差。那个aman，我因为三件事找过他。\n第一是我24.7崴脚韧带断裂做手术，我让他把我的半年瑜伽团课延后三个月。合理的消费者需求在他那里不可行，以团课是赠送的为由，不能延期。我据理力争，他才勉强延期了三个月。从头到尾没有一句人道主义关怀。\n第二是我24.10脚踝康复后可以逐渐运动，恢复了普拉提课程。如前面说的，24.10.13有一节课我排队没收到消息的那件事，也是推脱很久，再三盯着才给我补卡。\n第三是今天中午小班课，上午因为工作开会到十一点五十，结束开车过去，想着差不多能赶上。结果下雨车多堵在路上，已经来不及了。于是只能取消，前台说她没有权限。我就去问aman，他开始冷嘲暗讽，说我经常性取消，去年已经操作过一次（排队那一次）。一时之间我不知道去上的是普拉提，还是部队参军，这玩意一生只有一次？我强调我小班课没有主动取消过，他在没有了解事实的情况下说我去年十月份取消。我问定义这种行为“经常”是什么标准，他语气非常冲，说你这样我们怎么做生意。我决定去馆里当面说，挂了电话八分钟赶到了。他怂的跑了，我拨通了他微信，听到我已经在馆里，他开始声嘶力竭，说我现在给你补课 你还要不要 试图用声音吓唬我。拒不承认前面对我阴阳怪气说我经常性取消。难道我是花钱来买气受？这老大爷是哪来的自信对消费者这样啊。不说你的服务态度。最起码的尊重和讲事实要有的吧？撒谎成性、没有担当作为，人品差劲👎🏻\n锻炼身体虽然重要，心理健康也至关重要啊。一个女性消费者，就因为临时有事赶不到被男老师冠以“经常性取消”以及大声吼“这节课给你补 你还要不要补”。当我逻辑清晰问他  我经常性取消所以不能给我这次操作，从哪里得出的结论，临时取消规则到底是什么 对别的消费者也是一致吗 他又开始闪烁其词，拒不承认，一直小学生复读机“然后呢”“然后呢”遇到这种草履虫生物，无脑又无赖。大家擦亮眼睛，健身先健智，这种人品差的老师尽早远离。#杭州普拉提避雷 #杭州普拉提馆避雷 #普拉提", "type": "normal", "author": "Zhangziii01-13", "authorId": "5a8f05144eacab4ea4916207", "url": "https://www.xiaohongshu.com/explore/67d161ed000000001201cb4d?xsec_token=ABpYka5Ues_IrjbGxY76rv5DYSQW4pnI7JHqwJ3-z1D6g=&xsec_source=pc_search&source=web_search_result_notes", "likes": 15, "collects": 1, "comments_count": 5, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031743/96a87619d73dc3d3ababaa1a925416b5/1040g2sg31eu5eb426o704a1mga2h8og729dkpk0!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "豆妈精品店", "userId": "5b71a95c444f860001a6984b", "text": "自己的预付卡没有有效期 你打个市场监督管理局的 他就老实了 何况你还是特殊情况", "likes": 1}, {"user": "一只特立独行的猪🐷", "userId": "5a8f05144eacab4ea4916207", "text": "上个普拉提太难了，各种斗智斗勇➕被人身攻击", "likes": 1}, {"user": "MOMO的碎碎念", "userId": "5b5e946011be101a413a9a91", "text": "打12315+12345，然后同步找商家要合同和发票", "likes": 0}, {"user": "糯米糍mo", "userId": "556e567ee58d132eb4e5f71f", "text": "这家连约课系统都这么差 水平可见一斑", "likes": 0}, {"user": "豆妈精品店", "userId": "5b71a95c444f860001a6984b", "text": "自己的预付卡没有有效期 你打个市场监督管理局的 他就老实了 何况你还是特殊情况", "likes": 1}]}, {"id": "6846c9980000000012006672", "title": "普拉提老板跑路了", "content": "杭州普拉提老板跑路了…..\n杭州有没有一节一付普拉提课\n不要那种一节贵贵的，20节才便宜的那种\n（我找到组织了、据说房子就签约了半年，然后这个月到期了，所以才爆雷的，我还是太天真、想着应该会最起码开一年吧）\n\t\n打算长期#普拉提", "type": "normal", "author": "Zhangziii01-13", "authorId": "650edcb800000000160389bf", "url": "https://www.xiaohongshu.com/explore/6846c9980000000012006672?xsec_token=ABGDwLwUgBkRI7WH4lO1k7gtoOJfb6gZ9R8TcSj1qotDQ=&xsec_source=pc_search&source=web_search_result_notes", "likes": 4, "collects": 0, "comments_count": 59, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031743/213744168d398db63b0f7d73af60accd/notes_pre_post/1040g3k831igq717lgc005p8eris5n2dva4q8gog!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "我是陈晨曦", "userId": "5b57b9aa4eacab507e1d4349", "text": "哪一家…", "likes": 0}, {"user": "Paris L", "userId": "650edcb800000000160389bf", "text": "萧山", "likes": 0}, {"user": "停不下来的消停", "userId": "57aca3407fc5b8468af44320", "text": "我也是这家充了钱，结果说关门了…一次都没去", "likes": 0}, {"user": "Paris L", "userId": "650edcb800000000160389bf", "text": "你退回来了吗", "likes": 0}, {"user": "用户已注销", "userId": "5ace143411be103d4260b96c", "text": "剩下的钱呢 能追回吗", "likes": 0}]}, {"id": "65a0aec6000000001101d62b", "title": "杭州上门私教", "content": "#浪漫生活的记录者\n上门一对一私教\n坐标：杭州\n适合人群：社交恐惧症、自律性差、需监督、不想收拾懒得出门、讨厌场馆的商业气息、注重隐私不喜欢嘈杂环境、工作忙碌帮你省去交通时间\n课程内容\n理疗瑜伽类：（肩颈不适、富贵包、腰椎疼痛）\n颂钵疗愈：颂钵疗愈能引起身体深层迅速的放松，增加体内血液循环，减少紧张和压力，减轻身体疼痛，改善消化能力。\n产后修复类:腹直肌修复、骨盆修复、产后大肚子、悬垂腹、脏腑下垂、阴吹松弛漏尿…\n减脂塑形类：妈妈臀、扁平臀、臀凹陷、游泳圈、大肚腩、水桶腰、一字肩、少女背\n三段式拉伸❤️❤️❤️\n配合小工具和饮食指导\n自带工具可上门，不收交通费，家里4平米以上的场地即可\n第一次上门体验课时长为65分钟左右\n上课会做一个身体评估，后面会根据您的需求以及身体情况制定计划进行练习\n您需要考察教练的练习方式是否习惯，是否专业，气场是否合拍#杭州瑜伽上门私教 #维秘瘦身 #杭州上门私教 #杭州探店 #杭州约拍 #颂钵 杭州理疗 #普拉提私教 #我的私教 #杭州上门私教 #减脂塑形 #瑜伽日常", "type": "normal", "author": "Zhangziii01-13", "authorId": "60e9666a000000000100568f", "url": "https://www.xiaohongshu.com/explore/65a0aec6000000001101d62b?xsec_token=ABa11f9cVr5TXKerkD-E-zwS0EtLU1AOVmzVmLp4ImD7Q=&xsec_source=pc_search&source=web_search_result_notes", "likes": 98, "collects": 22, "comments_count": 0, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031743/19087c20543e9653fbc001494ee5c8b5/1040g2sg30tqjihg44m005o79cpl08lkfvc51or8!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": []}, {"id": "67702e1c000000000900c756", "title": "不要广", "content": "需要改正体态，杭州有教普拉提很厉害的教练吗#普拉提私教 #普拉提 #普拉提教练的老师", "type": "normal", "author": "Zhangziii01-13", "authorId": "6520e414000000002401731e", "url": "https://www.xiaohongshu.com/explore/67702e1c000000000900c756?xsec_token=ABaSGSj-gmuC932RN8E3_EFar2xliAiZPlbXpXNYvlXzg=&xsec_source=pc_search&source=web_search_result_notes", "likes": 81, "collects": 78, "comments_count": 117, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031744/12b24a664d87ca723607155612447d35/1040g2sg31bv7rubj0u705p90sga92soum8ttmrg!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提", "commentList": [{"user": "小屋", "userId": "6520e414000000002401731e", "text": "不要广喔", "likes": 0}, {"user": "333399", "userId": "55a8f7b43397db6729c92cf7", "text": "九堡或者钱江新城 有", "likes": 0}, {"user": "momo", "userId": "65980b3e0000000022004ab6", "text": "滨江浦沿funfun老师", "likes": 2}, {"user": "点点", "userId": "5893f19a82ec39101002b493", "text": "姐妹求推荐", "likes": 1}, {"user": "爱音乐的朵拉", "userId": "635e29f3000000001802bd37", "text": "我的教练 两百多块钱一节课  闲林这边 不是广", "likes": 0}]}, {"id": "662e2b9b000000000d032945", "title": "避雷‼️杭州无良商家E➕瑜伽普拉提", "content": "一开始在楼下散步，有个女的一直拉着我让我去她们店体验什么瑜伽，疯狂推销不让我走的那种，然后我就同意了，后面去了店里办理了该公司推出的健身卡，交了费用5380\n\t\n这家店提供30节小班课和6节私教课，第一次去上课因为被告前台没有人接待，前台也没人，客服也不回复我发的信息，我觉得服务不好所以申请退卡，此时还没有开卡，这家店拒绝退卡并说因为该店新开所以导致服务不周，但是我依然坚持退卡，对方不予回应，后我实在没办法，就去开卡上课了\n\t\n后续我上了5节私教课和2节小班课，觉得还是服务不够好，没有达到我的预期，所以想退掉剩下没有上的课，包含28节小班课加一节私教课，对方仍然拒绝退款，经👮协商，对方同意退款，态度恶劣，但是要收取45%的违约金！\n\t\n🌟我没见过这样的店，当时他说我开的te惠卡，说是请第三方给他们做的活动，我钱支付给这家店的，人也是去店里办的，她请第三方花了多少钱与我无关啊🤷，然后又说te惠卡以后店里推出的卡不会比这个卡更划算，但是过年的时候还被我发现她推出了价格更低的卡，后面问她，她说同类tao 餐不会更便宜，请问你是在虚假宣传玩文字游戏吗？并且拿合同压我，说我签署了他们的合同，请问这合同有效吗⁉️#退卡维权 #退卡坑 #瑜伽退费维权 #瑜伽退费起诉 #恶臭商家 #杭州维权 杭州消费者维权 #杭州萧山", "type": "normal", "author": "嫦娥6小时前", "authorId": "5c5c32f7000000001002d8c4", "url": "https://www.xiaohongshu.com/explore/662e2b9b000000000d032945?xsec_token=ABmXPR0ohm9X3G-wjiHhFEWn_-UleOEKuG86AFqXHiLY4=&xsec_source=pc_search&source=web_search_result_notes", "likes": 9, "collects": 3, "comments_count": 20, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031816/f060acdab06cb161890238d6c8841cff/1040g2sg3124p24tojs505n2s6brk5m64dql09qo!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽馆", "commentList": [{"user": "爱冒险的梦", "userId": "61ee3fa70000000010008671", "text": "直接起诉这种无良商家", "likes": 2}, {"user": "你算哪块小饼干", "userId": "5c5c32f7000000001002d8c4", "text": "她说不怕起诉，开了那么多年了", "likes": 2}, {"user": "肆叁与九七", "userId": "59c1f24244363b6d4e5a9b5c", "text": "被坑+1，已经在走起诉流程了 服务不好，态度也特别恶劣，办完会员排不上课，私自更换老师，自己还有理有据的，恶心透了", "likes": 1}, {"user": "你算哪块小饼干", "userId": "5c5c32f7000000001002d8c4", "text": "你也是这家店？", "likes": 0}, {"user": "DBL 筋膜颅骶工作室", "userId": "650c6f11000000000201190d", "text": "所以为了对会员以及自己负责千万不要找第三方推广，靠口碑慢慢来，人心都是肉长的，好不好自然看得出来", "likes": 1}]}, {"id": "69737871000000000b009499", "title": "30岁，单身进入第四年", "content": "最近见会员，还没到年关呢，就开始被客户们“暖心催”了。\n\t\n当然，都是好心，所以听着也挺暖的。\n\t\n时间真是快得吓人，创业之后尤其如此——三年多 刷一下就没了。\n\t\n每天的生活，几乎是一个循环：在我们这个全女的场馆里上课、训练、出去学习、回来内训……周而复始。\n\t\n但生活里并不缺热闹。身边有许多爱我的姐妹和朋友，我自己也是个乐趣贼多的人。虽经常三分钟热度，但，重在参与，开心就好hh。\n\t\n我超爱分享，大事小事，日常碎片。\n\t\n也喜爱生活中那些具体的柔软瞬间：夏天夜晚自己散步时清凉的风、骑小电驴时路边一闪而过的小花、陌生小朋友突然递来的糖、主动和迎面走来的人打招呼的时刻。\n\t\n至于发相亲帖？一半是测测流量，一半是……万一真有缘分呢。（玄学）\n\t\n不喜欢家人介绍，总迷信“遇上”的感觉。嗯，我知道，这很天蝎，也挺难搞的。\n\t\n这三年，其实也见过一些男嘉宾。学历高的、条件好的、长得帅的，都有遇到过。但都没走到恋爱那一步。\n\t\n通常只见一面就一别两宽了，因为我很难接受见一面就要确定关系，也不信一面之缘就能认定“就是对的人”。\n\t\n人总要相处，才能慢慢看见对方，然后才可能慢慢爱上吧。\n\t\n也许现在大家都太忙了，没有那么多精力去重新认识一个人，也没那么多心思慢慢谈恋爱。于是许多人，包括我，就选择了一个人生活。\n\t\n回头看看自己，我大概是个想得多、不够勇敢，但总体乐观的人。\n\t\n最近看书有句话很戳我：恋爱时就做恋爱脑，做事时就做事业脑，喜欢就勇敢尝试。\n\t\n不过，俺常常觉得自己还挺厉害的。\n\t\n一个人在杭州实体创业快四年，这个过程不断打碎我又重建我。\n\t\n一个人去很多城市学习，一个人出国旅行，想做的事几乎都靠自己尝试了一遍。\n\t\n2026年，如果能遇见爱的人，那很幸福。\n\t\n如果还没遇见，那就像现在这样，继续好好爱自己，也是一件很重要、很踏实的事。#瑜伽馆 #三十岁我在这里\n---", "type": "normal", "author": "嫦娥6小时前", "authorId": "5b76be2326b61b0001c11dbb", "url": "https://www.xiaohongshu.com/explore/69737871000000000b009499?xsec_token=AB689WrdOdKrcya9364tbpJnZolJyIHFZv53jSzLuL1_w=&xsec_source=pc_search&source=web_search_result_notes", "likes": 655, "collects": 53, "comments_count": 236, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031816/bdf693d0a42f16c7d43234a070625f1b/1040g2sg31rmehp0122e04afiqjv267drorures0!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽馆", "commentList": [{"user": "Jacky", "userId": "61eed24f000000001000afd4", "text": "兄弟们信她单身四年还是信我上奥特曼", "likes": 10}, {"user": "小羊女子塑形", "userId": "5b76be2326b61b0001c11dbb", "text": "我信你上奥特曼吧。 单身有啥不信的。一直在创业 周一到周六全在瑜伽馆上课。周日跟姐妹出去玩 要么店里七七八八的事情  出活动 进修学习 内训 做培训 哪个不需要时间", "likes": 0}, {"user": "。。", "userId": "681de2a800000000060122d5", "text": "男  年龄30    身高178  体重80     个体户创业多年    收入100+    车房N+    现金流C8起， 户外运动爱好者 ，擅长烹饪，喜欢创新冒险。", "likes": 2}, {"user": "小羊女子塑形", "userId": "5b76be2326b61b0001c11dbb", "text": "啥是C8 新名词嘛", "likes": 5}, {"user": "自律", "userId": "6053329d0000000001006095", "text": "单身价更高", "likes": 3}]}, {"id": "68108768000000002101a73f", "title": "杭州｜开了家不让囤课的女性普拉提瑜伽馆", "content": "嗨，我是观止的主理人。\n从最开始的一家小馆，到现在杭州三家店，观止一直没变的，是坚持只做一件事——给女生们一个可以长期练习、自由成长的地方。\n\t\n—\n\t\n📍关于价格\n• 明码标价，不推销，不套路\n• 上完体验课，喜欢就办卡，犹豫了，也可以喝杯茶慢慢想\n• 不需要焦虑，不需要被催促，所有决定都交给你自己\n\t\n—\n\t\n📍关于课程\n• 普拉提小班课、瑜伽小班课、1V1私教\n• 有次卡、月卡、季卡，不捆绑消费，怎么上课都自由\n• 课程设计专门针对女性：改善体态、塑形、提升气质、缓解肩颈腰背问题\n\t\n—\n\t\n其实，我们也见过太多为了销售业绩搞各种套路的健身房。\n所以做观止的时候，我就想做一个不一样的地方。\n运动这件事，本来就应该是让人舒服的，而不是被PUSH出来的。\n\t\n如果你也在找一家能让自己慢慢变好的地方，欢迎来观止试试。\n不赶、不催、不焦虑，慢慢来，我们陪着你。\n\t\n📍祥生店 地址:杭州市上城区祥生中心5幢6层605室\n📍普大店 地址:杭州市上城区九州路297号普大福地4幢20F\n📍七堡店 杭州市上城区澎文巷1872汇港城1 瑜伽的感觉，全是器械", "likes": 7}, {"user": "LIN瑜伽&普拉提", "userId": "5cf8c5c60000000025038ffd", "text": "我们2楼是普拉提和器械 一楼是空中瑜伽和瑜伽哈", "likes": 3}, {"user": "岚宝", "userId": "642a6fa00000000012012e2c", "text": "是我喜欢的味道", "likes": 0}, {"user": "LIN瑜伽&普拉提", "userId": "5cf8c5c60000000025038ffd", "text": "就是想要慢生活慢节奏 慢慢改变", "likes": 0}, {"user": "初夏～姣", "userId": "5ce4da11000000001800f3ad", "text": "喜欢这种氛围", "likes": 0}]}, {"id": "693ba1f60000000019024e3a", "title": "🧘‍♂️｜杭州瑜伽馆体验 005（已办卡）", "content": "人物背景：4个月瑜伽练习时长的瑜伽小白\n今天来记录一下第五家瑜伽馆体验\n\t\n🏠 店名：漫舍瑜伽·普拉提(远扬馆)\n📍 地址：浙江省杭州市拱墅区湖墅街道莫干山路268号远扬大厦17楼1701\n💵 人均：体验课9.9元一节课，瑜伽年卡4388（店庆价格），季卡1500左右\n\t\n【我的体验报告】\n✨ 环境：瑜伽馆在写字楼里面，装修比较简约，也是需要换拖鞋的。教室空间很大，而且两间教室中间的挡板也可以拆开，变成一个更大的教室，20多个人上课也不是很闷（晚上会有点闷，白天不闷）。\n🧘‍♀️ 课程：我上的是瑜伽课，当天课程是20个人左右（后续我上个课也基本上是稳定在10人以上）。老师很专业，会给大家做指导（体式不标准的会有更多的指导）；因为我已经上了几节课了，体验了三位不同的老师，基本上都是专业度很高，一般课程结束后会和大家主动了解练习问题并耐心解答。\n🛁 设施：更衣室有淋浴间、衣柜但没有独立的换衣间（店里有卫生间，3个坑位！不会出现要一直等位）。\n💁 服务：课程结束后，会有专门讲解优惠套餐，当然销售性质可能稍微有点浓，但因为态度很温柔，就觉得也不是不能接受\n\t\n✅ 优点（也是我选择办卡的点）：\n1.老师专业且负责（而且有两个老师是合伙人，会长期授课；当天体验了一位男老师的课，虽然难度比较大，但是确实一下子就给我轮式拎起来了，后面自己回去发现也能试着推起来一点了，感觉持续上课应该会有水平大提升）\n2.环境超级nice，干净整洁，有地暖\n3.瑜伽馆内有卫生间（三个坑的含金量）\n4.瑜伽馆内有可以存放自己的瑜伽垫、拖鞋的格间（我打算周六把瑜伽垫带过去）\n5.性价比很高，年卡划下来一个月不到400，很划算了\n❌ 缺点：\n1.瑜伽教室没有镜子，看不到自己的动作还是有点不习惯的\n\t\n总的来说，这家适合和我一样追求性价比，想要有一些提升但可以忍受没有镜子的姐妹！\n#瑜伽馆 #瑜伽改变生活 #杭州瑜伽馆 #杭州瑜伽探店 #瑜伽日常 #普拉提瑜伽", "type": "normal", "author": "嫦娥6小时前", "authorId": "684cfb16000000001d0170fd", "url": "https://www.xiaohongshu.com/explore/693ba1f60000000019024e3a?xsec_token=ABIEr7GA_CETzd9rPevXAfbdhTFljNx5JW2xhkshwJEdo=&xsec_source=pc_search&source=web_search_result_notes", "likes": 38, "collects": 31, "comments_count": 19, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031817/2039e236d36751fe7c1657c09c61e60f/notes_pre_post/1040g3k831pvtoet8g4ag5q2cvcb7as7teak2g40!nd_dft_wgth_webp_3", "keyword": "杭州瑜伽馆", "commentList": [{"user": "one", "userId": "62d6de7f000000000e00f383", "text": "那家呀？", "likes": 0}, {"user": "小湜同学", "userId": "684cfb16000000001d0170fd", "text": "名字有放在笔记开头哈", "likes": 0}, {"user": "干脆小橙", "userId": "5c624017000000001802fd57", "text": "宝年卡是多少人一个班 上几节课呀", "likes": 0}, {"user": "小湜同学", "userId": "684cfb16000000001d0170fd", "text": "年卡的话一年200次课 大班，一般来讲都是10几个人，多的时候20多个吧", "likes": 0}, {"user": "是涵涵呀", "userId": "67e33efc000000000e01f9ad", "text": "哪里", "likes": 0}]}, {"id": "64b50bf3000000002f029dcd", "title": "杭州瑜伽去哪练？看这里！", "content": "Hi！如果你在杭州\n周末来瑜伽馆整整的呆上一天的时间吧！\n享受瑜伽的练习、身心的放松与疗愈\n冥想独处、与自然的亲密链接，让身心重归于自然\n久在樊笼里，复得返自然✨\n-\n-\n🧘:Met Yoga\n📍坐标：杭州四眼井101号\n🌟西湖之畔的身心栖息瑜伽空间🍃\n这里是瑜伽人的秘密花园\n是与森林同呼吸共瑜伽空间。\n坐落于西湖之畔，隐于山林，\n是一处分享宁静，让身心回归连结的理想之地。\n🌈作为杭州的一家个性化瑜伽静修中心\n三层空间风格一致，又各有意志\n夏蝉、草香、清风……\n居于这一方静谧天地\n喜爱瑜伽的伙伴们不要错过这家瑜伽馆\n会让你体会到在大自然的中练习瑜伽的美\n-\n-\n🧘:杭州大象瑜伽\n📍坐标：杭州市西湖区古墩路22号\n✨大象瑜伽主张凡事不要表现得太刻意\n不显山不露水真正的心才能包容万物、兼容一切。\n「大象无形」即是一种朴素含蓄的中国文人表达方式，当一个形象大的超过了人的思维眼界，它就没有一个具体的象呈现出来了，这也是瑜伽的真谛之一。\n-\n-\n🧘:Yoga Corner 瑜伽角\n📍 坐标:浙江省杭州市滨江区星耀城\n瑜伽角的 slogan 是 BE IN NOW\n意思是从此刻起，我们现在开始瑜伽。\n场馆配备全屋地暖和空气净化设备，\n一间大教室与两间私教室。\n除此之外，休息室、咖啡和植物也融入整体布局。\n从 2017 年到现在，Yoga Corner 一直以流瑜伽、理疗课、身心疗愈课为主要核心课程。\n-\n-\n🧘:A.T Yoga\n📍坐标：杭州西湖区天目里\nA.T YOGA🌟是一家以阿斯汤加为特色的专业瑜伽馆\n2019年创立于杭州，\n由阿斯汤加印度总院二级授权西美娜担任驻馆导师\n并由近10位专业老师一同组成有料、有趣、有爱的“A.T教学天团”。\n整体的环境带着原始美感的清水混凝土\n配着温和的原木，净透的落地玻璃，\n窗外绿树摇曳，自然与瑜伽浑然天成，\n这里专注于阿斯汤加瑜伽的传承与传播，\n又致力于带领更多人了解瑜伽，\n将瑜伽融入生活，成为更好的自己🌱\n在A.T，生活可以慢下来。\n这里不仅有专业的瑜伽课程，\n更是构筑心灵绿洲的家园。\n#浪漫生活的记录者  #瑜伽 #杭州最美瑜伽普拉提馆 #一起来瑜伽 #杭州", "type": "normal", "author": "嫦娥6小时前", "authorId": "64a91868000000002b0086fd", "url": "https://www.xiaohongshu.com/explore/64b50bf3000000002f029dcd?xsec_token=ABj3vySmY8q_OIWld_EFiHviLCwzdYHk55kLpevjljjGY=&xsec_source=pc_search&source=web_search_result_notes", "likes": 137, "collects": 153, "comments_count": 5, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031817/9205b5d6f4c73a9f93778b0344142f9f/1000g0082qhvpqemk602g5p5931kap1ntcoucvk8!nd_dft_wlteh_webp_3", "keyword": "杭州瑜伽馆", "commentList": [{"user": "3D面部瑜伽培训学院", "userId": "5cb495a2000000001702e60d", "text": "喜欢大飘窗的瑜伽馆，好温馨", "likes": 1}, {"user": "叛逆小芒果", "userId": "5983ab2382ec395d892fbd0a", "text": "图二那个户外的是哪家", "likes": 1}, {"user": "Joy", "userId": "5fbca06f0000000001005d9d", "text": "有她们的联系方式嘛", "likes": 1}, {"user": "小宝贝", "userId": "615a9faa000000001f03dafd", "text": "怎么报名", "likes": 0}, {"user": "一起逛gai", "userId": "64a91868000000002b0086fd", "text": "@小红书成长助手 @小红书创作学院", "likes": 2}]}, {"id": "69cf85a4000000002800a0c7", "title": "杭州上城九和路地铁口瑜伽馆", "content": "杭州上城区普拉提馆老板快哭晕了😭😭😭\n花光所有积蓄开的瑜伽普拉提馆\n宣传到连后槽牙都在用力\n结果……没有人来上课\n上城区的姐妹们，你们真的都是在家练吗？？\n真的快撑不住了\n不是营销，是真的想让大家试试\n#100米 ＝1节微私教，1节小班，2节团课\n一对一指导\n不推销不套路，不硬逼办卡\n只求你来体验一次，给个机会\n想瘦腰 翘臀 紧致线条 美背 纤细手臂的姐妹们\n真的别在家瞎练了\n专业器械➕针对性塑形➕维秘塑形超燃脂暴汗\n效果比自己练快太多\n📍喜福汇2栋\n求姐妹们来捧个场\n评论区扣666，有惊喜福利等你哦\n#普拉提核心床 #杭州普拉提馆 #瑜伽私教 #健身人健身魂#普拉提打卡 #孕期瑜伽 #瑜伽馆 #健身人健身魂 #瑜伽疗愈你的身心", "type": "normal", "author": "嫦娥6小时前", "authorId": "678cdbea000000000500b9d9", "url": "https://www.xiaohongshu.com/explore/69cf85a4000000002800a0c7?xsec_token=AB96ozkjqTvDpflbVxWJSw3NZZyGlw20VZ9ZAoSVmbt3Y=&xsec_source=pc_search&source=web_search_result_notes", "likes": 0, "collects": 0, "comments_count": 0, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031817/f4fc468c7b4a60af382091c06badd8d9/1040g2sg31ugb1i212q4g5pscrfl19eep6qd9dg0!nd_dft_wgth_webp_3", "keyword": "杭州瑜伽馆", "commentList": []}, {"id": "690c9dfd0000000003035a8b", "title": "🧘‍♂️｜杭州瑜伽馆体验 002", "content": "人物背景：4个月瑜伽练习时长的瑜伽小白\n\t\n今天来记录一下第二家瑜伽馆体验\n\t\n🏠 店名：小瑜荚（城北万象城店）\n📍 地址：余杭区良渚街道杭行路城北万象城4楼L456号商铺(近1号电梯厅)\n💵 人均：体验课19.9元，双十一次卡约40+/节\n\t\n【我的体验报告】\n✨ 环境：干净整洁，教室不多，一个普拉提教室，一个瑜伽教室，一个私教室。瑜伽教室差不多可以容纳12-14人左右！教室温度还可以，但没有开地暖\n🧘‍♀️ 课程：我上的是瑜伽团课。老师很专业，但没有办法每个体式每个人都辅助。课程种类比较多，除了基础的瑜伽还有内观流、墙绳和空中瑜伽\n🛁 设施：有独立的换衣间且有换衣镜可以拍一下ootd；还会有发圈和发夹，可以整理发型\n💁 服务：老师课前会简单了解学员情况，练习后会主动进行答疑。基本无营销，比较自助型的，适合i人！部分老师上课时会给大家进行拍照（但技术稍有参差）\n\t\n✅ 优点：\n1.连锁机构，平台大有保障，且店多选择多\n2.环境私密安静，基本无推销\n3.瑜伽馆内环境还不错，设施细节做得比较好\n4.老师多且每个老师各有所长，可以接触的瑜伽课类型也比较多\n5.性价比还不错\n❌ 缺点：\n1.瑜伽课会受人数限制，满4人才开课，有时候会有当日不开课的情况（部分店铺课程太火，会需要卡点约课）\n2.若有旷课等情况出现比较多，会有后期约课限制\n3.大部分的店在商场里，刚去不熟悉路线时会需要经常找\n4.部分门店需要扫码进店，需要在手机里下载乐刻APP\n\t\n总的来说，这家更适合i人且上课频率不高的姐妹（之前办的季卡，后期转次卡形式对上课频率高的人来说实在是成本激增）\n#瑜伽馆 #瑜伽疗愈你的身心 #瑜伽打卡 #瑜伽是一种生活方式 #瑜伽日常 #杭州瑜伽馆 #杭州瑜伽馆探店", "type": "normal", "author": "嫦娥6小时前", "authorId": "684cfb16000000001d0170fd", "url": "https://www.xiaohongshu.com/explore/690c9dfd0000000003035a8b?xsec_token=ABE9a02uyyctkZxK1-NlVj9afQCYhFOY_6W-jX_7LPGng=&xsec_source=pc_search&source=web_search_result_notes", "likes": 10, "collects": 2, "comments_count": 2, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031818/e6aab55342b36573b0e8771297927cb6/notes_pre_post/1040g3k831oi0gv9906005q2cvcb7as7t90e32q8!nd_dft_wgth_webp_3", "keyword": "杭州瑜伽馆", "commentList": [{"user": "AhamYoga", "userId": "6735aea4000000001d02c597", "text": "课单价高的瑜伽馆，为了保证会员体验，一般满1人开课，实际也是再补贴主打一个人气", "likes": 0}, {"user": "AhamYoga", "userId": "6735aea4000000001d02c597", "text": "课单价低，开课成本高，一需要满足人数才行", "likes": 0}, {"user": "AhamYoga", "userId": "6735aea4000000001d02c597", "text": "课单价高的瑜伽馆，为了保证会员体验，一般满1人开课，实际也是再补贴主打一个人气", "likes": 0}, {"user": "AhamYoga", "userId": "6735aea4000000001d02c597", "text": "课单价低，开课成本高，一需要满足人数才行", "likes": 0}]}, {"id": "69cf7fc6000000001e00f7fb", "title": "一个小县城女孩在杭州钱塘区下沙已经碎掉了", "content": "事情是这样子的，我在杭州钱塘区下沙金沙湖开了一家瑜伽普拉提塑形馆，没人上课，(杭州的姐妹都去跳刘g宏了吗?)  福丽价#99可以上#3节(普拉提，瑜伽，维密都可以上)我就简单介绍一下小馆#600平的别墅馆共四层，负二层直达停车场（5间私教室，7个小班教室）只想安安静静上课不喜欢推销!非常重视学员的上课体验。救救孩子吧\n#见人不如健身#普拉提私教#瑜伽普拉提#杭州普拉提 #杭州下沙区  #救救孩子吧 #金沙湖", "type": "normal", "author": "偷颗小星星1小时前", "authorId": "63d6b844000000002600400c", "url": "https://www.xiaohongshu.com/explore/69cf7fc6000000001e00f7fb?xsec_token=AB96ozkjqTvDpflbVxWJSw3PuZkZN750TeeA10b-90Mjo=&xsec_source=pc_search&source=web_search_result_notes", "likes": 0, "collects": 0, "comments_count": 2, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031818/ea0a1b28fadd5341ed030e564f82a7c1/notes_pre_post/1040g3k831ug9baij2g805oumn129gg0cd8aadmo!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提馆", "commentList": [{"user": "肚肚打雷雷啦", "userId": "66dd5468000000000b030d82", "text": "🙋‍♂️", "likes" 88181e00000000110017e2", "url": "https://www.xiaohongshu.com/explore/699b68fa000000001b01cabd?xsec_token=ABHAYEoV1HJxMB57rqzZlL_dz2ezGccCpWTPdQ5kY1CE4=&xsec_source=pc_search&source=web_search_result_notes", "likes": 9, "collects": 3, "comments_count": 10, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031820/8ee9d8e4066c94883ccba04b792589f6/1040g00831stejt2p5m6g5p4830f485v2bnjhh2g!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提馆", "commentList": [{"user": "龙凤🌞 小妈", "userId": "5bae4d367c01030001543705", "text": "我准备练瑜伽，我在滨江 我也是小白 2026目标改变自己 我们一起加油", "likes": 2}, {"user": "麦子｜壹伽瑜普拉提", "userId": "66c55e59000000001d022c78", "text": "滨江龙湖天街对面普拉提，新店宠粉福利", "likes": 0}, {"user": "甜柚", "userId": "5da870cd0000000001008851", "text": "姐妹来一起呀", "likes": 1}, {"user": "洒脱", "userId": "5f64a4ea0000000001001ef8", "text": "你可以去医院挂康复科", "likes": 0}, {"user": "小丹吃不胖（存钱版）", "userId": "6405a1f0000000001001c682", "text": "蹲", "likes": 1}]}, {"id": "692ac710000000001e0031f0", "title": "为什么普拉提团课在国外火，在国内却做不大？", "content": "作为一个深受澳洲普拉提模式影响的馆主，最初开馆时的初心就是：希望普拉提团课能成为大家的日常运动，而不是偶尔体验。\n\t\n但经营几年后不得不承认，团课在国内并没有我想象中那样容易做起来。\n\t\n这次回澳洲，每天都去上团课，又一次被这里的训练文化唤醒，也更理解为什么同样的模式在两地会呈现完全不同的状态。\n\t\n运动人群基数的差异\n\t\n在澳洲，一个不到100平的小馆，10张床，一天能排 6-8节课几乎都是满员。而在国内多数馆每天只能排 2–3 节课，还未必满员。倒也不是说只有澳洲人不用上班，国内现在不用朝9晚5上班的人也蛮多的，但未必会把运动健身作为日常休闲方式。整体运动习惯尚在培养。\n\t\n生活习惯差异\n\t\n澳洲人普遍早睡早起，大部分场馆都是早上5点开始排课，6点7点的课往往是爆满。而国内一般大家只能在午休或下班后安排运动，然而午休时间领导时不时安排个会议，很多行业不到晚上八九点可能还下不了班，早上堵车通勤接送娃跟打仗一样更没可能运动了。这样时间段高度集中，团课就很难形成全天稳定客流。\n\t\n运动能力差异\n\t\nReformer 团课节奏快强度高，口令里也有一定的细节在，对基本的身体力量和运动能力有一定的要求。澳洲这边很多健身普拉提团课虽然强度大口令糙，教练也完全不上手辅助，但观察下来大部分的练习者其实动作也没有特别离谱，完成度还是可以的，也不会因为有点挑战下次就不来了。在国内如果是首次接触普拉提的客人，碰到像我们馆这种强度的团课，那基本上体验完以后就是没有然后了。\n\t\n规则意识也影响模式能否成立\n\t\n在澳洲，课程预约后临时取消不退款，课包过期不延长是规则，也让场馆有可持续运营的底气。\n国内的沟通文化更讲人情与灵活性，各种情况需要协调处理，团课这种依赖准时出勤的模式自然更难做到完全按排课规律运转。\n\t\n所以国内不是做不好，而是生态，习惯和运动文化都还在发展曲线上。\n\t\n未来随着运动人口增长，规律训练的人越来越多，规则意识更清晰，普拉提团课在国内一定会找到适配自己的模式。\n\t\n行业不是落后，只是节奏不同，而我们能做的，是在当下的土壤里，把专业和服务做好，把训练文化一点点推向更成熟的方向。\n\t\n#杭州普拉提 #普拉提团课", "type": "normal", "author": "偷颗小星星1小时前", "authorId": "5c10a9360000000005021d25", "url": "https://www.xiaohongshu.com/explore/692ac710000000001e0031f0?xsec_token=ABn2mFUSnnNoLNKho281H3ngxe27fL-PGDFoAg1LgjjN8=&xsec_source=pc_search&source=web_search_result_notes", "likes": 175, "collects": 56, "comments_count": 86, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031820/7d6eca2d0963a32d4d04659b9ebdfe6a/notes_pre_post/1040g3k031pfbf3dr3k0g4bv0kfkjc79525ovqb8!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提馆", "commentList": [{"user": "窗台的薄荷", "userId": "60ebc5cf000000000101c196", "text": "我也觉得奇怪，澳洲这边不咋纠正动作，大家做的乱七八糟的老师也不怎么管，最多说几句，看别人不改也就算了。澳洲强度更大，我最开始上完课腿都走不动路", "likes": 21}, {"user": "dcmxxx", "userId": "5c10a9360000000005021d25", "text": "她们太爱练臀了，我这几天也是每天腿抖[呃R]好的教练通过口令中的细节还是能让大家做得更标准一点，碰上差的教练那真是群魔乱舞，不过团课确实流畅和氛围是最重要的", "likes": 9}, {"user": "今天也很好吃", "userId": "5a4fbfcb11be107a9c565ae9", "text": "我回国上了一次完全喜欢不起来国内的形式 有点像我小时候的舞蹈课 教练力求所有人把动作做到最好 但在澳洲就非常轻松随意 能做的动作就做 做不到有简单的modification 在国内上了一节我再也不想去了", "likes": 15}, {"user": "dcmxxx", "userId": "5c10a9360000000005021d25", "text": "因为培训有统一的动作原则，但其实每个人的身体不一样，团课更不可能做到一样标准了。再就是很多国内的客人会想要在团课中也获得跟私教一样的细节和精准度，很怕”练不标准”。但其实这一次做不标准又怎样呢，下一次肯定会比上一次有进步呀", "likes": 16}, {"user": "小17", "userId": "59e9c81811be1069811824b5", "text": "上团课上了一年多了 感觉回国根本找不到相对应的 太麻烦了", "likes": 5}]}, {"id": "67a2c09d000000002900bd9c", "title": "打工人如何维权#在瑜伽馆吃过的亏", "content": "🆒24年10月21日，杭州市拱墅区普瑜健康咨询管理工作室（M Queen普拉提瑜伽馆-良渚店）宣布关门，并发圈说明会处理退费问题。截至到今日为止，良渚社区街道联系过，消费者协会打过电话，拱墅法院那边也去投诉过，都没什么用！！！有些人接收了瑜伽馆的转课方案，综合考虑各方面原因，本人不想接手转课方案。求助网友，还能有什么办法可以维权讨薪啊", "type": "normal", "author": "偷颗小星星1小时前", "authorId": "561a27a7484fb66571e83eef", "url": "https://www.xiaohongshu.com/explore/67a2c09d000000002900bd9c?xsec_token=ABTmbK9jinrRrZmbpVkZBRaCthXL_okyY4fgfzpmAZxOw=&xsec_source=pc_search&source=web_search_result_notes", "likes": 3, "collects": 1, "comments_count": 3, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031820/1fbd767c60e60938066eba6d05f68945/spectrum/1040g0k031dgj6eqj 4aa51cb000000002b00b5fa", "text": "来啦", "likes": 0}, {"user": "摆烂大师", "userId": "60597023000000000101e794", "text": "问价", "likes": 0}, {"user": "Breathe", "userId": "64aa51cb000000002b00b5fa", "text": "来啦", "likes": 0}, {"user": "小名叫甜甜", "userId": "5abcc9b011be1031f37970c0", "text": "一节课多少钱", "likes": 1}]}, {"id": "69aed066000000001b017a6a", "title": "第一次进一人一馆，我该怎么跟教练沟通？", "content": "第一次推开一人一馆的门，有点紧张，太正常了。\n不知道该说什么，怕说错话，怕教练觉得我问题太多，这些我都懂。因为我也曾是那个站在门口犹豫的人。\n今天想以教练的身份，也以一个过来人的感受，和你聊聊：第一次见面，怎么开口才能让这节课更舒服。\n1️⃣ 直接说你为什么来\n不用想太多开场白。\n“我想改善圆肩”、“生完孩子两年了，肚子一直收不回去”、“就是想找个地方动一动”，说什么都行。\n越直接，我越能知道怎么帮你。\n2️⃣ 把痛点和顾虑都告诉我\n“我腰不好”、“膝盖会疼”、“这个动作我做不了”，一定要说。\n不是麻烦，是帮我了解你的身体。你忍着不说，我看着着急；你说了，我才能调整成适合你的节奏。\n3️⃣ 累了就喊停，不用不好意思\n很多姑娘觉得“教练没说停，我就得硬撑”。\n错了。一人一馆最大的好处就是，这节课完全属于你。\n“这个有点累”、“我想歇一下”、“能换个轻点的吗”，这些是我最想听到的话。你在保护自己，而我会陪你找到刚刚好的强度。\n4️⃣ 不懂就问，不要怕显得笨\n“这个发力点在哪”、“我这样做对吗”、“为什么我感觉不到”，尽管问。\n我最开心的瞬间，不是会员做得有多标准，而是她开始认真感受自己的身体，愿意和我一起探索。\n写在最后\n第一次来，你只需要做一件事：做你自己。\n紧张就说紧张，舒服就说舒服，疼就说疼。剩下的，交给我。\n这间60 平的小馆，没有摄像头，没有围观的人。只有你、我和普拉提器械。\n你刚进门时的那点不安，我会用一杯温水、一个微笑和一节慢慢来的课，帮你一点点抚平。\n欢迎你来。\n🚪深蓝国际 3 幢 705 室\n\t\n#一人一馆 #普拉提新手 #社恐友好 #第一次体验 #温暖小事 #普拉提私教 #见人不如健身 #跃悦普拉提 #杭州普拉提 #深蓝国际", "type": "normal", "author": "sssss", "authorId": "6056a281000000000101dd42", "url": "https://www.xiaohongshu.com/explore/69aed066000000001b017a6a?xsec_token=ABGABLgbUr47ddrvjPqiujLYiZ6zZyuVtAm3_r60y0IQM=&xsec_source=pc_search&source=web_search_result_notes", "likes": 4, "collects": 1, "comments_count": 0, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031825/957b3f60ecd9eed5ebc936d0fa154735/notes_pre_post/1040g3k831tgcl1vem2205o2mka0gbna2aknlvg0!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提私教", "commentList": []}, {"id": "6780eff5000000000b021584", "title": "我超爱的普拉提私教工作室🦋", "content": "是主理人也是教练｜一家开在商业公寓楼里的普拉提工作室\n一直觉得运动是一件赋予身体能量积极释放的事儿\n运动界有一句话是这么说的\n“没有什么事情是一个小时运动后解决不了的”\n\t\n你平时是不是也有这样的顾虑和担忧？\n想要练习普拉提，既没有方向🧭有对市场普遍高价收费标准\n和怕教练不负责 不专业三无 效果没有保障等等\n成了你跨出普拉提第一步的绊脚石\n\t\n关于我们这里⬇️\n🥜工作室：只做一对一全场馆普拉提私教，专注效果和交付\n\t\n🥜教学：都是资深教练线下授课3000节以上，证书开放展示，教练性格都比较温和开朗活泼 绝对不pua会员 以引导鼓励为前提\n\t\n🌾价格：工作室没有前台没有销售没有多余支出，所以定价\n亲民性价比高  收费透明 价格亲民\n\t\n🌾体验课：不做·团·音 不走量只专注效果品质，教练上课精力有限，所以道不贱卖。吸引🤩真正想要练习普拉提的人\n\t\n🌾器械使用：都是一课一消毒，不用担心细菌交叉感染\n\t\n🌾不推销 以会员体验感自主需求想法为主\n\t\n🌾不用担心工作室 因不像大馆对现金流需求大，只要资金链断就over。\n🌾以上综合上述性价比真的超高当然遇到合拍教练不容易\n\t\n#临平普拉提1对1私教 #临平产后修复 #临平普拉提工作室 #普拉提核心床 #杭州临平体态调整私教 #普拉提私教 #我的运动日常 #生命不停运动不止 #开心的一天耶 #临平", "type": "normal", "author": "sssss", "authorId": "5b93976a2045fe0001761b74", "url": "https://www.xiaohongshu.com/explore/6780eff5000000000b021584?xsec_token=ABaEfYSTnzt8nrcJnb1thVNKBRsxxcvO-wFT_TSu43mFk=&xsec_source=pc_search&source=web_search_result_notes", "likes": 116, "collects": 83, "comments_count": 15, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031825/20100053b605d10bb27af7812ca0e72d/notes_pre_post/1040g3k031cfjh3420m004asdogbmk6rkmgefm48!nd_dft_wlteh_webp_3", "keyword": "杭州普拉提私教", "commentList": []}, {"id": "69cf40e8000000001a02d3ba", "title": "杭州40元一节的上门体育课，不得不吐槽一下", "content": "杭州40元一节的上门体育课，不得不吐槽一下\n家人们谁懂啊！刷到杭州40元一节的体育课宣传时，我第一反应是“捡到宝”，仔细琢磨后才发现——这钱花出去，大概率是“买教训”！从收费、专业度到服务资质，掰开揉碎了说，40元想上一节正经体育课，根本不现实！\n先算笔最基础的“成本账”。正规体育场馆的场地费，哪怕是小区配套的羽毛球馆、乒乓球室，一小时租金至少50-80元，要是篮球、足球这种大场地，价格直接翻倍。40元一节的课，单场地成本都覆盖不了，难不成教练自带“空中球场”？再算教练的人力成本，有资质的体育教练时薪基本在150-300元，就算是刚毕业的新手，低于100元也很难请到。40元一节课，教练赚什么？倒贴钱陪练吗？\n再看最关键的“专业度”。正经体育课得有明确的教学目标吧？比如一节少儿体能课，要练协调性、爆发力，得有热身、主训练、放松的完整流程。40元的课，我见过最离谱的是“教练站旁边看孩子瞎跑”，既没有动作指导，也没有安全防护，连基本的运动心率监测都没有。反观专业机构的课，教练会提前了解孩子的体能基础，上课带专业教具，课后还会给家长反馈训练情况——这些专业服务，40元怎么可能覆盖？\n更别谈“服务和资质”这两个硬指标。正规体育培训，教练得有国家认证的《社会体育指导员证书》吧？涉及少儿的，还得有急救培训证书。40元一节的课，你敢问教练要资质证明吗？我朋友试过一次，对方支支吾吾说“经验就是资质”，当场就退课了。服务更不用提，报名前说“随到随学”，报完名发现“15个人挤在50平小场地”，想换时间要等半个月，请假还不给补课——这哪是上课，分明是“凑人头”！\n不是我吹毛求疵，体育培训是“一分钱一分货”的事儿。40元可能买杯好点的奶茶，但若想给孩子或自己报一节专业体育课，真的别抱幻想。毕竟运动这件事，专业与否直接关系到安全，万一因为教练不专业受伤，后续花的钱可比这40元多得多！\n最后想问问大家，你们在杭州报过哪些“踩雷”的体育培训#儿童运动 #体能训练 #少儿运动 #上门体育 #体能 #体育培训 #杭州 #杭州上门私教", "type": "normal", "author": "禾鹿-🦌杭州上门私教03-06", "authorId": "628a66f80000000021026d47", "url": "https://www.xiaohongshu.com/explore/69cf40e8000000001a02d3ba?xsec_token=AB96ozkjqTvDpflbVxWJSw3CdyAknKDY2PF0alOYNcLvU=&xsec_source=pc_search&source=web_search_result_notes", "likes": 1, "collects": 0, "comments_count": 0, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031825/79c52a1b7abc39638635045732e91c0f/note_pre_post_uhdr/1040g3r031ug2t38b2q005okacrs8cra7bc9h1r0!nd_dft_wlteh_webp_3", "keyword": "杭州上门私教", "commentList": []}, {"id": "69a95678000000002801c70d", "title": "杭州🏠上门私教|萧山区一脚油门即达✌", "content": "早安～伴着西湖的晨雾，7点我已出发开启今天的课程之旅✨\n\t\n🚗 今天首站来到萧山区，为一位创业妈妈进行产后体态修复。一节专注的晨练后，学员可以在家从容准备一天的生活，而我沿着运河畔继续前往滨江区赴下一节课～\n\t\n想约课的朋友，欢迎随时📩我（课后会尽快回复您）。\n\t\n【🌿 杭州上门私教服务说明】\n⏰ 服务时间：7:00-21:00\n📍 服务区域：杭州主城区（西湖、拱墅、上城、滨江、萧山等）\n🕒 课时时长：75分钟/节\n（首次课程含全面身体评估：体态对称分析、呼吸模式检测、筋膜张力评估。课程融入自然香氛、正念引导、特色手法调理及个性化训练编排）\n\t\n#女子塑形  #普拉提 #居家锻炼  #杭州上门私教  #上门私教  #saf上门私教", "type": "normal", "author": "禾鹿-🦌杭州上门私教03-06", "authorId": "62603820000000001000cf8e", "url": "https://www.xiaohongshu.com/explore/69a95678000000002801c70d?xsec_token=ABpGxB2bgR0ez8Vw0UV3EWRfsssyryW7LDA1DFkI0Td-w=&xsec_source=pc_search&source=web_search_result_notes", "likes": 1, "collects": 1, "comments_count": 14, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604031826/42ff457d50441e95ab88ca699a355cab/spectrum/1040g34o31tb17j1dla5g5oj070g41jseiqhl94g!nd_dft_wlteh_webp_3", "keyword": "杭州上门私教", "commentList": [{"user": "伊吖依丫哟", "userId": "56c52f451c07df6efa1ad6e2", "text": "多少钱一节课？", "likes": 0}, {"user": "杭州SAF普拉提工作室", "userId": "62603820000000001000cf8e", "text": "亲爱的，私信您了哈，可以看下后台", "likes": 0}, {"user": "💞宝宝💞Angela小白甜👄", "userId": "5d213e0a000000001202d634", "text": "价格多少", "likes": 0}, {"user": "杭州SAF普拉提工作室", "userId": "62603820000000001000cf8e", "text": "你好，宝宝，私信你啦，可以看下陌生人信息哈~", "likes": 0}, {"user": "Cassandra.Xu", "userId": "55ee47a6e4b1cf15ba5ec85e", "text": "多少钱一节课", "likes": 0}]}, {"id": "69731c7e0000000022009b8a", "title": "杭州🏠普拉提上门私教！300➕一节课很贵吗？", "content": "#杭州上门私教 #生命不停运动不止 #产后修复\n哈咯姐妹！你好呀！❤️\n今天天气好好啊！\n我是普拉提教练闵闵～从业七年啦！从去年开始在杭州做上门私教！\n❤️问：为什么选上门 <script>

    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+

    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');
    const cover=n.cover?'<div class="card-cover"><a href="'+esc(n.url)+'" target="_blank"><img src="'+esc(n.cover)+'" alt="'+esc(n.title)+'" loading="lazy"></a></div>':'';
    const authorLink=n.authorId?'<a href="https://www.xiaohongshu.com/user/profile/'+esc(n.authorId)+'" target="_blank">@'+esc(n.author)+'</a>':'@'+esc(n.author);
    const cms=(n.commentList||[]).slice(0,5).map(c=>
      '<div class="comment-item">'+(c.userId?'<a class="user" href="https://www.xiaohongshu.com/user/profile/'+esc(c.userId)+'" target="_blank">'+esc(c.user)+'</a>':'<span class="user">'+esc(c.user)+'</span>')+'<span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    ).join('');
    return '<div class="card">'+cover+'<div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div><div class="card-author">'+authorLink+'</div>'+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
