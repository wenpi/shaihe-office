的小花、陌生小朋友突然递来的糖、主动和迎面走来的人打招呼的时刻。\n\t\n至于发相亲帖？一半是测测流量，一半是……万一真有缘分呢。（玄学）\n\t\n不喜欢家人介绍，总迷信“遇上”的感觉。嗯，我知道，这很天蝎，也挺难搞的。\n\t\n这三年，其实也见过一些男嘉宾。学历高的、条件好的、长得帅的，都有遇到过。但都没走到恋爱那一步。\n\t\n通常只见一面就一别两宽了，因为我很难接受见一面就要确定关系，也不信一面之缘就能认定“就是对的人”。\n\t\n人总要相处，才能慢慢看见对方，然后才可能慢慢爱上吧。\n\t\n也许现在大家都太忙了，没有那么多精力去重新认识一个人，也没那么多心思慢慢谈恋爱。于是许多人，包括我，就选择了一个人生活。\n\t\n回头看看自己，我大概是个想得多、不够勇敢，但总体乐观的人。\n\t\n最近看书有句话很戳我：恋爱时就做恋爱脑，做事时就做事业脑，喜欢就勇敢尝试。\n\t\n不过，俺常常觉得自己还挺厉害的。\n\t\n一个人在杭州实体创业快四年，这个过程不断打碎我又重建我。\n\t\n一个人去很多城市学习，一个人出国旅行，想做的事几乎都靠自己尝试了一遍。\n\t\n2026年，如果能遇见爱的人，那很幸福。\n\t\n如果还没遇见，那就像现在这样，继续好好爱自己，也是一件很重要、很踏实的事。#瑜伽馆 #三十岁我在这里\n---","type":"normal","author":"嫦娥6小时前","authorId":"5b76be2326b61b0001c11dbb","url":"https://www.xiaohongshu.com/explore/69737871000000000b009499?xsec_token=AB689WrdOdKrcya9364tbpJnZolJyIHFZv53jSzLuL1_w=&xsec_source=pc_search&source=web_search_result_notes","likes":655,"collects":53,"comments_count":236,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031816/bdf693d0a42f16c7d43234a070625f1b/1040g2sg31rmehp0122e04afiqjv267drorures0!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽馆","commentList":[{"user":"Jacky","userId":"61eed24f000000001000afd4","text":"兄弟们信她单身四年还是信我上奥特曼","likes":10},{"user":"小羊女子塑形","userId":"5b76be2326b61b0001c11dbb","text":"啥是C8 新名词嘛","likes":5},{"user":"自律","userId":"6053329d0000000001006095","text":"单身价更高","likes":3},{"user":"。。","userId":"681de2a800000000060122d5","text":"男  年龄30    身高178  体重80     个体户创业多年    收入100+    车房N+    现金流C8起， 户外运动爱好者 ，擅长烹饪，喜欢创新冒险。","likes":2},{"user":"洪某越级单刷","userId":"5d07e29c000000001201d8ba","text":"你好可以认识嘛","likes":2},{"user":"小羊女子塑形","userId":"5b76be2326b61b0001c11dbb","text":"河南老乡都跑澳大利亚了","likes":1},{"user":"北笙","userId":"619cac4c000000001000bbcb","text":"这么优秀不适合结婚，到时候想要孩子再通过科技手段要一个好咯","likes":1},{"user":"威勋烈马","userId":"5fd1cb080000000001002b11","text":"采访一下，天秤座女生最喜欢哪个星座","likes":1},{"user":"小羊女子塑形","userId":"5b76be2326b61b0001c11dbb","text":"我有点慕强","likes":1},{"user":"八月爱人🥕","userId":"63481448000000001901f36b","text":"离异么？","likes":1}]},{"id":"67 a3a0000000002022585","text":"小姐姐好美呀","likes":0},{"user":"3211","userId":"5acf22bfe8ac2b4a169bbc86","text":"薏米水 看着就很健康了","likes":0},{"user":"米饭","userId":"5b4588014eacab206d2319df","text":"水能送我一箱么","likes":0},{"user":"晚","userId":"61cd5e9c000000001000723e","text":"你也要养生了咯","likes":0},{"user":"波波子","userId":"5b20a5156b58b76b616f9a70","text":"给我点个赞赞","likes":0},{"user":"晚","userId":"61cd5e9c000000001000723e","text":"给你买一箱","likes":0},{"user":"饭饭～","userId":"5cd4c0c5000000001603c074","text":"活力满满 喜欢 已被种草","likes":0},{"user":"小楼Eason","userId":"5e5cd2b20000000001004476","text":"好美呀博主。这个薏米水值得试试，哈哈","likes":0},{"user":"Andy You","userId":"5b96f0f7679b26000104e470","text":"这两天杭州温度略好，明天开始下雨了","likes":0}]},{"id":"64b50bf3000000002f029dcd","title":"杭州瑜伽去哪练？看这里！","content":"Hi！如果你在杭州\n周末来瑜伽馆整整的呆上一天的时间吧！\n享受瑜伽的练习、身心的放松与疗愈\n冥想独处、与自然的亲密链接，让身心重归于自然\n久在樊笼里，复得返自然✨\n-\n-\n🧘:Met Yoga\n📍坐标：杭州四眼井101号\n🌟西湖之畔的身心栖息瑜伽空间🍃\n这里是瑜伽人的秘密花园\n是与森林同呼吸共瑜伽空间。\n坐落于西湖之畔，隐于山林，\n是一处分享宁静，让身心回归连结的理想之地。\n🌈作为杭州的一家个性化瑜伽静修中心\n三层空间风格一致，又各有意志\n夏蝉、草香、清风……\n居于这一方静谧天地\n喜爱瑜伽的伙伴们不要错过这家瑜伽馆\n会让你体会到在大自然的中练习瑜伽的美\n-\n-\n🧘:杭州大象瑜伽\n📍坐标：杭州市西湖区古墩路22号\n✨大象瑜伽主张凡事不要表现得太刻意\n不显山不露水真正的心才能包容万物、兼容一切。\n「大象无形」即是一种朴素含蓄的中国文人表达方式，当一个形象大的超过了人的思维眼界，它就没有一个具体的象呈现出来了，这也是瑜伽的真谛之一。\n-\n-\n🧘:Yoga Corner 瑜伽角\n📍 坐标:浙江省杭州市滨江区星耀城\n瑜伽角的 slogan 是 BE IN NOW\n意思是从此刻起，我们现在开始瑜伽。\n场馆配备全屋地暖和空气净化设备，\n一间大教室与两间私教室。\n除此之外，休息室、咖啡和植物也融入整体布局。\n从 2017 年到现在，Yoga Corner 一直以流瑜伽、理疗课、身心疗愈课为主要核心课程。\n-\n-\n🧘:A.T Yoga\n📍坐标：杭州西湖区天目里\nA.T YOGA🌟是一家以阿斯汤加为特色的专业瑜伽馆\n2019年创立于杭州，\n由阿斯汤加印度总院二级授权西美娜担任驻馆导师\n并由近10位专业老师一同组成有料、有趣、有爱的“A.T教学天团”。\n整体的环境带着原始美感的清水混凝土\n配着温和的原木，净透的落地玻璃，\n窗外绿树摇曳，自然与瑜伽浑然天成，\n这里专注于阿斯汤加瑜伽的传承与传播，\n又致力于带领更多人了解瑜伽，\n将瑜伽融入生活，成为更好的自己🌱\n在A.T，生活可以慢下来。\n这里不仅有专业的瑜伽课程，\n更是构筑心灵绿洲的家园。\n#浪漫生活的记录者  #瑜伽 #杭州最美瑜伽普拉提馆 #一起来瑜伽 #杭州","type":"normal","author":"嫦娥6小时前","authorId":"64a91868000000002b0086fd","url":"https://www.xiaohongshu.com/explore/64b50bf3000000002f029dcd?xsec_token=ABj3vySmY8q_OIWld_EFiHviLCwzdYHk55kLpevjljjGY=&xsec_source=pc_search&source=web_search_result_notes","likes":1 0000000006014b53","text":"差不多200多一节的嘛","likes":0},{"user":"GGLI","userId":"695a3f3400000000370016d9","text":"有效果对比吗","likes":0}]},{"id":"693ba1f60000000019024e3a","title":"🧘‍♂️｜杭州瑜伽馆体验 005（已办卡）","content":"人物背景：4个月瑜伽练习时长的瑜伽小白\n今天来记录一下第五家瑜伽馆体验\n\t\n🏠 店名：漫舍瑜伽·普拉提(远扬馆)\n📍 地址：浙江省杭州市拱墅区湖墅街道莫干山路268号远扬大厦17楼1701\n💵 人均：体验课9.9元一节课，瑜伽年卡4388（店庆价格），季卡1500左右\n\t\n【我的体验报告】\n✨ 环境：瑜伽馆在写字楼里面，装修比较简约，也是需要换拖鞋的。教室空间很大，而且两间教室中间的挡板也可以拆开，变成一个更大的教室，20多个人上课也不是很闷（晚上会有点闷，白天不闷）。\n🧘‍♀️ 课程：我上的是瑜伽课，当天课程是20个人左右（后续我上个课也基本上是稳定在10人以上）。老师很专业，会给大家做指导（体式不标准的会有更多的指导）；因为我已经上了几节课了，体验了三位不同的老师，基本上都是专业度很高，一般课程结束后会和大家主动了解练习问题并耐心解答。\n🛁 设施：更衣室有淋浴间、衣柜但没有独立的换衣间（店里有卫生间，3个坑位！不会出现要一直等位）。\n💁 服务：课程结束后，会有专门讲解优惠套餐，当然销售性质可能稍微有点浓，但因为态度很温柔，就觉得也不是不能接受\n\t\n✅ 优点（也是我选择办卡的点）：\n1.老师专业且负责（而且有两个老师是合伙人，会长期授课；当天体验了一位男老师的课，虽然难度比较大，但是确实一下子就给我轮式拎起来了，后面自己回去发现也能试着推起来一点了，感觉持续上课应该会有水平大提升）\n2.环境超级nice，干净整洁，有地暖\n3.瑜伽馆内有卫生间（三个坑的含金量）\n4.瑜伽馆内有可以存放自己的瑜伽垫、拖鞋的格间（我打算周六把瑜伽垫带过去）\n5.性价比很高，年卡划下来一个月不到400，很划算了\n❌ 缺点：\n1.瑜伽教室没有镜子，看不到自己的动作还是有点不习惯的\n\t\n总的来说，这家适合和我一样追求性价比，想要有一些提升但可以忍受没有镜子的姐妹！\n#瑜伽馆 #瑜伽改变生活 #杭州瑜伽馆 #杭州瑜伽探店 #瑜伽日常 #普拉提瑜伽","type":"normal","author":"嫦娥6小时前","authorId":"684cfb16000000001d0170fd","url":"https://www.xiaohongshu.com/explore/693ba1f60000000019024e3a?xsec_token=ABIEr7GA_CETzd9rPevXAfbdhTFljNx5JW2xhkshwJEdo=&xsec_source=pc_search&source=web_search_result_notes","likes":38,"collects":31,"comments_count":19,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031817/2039e236d36751fe7c1657c09c61e60f/notes_pre_post/1040g3k831pvtoet8g4ag5q2cvcb7as7teak2g40!nd_dft_wgth_webp_3","keyword":"杭州瑜伽馆","commentList":[{"user":"一只西禾呀","userId":"5fdc462f000000000100625e","text":"普拉提有年卡或者月卡吗","likes":1},{"user":"❄⛄","userId":"57a5e6a3bd0da5387132c038","text":"年卡好便宜啊，现在还有活动吗","likes":1},{"user":"小湜同学","userId":"684cfb16000000001d0170fd","text":"瑜伽馆体验将稍稍告一段落啦，已经办好了年卡，接下来的一年应该会稳定上课","likes":0},{"user":"BigBigBig大西瓜🍉","userId":"5b35ed61e8ac2b6757bcd6e9","text":"刘老师的强度真的大，我感觉施老师的课编排会很舒服","likes":0},{"user":"小湜同学","userId":"684cfb16000000001d0170fd","text" \n一家6年专注女性上门私教的品牌，专为没时间和不方便外出锻炼的姐妹提供一对一的上门私教方案。\n\t\n目前在北京、上海、杭州、南京、苏州均已开通上门服务~\n\t\n服务介绍：\n1️⃣服务范围：覆盖杭州全市区，早上7点到晚上9点提供上门教学\n\t\n2️⃣课程内容：体态调整丨运动康复丨备孕助孕丨产后恢复丨少儿体态丨减压冥想丨呼吸疗愈等\n\t\n3️⃣教练自带器材：瑜伽垫、瑜伽砖、瑜伽球、泡沫轴、香薰精油、颂钵等，课前消毒\n\t\n步服务流程\n1、添加顾问\n顾问老师会先了解您的身体情况和训练目标，并发送对应的课程安排和价格单\n\t\n2、深度匹配老师，0试错成本\n详细了解需求、目标、地址、过往运动史、风格偏好、性格、接受强度等匹配有对应经验的老师\n\t\n3、预约试课时间\n确定您的空闲时间以便提前锁定私教档期，安排规划上门，备课\n\t\n4、深度评估\n老师提前上门，消毒辅具，评估运动功能、体态，孕产会员会评估盆底肌腹直肌状态以及目标等\n\t\n5、定制训练计划\n1v1定制训练方案、筋膜松解手法、动作原理讲解、匹配拉伸放松冥想、规划家庭作业、课后效果反馈、满意度调研等\n\t\n希望能让更多杭州想要宅家锻炼的姐妹看到我们丨带着器材去家里找你们🏡~\n#上门瑜伽#爱生活爱瑜伽 #瑜伽是身和心的修行 #瑜伽改变生活#杭州上门私教 #攸攸体态上门私教 #体态调整 #体态调整私教","type":"normal","author":"一只特立独行的猪🐷","authorId":"683e89d70000000007030374","url":"https://www.xiaohongshu.com/explore/684bb9d800000000200281d8?xsec_token=AB72_o3NlAKRlK8hHsALeKL8t9oG9bwjkQgSzpAiDAWN4=&xsec_source=pc_search&source=web_search_result_notes","likes":19,"collects":13,"comments_count":53,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031821/d267ab38a3d5a1ec40f12a5012c9e0b8/notes_pre_post/1040g3k031ilklnrgha105q1uh7bhu0rkes8mm58!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽私教","commentList":[{"user":"杭州攸攸体态上门私教","userId":"683e89d70000000007030374","text":"杭州的姐妹们，当天一般提前三个小时可约，早7点～晚9点私教可上门授课，训练工具全部自带，家里只需要有能放下一张瑜伽垫的场地就可以，左下角【立即咨询】在线秒回～","likes":1},{"user":"她与书隅","userId":"5a4f3ea2e8ac2b735605d965","text":"价格呢","likes":0},{"user":"杭州攸攸体态上门私教","userId":"683e89d70000000007030374","text":"私您哈","likes":0},{"user":"燕子","userId":"5de85f1000000000010080b2","text":"什么价格？杭州哪里都可以吗","likes":0},{"user":"杭州攸攸体态上门私教","userId":"683e89d70000000007030374","text":"滴滴","likes":0},{"user":"zz","userId":"601aa7af000000000101dd17","text":"价格？","likes":0},{"user":"两个孩子的妈","userId":"5e006748000000000100384e","text":"价格怎么样","likes":0},{"user":"杭州攸攸体态上门私教","userId":"683e89d70000000007030374","text":"滴滴","likes":0},{"user":"杭州攸攸体态上门私教","userId":"683e89d70000000007030374","text":"滴滴","likes":0},{"user":"xhuhshgdyxvdhhs","userId":"566edb88589de365124d7539","text":"价格","likes":0}]},{"id 060000000001004507","text":"我看的普拉提私教480-1280一节甚至都没啥资质 教练学的课程都搜不到","likes":11},{"user":"折纸鸢","userId":"5f2d3076000000000100af52","text":"终于有人替我发声！主要是资质也很一般","likes":10},{"user":"折纸鸢","userId":"5f2d3076000000000100af52","text":"（不是抬杠，台州现在是二线了但是我的工资怎么不是二线的水准啊","likes":3},{"user":"e酱","userId":"5a2ea4264eacab08b6db573b","text":"多看看几家","likes":2},{"user":"MoomooYY","userId":"5c3ee262000000000502c666","text":"你哪里的店，这么贵我要避开","likes":2},{"user":"MoomooYY","userId":"5c3ee262000000000502c666","text":"民营老板多，工资都扣","likes":1},{"user":"摆烂猫","userId":"580e27bb82ec3906c4f3474d","text":"台州能有几个好的健身教练… 我以前在健身房上过班。有一个瑜伽教练刚满18来上班，会员来约课，她先找别的教练学几个动作，现学现教  上瑜伽大课在做什么动作都不知道，还被学员提醒做反了 就这样一个月底薪加卖课提成拿了小两万","likes":1},{"user":"手写宇宙","userId":"593e0f9c50c4b47dfc0c392e","text":"小地方没有竞争力呀，总共就这么几家店。上海杭州遍地都是店，老师没点资质，店里没点优惠，马上有下一家更好的等着你。","likes":1},{"user":"我是临海肖肖呀","userId":"59412fa450c4b47c5ba278fc","text":"台州虽然小 物价不低 哈哈","likes":1},{"user":"momo","userId":"671e40f2000000001d033005","text":"美团上私教课都200左右一节","likes":0}]},{"id":"68590aae0000000017030317","title":"杭州找个瑜伽老师～","content":"一周三次课或者一周五次 都行\n一对10 差不多\n一天 一节 or 两节\n地点在拱墅区 绍兴路上～#瑜伽老师 #瑜伽女孩 #瑜伽体式 #杭州瑜伽馆","type":"normal","author":"一只特立独行的猪🐷","authorId":"5991430f50c4b4560dbe11b5","url":"https://www.xiaohongshu.com/explore/68590aae0000000017030317?xsec_token=ABDMOEhTAe09ruPNGg8oy_Fcrhdcot11wVXO4itc1lGh0=&xsec_source=pc_search&source=web_search_result_notes","likes":11,"collects":0,"comments_count":11,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031821/6b6db2181a8e5e843874c2eb002b42ba/1040g2sg31j2kphgd1ce049nvo01gu4dl13bce0o!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽私教","commentList":[{"user":"妮妮子","userId":"5991430f50c4b4560dbe11b5","text":"我要女老师！","likes":0},{"user":"雷雷的普拉提教室","userId":"5a9c24c511be1027d8bfdaa2","text":"上门吗","likes":0},{"user":"妮妮子","userId":"5991430f50c4b4560dbe11b5","text":"是的","likes":0},{"user":"多多1107","userId":"6066fe480000000001003caa","text":"很近，我也想找，我们要不一起","likes":0},{"user":"多多1107","userId":"6066fe480000000001003caa","text":"有没有女老师可以收男学员的，急需改善每天久坐酸痛感","likes":0},{"user":"小红薯67166D6B","userId":"6716658f000000001d03165f","text":"姐妹，看我看我，瑜伽老师！","likes":0},{"user":"杭州上门瑜伽私教Ivy","userId":"58c0f9927fc5b81f95861b64","text":"资深10年+杭州瑜伽老师","likes":0}]},{"id":"690c9dfd0000000003035a8b","title":"🧘‍♂️｜杭州瑜伽馆体验 002","content":"人物背景：4个月瑜伽练习时长的瑜伽小白\n\t\n今天来记录一下第二家瑜伽馆体验\n\t\n🏠 店名：小瑜荚（城北万象城店）\n📍 地址：余杭区良渚街道杭行路城北万象城4楼L456号商铺(近1号电梯厅)\n💵 人均：体验课19.9元，双十一次卡约40+/节\n\t\n【我的体验报告】\n✨ 环境：干净整洁，教室不多，一个普拉提教室，一个瑜伽教室，一个私教室。瑜伽教室差不多可以容纳12-14人左右！教室温度还可以，但没有开地暖\n🧘‍♀️ 课程：我上的是瑜伽团课。老师很专业，但没有办法每个体式每个人都辅助。课程种类比较多，除了基础的瑜伽还有内观流、墙绳和空中瑜伽\n🛁 设施：有独立的换衣间且有换衣镜可以拍一下ootd；还会有发圈和发夹，可以整理发型\n💁 服务：老师课前会简单了解学员情况，练习后会主动进行答疑。基本无营销，比较自助型的，适合i人！部分老师上课时会给大家进行拍照（但技术稍有参差）\n\t\n✅ 优点：\n1.连锁机构，平台大有保障，且店多选择多\n2.环境私密安静，基本无推销\n3.瑜伽馆内环境还不错，设施细节做得比较好\n4.老师多且每个老师各有所长，可以接触的瑜伽课类型也比较多\n5.性价比还不错\n❌ 缺点：\n1.瑜伽课会受人数限制，满4人才开课，有时候会有当日不开课的情况（部分店铺课程太火，会需要卡点约课）\n2.若有旷课等情况出现比较多，会有后期约课限制\n3.大部分的店在商场里，刚去不熟悉路线时会需要经常找\n4.部分门店需要扫码进店，需要在手机里下载乐刻APP\n\t\n总的来说，这家更适合i人且上课频率不高的姐妹（之前办的季卡，后期转次卡形式对上课频率高的人来说实在是成本激增）\n#瑜伽馆 #瑜伽疗愈你的身心 #瑜伽打卡 #瑜伽是一种生活方式 #瑜伽日常 #杭州瑜伽馆 #杭州瑜伽馆探店","type":"normal","author":"嫦娥6小时前","authorId":"684cfb16000000001d0170fd","url":"https://www.xiaohongshu.com/explore/690c9dfd0000000003035a8b?xsec_token=ABE9a02uyyctkZxK1-NlVj9afQCYhFOY_6W-jX_7LPGng=&xsec_source=pc_search&source=web_search_result_notes","likes":10,"collects":2,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031818/e6aab55342b36573b0e8771297927cb6/notes_pre_post/1040g3k831oi0gv9906005q2cvcb7as7t90e32q8!nd_dft_wgth_webp_3","keyword":"杭州瑜伽馆","commentList":[{"user":"AhamYoga","userId":"6735aea4000000001d02c597","text":"课单价低，开课成本高，一需要满足人数才行","likes":0},{"user":"AhamYoga","userId":"6735aea4000000001d02c597","text":"课单价高的瑜伽馆，为了保证会员体验，一般满1人开课，实际也是再补贴主打一个人气","likes":0}]},{"id":"662e2b9b000000000d032945","title":"避雷‼️杭州无良商家E➕瑜伽普拉提","content":"一开始在楼下散步，有个女的一直拉着我让我去她们店体验什么瑜伽，疯狂推销不让我走的那种，然后我就同意了，后面去了店里办理了该公司推出的健身卡，交了费用5380\n\t\n这家店提供30节小班课和6节私教课，第一次去上课因为被告前台没有人接待，前台也没人，客服也不 normal","author":"一只特立独行的猪🐷","authorId":"669b9f96000000002401fcbd","url":"https://www.xiaohongshu.com/explore/68ff5b5e000000000703bf7d?xsec_token=AB_MNNpMxwukYoDnLPZ8aLx0tG-4UsoSQNZNkqFgpLdiQ=&xsec_source=pc_search&source=web_search_result_notes","likes":9,"collects":0,"comments_count":1,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031822/24b5006aa801bf345f5ee0b37f3f4ed7/1040g00831o520k2350005pkrjub93v5tdpu1cho!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽私教","commentList":[{"user":"小红薯61D1F4C4","userId":"61d0738d000000001000b611","text":"私教多少价格","likes":0}]},{"id":"68d6384c000000001003d141","title":"杭州瑜伽环境这么好那我在北京练的算什么❓","content":"从北京搬到杭州一个月啦❗\n\t\n最大的感受就是杭州好热🥵环境好棒👍🏻物价好高\n\t\n窗外的风景从小区里的大爷大妈变成了钱塘江，最近在看各种瑜伽馆和健身房，游泳馆🏊🏻‍♀️无一例外的环境都超级好\n\t\n顿时就心生感慨，原来大家锻炼的环境都这么好！！之前的瑜伽馆，健身房无一例外的外面全是高楼林立，从来没有这种绿树🌲江边🏞️黄昏🌆的感觉，练完都忍不住的身心舒畅，这种情况下感觉锻炼频率都会增加\n\t\n都说有水的城市都会格外浪漫，不光是海水还是江水，杭州的浪漫我正在慢慢体会，你们的锻炼环境是不是都这么美，分享出来让我一起感受一下吧[心心眼R]\n#瑜伽馆 #普拉提 #普拉提打卡 #北京到杭州 #瑜伽日常 #一种很新的健身方式 #零基础瑜伽入门 @日常薯 @小红书成长助手","type":"normal","author":"Abby上门私教","authorId":"56554d0c484fb6090789f188","url":"https://www.xiaohongshu.com/explore/68d6384c000000001003d141?xsec_token=ABRPKOh4wtUPQRWHbeILRZwrWGP9FFxYVBiy31Ype_ivA=&xsec_source=pc_search&source=web_search_result_notes","likes":8,"collects":1,"comments_count":3,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031740/f74fd58c43a7a53329eab5f0643c7062/notes_pre_post/1040g3k831mss5tm6lma0431dj26gpsc8o58lrho!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽","commentList":[{"user":"应姐姐","userId":"6105344f000000000100a3b9","text":"背影好美 风景好治愈疲劳的双眼","likes":0},{"user":"max伦","userId":"56554d0c484fb6090789f188","text":"教练下次能把我背影拍的再唯美点就更好了哈哈哈爱您","likes":0}]},{"id":"689eec73000000001d0242bc","title":"杭州瑜伽馆个人体验分享｜城北旅程瑜伽","content":"练习瑜伽好几年了，在杭州去过不少瑜伽馆。\n今年发现，想找到一家真正满意的馆挺难的，也不知道是我太挑剔，还是现在瑜伽馆不好经营，好的馆越来越少。所以想写一个系列，记录一下我去过的杭州瑜伽馆\n\t\n第一篇，先说说城北的旅程瑜伽。\n它在花园岗地铁站B出口出来，交通很方便。旅程瑜伽以流瑜伽为主，整体风格比较专注体式。这里的会员普遍体式水平很高，很多高难度动作大家都能做，是我去过的馆里体式难度最高的。不过也有偏基础的课，所以初学者来也不会太有压力。老师会很认真地辅助，长期在这里练习，体式进步很快。\n\t\n馆里就两位老师，没有其他工作人员，氛围很简单。两位老师都特别好说话，有需要都会帮忙。比如我有一次约了课但没去，老师直接帮我取消了，没有扣卡；临时改课、约课，在群里随便@一下就行，不会有负担。Edern老师几乎全年无休，每天都在馆里带课，很用心地守着这个空间，让人想来的时候随时都能上到她的课。细节也很周到，比如更衣室的小黑板上会写停车指南，还有直接交停车费的二维码。也正因为这样，这几年我一直在这里练，也明显感觉会员越来越多。\n\t\n🧡缺点的话，这里基本只做体式，课程强度偏大，一节课下来会很累。我现在大多白天去练，晚上就不太适合上强度高的课了。如果最近状态不好，在这里练会觉得有点耗气血。另外，它不是那种节奏慢、强调向内探索或冥想的风格，和瑜伽精神的连接感相对弱一些，更像是身体层面的锻炼。\n\t\n总的来说，如果你想提升体式水平、喜欢挑战自己，这里会很适合；但如果你更想在瑜伽里找安静、慢节奏的状态，可能会觉得强度有点高。\n📷如侵，可联系删除。\n#杭州瑜伽馆 #杭州瑜伽探店 #瑜伽","type":"normal","author":"Abby上门私教","authorId":"66af3bdb000000001d020acf","url":"https://www.xiaohongshu.com/explore/689eec73000000001d0242bc?xsec_token=AB4E33ylsjuGkUxg-s187dUeI-NjVhjilZg_fiTNUESrs=&xsec_source=pc_search&source=web_search_result_notes","likes":8,"collects":3,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604031740/4253bb6a6dab601a7e6494a33373a02f/1040g2sg31l6lk1lmj2gg5n1skl71fkf1dkget08!nd_dft_wlteh_webp_3","keyword":"杭州瑜伽","commentList":[{"user":"锦渔🐟","userId":"63de4f6d000000002601332f","text":"说的很对啊，有参考到","likes":0},{"user":"反击的葫芦小金刚","userId":"66af3bdb000000001d020acf","text":"谢谢","likes":0}]},{"id":"68bd14d5000000001d01a52c","title":"杭州上门私教","content":"【在杭州虎跑公园拍瑜伽照，这地方也太仙了吧！🧘‍♀️】\n终于来虎跑公园打卡了！不愧是隐藏在市区的“绿野仙踪”，随便一拍都是禅意大片～🍃\n推荐理由：\n1️⃣ 人少景美：工作日基本包场，怎么拍都不怕尴尬，竹林、古亭、苔藓阶梯，每个角落都像自带滤镜！\n2️⃣ 灵气十足：虎跑泉是杭州三大名泉之一，水质清冽，据说泡茶🍵一绝！泉边取水的人络绎不绝。用虎跑泉水冲泡一杯龙井，“龙虎斗”听说是“西湖双绝”极致搭配。美哉美哉～\n3️⃣ 弘一法师与济公的禅意足迹\n\t\n李叔同曾在此断食出家，此处也有李叔同纪念馆，在这儿感受弘一法师从才子到高僧的传奇一生。\n馆内陈列的书法、绘画、音乐作品，无一不在诉说着大师的才与情，心与境的转变～\n济公传说更是为古寺添了神秘感。塔院墙壁的石刻济公形象，神还原游本昌老师的经典造型\n济公圆寂于此，园内济公塔院静静伫立，诉说济公心怀慈悲、惩恶扬善的传奇故事，漫步塔院，仿佛能看到济公摇着破扇，在山林间行侠仗义的身影，为这座江南园林增添了几分神奇色彩。\n4️⃣ 森系拍照·出片率100\n📸拍照Tips：\n· 建议穿白色/浅灰色系服饰，和绿色背景绝配！\n· 利用泉水、石阶做前景，层次感秒升～\n· 动作以舒展、静心为主，侧脸、背影也超有氛围！\n📍定位：杭州虎跑公园（门票15）\n#瑜伽拍照 #杭州小众打卡 #虎跑公园 #瑜伽女孩 #户外瑜伽 #瑜伽与大自然 #绿树阴浓夏日长 #光影落在绿意里 #万物静观皆自得","type":"normal","author":"Abby上门私教","authorId":"5b6ec23e38a9800001276797","url":"https://www.xiaohongshu.com/explore/68bd14d5000000001d01a52c?xsec_token=ABK1Ik3pL8AZ_U0Oz5DeeOlhAvQfqLqpmqo88fkHGN4pU=&xse <script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');
    const cover=n.cover?'<div class="card-cover"><a href="'+esc(n.url)+'" target="_blank"><img src="'+esc(n.cover)+'" alt="'+esc(n.title)+'" loading="lazy"></a></div>':'';
    const authorLink=n.authorId?'<a href="https://www.xiaohongshu.com/user/profile/'+esc(n.authorId)+'" target="_blank">@'+esc(n.author)+'</a>':'@'+esc(n.author);
    const cms=(n.commentList||[]).slice(0,5).map(c=>
      '<div class="comment-item">'+(c.userId?'<a class="user" href="https://www.xiaohongshu.com/user/profile/'+esc(c.userId)+'" target="_blank">'+esc(c.user)+'</a>':'<span class="user">'+esc(c.user)+'</span>')+'<span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    ).join('');
    return '<div class="card">'+cover+'<div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div><div class="card-author">'+authorLink+'</div>'+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
