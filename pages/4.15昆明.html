花楹 #4月旅游攻略 #昆明赏花 #蓝花楹攻略 #昆明小众旅游 #昆明拍照打卡 #云南旅游 #在这遇见紫色花海\n#公园的对手竟然是绿化带","type":"normal","author":"云南亲子游","authorId":"5c68375b0000000011031afd","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo315mrui811a6g5p367ca4mq4mh0qbtkg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69b38752000000002203191b?xsec_token=AB2Cuj4RhjXynac64God2wk8jO5r-c3zpFbrR68YcO8I0=&xsec_source=pc_search&source=web_search_result_notes","likes":429,"collects":403,"comments_count":127,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604052047/39326820aafbfc940d9a1feac269d01e/notes_pre_post/1040g3k831tl0dicpnucg5n386tdke6ntcuvb7ng!nd_dft_wlteh_webp_3","keyword":"4.15昆明","commentList":[{"user":"猫小懒520v","userId":"5558180cb7ba22559a914b34","text":"预计今年4月15号左右能开花嘛","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo30t7p8kuh400040kl1lc0oipk1dt3n2g?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"昆明土著玩家","userId":"5c68375b0000000011031afd","text":"今年应该差不多，回头开花我艾特你","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tkveu6bmo6g5n386tdke6ntke3osuo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"昆明土著玩家","userId":"5c68375b0000000011031afd","text":"希望能早点开欢迎","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tkveu6bmo6g5n386tdke6ntke3osuo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"昆明土著玩家","userId":"5c68375b0000000011031afd","text":"应该还有点","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tkveu6bmo6g5n386tdke6ntke3osuo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"昆明土著玩家","userId":"5c68375b0000000011031afd","text":"昆明比较多点","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tkveu6bmo6g5n386tdke6ntke3osuo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"唐师傅的照相馆","userId":"5aa0db314eacab63f80d3fd3","text":"我这个时间段呢，来一周末","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/ mageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"小红薯65FC5D65","userId":"65fbb87d000000000b00fc56","text":"怎么样联系你","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/645b7f6e338379fac1893093.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"LiZiQuan","userId":"5b5a8233e8ac2b67507752d3","text":"直接私","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo30u6ginh2l4004a7io8136kmjcc56qfo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"彬","userId":"5c2cb373000000000702e345","text":"多少","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tvs9659nq005n1cmdphtoq5jqlcaag?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69c0e36b0000000023004f7d","title":"我帮你把们昆明即蓝花楹核心打卡点弄好了！","content":"一、时间规划（精准不跑空）\n1. 花期：4月中下旬—5月中旬；盛花期多在4月25日—5月8日（气温高会提前谢，关注「昆明发布」确认当年情况）\n2. 每日黄金时段：早晨8:00–10:00（柔光通透，人少）；傍晚16:00–18:00（侧逆光，花瓣透光，氛围感强）；阴天可全天拍，避免正午顶光\n3. 避峰：工作日早场＞工作日傍晚＞周末清晨；教场中路周末下午人山人海\n二、核心机位+拍摄技巧（附交通）\n1. 教场中路（顶流C位）\n◦ 交通：地铁4号线苏家塘站C口步行5分钟；公交65/104路\n◦ 机位：天桥俯拍紫色花廊纵深感；幼儿园三叉口无车区拍人像；低角度仰拍（天空作背景，避开人群）；主题公园背景墙；航拍需注意禁飞区\n◦ 技巧：长焦压缩空间；用蓝花楹双层巴士作动态前景！\n\t\n2.春城路（泰隆宏瑞饭店段）\n◦ 交通：地铁1号线昆明火车站步行/打车\n◦ 机位：矮围墙+花枝，可近距离拍人像特写；红墙与蓝紫撞色\n◦ 技巧：浅色系穿搭，侧逆光拍花瓣透光\n\t\n3.铁皮巷/彩云里文创园（小众文艺）\n◦ 交通：地铁环城南路站步行15分钟\n◦ 机位：露天公交站台；A/B栋露台俯拍老巷+蓝花楹；红砖建筑与花同框\n◦ 技巧：复古穿搭，用老建筑线条构图\n\t\n4.黄公东街（黄墙撞色）\n◦ 小众机位，明黄色墙面与蓝花楹形成强烈对比，适合人像、胶片风\n三、器材与参数预设（直接套用）\n1. 机身镜头：全画幅+24-70（全能）+70-200（长焦压缩、拍特写、避人）；手机建议用长焦模式；三脚架（夜景/慢门倒影必备）\n2. 参数模板\n◦ 自然光人像（顺光）：ISO100–200，f2.8–4，快门1/500s+，对焦人脸/眼睛\n◦ 逆光花瓣特写：ISO200，f4–5.6，快门1/250s，加1/3–1档曝光补偿，避免暗部死黑\n◦ 水面倒影慢门：ISO100，f8–11，快门1–4s，三脚架+快门线\n◦ 白平衡：日光5500K；想偏蓝紫冷调降100–200K；想暖调加200K\n3. 配件：偏振镜（消除叶面反光，提升蓝紫饱和度）；备用电池；防晒帽；折叠小凳（拍高处花枝）\n四、人像穿搭&构图\n穿搭：浅色系（白色、米色、淡蓝）最出片！\n行程建议\n• 早场：教场中路（8:00–9:30）→ 春城路（10:00）\n• 下午场：铁皮巷/彩云里（15:00）→ 盘龙江油管桥（16:30–18:00拍夕阳+倒影）","type":"normal","author":"云南亲子游","authorId":"65a4b5080000000003026e91","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo315mrui811a6g5p367ca4mq4mh0qbtkg?imageView2/2/w/80/format/jpg?imageView 1","text":"可以","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31gj58k5b3i005pd4mk40srkh5b96btg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"奶味小洛洛💙","userId":"6402b26000000000140134f5","text":"4月8号会有蓝花楹吗","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31krphgdk2g005p02m9g52d7lr8dc3n8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"窗边的光","userId":"65a4b5080000000003026e91","text":"不会","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31gj58k5b3i005pd4mk40srkh5b96btg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"红yz&wx","userId":"5d39649e0000000016015d9f","text":"5月4号13左右到昆明南站，想去拍蓝樱花，可以去哪里啊？","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31q086955g26g5n9pcif5incv714fk2g?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"67fe4e19000000001a0074b2","title":"昆明蓝花楹开了，快看！2025.4.15开花情况","content":"不好意思，标题党一下，蓝花楹目前只开了几朵，如图5、8。\n\t\n今年3月昆明几次倒春寒，使得蓝花楹花期有所推迟。不过据说今年的花量会比往年更可观哦😉！浅浅期待一下\n\n⭕️图1-4是我去年2024年4月13-4月22所拍摄的蓝花楹；\n⭕️图5-14是2025年4月15日新鲜出炉的，分别观察了教场中路、盘龙江滨江西路、春城路的蓝花楹，目前基本都处于花芽向花蕾发育的阶段（如图13），有个别几朵蓝花楹绽放；预计再过10天左右，4月25前后迎来初花期，五一假期开始进入盛花期，五月进入落花期；\n\n赏花点：\n✅️教场中路：蓝花楹赏花必去的蓝花楹大道，蓝花楹最密集的地方：\n✅️盘龙江畔滨江西路：人比教场中路少，蓝花楹沿江盛开，拍照也很出片。\n✅️春城路：拍人像离花zui近；导航：泰隆宏瑞酒店；目前集市已经搭建好，设置了拍照打卡点；\n✅️盘龙江油管桥：蓝花楹+废旧的铁轨，电影感；\n✅️红锦路：上千株蓝花楹，书馆高大，人少\n✅️其西苑地铁站：C口对面，楼梯上和蓝花楹近距离合影\n✅️联盟路 ：人比较少，蓝花楹较密集\n✅️黄公东路：在翠湖和网红打卡点黄公东街附近；\n✅️铁皮巷：文艺感昆明老街巷+蓝花楹，松弛赏花；\n🌸\n‼️Tips：\n1⃣赏花期交通拥堵，尽量选公共交通或共享单车出行；\n2⃣盛花期正好赶上五一长假，教程中路人会非常多，建议早上九点前前往观赏；\n#交换春天 #花情实况播报 #昆明 #蓝花楹 #昆明蓝花楹#昆明旅游攻略 #昆明旅游#云南亲子游 #昆明亲子#昆明拍照#在这遇见紫色花海 #昆明旅游 #昆明一日游#昆明花海","type":"normal","author":"云南亲子游","authorId":"64663b140000000012036896","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo315mrui811a6g5p367ca4mq4mh0qbtkg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/67fe4e19000000001a0074b2?xsec_token=ABB8sy9GN4pVGgs6CpA3zl9rHWUDnb02Xw6hUQW0IezbM=&xsec_source=pc_search&sourc -qc.xhscdn.com/avatar/1040g2jo31tu9p4eqn2004a01sqnqfcgicvrmgeg?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69b7be7e0000000020039ef8","title":"泼水节的水，为什么要加叶子🍃","content":"💦泼水节的水里，为什么要加叶子？\n\t\n很多人以为泼水节就是\n拿着水枪乱滋、见人就泼\n\t\n但其实\n真正的泼水节，水里有讲究🌿\n\t\n🌱水里的叶子，不是随便掉的\n\t\n在泼水节的传统里\n水不是普通的水\n\t\n节日前\n人们当地人会上山采集鲜花和绿叶\n缅桂花、香茅草、九里香……\n用这些花叶浸泡清水\n制成带着自然香味的“圣水”\n\t\n这些香花清水\n首先用来为佛像“浴佛”\n洗去尘埃，祈求平安\n\t\n然后才用沾着花叶的水\n轻拍在对方肩上\n洗去不顺，送上祝福\n\t\n所以泼水节的水\n从一开始就是带着植物香气的\n不是后来才加的\n\t\n🎉“文泼”和“武泼”，你选哪种\n\t\n现在的泼水节\n其实有两种玩法\n\t\n文泼\n拿一小碗水\n用带叶子的树枝\n沾一点轻点在别人肩头\n轻轻一下，祝福就到了\n这是最传统的模样\n\t\n武泼\n水枪、水桶、水管齐上阵\n见人就泼，泼到怀疑人生\n追求的就是尽情狂欢\n\t\n有人觉得“武泼”变味了\n但也有人说\n开心本身就是一种祝福\n\t\n✨泼水节真正的意思\n\t\n不管用叶子点一下\n还是用水桶浇一桶\n泼水节的内核从来没变：\n用纯洁的水，辞旧迎新\n\t\n把去年的不顺泼掉\n把新一年的好运接住\n\t\n所以下次被泼的时候\n可以低头看看水里有没有叶子\n有的话——\n恭喜你，被祝福砸中了💧\n\t\n你喜欢“文泼”还是“武泼”？评论区聊聊～\n#西双版纳泼水节 #泼水节冷知识 #傣族文化 #泼水节 #版纳旅行 #没有人能拒绝泼水节的热情","type":"normal","author":"小凡快跑03-14","authorId":"69abdd0e000000003302619f","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6626956d21db97c12b0ca620.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69b7be7e0000000020039ef8?xsec_token=ABTtkKrrGGvaTKO0cj_HUMEUQJK6G-6XAE0WLLP5mnNq8=&xsec_source=pc_search&source=web_search_result_notes","likes":19,"collects":9,"comments_count":6,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604052119/d753e85d1722c30d16930791456a1ab5/notes_pre_post/1040g3k031tmio0p072005qdbrk7csocvqqp1q40!nd_dft_wlteh_webp_3","keyword":"4.15昆明","commentList":[{"user":"好！！","userId":"5eaad0020000000001004ed2","text":"原来泼水节用的水里还有这么多门道","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31j1nojeggs605nlaq0108jmis1t0b08?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"南药园｜傣药本草科普","userId":"69abdd0e000000003302619f","text":"是的宝子，不只是简单的泼水，更多的是祝福","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31trnrsskmu005qdbrk7csocvdv5s050?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user 南蓝花楹同性女搭子","type":"normal","author":"昆明湖20小时前","authorId":"6462785b0000000010026dfa","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5558b21d5894467d3ddf7831.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c64dcd0000000023007765?xsec_token=AB4cCF1CRmhW_4GF8334-Jz8gLR7xmd_g8jo5Gw5YXs7Y=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604052056/9829f33b4481f2aa4388093dd0fe62d6/1040g00831u7b6cqcio605p32f1dk4rfqdeutqv0!nd_dft_wlteh_webp_3","keyword":"4.15昆明","commentList":[]},{"id":"69b7de5b000000001d01ab80","title":"昆明——蓝花楹","content":"🌿 白日梦境·油画感拉满\n👉 这条藏在老城区的河道边，简直是现实版莫奈花园！蓝紫色的花瀑沿着河岸蔓延，阳光透过花瓣洒下斑驳光影，连空气都变成温柔的香芋色～\n✅ 下午4点的光线最绝！逆光拍花枝能拍出仙气飘飘的光斑，河面上的倒影更是自带滤镜，原图直出发朋友圈被问爆地址！\n💡 穿搭小Tips：浅色系衣服更出片！白色连衣裙或米色衬衫，往花树下一站就是韩剧女主既视感～\n🌃 夜晚限定·梦幻蓝紫色海洋\n👉 没想到晚上的蓝花楹另有一番风味！路灯亮起后，紫色花朵在暖光下像星星落在枝头，晚风吹过花瓣簌簌落下，浪漫到想原地求婚！\n✅ 亲测夜晚人少超好拍！打开手机闪光灯+反差色滤镜，分分钟get氛围感大片，记得带防蚊贴哦～\n💡 隐藏机位：河道对岸的石阶！能拍到花枝与老建筑同框，复古感直接拉满，朋友圈九宫格有着落了！\n📸 无滤镜实拍·附最佳观赏期\n- 现在正是盛花期！预计还能美2周，姐妹们快冲\n- 下午3-5点/晚上7-8点是黄金拍摄时间\n- 建议错峰出行，周末人超多，工作日下午简直包场\n今年的蓝花楹比去年开得更盛，走在花树下的时候，真的会相信“人间值得”这四个字～ 快@你的拍照搭子，一起去赴这场紫色浪漫吧！💜","type":"normal","author":"昆明湖20小时前","authorId":"68cbd7cc000000002101ce86","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5558b21d5894467d3ddf7831.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69b7de5b000000001d01ab80?xsec_token=ABTtkKrrGGvaTKO0cj_HUMEbmaqIA6I_iF7Il5ZiyWsx4=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":2,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604052056/29afb278bc8a756838f3400cf86f094d/1040g00831tp81779g81g5q6bqv68bjk6sqstd5g!nd_dft_wgth_webp_3","keyword":"4.15昆明","commentList":[{"user":"hippo","userId":"5976f27d5e87e7318745fcbf","text":"已经开了？不是说45月吗","likes":0,"avatar":"https://sns-avatar-qc.x <script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');

    // 作者链接
    const authorLink=n.authorId?'https://www.xiaohongshu.com/user/profile/'+n.authorId:'#';
    const authorHtml='<div class="card-author">@<a href="'+authorLink+'" target="_blank">'+esc(n.author)+'</a></div>';

    // 评论（带作者链接）
    const cms=(n.commentList||[]).slice(0,5).map(c=>{
      const cLink=c.userId?'https://www.xiaohongshu.com/user/profile/'+c.userId:'#';
      return '<div class="comment-item"><span class="user"><a href="'+cLink+'" target="_blank" style="color:#667eea;text-decoration:none">'+esc(c.user)+'</a></span><span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    }).join('');

    return '<div class="card"><div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div>'+authorHtml+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
