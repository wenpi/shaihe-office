，就是北上深接受流行后，成都重庆这种跟风属性强的城市接棒，然后是武汉天津广州青岛西安这种传统大城市，最后是河南这种低收入人口大省，一旦河南接受，那就可以无阻力的在全国范围内流行并形成行业规模。", "likes": 31}, {"user": "用户已注销", "userId": "5cc6b852000000001102e668", "text": "规规矩矩做事，保温袋➕中央厨房➕独立包装", "likes": 61}, {"user": "摄影师宇翔Yuta", "userId": "654d418e0000000002013c5e", "text": "所以他们普通客户大多小红书，因为包装好看，好拍照", "likes": 39}, {"user": "不知海🌊", "userId": "62496fcd000000002102acb3", "text": "能拍出来了就不再是蓝海", "likes": 429}], "url": "https://www.xiaohongshu.com/explore/68a053ca000000001d0382c1?xsec_token=ABjAHVukwMxvF4YAI8y9tepG0vpJH0L0sBSGgMJa2dtM8=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "69c4da42000000001b00100f", "title": "杭州烤肉盒子｜把快乐装进盒中", "content": "在杭州的朋友现在居家烤肉，露营野餐完全不需要自己备菜\n直接拎着一个烤肉盒子就可以了，氛围感仪式感拉满！[棒R][棒R][棒R]\n\t\n牛皮纸盒子+透明盖，食材整整齐齐，拍照📸出片\n\t\n食材都是进口安格斯谷饲牛肉🥩、厚切剔骨五花、菌菇、时蔬…荤素搭配，不用洗不用切，直接开烤！\n\t\n蘸料、餐具都给配好，吃完收拾也超方便\n\t\n居家烤肉，露营聚餐再也不用为备菜头疼，快乐就是这么简单！\n\t\n#家庭烤肉#杭州烤肉盒子#杭州露营#露营必备 #户外好出片 #露营食材#外卖烤肉", "type": "normal", "author": "爱吃烤肉的阿文🥩01-18", "authorId": "5f1cd74a000000000101f2d3", "likes": 91, "collects": 58, "comments_count": 38, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081403/a840266f17a21c8024d06c12987663a9/notes_pre_post/1040g3k831u5tpo0t2u005nosqt50bsmjrt0l8kg!nd_dft_wlteh_webp_3", "keyword": "烤肉盒子", "commentList": [{"user": "想不出个名字", "userId": "58632f9d6a6a69061c01dcf3", "text": "有铝箔盒子的吗？可以直接烤", "likes": 0}, {"user": "杭州觅也·烤肉盒子", "userId": "5f1cd74a000000000101f2d3", "text": "没有呢宝子，我们是拿出来用烤盘烤呢", "likes": 0}, {"user": "油腻大叔", "userId": "60e85deb000000002002f7e1", "text": "可以外卖吗？", "likes": 0}, {"user": "杭州觅也·烤肉盒子", "userId": "5f1cd74a000000000101f2d3", "text": "宝子我们就是做外送的", "likes": 0}, {"user": "Jolee｜Feng", "userId": "55d53911c2bdeb65a7aa6586", "text": "怎么预定呀", "likes": 0}], "url": "https://www.xiaohongshu.com/explore/69c4da42000000001b00100f?xsec_token=ABxqGUTY4EnV5fhdUkFkyO6IJoZ5U-S1qoRnxCvoSyWYA=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "68d523a10000000013018994", "title": "露营美食系列", "content": "秋天是预 aohongshu.com/explore/68a017b6000000001c00a039?xsec_token=ABjAHVukwMxvF4YAI8y9tepKHOKcIeKR_PjA0CUEylPp4=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "69cd1667000000001a03799e", "title": "🏕️自制烤肉🥩盒子｜宝宝也能吃，附教程", "content": "自己做露营🏕️烤肉盒真的太香了！\n不用排队等位，拎着就去户外开烤，大人小孩都爱吃！\n\t\n🥩 超全食材清单（直接抄作业）\n\t\n✅ 肉类区（提前一晚腌好超入味）\n\t\n• 五花肉：蒜香/黑胡椒两种口味，烤到焦香巨香\n• 奥尔良鸡腿：小朋友超爱，嫩到爆汁\n• 孜然羊肉：洋葱姜丝腌完，烤完一点膻味都没有\n• 还有拌牛肉、广式腊肠、午餐肉、芥末香肠、皮蛋肠，种类超全！\n\t\n✅ 蔬菜菌菇区（解腻神器）\n\t\n口蘑、香菇、金针菇、土豆片、西葫芦、杏鲍菇、酸菜，烤完吸满肉汁，比肉还好吃！\n\t\n✅ 水果&甜品区（露营🏕️幸福感来源）\n\t\n菠萝、芒果、小番茄、凤梨，解腻又清爽\n自制奶油蛋挞、麻薯、奶香吐司，小朋友抢着吃！\n\t\n✅ 零食区（带娃露营必备）\n\t\n坚果、瓜子、小饼干，还有宝宝爱吃的小皮果泥、小皮燕麦饼干🍪，哄娃神器！\n\t\n🍳 零失败腌制公式\n\t\n✅ 五花肉：蒜片+料油+十三香+辣椒粉+生抽+蚝油 / 黑胡椒+盐\n✅ 奥尔良鸡腿：生抽+老抽+奥尔良料+姜丝+辣椒粉\n✅ 孜然羊肉：料油+孜然+十三香+生抽+老抽+洋葱丝+姜丝\n提前一晚腌好，第二天直接装盒，超方便！\n\t\n🌿 露营小贴士\n\t\n1. 用一次性餐盒分装，分类清晰不串味，吃完直接扔，不用洗碗！\n\t\n2. 蛋挞、麻薯、吐司提前在家做好，露营直接带，省时间又出片📷\n\t\n3. 户外烤炉一摆，肉在烤盘上滋滋冒油，吹着春风吃烤肉～春日露营就这么安排！\n#春游野餐 #宝宝辅食 #辅食  #野餐盒子 #带着美食去露营  #露营烤肉 #露营攻略 #小皮果泥 #和小皮过春天 @littlefreddie小皮 #露营也要吃好的", "type": "normal", "author": "爱吃烤肉的阿文🥩01-18", "authorId": "61ad9bbf000000001000a707", "likes": 144, "collects": 89, "comments_count": 6, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081404/5dc393061a2ffafc721fb301b5b6d623/1040g2sg31uijrs5j2ofg5oddjevk19o78atmrj8!nd_dft_wlteh_webp_3", "keyword": "烤肉盒子", "commentList": [{"user": "花又开好了", "userId": "5ea6295800000000010000a1", "text": "这个纸盒子是什么尺寸的呀", "likes": 0}, {"user": "吉米麻麻", "userId": "61ad9bbf000000001000a707", "text": "45✖️31✖️8", "likes": 0}, {"user": "趣果有间", "userId": "59e2e24b27d594339e2e8656", "text": "好厉害，立马收藏了", "likes": 0}, {"user": "VlPbg4", "userId": "64a6db0800000000110005f7", "text": "提前腌会不会咸啊", "likes": 0}, {"user": "吉米麻麻", "userId": "61ad9bbf000000001000a707", "text": "不会的，少放点酱油什么的，我吃的时候有蘸料，吃着可以", "likes": 0}], "url": "https://www.xiaohongshu.com/explore/69cd1667000000001a03799e?xsec_token=ABeAq9Nck06Q6sjwGTzlB-arOESFWQShVk7zmUhzkxv3s=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "68aed7aa000000001d00478c : 0}, {"user": "qc", "userId": "5dae939600000000010014ad", "text": "煮了一锅火锅🍲", "likes": 1}, {"user": "又见斑斓", "userId": "5e5ceee3000000000100b01a", "text": "很有锅气，想看成品", "likes": 1}, {"user": "qc", "userId": "5dae939600000000010014ad", "text": "成品是熟的吗，后面几张哈哈哈", "likes": 0}, {"user": "qc", "userId": "5dae939600000000010014ad", "text": "分享晚餐第1️⃣4️⃣3️⃣天咯", "likes": 0}], "url": "https://www.xiaohongshu.com/explore/693ec92a000000001b023863?xsec_token=ABYqniwkwuxMOAThs6nG7v8mtWZz9obw-yNFXLKzP8Da8=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "68d5ecb7000000001003d4a6", "title": "📍新昌，高颜值烤肉盒子太太太方便啦", "content": "#野餐盒子 #露营烧烤 #家庭烤肉 #精致露营 #露营也要吃好的", "type": "normal", "author": "爱吃烤肉的阿文🥩01-18", "authorId": "59e20c26f1fa172ecce2c001", "likes": 318, "collects": 206, "comments_count": 2, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081404/5a4dfeb3924093988faca632f989cf7b/notes_pre_post/1040g3k031msiu542mg1049tkke62dg013knl388!nd_dft_wlteh_webp_3", "keyword": "烤肉盒子", "commentList": [{"user": "彭大叔^_^", "userId": "607cc9e5000000000100472f", "text": "怎么拿货啊", "likes": 1}, {"user": "*暴富猫*", "userId": "56a5cacab8ce1a2c3adaac7a", "text": "先占个位 有需要回来", "likes": 1}], "url": "https://www.xiaohongshu.com/explore/68d5ecb7000000001003d4a6?xsec_token=ABt7SImcqKhH8ZM6UFAHjvwRh1TsjjjMCFst2wxEO5eBs=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "685920460000000023004048", "title": "露营不做饭，装备少一半（内含清单）", "content": "人均不用50的烤肉盒子详解来了！！\n夏天又热，又不想出去吃农家乐的营友们\n先点赞👍🏻收藏⭐\n下次吃饭不用烦\n1盒解决4人聚餐，好看出片不用洗碗\n摆盘准备\n生菜1颗，柠檬1颗，洋葱半个\nTips:食材会出水纸盒会变软，建议底部先用锡纸、油纸和生菜垫底，隔开水分食材也能更好保鲜\n\t\n烤肉盒子\n从左到友、从上到下\n1、必品阁烤肉煎饺10只\n2、车达芝士肠4条，好吃必选\n3、牛肉粒（最好自己用牛排切，其次买原切，拼接的难吃）\n4、五花肉，撒点黑胡椒盐给个底味（烤肉先用五花肉润锅，露营连油都不用带了）\n5、小南瓜、杏鲍菇、洋葱切片，给肉做分区\n6、牛五花切片\n7、原切上脑烤肉片\n8、战斧羊排（某象的太肥好难吃，买山姆的）\n9、奥尔良鸡中翅（最好买新鲜鸡翅，倒一包奥尔良粉腌就好）\n10、口蘑虾滑，口蘑摘掉蒂，虾滑解冻用力挤入口蘑，，强推！（烤肉时先把虾滑部分朝下，烤定型后再反面烤口蘑）\n\t\n解腻神器话梅小番茄🍅\n连泡番茄的汤汁都被喝完的程度，夏天有这个肉都多吃两口！！\n1、450g给小番茄屁股开十字花刀（务必记得，不然剥皮会哭），倒刚烧开的开水下去搅拌一下，然后捞起倒冰水里\n2、话梅8颗+冰糖or蜂蜜1勺+100g水，小火烧开后放凉\n3、小番茄剥皮后放容器，倒入话梅糖水，再倒入雪碧至淹没所有小番茄，加入柠檬（有籽的话记得去掉，不然会发苦）\n4、冷藏腌制3小时后食用~\n露营夜晚打光建议：饮料酒水背后放两个GZ灯，肉类蔬菜斜着打个暖光灯，随便拍都好看！\n下一期出人均50健康、好看又出片的烧鸟盒子搭配思路，小关小注求点一下#户外露营也要好好吃饭 #一起去露营 #露营 #露营美食家 #烤肉", "type": "normal", "author": "爱吃烤肉的阿文🥩01-18", "authorId": "62b92aa0000000001b028f71", "likes": 116, "collects": 76, "comments_count": 21, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081404/71128a376a0b1c77453f3dfe9cc98aea/notes_pre_post/1040g3k831j2nddnp142g5olp5ag6t3rh0mm1u8g!nd_dft_wlteh_webp_3", "keyword": "烤肉盒子", "commentList": [{"user": "Lu边微物摊er", "userId": "60238fbb00000000010053cd", "text": "玻璃器皿怎么收纳的", "likes": 0}, {"user": "冲个靓梁女士", "userId": "62b92aa0000000001b028f71", "text": "我的保温箱是软包，目前还没碎过", "likes": 0}, {"user": "大型猫科动物", "userId": "5c2ee58c000000000500ea2f", "text": "露营不带帐篷，装备全省了", "likes": 3}, {"user": "冲个靓梁女士", "userId": "62b92aa0000000001b028f71", "text": "再说就要退坑了", "likes": 0}, {"user": "爱户外的温哥", "userId": "5dbf7cd500000000010067bd", "text": "我下次就带张凳➕一个人啥都不带", "likes": 0}], "url": "https://www.xiaohongshu.com/explore/685920460000000023004048?xsec_token=ABVxaoSA9yzCotKvNV85ft0MsKmswkfR1zT8d_rrkCdTc=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "69085d38000000000700b8bd", "title": "露营吃烤肉呀！", "content": "又又又又出发啦！！！\n烤肉盒子进阶版，这次小朋友比较多，特意加了一个蔬菜盒子。秋天和露营也很搭呢🏕️\n露营搭子新技能get✓，虽然骑的歪七扭八哈哈哈\n#一起去露营 #露营烤肉#烤肉盒子 #露营美食 #宁波露营#周末遛娃计划", "type": "normal", "author": "爱吃烤肉的阿文🥩01-18", "authorId": "5a753e7111be1072dc465475", "likes": 159, "collects": 77, "comments_count": 6, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081406/02a9d872215145f1e39f8b1a95823062/1040g2sg31odrfnbf4u704a184kv72l3ln47nu6o!nd_dft_wlteh_webp_3", "keyword": "户外烤肉拼盘", "commentList": [{"user": "小红薯CB661C0D", "userId": "5bb48eae6b58b710c10b09c4", "text": "怎么预定烤肉盒子？", "likes": 1}, {"user": "wo嘞个豆", "userId": "5a753e7111be1072dc465475", "text": "我这个是自己吃的，没有售卖", "likes": 1}, {"user": "巧巧", "userId": "5dbaead10000000001007d22", "text": "盒子的链接有吗", "likes": 0}, {"user": "淀山湖阳 sec_token=AB5M2XiuWIszBzLtHajyV6eB2qnFpzwgFMUP7yvVwdb7I=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "69c2a0f1000000001f00452b", "title": "🍃 把春天搬进野餐盒里｜露营烧烤太治愈了！", "content": "谁懂啊！在草地上露营烤肉🥩的快乐，是春天给的最好礼物✨\n\t\n阳光正好，微风不燥\n把一整盒春天的色彩搬去露营\n\t\n• 红白相间的肉卷在锅里翻滚\n\t\n• 脆嫩的时蔬带着泥土的清香\n\t\n• 还有酸甜的水果解腻收尾\n连调料都摆得整整齐齐，仪式感拉满💯\n\t\n听着炭火滋滋作响，和朋友碰杯大笑\n风里都是青草和食物的香气\n这才是春天该有的样子啊🌿\n\t\n📍露营小Tips：\n• 提前备齐食材，用野餐盒分类装好，颜值和方便度双在线\n• 带足湿巾和垃圾袋，无痕露营才是真快乐\n• 选一片有树荫的草地，晒晒太阳太舒服啦\n\t\n#春季露营 #野餐吃什么 #户外火锅 #一起去野餐 #城市周边露营 #春日漫游计划#襄阳露营 #襄阳 #一起去露营 #野餐氛围感", "type": "normal", "author": "番茄你个西红柿🍅", "authorId": "5c6a26bd000000001102b251", "likes": 67, "collects": 33, "comments_count": 1, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081416/26a2232c46353a42806ef07064da8d3a/notes_pre_post/1040g3k031u3o98q82o305n3a4qukdcih4h10iug!nd_dft_wlteh_webp_3", "keyword": "烤肉便当", "commentList": [{"user": "阿铭崽湿辣牛肉、果酱烧烤", "userId": "5de9b6a50000000001007577", "text": "可以拿图吗", "likes": 0}], "url": "https://www.xiaohongshu.com/explore/69c2a0f1000000001f00452b?xsec_token=ABOVBXpDySkHr5lWc-_RiT688l50Jq0z0LgOapYQ9JNx4=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "65e6a74e000000000b00f171", "title": "烤肉便当diy", "content": "#自制diy #烤肉 #烧烤 听说现在流行这种烤肉外卖，但是价格并不美丽，觉得好玩，又想省钱，尝试自己做一个，这个盒子在pdd就可以买到，这种是有包含两块碳，可以烧一小时，食材就网上点单送到家，就是处理食材麻烦了点，不过食材都自己喜欢吃的又新鲜还便宜，处理就处理吧，肉类还是要切薄一点，最好越薄越好，烤的快，太厚了烤的很慢，就两块碳，火力一般般，一个人慢慢吃就好，赶时间就不要尝试了，然后摆盘成自己喜欢的样子就可以开始烤了，烤的时候烟不会很多。总的来说有点新鲜便宜都是自己爱吃的，缺点费时费力。", "type": "normal", "author": "番茄你个西红柿🍅", "authorId": "5c60636100000000180377b5", "likes": 23, "collects": 11, "comments_count": 0, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081417/d2fc76fdc4aa78bacbad76cbfd18a906/1040g2sg30vuu58v7605g5n30cdgm6ttl32257so!nd_dft_wgth_webp_3", "keyword": "烤肉便当", "commentList": [], "url": "https://www.xiaohongshu.com/explore/65e6a74e000000000b00f171?xsec_token=ABksMBbylvwgr8SN-rxuW_JFphbHR7BmCB1GOVTHmL1T8=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": ": "雨天烤肉日｜家庭聚会\n雨天☔️和烤肉🍖太适配啦\n用电磁炉➕电烤盘就能轻松Get家庭烤肉～\n谁懂生菜包五花肉和辣白菜真是太好吃了！", "type": "normal", "author": "阿优的Dream cake（禁言）", "authorId": "68331b6e000000000e01d4fe", "likes": 44, "collects": 7, "comments_count": 1, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081420/1872522f1df78b7a2513af0073f16e70/notes_pre_post/1040g3k831qeaui8372005q1j3dn3jl7u0eu7obg!nd_dft_wlteh_webp_3", "keyword": "自制烤肉", "commentList": [{"user": "特别牛（齐齐哈尔牛肉）", "userId": "5e0f41ee00000000010084d6", "text": "回过", "likes": 0}], "url": "https://www.xiaohongshu.com/explore/694a64a9000000001e014601?xsec_token=ABu3pScZ6ktTu3SZx1oVv70sRBGF2zjwoOOMU3vGTzrn8=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "696b252f000000000903927b", "title": "烤肉盒子教程｜亲测九荤八素", "content": "西冷牛排：烤架烧烫后，大火每面煎烤2-3分钟，锁住肉汁。可根据喜好加入黄油、大蒜增加风味。\n中心达到您喜欢的熟度（如四至六分熟）。\n西冷肋条：切成小块，中火烤制。因带筋，需勤翻动至四面金黄、肉质收紧。\n肉质有嚼劲，表面焦香。\n五花肉：切薄片，中火炙烤。利用自身油脂，烤至两面金黄焦脆。\n肥肉部分透明，瘦肉焦黄，口感酥脆。\n鸡翅中：两面划刀，中火慢烤，勤翻动。可刷上蜂蜜水使色泽更亮。\n通体金黄，无血水溢出。\n金牌爽脆肉肠：中小火慢烤，不断翻动，烤至肠体膨胀，表面焦黄。\n外皮脆裂，内部熟透。\n金针菇肥牛卷：中火烤制，刷上酱汁。烤至肥牛卷边微焦、金针菇变软。\n金针菇吸收肉汁，口感脆嫩。\n老虎虾：大火短时烤制。可保持原味，或涂抹蒜蓉酱。\n虾壳变红，虾肉紧实呈不透明\n口蘑虾滑：虾滑填入口蘑。中火烤制，虾滑变色、口蘑变软并渗出汁水即可。\n能喝到蘑菇碗里的鲜美汤汁。\n彩椒牛肉粒：大火烤到（约5分钟时）中途翻面，并在表面刷一层油。\n牛肉颜色从鲜红变为褐色，肉质收紧，用筷子按压感觉有弹性，并有清澈肉汁渗出。彩椒变软，边缘有轻微焦痕。\n玉米：中火烤约15分钟，不时转动。可提前煮熟，更易烤均匀。\n玉米粒香软，有焦香斑点。\n土豆片/番薯片：中小火慢烤至两面金黄，筷子能轻易戳穿。\n内部粉糯，边缘微焦。\n西葫芦片：中火烤制，两面烤软并出现轻微烤痕即可。\n口感柔软，略带清甜。\n生菜：洗净沥干，可用于包裹烤肉生食，也可烤着吃\n叶片清脆，用于解腻。\n口蘑：口蘑口朝上放在烤网上，中火烤至蘑菇变软，中间积满汤汁。\n先喝汤汁，再吃蘑菇，味道鲜美。\n金针菇​\n可放入锡纸盒加蒜蓉酱汁焗熟；或直接中小火烤至变软。\n口感爽滑，入味。\n洋葱圈/青椒圈：主要作为配料，可与其他食材一同烤制，或烤软后作为佐餐蔬菜。\n变软，香味溢出。\n#露营美食 #户外野餐 #周末去哪儿 #广州周末 #烤肉盒子 #野餐盒子 #露营 #露营烤肉 #露营烧烤 #露营的松弛", "type": "normal", "author": "阿优的Dream cake（禁言）", "authorId": "62fc98690000000012003ef3", "likes": 17, "collects": 10, "comments_count": 0, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081420/77d5f1d2011143e08b888abb1bd260f2/notes_pre_post/1040g3k031reab6i6n0305onsj1kkgfnj5tgt7n8!nd_dft_wgth_webp_3", "keyword": "自制烤肉", "commentList": [], "url": "https://www.xiaoh U6K8=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "6982efb6000000000a03cb1d", "title": "围炉烤肉➕4款封神烤肉腌制配方！", "content": "🥩秘制黑椒肥牛：烤的时候滋滋冒油，黑胡椒香气直冲天灵盖，每一口都裹满酱汁✨\n2勺生抽 + 1勺蚝油 + 2勺味淋（可加少量清酒提鲜）+ 半勺盐 + 半勺蜂蜜 + 大量现磨黑胡椒 + 洋葱丝\n\t\n🥓甜辣烤五花：烤到焦香微卷，外皮带点脆，甜辣口直接封神，配生菜吃绝了！\n1勺韩式辣酱 + 1勺蒜末 + 1勺蒜蓉辣酱 + 1勺蜂蜜 + 2勺香油 + 适量苹果片（增甜解腻关键）\n\t\n🍍菠萝牛小排 ：完全不输烤肉店的味道，果香解腻，牛小排嫩到脱骨，吃多了也不齁～\n1/3个菠萝榨成果泥 + 2勺生抽 + 1勺味淋 + 1勺海盐 + 适量洋葱丝 + 少许食用油\n\t\n🍗香辣烤鸡翅 ：外焦里嫩，香辣入味，追剧、聚餐必备，一口一个停不下来！\n2勺盐 + 1勺辣椒面 + 1勺花椒粉 + 1勺孜然粒 + 1勺蒜蓉辣酱 + 适量白芝麻 + 少许食用油\n\t\n💡小tips：所有肉类腌制时抓匀，冷藏30-40分钟，烤的时候中火慢烤，勤翻面避免烤糊～\n#餐饮供应链#家庭烤肉 #配方 #烤肉店 #围炉烤肉 #烤肉食材 #餐饮食材供应链 #酱料 #半成品 #冻品批发", "type": "normal", "author": "番茄你个西红柿🍅", "authorId": "640ee96d0000000010027d11", "likes": 907, "collects": 862, "comments_count": 1, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081430/4ca96764e719067645f89ec50ac530df/spectrum/1040g34o31s5hlucula405p0et5mk4v8hh1bfk3o!nd_dft_wlteh_webp_3", "keyword": "烤肉食材清单", "commentList": [{"user": "环骐食材供应链", "userId": "640ee96d0000000010027d11", "text": "过年囤货", "likes": 2}], "url": "https://www.xiaohongshu.com/explore/6982efb6000000000a03cb1d?xsec_token=AB5U4j9BvvxADr8bBdRh-pCE9fuubLWXbSUr0ZN6d57LM=&xsec_source=pc_search&source=web_search_result_notes"}, {"id": "65fac91d0000000012020c0e", "title": "春天当然要去露营烤肉啦⛺️附装备食材清单", "content": "春天来啦🍃露营装备可以拿出来啦\n位置就选在了家附近的草坪\n带上备好的食材和装备\n和家人朋友一起户外烤肉的感觉太惬意了\n最后一张图附完整的装备食材清单\n露营攻略很足！\n#一起去露营 #露营烤肉 #唯有美食可以治愈一切 #户外 #精致露营 #露营天幕 #露营", "type": "normal", "author": "番茄你个西红柿🍅", "authorId": "59e2d5c8f1fa173b7275e33a", "likes": 1, "collects": 5877, "comments_count": 238, "shares": 0, "cover": "https://sns-webpic-qc.xhscdn.com/202604081430/122e53e29464cdd034b83e9a9b44ad67/1040g2sg310ij8qoi6k4g49tu0fashopqil5li0g!nd_dft_wlteh_webp_3", "keyword": "烤肉食材清单", "commentList": [{"user": "张张包", "userId": "5aa1ccf34eacab3f787b0e52", "text": "可以推荐下卡式炉链接不 姐妹", "likes": 34}, {"user": "一只小球球啊", "userId": "59e2d5c8f1fa173b7275e33a", "text": "岩谷", "likes": 11}, {"user": "喜宝", "userId": "56 <script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');

    // 作者链接
    const authorLink=n.authorId?'https://www.xiaohongshu.com/user/profile/'+n.authorId:'#';
    const authorHtml='<div class="card-author">@<a href="'+authorLink+'" target="_blank">'+esc(n.author)+'</a></div>';

    // 评论（带作者链接）
    const cms=(n.commentList||[]).slice(0,5).map(c=>{
      const cLink=c.userId?'https://www.xiaohongshu.com/user/profile/'+c.userId:'#';
      return '<div class="comment-item"><span class="user"><a href="'+cLink+'" target="_blank" style="color:#667eea;text-decoration:none">'+esc(c.user)+'</a></span><span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    }).join('');

    return '<div class="card"><div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div>'+authorHtml+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
