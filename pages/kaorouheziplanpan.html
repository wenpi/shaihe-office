种类超全！\n\t\n✅ 蔬菜菌菇区（解腻神器）\n\t\n口蘑、香菇、金针菇、土豆片、西葫芦、杏鲍菇、酸菜，烤完吸满肉汁，比肉还好吃！\n\t\n✅ 水果&甜品区（露营🏕️幸福感来源）\n\t\n菠萝、芒果、小番茄、凤梨，解腻又清爽\n自制奶油蛋挞、麻薯、奶香吐司，小朋友抢着吃！\n\t\n✅ 零食区（带娃露营必备）\n\t\n坚果、瓜子、小饼干，还有宝宝爱吃的小皮果泥、小皮燕麦饼干🍪，哄娃神器！\n\t\n🍳 零失败腌制公式\n\t\n✅ 五花肉：蒜片+料油+十三香+辣椒粉+生抽+蚝油 / 黑胡椒+盐\n✅ 奥尔良鸡腿：生抽+老抽+奥尔良料+姜丝+辣椒粉\n✅ 孜然羊肉：料油+孜然+十三香+生抽+老抽+洋葱丝+姜丝\n提前一晚腌好，第二天直接装盒，超方便！\n\t\n🌿 露营小贴士\n\t\n1. 用一次性餐盒分装，分类清晰不串味，吃完直接扔，不用洗碗！\n\t\n2. 蛋挞、麻薯、吐司提前在家做好，露营直接带，省时间又出片📷\n\t\n3. 户外烤炉一摆，肉在烤盘上滋滋冒油，吹着春风吃烤肉～春日露营就这么安排！\n#春游野餐 #宝宝辅食 #辅食  #野餐盒子 #带着美食去露营  #露营烤肉 #露营攻略 #小皮果泥 #和小皮过春天 @littlefreddie小皮 #露营也要吃好的", "type": "normal", "author_name": "爱吃烤肉的阿文🥩01-18", "author_avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31id7h80cga005os5vie7qtqik1mu368?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip", "liked_count": 144, "collected_count": 89, "comment_count": 6, "share_count": 0, "note_url": "https://www.xiaohongshu.com/explore/69cd1667000000001a03799e?xsec_token=ABeAq9Nck06Q6sjwGTzlB-arOESFWQShVk7zmUhzkxv3s=&xsec_source=pc_search&source=web_search_result_notes", "cover_url": "https://sns-webpic-qc.xhscdn.com/202604081404/5dc393061a2ffafc721fb301b5b6d623/1040g2sg31uijrs5j2ofg5oddjevk19o78atmrj8!nd_dft_wlteh_webp_3", "keyword": "烤肉盒子", "rank": 17, "comments": [{"nickname": "花又开好了", "content": "这个纸盒子是什么尺寸的呀", "liked_count": 0}, {"nickname": "吉米麻麻", "content": "45✖️31✖️8", "liked_count": 0}, {"nickname": "趣果有间", "content": "好厉害，立马收藏了", "liked_count": 0}, {"nickname": "VlPbg4", "content": "提前腌会不会咸啊", "liked_count": 0}, {"nickname": "吉米麻麻", "content": "不会的，少放点酱油什么的，我吃的时候有蘸料，吃着可以", "liked_count": 0}]}, {"id": "68aed7aa000000001d00478c", "title": "🏕露营 自制烤肉盒子🥩", "content": "图三自制烤肉盒子，图四露营地配餐烤肉盒子，蔬菜盒子#一起去露营 #露营 #烤肉 #烤肉盒子 #露营氛围", "type": "normal", "author_name": "爱吃烤肉的阿文🥩01-18", "author_avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31id7h80cga005os5vie7qtqik1mu368?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip", "liked_count": 240, "collected_count": 104, "comment_co （烤肉时先把虾滑部分朝下，烤定型后再反面烤口蘑）\n\t\n解腻神器话梅小番茄🍅\n连泡番茄的汤汁都被喝完的程度，夏天有这个肉都多吃两口！！\n1、450g给小番茄屁股开十字花刀（务必记得，不然剥皮会哭），倒刚烧开的开水下去搅拌一下，然后捞起倒冰水里\n2、话梅8颗+冰糖or蜂蜜1勺+100g水，小火烧开后放凉\n3、小番茄剥皮后放容器，倒入话梅糖水，再倒入雪碧至淹没所有小番茄，加入柠檬（有籽的话记得去掉，不然会发苦）\n4、冷藏腌制3小时后食用~\n露营夜晚打光建议：饮料酒水背后放两个GZ灯，肉类蔬菜斜着打个暖光灯，随便拍都好看！\n下一期出人均50健康、好看又出片的烧鸟盒子搭配思路，小关小注求点一下#户外露营也要好好吃饭 #一起去露营 #露营 #露营美食家 #烤肉", "type": "normal", "author_name": "爱吃烤肉的阿文🥩01-18", "author_avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31id7h80cga005os5vie7qtqik1mu368?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip", "liked_count": 116, "collected_count": 76, "comment_count": 21, "share_count": 0, "note_url": "https://www.xiaohongshu.com/explore/685920460000000023004048?xsec_token=ABVxaoSA9yzCotKvNV85ft0MsKmswkfR1zT8d_rrkCdTc=&xsec_source=pc_search&source=web_search_result_notes", "cover_url": "https://sns-webpic-qc.xhscdn.com/202604081404/71128a376a0b1c77453f3dfe9cc98aea/notes_pre_post/1040g3k831j2nddnp142g5olp5ag6t3rh0mm1u8g!nd_dft_wlteh_webp_3", "keyword": "烤肉盒子", "rank": 22, "comments": [{"nickname": "Lu边微物摊er", "content": "玻璃器皿怎么收纳的", "liked_count": 0}, {"nickname": "冲个靓梁女士", "content": "我的保温箱是软包，目前还没碎过", "liked_count": 0}, {"nickname": "大型猫科动物", "content": "露营不带帐篷，装备全省了", "liked_count": 3}, {"nickname": "冲个靓梁女士", "content": "再说就要退坑了", "liked_count": 0}, {"nickname": "爱户外的温哥", "content": "我下次就带张凳➕一个人啥都不带", "liked_count": 0}]}, {"id": "69085d38000000000700b8bd", "title": "露营吃烤肉呀！", "content": "又又又又出发啦！！！\n烤肉盒子进阶版，这次小朋友比较多，特意加了一个蔬菜盒子。秋天和露营也很搭呢🏕️\n露营搭子新技能get✓，虽然骑的歪七扭八哈哈哈\n#一起去露营 #露营烤肉#烤肉盒子 #露营美食 #宁波露营#周末遛娃计划", "type": "normal", "author_name": "爱吃烤肉的阿文🥩01-18", "author_avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31id7h80cga005os5vie7qtqik1mu368?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip", "liked_count": 159, "collected_count": 77, "comment_count": 6, "share_count": 0, "note_url": "https://www.xiaohongshu.com/explore/69085d38000000000700b8bd?xsec_token=AB812_Fk13CstfcoQqk6iKDU 肉腌制配方！", "content": "🥩秘制黑椒肥牛：烤的时候滋滋冒油，黑胡椒香气直冲天灵盖，每一口都裹满酱汁✨\n2勺生抽 + 1勺蚝油 + 2勺味淋（可加少量清酒提鲜）+ 半勺盐 + 半勺蜂蜜 + 大量现磨黑胡椒 + 洋葱丝\n\t\n🥓甜辣烤五花：烤到焦香微卷，外皮带点脆，甜辣口直接封神，配生菜吃绝了！\n1勺韩式辣酱 + 1勺蒜末 + 1勺蒜蓉辣酱 + 1勺蜂蜜 + 2勺香油 + 适量苹果片（增甜解腻关键）\n\t\n🍍菠萝牛小排 ：完全不输烤肉店的味道，果香解腻，牛小排嫩到脱骨，吃多了也不齁～\n1/3个菠萝榨成果泥 + 2勺生抽 + 1勺味淋 + 1勺海盐 + 适量洋葱丝 + 少许食用油\n\t\n🍗香辣烤鸡翅 ：外焦里嫩，香辣入味，追剧、聚餐必备，一口一个停不下来！\n2勺盐 + 1勺辣椒面 + 1勺花椒粉 + 1勺孜然粒 + 1勺蒜蓉辣酱 + 适量白芝麻 + 少许食用油\n\t\n💡小tips：所有肉类腌制时抓匀，冷藏30-40分钟，烤的时候中火慢烤，勤翻面避免烤糊～\n#餐饮供应链#家庭烤肉 #配方 #烤肉店 #围炉烤肉 #烤肉食材 #餐饮食材供应链 #酱料 #半成品 #冻品批发", "type": "normal", "author_name": "番茄你个西红柿🍅", "author_avatar": "https://sns-avatar-qc.xhscdn.com/avatar/618237d8e6fad5172de97480.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip", "liked_count": 907, "collected_count": 862, "comment_count": 1, "share_count": 0, "note_url": "https://www.xiaohongshu.com/explore/6982efb6000000000a03cb1d?xsec_token=AB5U4j9BvvxADr8bBdRh-pCE9fuubLWXbSUr0ZN6d57LM=&xsec_source=pc_search&source=web_search_result_notes", "cover_url": "https://sns-webpic-qc.xhscdn.com/202604081430/4ca96764e719067645f89ec50ac530df/spectrum/1040g34o31s5hlucula405p0et5mk4v8hh1bfk3o!nd_dft_wlteh_webp_3", "keyword": "烤肉食材清单", "rank": 85, "comments": [{"nickname": "环骐食材供应链", "content": "过年囤货", "liked_count": 2}]}, {"id": "65fac91d0000000012020c0e", "title": "春天当然要去露营烤肉啦⛺️附装备食材清单", "content": "春天来啦🍃露营装备可以拿出来啦\n位置就选在了家附近的草坪\n带上备好的食材和装备\n和家人朋友一起户外烤肉的感觉太惬意了\n最后一张图附完整的装备食材清单\n露营攻略很足！\n#一起去露营 #露营烤肉 #唯有美食可以治愈一切 #户外 #精致露营 #露营天幕 #露营", "type": "normal", "author_name": "番茄你个西红柿🍅", "author_avatar": "https://sns-avatar-qc.xhscdn.com/avatar/618237d8e6fad5172de97480.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip", "liked_count": 1, "collected_count": 5877, "comment_count": 238, "share_count": 0, "note_url": "https://www.xiaohongshu.com/explore/65fac91d0000000012020c0e?xsec_token=ABNNGhgEWSc6RC3FXPUnuRowQ9Ysg0JQEPDPE67VY3NZQ=&xsec_source=pc_search&source=web_search_result_notes", "cover_url": "https://sns-webpic-qc.xhs <script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');

    // 作者链接
    const authorLink=n.authorId?'https://www.xiaohongshu.com/user/profile/'+n.authorId:'#';
    const authorHtml='<div class="card-author">@<a href="'+authorLink+'" target="_blank">'+esc(n.author)+'</a></div>';

    // 评论（带作者链接）
    const cms=(n.commentList||[]).slice(0,5).map(c=>{
      const cLink=c.userId?'https://www.xiaohongshu.com/user/profile/'+c.userId:'#';
      return '<div class="comment-item"><span class="user"><a href="'+cLink+'" target="_blank" style="color:#667eea;text-decoration:none">'+esc(c.user)+'</a></span><span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    }).join('');

    return '<div class="card"><div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div>'+authorHtml+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
