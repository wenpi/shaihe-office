这根本不是孤独\n是我和自己蕞坦诚的独处时刻\n\n原来成长就是这样\n把那些曾经害怕的、逃避的\n慢慢过成自由的样子\n\n失望也是\n谁没在车里哭过呢\n但后来发现\n每一次失望 都是在教我怎么重新站起来\n怎么把眼泪开成花\n\n现在这辆小车\n已经是我移动的小世界\n有喜欢的味道 有喜欢的歌\n有慢慢练出来的勇气\n\n木质调的香气还在慢慢散\n像日子一样 不急不躁\n稳稳地陪着我 往想去的地方开\n\n愿我们都能\n把孤独过成自由\n把失望活成勇气 💫\n\n#plog #mini车 #新人博主 #用生活治愈生活 #生活中的自洽时刻 #把生活调成自己的频道 #最忆香薰#最忆香氛 #车载好物分享 #木质调香薰\n@薯队长 @薯条小助手 @生活薯 @日常薯 @汽车薯 @小红书创作助手 @小红书成长笔记","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"593e01235e87e70a98242efb","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69b0e78b000000002202fb99?xsec_token=ABPZ9oIodOZXi13lbJnsNSo_QQR2k7j3t3ds3ZajfBQQw=&xsec_source=pc_search&source=web_search_result_notes","likes":121,"collects":70,"comments_count":110,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131243/68f54d7e8100b10e5bdccc57a182cd2c/note_pre_post_uhdr/1040g3r031tie846tla0g49jtb50i6bnr3oo9n18!nd_dft_wlteh_webp_3","keyword":"最忆香薰","commentList":[{"user":"团团香了又香","userId":"68f61f5700000000370095c1","text":"","likes":7,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31sbupo7nle005q7m3tbtp5e1h2o4prg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"团团香了又香","userId":"68f61f5700000000370095c1","text":"同款香薰","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31sbupo7nle005q7m3tbtp5e1h2o4prg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"不吃香菜","userId":"6430cbac00000000120101ff","text":"味道浓吗","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/64cc9f27f249dc6e0f3d198c.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"团团香了又香","userId":"68f61f5700000000370095c1","text":"不是浓香滴","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31sbupo7nle005q7m3tbtp5e1h2o4prg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"财神爷亲生女Zoe","userId":"5fe887b90000000001001b00","text":"喜欢茉莉的味道耶","likes":0,"avatar":"https://sns-avatar- erId":"5afb066011be105f7d10f85c","text":"这个我倒没注意","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31adt8skani6g4a5bqd361u2sculuofg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"小狮子不是小虱子","userId":"5b0d26cb6b58b77ef1dddf65","text":"吹掉蜡烛，会有刺鼻的烟味吗","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/63e4214c9fd03fccc7adc834.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69db8ed5000000002102cdba","title":"新家的100个快递｜香薰","content":"回到家闻到香香的味道，治愈+100\n香味一下就能让人放松下来\n以前很喜欢香薰蜡烛、精油时间久了已经要凑的很近才能闻到香线的味道比较重\n下班回家洗澡、睡觉、玩手机的时候点点上一根\n心情舒畅\n个人比较喜欢甜腻腻的花果香和奶香\n香线-slowood：玫瑰、薰衣草和奶呼呼的香味，好像巧克力棒很有食欲\n香薰-niko and ：很特别是泡泡糖的味道\n香线托-泥见景德镇非遗：感觉是手工制作非常精致\n\n#香薰 #高颜值香薰 #让房间香香的物品 #让房间香香的物品 #香薰礼盒 #室内香薰 #家居香氛 #氛围感香氛 #用气味储存记忆","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"5ad94b0be8ac2b74d7523075","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69db8ed5000000002102cdba?xsec_token=AB5N_GvVmvyEbq-Xx7PIzKq-rhD7CGDvBJI0RYQB4DhFo=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131246/f6f0180638723a5ef7aaf1244fc962a3/note_pre_post_uhdr/1040g3r831us34mi43q7g4a4m545gmc3lah8ts20!nd_dft_wlteh_webp_3","keyword":"最忆香薰 推荐","commentList":[]},{"id":"69c1fc3b000000001a027f10","title":"米车跟闻献联名香氛","content":"米车跟闻献联名的香氛，冷杉之息，真的有微凉的感觉，第一好评，夏天开车首选；雪松雾境带点檀香的味道，跟檀木梳子的气味差不多，我一直对檀香类似味道不怎么喜欢，小差评；花木之间完全是女性倾向的复合花香风格，清爽的甜腻感，女生应该会喜欢 。\n就是YU7 的适配还差点，香氛机开启状态时，智能设备栏显示已关机，自动醒神功能还是切换“晨间松木”出香","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"6057174700000000010051c5","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c1fc3b000000001a027f10?xsec_token=ABTRZsHxRJ6zt9p3Kx51oQdCLHnt_b2VSL3W6qZ_lgM9E=&xsec_source=pc_search&source=web_search_result_notes","likes":7,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131246/1b5c8c16eae08aea6918e8df56f512ec/notes_uhdr/1040g3qo31u3472id7ed05o2n2t3g8ke5tsooq20!nd_dft_wlteh_webp_3","keyword":"最忆香薰 推荐","commentList":[]},{"id":"69c7a46d000000001f000c89","title":"气味是一台时光机⏳，我被拉回了某年某天","content":"你们有没有这种感觉？\n气味比记忆跑得快——\n闻到某种熟悉的味道，\n整个人先恍惚了，\n然后画面才慢慢跟上来。\n\n这罐鼠尾草香薰就是这样的存在。\n火光在茶色玻璃罐里轻轻摇曳，\n鼠尾草的香气慢慢散开，\n清新、自然，带点草木的温润。\n\n香气钻进鼻腔的那一下，\n像是被拉回某个下午——\n阳光的角度、风的方向，\n身边的人、说过的话，\n都变得清晰起来……\n\n有时候坐在旁边发呆，\n看着火苗轻轻跳动，\n火光透过茶色玻璃，\n把桌面映成暖烘烘的一片。\n\n气味大概是记忆的另一种形状，\n看不见摸不着，\n但每次闻到，\n就只是安静地待在这一刻。\n\n#香薰蜡烛 #鼠尾草 #气味记忆 #治愈系生活\n#我的春天时刻 #plog #我的香味日记 #香氛","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"5ca4af07000000001600e933","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c7a46d000000001f000c89?xsec_token=ABTTGZ7nqwiCOTJUImwenxbT79-iHWSDeRBtW_bigNN5I=&xsec_source=pc_search&source=web_search_result_notes","likes":267,"collects":129,"comments_count":31,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131246/231d7ce0cd2baa0e9b47a43bec02e980/notes_pre_post/1040g3k031u8kv0g12a3g5n54ls3lhq9js0e65fo!nd_dft_wlteh_webp_3","keyword":"最忆香薰 推荐","commentList":[{"user":"白日梦的喵","userId":"5a066f3a11be104f24ea4778","text":"气味比记忆更储藏的久，有时候嗅到熟悉的味道，会马上翻出回忆","likes":4,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31h60439v420049vd11njkhror2bt5do?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"大土土e手帐","userId":"5ca4af07000000001600e933","text":"是的，好像体感温度也会","likes":5,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tlhkeidn8005n54ls3lhq9jugd39o8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"蛙赛赛","userId":"6437c501000000001002b7bc","text":"这小生活过的太享受了～","likes":0,"avatar":"https://sns-avata 礼盒？\n📦 香薰+蜡烛+扩香晶石，礼盒仪式感拉满\n不是单一品类凑数，一盒涵盖无火香薰、蜡烛、扩香晶石，打开那一刻就有\"这礼用了心\"的感觉。送到客户手里，摆在办公桌或家里都拿得出手。\n\n🏔️ \"河山大好\"四个字，寓意自带心意\n企业送礼讲究意头。我们在礼盒上融入多地著名景点，山河为轴，尽收万里山河气韵。\n好看又有好寓意。\n\n🌿 龙井听泉，东方茶香不踩雷\n香调走的是清雅茶韵路线，不甜腻、不冲鼻，男女通吃、老少皆宜。\n金融圈、医疗圈、地产圈的客户都能接住这个审美，不挑人是采购选品的底线。\n\n🎨 中式设计语言，摆拍即内容\n礼盒视觉走东方意境风格，拍照发朋友圈自带质感。\n客户收到后主动晒图，等于帮企业做了一次品牌露出，这笔账太划算。\n\n🏢 谁适合直接闭眼入？\n· 金融/保险行业\n· 车企/4S店\n· 医械/医药\n· 珠宝/美业\n· 互联网/传媒\n· 地产\n· 文创集合店\n\n✏️ 定制服务，采购人看这里\n✅ 礼盒LOGO烫印\n✅ 专属感谢卡定制\n✅ 手提袋/腰封定制\n✅ 一份起订\n✅ 支持批量采购方案，量大可单独沟通排期\n\n不管是50份还是500份，都能给到完整的定制落地方案。\n📩 需要定制方案的朋友，直接告诉我你的行业+数量，帮你匹配合适的规格和预算。\n\n山河从来不让人失望，好礼也是。\n\n#商务伴手礼 #企业礼品采购 #企业伴手礼 #高端商务礼 #客户答谢礼 #最忆香氛 #品牌定制礼盒 #文创礼品厂家 #文创礼品定制 #行政采购","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"697c3fd000000000210233b9","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c7f079000000001d01fbb9?xsec_token=ABTTGZ7nqwiCOTJUImwenxbXWluwyENBEgimDiUSk0yHw=&xsec_source=pc_search&source=web_search_result_notes","likes":8,"collects":4,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131246/32cfc399c4d7e24624b81f19c342225c/1040g00831u8u7l5a1m305qbs7v88cctpidrnbp8!nd_dft_wlteh_webp_3","keyword":"最忆香薰 测评","commentList":[{"user":"在下小爱～","userId":"68f618f70000000032016b71","text":"怎么拿？200份多少钱？","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tp1595u7q605q7m33rsiqrhqdlrsn0?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"最忆香氛礼品定制","userId":"697c3fd000000000210233b9","text":"发咯","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tioflhe6q6g5qbs7v88cctp39pk5go?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69bf805f000000001f005594","title":"新人博主第10天｜让crush心动的香","content":"想让crush一上车就对你心动？\n不用搞花里胡哨的，一瓶好闻的车载香就够了！\n空谷密林这瓶，就是约会绝杀神器！\n不是烂大街的街香，不是廉价工业味\n干净清冽的雨后森林香，混着淡淡的栀子花香，温柔又显品味\n\ncrush一拉开车门，好感直接拉满！\n亲测有效！上次接crush，他全程都在夸我车里味道好闻\n\n氛围感直接拉满， eMogr2/strip"},{"user":"邱少","userId":"5c81bf14000000001103ea80","text":"刚想买宋朝","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo318erhq59k6005n41nsa4fqk0pnohfto?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"bb","userId":"6399e5340000000027028004","text":"刚买完","likes":6,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31bboug3p7g005ospskq9t004qptfm4o?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"Shirly","userId":"58f9a40050c4b42f24c56880","text":"我觉得一般，不是嘉伯丽尔那款香味，更多是花果香","likes":6,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31p9st9mp2o0049du8ai00q40laiavb0?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"雨墨","userId":"671b1443000000001d022924","text":"我妈以为我在车里煮咖啡  简直是在车里开了个移动咖啡馆","likes":14,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31f9grsnk5u6g5por2h1nca949rlf5no?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"雨墨","userId":"671b1443000000001d022924","text":"就是翻页的香薰","likes":5,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31f9grsnk5u6g5por2h1nca949rlf5no?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"Hey杰夫","userId":"5f74cdaa000000000101c389","text":"网易严选的先避雷","likes":35,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6114bb365a2996000176b4c9.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"6974ff79000000000a02c19b","title":"狠狠避雷这家店，这质量难怪要倒","content":"狠狠避雷这家的香水了\n品控差到让人发指，黑白全凭客服一张鸭子嘴\n怎么会有这种出问题全凭狡辩，品控如此差的香水店，真的是第一次见，大牌平价香买了那么多，客服和质量真的是让人发指。\n去年1月底60胡萝卜入的2ml16瓶的人格香小样，这个价格在国产香水作坊里面的价格也不算低了，到手后就看了一眼然后就平平整整的放柜子里没动过，今年收东西的时候翻出来看了一眼，人傻了，每瓶大约都是不到0.5ml的容量。\nP2,拍照给客服，客服第一句话就是，这是赠送的，所以少，你自己也知道少的不合理，问题这不是赠品，是实实在在的出过钱的，未用过未开封的。\np3和p4客服就开始了疯狂的狡辩说自己材料工艺特殊，所以挥发是正常现象。what⁉️谁家香水不会挥发，谁家没酒精？\np5.16瓶香水的现状和其他的香水小样的对比图。\np6. 随便几瓶拍照，这些香水只放了不到一年时间（当时春节2月多发的货）就已经开始出现分层，絮状沉淀，等等奇奇怪怪的现象。更不用说直接人间蒸发的3/4的香水量。\np7.购买的规格很明确。\np8. 保质期还2年，根本等不到两年。\n香水的保存情况我就以我手上有的小单位香水来做对比，这家是有多烂，还死鸭子嘴硬不承认\np9.我手上现存最久的一瓶香水，保存时间可能近30年了，是爸爸送给妈妈的礼物，当时的迪士尼套装中的一瓶，虽然用的不多但是漫长岁月，多多少少用过一些，原装7ml现在的余量。\np10.国产的，进口的各种不同品牌，买的，送的小样版本，每一瓶都存放时间都在5年以上，左边2支是1ml的。右边那只2ml，并且还是用过几次的余量，是20年众筹的时候入的祖国产鹅梨帐中香，瓶子和产区都非常具有同质性，可以看出对比差异。\np11.老板非要说自己工艺独特，所以特别能挥发，p11是老板自家的10ml小容量包装同样放置一年后的情况。都是你家的吧，工艺一致了吧，为啥不挥发了？\np12.最后，非要让我再来打脸一次，我给你看我买的出了问题了，你给我说这是小样，小样是试香的，只有0.5ml，这张图才是店铺真正的小样的样子，左手边的第一只才是当时收到的小样，收到的时候我都震惊了，不想送可以不送，没有赠品不会有坏印象，但是赠品送成这样是绝对的坏印象，我一度以为这是个空瓶子，如果不是还有标签的话，里面是没啥液体的，就喷管里面有一点点间断的疑似液体在里面，实际上是这种小瓶子，别说一泵了，是一点都喷不出来。说难听点，你去任何一家几大千一瓶的香水店试香，柜姐都还你想闻的味道给你喷2-3泵给你。\n#再也不会去第二次的店","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"63620ca3000000001f01f110","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6974ff79000000000a02c19b?xsec_token=AB-C1H6-CCZriwrTVZp_bmrvDk1Jcjo84Wr9l0-XgDyCM=&xsec_source=pc_search&source=web_search_result_notes","likes":163,"collects":34,"comments_count":179,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131247/40b9066c3d5afa01fc086066762f1245/1040g00831rnudnmg20305or21ihnrs8g0f9rs4o!nd_dft_wgth_webp_3","keyword":"最忆香薰 测评","commentList":[{"user":"火堆边放羊","userId":"5c0149a30000000007017847","text":"嗯嗯…我没买过她家，第一次知道她家就是要闭店的消息，看评论区好多都在说很好闻很喜欢，还有写的小作文，给我看上头了，下单了三瓶今天刚到货都不喜欢，现在在思考要不要退货，因为她家没有给试香，我怕退货会说使用过的不能退，但是这三个香我真的都不喜欢","likes":6,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31u7nrl6q2i6g4bun7l4q6u272j58msg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"不务正业的容若🍀","userId":"63620ca3000000001f01f110","text":"我也是小作文看上头买的，还买了好几瓶不喜欢就退吧，只要你不是恶意用了好多那种一般也不会影响别人","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/63620ca3000000001f01f110.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"叶沐雪在摸鱼","userId":"5ab3cd884eacab3de68a8f6d","text":"完了 咋不早点让我刷到 我感觉我就是大冤种","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5e8835a12002720001f84078.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"不务正业的容若🍀","userId":"63620ca3000000001f01f110","text :0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131250/3317a1162107bfd1c0ff3fcde9fe2e56/1040g00831usqh1dq1u105ost58lpgutuckkvseg!nd_dft_wlteh_webp_3","keyword":"最忆香薰 香薰蜡烛","commentList":[]},{"id":"69db4bab000000001a0341cd","title":"最忆葫芦香薰蜡烛，非遗传承，手捏瓷花","content":"香薰蜡烛疗愈｜藏在烛光里的东方治愈美学\n🕯️\n当你在黄昏点亮一支柑橘香薰，\n温暖你的不仅是烛光，\n还有李清照「东篱把酒黄昏后」的温婉；\n当独处时燃一支木质香薰，\n萦绕的不只是暖意，\n更是王维「独坐幽篁里」的悠然。\n——\n香薰蜡烛的浪漫正如跳动的烛火：\n微光袅袅，却承载着现代人最渴望的治愈与温柔。\n——\n🕯️\n「何为香薰蜡烛」\n香薰蜡烛是由天然蜡质（大豆蜡、蜂蜡、椰子蜡）\n搭配植物精油制成的香氛载体，\n摒弃化学香精，还原纯粹自然香气。\n使用时点燃烛芯，暖光弥散，香气缓缓蔓延，\n既能点亮空间，又能抚平内心的焦躁与疲惫。\n——\n🕯️\n「1秒营造治愈氛围感」\n不用繁琐步骤，点燃一支香薰蜡烛，\n客厅、书房、浴室立刻变身治愈角落。\n木质香：沉静心绪，适合独处冥想时用\n花香调：温柔舒缓，闺蜜小聚氛围感拉满\n柑橘调：清新解压，工作日午后驱散倦意\n——\n科学验证功效:\n舒缓情绪：植物精油能调节神经，缓解焦虑抑郁\n助眠安神：薰衣草、雪松类香气可舒缓脑神经，改善失眠\n净化异味：天然香氛中和空气异味，替代化学清新剂\n营造松弛感：暖光+香气双治愈，快速缓解精神内耗\n——\n🕯️\n「打工人的心灵避难所」\n仪式感：点烛、静待、闻香，3分钟逃离生活琐碎；\n氛围拉满：冬夜点一支「雪境松林」，仿佛置身静谧山林；\n生活美学：小众香调+高颜值杯体，既是香氛也是家居软装。\n——\n🕯️\n「如何选择香薰蜡烛」\n新手入门：薰衣草（安神助眠）、柑橘白茶（清新百搭）、木质雪松（沉稳治愈）\n进阶甄选：白桃乌龙（清甜果香）、檀木沉香（东方禅意）、雨后青苔（自然清冷）\n避坑指南：优先选天然大豆蜡，拒绝石蜡刺鼻异味\n——\n使用场景:\n清晨：柑橘葡萄柚，唤醒活力开启美好一天；\n夜晚：檀木+薰衣草，放松身心一夜好眠；\n雨天：茉莉+白茶，宅家独享慵懒慢时光\n——\n🕯️\n古人以香伴晨昏，今人以烛慰人心，\n一盏烛火，一缕清香，\n抛开外界的喧嚣与压力，\n在方寸之间，寻得内心的安宁与自在。\n这种慢下来的生活仪式感，\n便是香薰蜡烛带给我们，\n最平凡也最珍贵的治愈力量。\n——\n#治愈生活 #香薰蜡烛 #生活仪式感 #家居香薰 #情绪价值 #小众香薰 #打工人治愈 #生活美学 #安神助眠 #天然香薰","type":"normal","author":"最忆伴手礼定制01-30","authorId":"5f1fc63e0000000001003267","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31rkok1ek2g5g5q8dg96cilparvn7440?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69db4bab000000001a0341cd?xsec_token=AB5N_GvVmvyEbq-Xx7PIzKqzR6fbBQrtZO5rulLbJpbFo=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131250/d6511be154532311e4c3839f28ae2978/1040g2sg31urr6hq3igjg5novoov08cj7hvc1u70!nd_dft_wlteh_webp_3","keyword":"最忆香薰 香薰蜡烛","commentList":[]},{"id":"697c2448000000000903a4d5","title":"朋友是十个勤天粉丝，送这个她会喜欢吗？","con eyword":"最忆香薰 香薰蜡烛","commentList":[{"user":"momo","userId":"666c35450000000003030de5","text":"这家的这家的香薰精油我买了桂花味的，一闻一股汽车香薰味道差点吐了","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31rmphin42g6g5pjc6l2gu3f5porkg9o?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"我爱点点！","userId":"5cb9913400000000170245c1","text":"看来普遍不好","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo3164ck3bcgu605n5pi4q5she17ap0seo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"还好","userId":"659ab0f1000000001f011346","text":"有什么助眠的香薰吗？推荐一下","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/645b7efe1fc3de4c930effac.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69b6840c00000000220281ba","title":"muji香薰蜡烛，在店里闻了10分钟…","content":"总结得出，muji还是挺会做香薰的～\n▪️白檀：个人感觉它hin高级，花香和木质的中和，闻久了不会腻的～\n▪️茉莉花：非常明显的茉莉香调，全盘花香，很纯粹！好闻的\n▪️葡萄柚：它有种柚子的清新感，整体香调还蛮浓郁的。\n▪️罗勒：据说是柠檬薰衣草交织，这倒是没体味出来，不过确实像香皂味，但我喜欢hh\n▪️秋梨：呼声很高，甜甜的水果，小女生会爱得\n▪️桧木：这适合那种独爱木质的，比较浓郁的木头味，我闻不来\n▪️百香果：酸甜的水果清香明显，倒不像闻香薰，好像吃水果糖的感觉\n▪️鼠尾草：花草中和一起的味道，它是毫无甜味的，酸而清新的感觉\n▪️栀子花：其实我不知道真实的栀子花啥味，没有茉莉那个浓郁的花香调，有它独有的花香\n▪️雪松：它也是我闻不来系列，整体是比较浓郁的，可能是豆蔻滴，感觉不怎么大众\n.\n⚠️这香薰用融蜡灯更出味～以前闻到个人感受哈，可能是千人千鼻\n#muji香薰#香氛蜡烛 #香氛 #香薰蜡烛 #无火香薰推荐 #春日香氛 #muji必买 #muji新品#无印良品","type":"normal","author":"最忆伴手礼定制01-30","authorId":"5b821612c48a010001acbfe6","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31rkok1ek2g5g5q8dg96cilparvn7440?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69b6840c00000000220281ba?xsec_token=ABDxTRYr3qRqhbA5q0f7q_WSdB1QaYRoaG_0xRY7i81qc=&xsec_source=pc_search&source=web_search_result_notes","likes":911,"collects":402,"comments_count":145,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131250/77004c70ba527d43a2862f901493da40/notes_pre_post/1040g3k831tntnfven2904ak2ttb15fv6p62s3p0!nd_dft_wlteh_webp_3","keyword":"最忆香薰 香薰蜡烛","commentList":[{"user":"issac's mm","userId":"5c16eaac0000000006000073","text":"我就喜欢秋梨，但是葡萄 2/strip"},{"user":"77","userId":"660ac755000000000b00f6ae","text":"请问这个是融腊灯吗 有链接不","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo318uoo998ju005pgaotaiptlerrg79no?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69db594e000000001a034a8c","title":"香薰蜡烛｜梅森马吉拉-春日公园","content":"如果你是白花爱好者 可以看下去\n如果不是 那可以点退出了\n\n春日公园的意境很美妙\n公园代表着闲适 放松 愉悦\n春日到来仿佛一切都有希望\n树上开着很多花\n这只蜡烛就非常写意\n不绿 只有芬芳的白花香\n\n我对这只大致挺满意的\n就是不知道为什么会有一点粉感\n稍微消解了春日的感觉\n听说同名香水和蜡烛停产了\n但作为用完了一整支蜡烛的我\n还是稍微觉得有点遗憾的\n（不过烧完的蜡烛杯是真的很黑……）\n在木质香大行其道\n白花 脂粉 被污名化为“老bao味”“风尘味”的时代\n黯然退场也是正常不过的\n没有闻过同名香水 马吉拉香水经常被诟病为化工\n我还是比较能理解\n但在我心里这只蜡烛可以到80分的中上水平\n#蜡烛 #香薰蜡烛 #梅森马吉拉 #氛围感蜡烛 #香薰蜡烛推荐 #香薰 #家居香氛 #小众香薰","type":"normal","author":"最忆伴手礼定制01-30","authorId":"5adeff3e4eacab1e3055f3db","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31rkok1ek2g5g5q8dg96cilparvn7440?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69db594e000000001a034a8c?xsec_token=AB5N_GvVmvyEbq-Xx7PIzKqzWMpjLwSK7c8mWX-HjiLwE=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131250/f0f773f05a65b7c1e1d0c743e4c1704d/notes_pre_post/1040g3k031ursm933ii004a4pg5vjtsurjh6ioho!nd_dft_wlteh_webp_3","keyword":"最忆香薰 香薰蜡烛","commentList":[]},{"id":"684ac81600000000220361c0","title":"入职一家香薰公司说要做品牌…","content":"入职前老板做的不是这个行业，后来说要做香薰！拦都拦不住，第一批货做好了一卖一个不吱声。\n\n[坏笑R]最糟糕的选品！！！\n为什么？你们来说吧……\n#我家的小众香氛 #香薰礼盒 #创业者 #创业 #选品","type":"normal","author":"森歮昨天 20:12","authorId":"6847f41a000000001b019e5d","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5c36cf8d000000000703bf77.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/684ac81600000000220361c0?xsec_token=AB4iIaTUMQPqNFnJqfgTGSpRMZink9_9urvdlyqBhUni0=&xsec_source=pc_search&source=web_search_result_notes","likes":85,"collects":48,"comments_count":78,"shares":0,"co ","text":"我的每天都有出单哎，砍价的一律不卖，墨迹的也不卖","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31nejao736g005nqb4lu0bu36jrhvtao?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"小红薯吃瓜选手","userId":"6847f41a000000001b019e5d","text":"那你们还不错诶，我们就...","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/645b6abf2e368555521befcc.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"6967ac7b000000000903aa42","title":"今年在名创买的有香味的东西","content":"一直很想买一款竹子味的香水或者香薰，但一直没遇到特别喜欢的，今天在名创逛到这款，闻了之后很喜欢，有股草本的清香，而且它这个瓶子装着竹叶我也很喜欢。\n\n万达的名创里每次去的时候，风之青提试用品都被喷完了，所以一直不知道啥味道，新朝阳新开的这家有，喷了一下，凑近闻感觉依稀有股酒精味，但酒精瞬间挥发后留下的就是青提味，闻着有点甜丝丝的，而且留香时间很久。\n\n犹豫了一下点外卖买了这两个hhh便宜了几块钱。\n\n因为有猫，所以晚上到家也只敢放在卫生间，(´-ω-`)感觉卫生间格调都上去了。\n\n红苹果系列第一次闻到时候被惊艳到了所以买了一堆这个系列的，闻久了感觉没有刚开始那么惊艳了。\n红苹果香水的瓶子很精致，香味我也喜欢，早晨起来会喷一喷，不过就是留香时间短，感觉这个系列的产品留香时间都短。\n红苹果香体喷雾最开始喷出来感觉只有酒精味，不太喜欢，但后面发现喷衣服上的话，衣服会留下一种苹果皮的清香，所以感觉它可能更适合喷在衣服而不是身上。\nhello kitty那款是一种苹果气泡水的味道，那种气泡水的感觉正好中和了甜腻感。\n\n葡萄味的漱口水和青提味的漱口水都很好闻，总是习惯买几条揣包里。\n\n买了史努比这个旅行装的牙膏牙杯，本来就为了放包里，出去吃完饭啥的可以随时刷一刷，结果牙膏味道意外的很喜欢，名字叫海洋薄荷，感觉是一个很清爽又带一点点甜的味道。\n\n不过味道这个东西千人千面，还是要去线下闻一闻喷一喷，个人感受仅供参考。#名创优品 #无火香薰推荐 #好闻的味道 #香香好物","type":"normal","author":"森歮昨天 20:12","authorId":"5bfd564151783a6098d44024","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5c36cf8d000000000703bf77.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6967ac7b000000000903aa42?xsec_token=AB4vMSHdoWCwps09sq8f-MlO-c-b-euCYUQNIAGFijKw0=&xsec_source=pc_search&source=web_search_result_notes","likes":11,"collects":1,"comments_count":3,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131251/71dea5288afd4ac4cdbe59ad716e6372/notes_pre_post/1040g3k031ratpmio6u0g4bueonb42g1430ob3oo!nd_dft_wlteh_webp_3","keyword":"最忆香薰 无火香薰","commentList":[{"user":"qq","userId":"66d81f54000000000b033972","text":"我也想买这个香薰，但是家里也有猫，博主你家猫闻了没问题吧","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/66d82454b323d2ff53c1edc4.jpg?imageView2/2/w/120/format/jpg 5f4360b50000000001004e74","text":"荔枝柯林斯对不对！我也好喜欢","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6465d2e3e961003c14c8e7e9.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"开云小国王","userId":"5bacd5802d669500010e4619","text":"这两个味道无敌[棒R]","likes":3,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo30tr6kd3j4u4g49vopjeo9td2ph1j7f8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"开云小国王","userId":"5bacd5802d669500010e4619","text":"现在线上国庆搞活动，满380减100，超级划算，之前买贵了","likes":3,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo30tr6kd3j4u4g49vopjeo9td2ph1j7f8?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69d7c1b200000000220274f9","title":"闻多了头晕？先看这个","content":"独居第二年，我靠香薰让18㎡有了\"家的味道\"。\n然后我开始闻到头晕——那时才意识到，用错了。\n\n不是香薰本身的问题，是我买错了东西。从那之后研究了很久，翻了不少品牌的成分，也用坏了一堆。今天把踩过的坑整理出来，干货向，建议收藏备用。🗂️\n\n---\n❌ 坑1：看见\"香薰\"两个字就买，不看成分\n\n超市里常见那种几十块的\"香薰\"，大概率是合成香精兑酒精。味道进屋就冲、容易刺鼻，密闭空间用一小时，头真的会昏。\n\n看成分表，找\"精油\"\"essential oil\"；香精类不是不能用，但要开窗通风，别长时间密闭。\n\n---\n❌ 坑2：越便宜的扩香棒，挥发越快\n\n竹签扩香棒吸附力差，便宜款可能一周就挥发完了。我现在换成藤条棒，挥发均匀，一瓶能用两个月。\n\n另外扩香棒不是放得越多越香——3-4根足够了，放太多反而呛。\n\n---\n❌ 坑3：蜡烛第一次点，没燃到\"记忆圈\"就灭\n\n蜡烛有记忆效应，第一次没烧到边缘就吹灭，之后每次都只烧中间，慢慢凹下去变成\"隧道状\"，浪费一大圈蜡。\n\n第一次点，至少留出2小时，让表面均匀融化一圈再灭。别心疼那点时间，不然更心疼蜡烛。🕯️\n\n---\n❌ 坑4：小空间点高浓度蜡烛\n\n18㎡以下的房间，蜡烛容量选130g以内就够了。我试过在卧室点了350g的，味道太饱和，反而闷。\n\n浓度不等于好闻，空间要呼吸。\n\n---\n目前在用的平价选择：\n\n扩香液：aromame（79元左右，白茶木兰那款不腻）\n蜡烛：oarto 小号款，浓淡适中，小窝用刚好。\n两款都是天然精油基底，我用下来没有头晕感。当然每个人对香味耐受度不同，这只是我的真实感受，供参考。\n\n---\n你们平时买香薰会看成分表吗？或者有没有也踩过这几个坑的——评论区说一下，我回复每条 👇\n\n#香薰避坑  #无火香薰推荐  #香薰蜡烛推荐  #平价香薰  #独居好物  #出租屋好物  #氛围感家居  #一个人的仪式感  #rentfree租房改造   #好物分享","type":"normal","author":"森歮昨天 20:12","authorId":"61a0f8360000000010008e29","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5c36cf8d000000000703bf77.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d7c1b200000000220274f9?xsec_token=ABljk4CZBog8kb0JB0xNVVd0GdduICSuD6uPJG31rEnrQ=&xsec_source=pc_search&source=web_search_r pg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/68e0ce7a000000000301a194?xsec_token=AB5x5SqdBixei7sbS_6NpngJq9bQkyRbmT3QUJgvPBzMU=&xsec_source=pc_search&source=web_search_result_notes","likes":4,"collects":1,"comments_count":17,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131252/a9452ceeab07a950051a9a25d0305317/1040g2sg31n76vrfrmme048g1dnsjotccl7cmtko!nd_dft_wlteh_webp_3","keyword":"最忆香薰 无火香薰","commentList":[{"user":"走走停停","userId":"5c7cdd62000000001103efb6","text":"护手霜行吗","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31rfh1pqfga5g5n3srlh4frtmt15nfmo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"JESSICA","userId":"575bf93c50c4b44a5b13758c","text":"也可以呀","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tlnkc2f720g48g1dnsjotccrfp2068?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"DuoDuo✨","userId":"5f2ff8af00000000010036dd","text":"香港有！","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31r58l2e6ng005npfv2ng8dmt3fdpjao?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"JESSICA","userId":"575bf93c50c4b44a5b13758c","text":"姐妹你是我亲姐妹什么牌子的？","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tlnkc2f720g48g1dnsjotccrfp2068?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69d86d340000000021039022","title":"名创优品车载熏香使用技巧","content":"使用问题：听说这款熏香挂着容易掉，液体会腐蚀操作台以及可能味道会很腻。\n解决方案：\n1⃣.到手后熏香包装有个试闻的盖子，打开之后里面有个小海绵，取出来直接塞到瓶子里，防止液体直接倒出来，倒置之后只会慢慢浸出来，如图2。\n2⃣.从盖子上抽掉绳子，为了保证正常挥发木头塞顶部用剪刀打个小孔，方便透气，木头顶非常薄，非常方便，如图3。\n3⃣.最后做个简单装饰，用布包一下防止透镜问题，可以摆操控台上，或者找个小袋子挂着也可以。如图4。\n使用效果：开门有股淡淡的茶香，不浓。一两分钟鼻子适应就感觉没啥味道了，整体还行。#车载香薰 #名创优品车载香薰","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"6367ca7d000000001f01e456","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d86d340000000021039022?xsec_token=ABLF0TiCNZ_MrMvEuypngFopY9EFlR6GbwaSGVZAcssGI=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131258/f6eb0876bd431b92d41882d8a9d228a3/1040g00831up14i393q5g5or7p9unrp2mqs187co!nd_dft_wlteh_webp_3","keyword":"最忆香薰","commentList":[]},{"id":"69c4e865000000001a028a37","title":"🎁凤凰组合礼盒，大胆说出你想要的周边！","content":"🎯 参与方式:\n在🍎L区大胆写下你的心愿👇\n① 香氛心愿：你希望是什么形式 + 什么味道？\n举个🌰：车载香氛 + 清爽柑橘调～\n（形式参考：香氛蜡烛 / 车载香氛 / 无火香薰 / 香氛喷雾 / 固体香膏 / 香薰挂卡）\n（味道参考：某种花，某种果，某种香调，某种感觉 等）\n② 周边心愿：\n你希望有什么赠品？\n举个🌰：冰箱贴/ 人形立牌 / 徽章套装等 ——只要你敢想，我们就敢听！ ✨\n\n🎁 好运掉落\n🏆 心愿锦鲤（1人）\n评选方式：点👍70%+💬创意30%\n凤凰组合😘明信片有两个人名字\n注：如发现刷👍行为（互👍群、买👍、异常增长），取消资格\n\n🎲 幸运锦鲤（2人）\n评选方式：④莲-随机zhua，\n凤凰组合限定笔记本 一份！\n敢写就有机会，冲就完事了！ 🚀\n\n📅 活动时间 即日起 — 4月8日10:00\n\n📌 所有心愿我们都会认真看，最终礼盒将结合大家的灵感、工艺及供应链实际情况进行开发，心愿不一定全部实现，但我们会努力让最受欢迎的愿望成真✨\n\n#凤凰组合  #最忆香氛  #羽毛球 #凤凰组合代言   #羽毛球周边  #运动礼物  #小红书抽奖 #最忆香薰","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"692ade4c0000000037002786","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c4e865000000001a028a37?xsec_token=ABxqGUTY4EnV5fhdUkFkyO6IC0OdKUAVG5Nun_8GgDuEo=&xsec_source=pc_search&source=web_search_result_notes","likes":88,"collects":27,"comments_count":53,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131259/8c942d6f889dc8d09f5266c61534c888/spectrum/1040g0k031u5uuqtbhm005q9arp6do9s6gequ4o8!nd_dft_wlteh_webp_3","keyword":"最忆香薰 推荐","commentList":[{"user":"最忆香氛小助理（宠粉版）","userId":"692ade4c0000000037002786","text":"恭喜粉丝 @Zz_很欢喜  在“共创周边”活动中获得代言人亲签明信片一份；\n恭喜粉丝 @CD 、@Fuka 各获得周边限定笔记本一份。","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31qdt4aq372605q9arp6do9s6fareaog?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"骑驴老师","userId":"63bba4890000000027029560","text":"香氛喷雾柑橘调，可以用在办公室。赠品的话想要冰箱贴和徽章套装，特别是穿漂亮衣服的","likes":67,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31bqst7ks0u6g5otrki4pt5b0j2foh00?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"骑驴老师","userId":"63bba4890000000027029560","text":"周边其实想要亚克力卡+卡套，可以挂包","likes":32,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31bqst7ks0u6g5otrki4pt5b0j2foh00?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"小运河","userId":"64d9917b00000000010118e4","text":"1、我希望有柑橘的水果味和雪松木质香，柑橘可以清新温和一点，雪松则冷冽还原真实的木香。2、更希望是扩香石或者无火香薰等，蜡烛也可以接受，但是要涉及点燃和熄灭感觉不太忍心破坏，车载香薰对于晕车人士等还是不够友好特别是有时候车自身发动的机油味和其混为一谈，喷雾留香又不够久，护手霜每个人习惯也不太一样3、周边的话，立牌徽章冰箱贴通通吻上来吧，作为冰箱贴控狠狠投上一票，但是只要是最忆出的凤凰周边我都喜欢，其实可以向更实用的方向靠近，挂件啥的都行","likes":9,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pa76fse2urg5p6pi5tga6745j7e018?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"波兰来客","userId":"6030fdf800000000010065a8","text":"我也喜欢这个味道！","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31so3ts0flkrg5o1gvns08pd83if5430?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"Zz_很欢喜","userId":"5ba251f10e212f00013c7522","text":"车载香氛：清爽柑橘调（柑橘自带干净轻快的气息，不黏腻也不厚重）周边心愿：金属徽章+冰箱贴","likes":108,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tde4uodm8004b2jfu8v2t92blt1450?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"夜落青山","userId":"651a8a20000000002402f2eb","text":"想要柑橘味和雪松味的挂卡和喷雾，像凤凰的味道，周边冰箱贴和徽章套装，感觉都不错[超喜欢R][超喜欢R]","likes":6,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo317fiedcmk46g5p8qh8g95snbbdan538?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"夜落青山","userId":"651a8a20000000002402f2eb","text":"冰箱贴或钥匙扣可以做成那种mini香薰瓶加凤凰","likes":3,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo317fiedcmk46g5p8qh8g95snbbdan538?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"凤凰的摩式硬度","userId":"60f991f9000000000101d96d","text":"最忆你已经把答案贴出来我照抄就行了：1️⃣车载香薰➕清爽柑橘调，感觉开车会又清新又精神，而且有姐弟俩在身边的感觉；2️⃣：冰箱贴、人形立牌、徽章套件都很好，最主要是都想要双人的，凤凰在一起就是最棒的！","likes":12,"avatar":"https://sns-avatar-qc.xhscdn.com/av ":"69bcd49500000000230161c7","title":"二刷印象西湖！这才是杭州春天的浪漫情书💌","content":"自从去年和朋友看了印象西湖一直念念不忘，这次趁着春暖花开🌸，外地闺蜜👭来杭州春游，直接被我拉去二刷！\n\n原本以为看过一次会有心理准备，没想到2026年全新升级的版本，还是让人很心动💓。那种刻在国人骨子里的浪漫，真的只有在春天的西湖夜色🌃里才能读懂。\n\n🌟演出亮点\n整场演出以西湖的天然山水为幕布，当灯光亮起，雷峰塔在远方若隐若现，那种虚实结合的感觉，简直是把整个江南的魂都勾出来了🤩。\n\n✅ 《采茶舞曲》：婀娜多姿的演员们在湖面上翩然起舞，仿佛春茶仙子踏水而来，仙气飘飘，是专属于杭州的春日序曲，这个季节来看真的太应景了。\n✅ 《梁祝》：当熟悉的旋律响起，湖面上光影流转，经典的“化蝶”桥段在水雾中上演，背景还是变化的扇面，那一刻的美，是让人想流泪的感动。\n✅ 《天鹅湖》：当西方芭蕾跳进中式西湖，这种中西合璧的创意真的太妙了！\n✅《梦想天堂》：当小女孩👧在水面上用童声唱出那句“我们的家，住在天堂，碧绿的湖水荡漾着美丽的梦想。”童年的记忆真的瞬间就回来了～\n\n🤫 惊喜彩蛋\n脖戴式香氛播放器 📢\n进场时领取佩戴好，会随着节目自动变换味道！唱到《茉莉花》时，空气中真的弥漫着清甜的茉莉花香🌿；当画面转到湖面烟波时，闻到的又是那种雨后空山的清新感。\n\n🌟视觉+听觉+嗅觉的三重沉浸，那种代入感真的太治愈了！\n\n🌙 演出信息\n📍地点：北山街·曲院风荷（岳王庙正对面）\n🕒时间：每晚19:40起（约55分钟，3月20日盛大开演 ）\n\n✨记得带上重要的人来看现场观看，这大概就是古诗里说的那句“江南无所有，聊赠一枝春”吧🌷。\n\n#印象西湖 #最忆是杭州 #杭州旅行 #杭州夜游 #杭州周末去哪儿 #西湖美景 #我的私藏宝藏景点 #春日漫游计划 #浪漫生活的记录者#杭州夜游攻略\n@本地薯 @生活薯 @热点薯 @走走薯@印象西湖","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"59bf834f44363b2313fc054a","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69bcd49500000000230161c7?xsec_token=ABImReskLVZPZ88ZtSSf1pJsgyje35HZ5jME3POehU2ew=&xsec_source=pc_search&source=web_search_result_notes","likes":82,"collects":53,"comments_count":19,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131307/bb9915f126c76599ca31026c27ba01cf/notes_pre_post/1040g3k831tv9fd5i727049q7q31ku1aam7btpr0!nd_dft_wlteh_webp_3","keyword":"最忆香氛","commentList":[{"user":"彩虹姐姐乐活杭州","userId":"59bf834f44363b2313fc054a","text":"📝 二刷后的Tips：\n1️⃣ 门票🎫，可以线上官方渠道提前买！现在支持在线选座，当然要挑一个视野好的位置。直接扫码入园，不用排队浪费时间 。\n2️⃣ 装备：虽然杭州春天夜晚还是很温柔的，但湖边坐着不动建议带个小外套。\n3️⃣ 交通：就在北山街，建议大家打车或公交到“岳庙”站，走走苏堤，吹吹晚风，感受杭州夜晚的美好😊。","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31kq0a62f2o7049q7q31ku1aag4i3fm8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"有生电台","userId":"60d8811400000000010058eb","text":"好美","likes":0,"avatar":"https://sns- 同的香气，仿佛将观众带入其中……\n#春分 #雨中西湖可以有多美 #正是江南好风景 #西湖美景如画 #江南春色处处好","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"5b3ecf66e8ac2b1f7c15907a","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69bdef63000000002102d497?xsec_token=ABa8NoqgBhEJW0PaLMsuv7pQhDqdGSfKur9wxSkvAMhLc=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":1,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131307/24ae1afbf55c11aea6396e77850638ad/1040g00831tv5ei17ne104a6sut7md43qmtm1v78!nd_dft_wgth_webp_3","keyword":"最忆香氛","commentList":[]},{"id":"6969ad5a000000002200a65e","title":"最忆：东方人的日常为什么不能有自己的香气","content":"四年天台晚风里的一场香聚，居然戳破了香圈的 “皇帝新衣”。\n圈外朋友一句 “国外香是好，但太贵”，让爱香人们突然哑火 ——\n\n香的传统明明起于东方，怎么市场王冠、时尚话语权，偏要拱手让给重洋之外的溢价泡沫？\n后来才知道：那些动辄上千的 “高端香”，和国内代工厂流水线上的香，可能出自同一罐原料。\n换个 logo、披件 “洋外衣”，就成了要为溢价买单的 “奢✨侈品”。\n\n“为什么东方人的日常，不能有东方自己的香气？”\n于是有了「最忆」——\n名字取白居易 “江南好，风景旧曾谙” 的怀想，从一开始就不做 “高高在上的香”。\n\n不复刻浓沉的古香，不困在陈旧的 “东方符号” 里\n而是把唐宋的意境、江南园林的禅静、茶竹桂檀的意象，拆成当代人能接住的情绪\n是晚风里的松弛，是案头的妥帖，是属于东方人的 “悦己香气”。\n没有虚高的溢价，只有触手可及的、长在文化根脉里的嗅觉记忆。\n#东方香 #香氛  #国货品牌  #最忆  #最忆车载香薰  #最忆香氛  #最忆香薰","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"695268ab0000000037030117","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6969ad5a000000002200a65e?xsec_token=ABs4b0RBAJ2W6Fmt90zZDqsz6iA-gJcUDTxIJIVEGFM-A=&xsec_source=pc_search&source=web_search_result_notes","likes":4,"collects":1,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131307/b8ab94049a284848ab81df8b75206201/1040g00831rcbudsr7o3g5qaid2ltu08nhq4kap0!nd_dft_wlteh_webp_3","keyword":"最忆香氛","commentList":[]},{"id":"69db9afc0000000023026b74","title":"备婚倒计时111天｜超低成本互动环节准备","content":"150r搞定60人份香薰DIY\n\n根据宴会厅风格旋选择了绿色和棕色的香薰瓶，还有配套干的颜色的扩香石准备了60人份，成本才一张多！！\n\n为了让来参加的友友们更有互动感，一直想弄点互动环节，参考了之前参加婚礼的香包什么的，感觉香薰DIY更优雅～嘻嘻希望我的朋友们都能连吃带拿玩的开心🥳\n\n#备婚攻略 #香薰diy #婚礼互动区 #婚礼前的准备 #婚礼倒计时 #备婚日常 #备婚好物大赏","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"60f04e500000000001000c52","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69db9afc0000000023026b74?xsec_token=AB5N_GvVmvyEbq-Xx7PIzKq0kGHlXAWzuDH3JLY8sLiCc=&xsec_source=pc_search&source=web_search_result_notes","likes":16,"collects":18,"comments_count":4,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131307/92545fbc0f2a1babc615d884c74f2c5b/notes_pre_post/1040g3k831us4b00lhmb05o7g9p80832io64pebo!nd_dft_wlteh_webp_3","keyword":"最忆香氛","commentList":[{"user":"真满汁～你小汁","userId":"5aa94c9d4eacab602372b52d","text":"喜欢","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31hkqjp26jo004a3eft69rd9dsptsq88?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"邪恶橙堡（备婚ing）","userId":"60f04e500000000001000c52","text":"创意参考@抓抓米","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uggkadr2s005o7g9p80832icjmfjr0?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"抓抓米","userId":"5bbf235c38640400012f23c6","text":"太棒啦！","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31rm7gvvjim0g4bdjl6hlo8u60em10m8?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69c36a4f000000002103a90d","title":"在车里也有Lululemon店香了，好好闻。","content":"之前武商重新开业的参加开业活动得到的，最近之前别的香薰没味道了用完了，拆开了这个，在车里就闻到露露店里的味道了哈哈，旧香薰被我放到出风口去了，也是柑橘味。#车载香薰","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"5a8f0aaa11be103ffc6b5553","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c36a4f000000002103a90d?xsec_token=ABQWrf31nhO_amV6p3JpasqlrIX4AgiCIRVEIaYHk86EE=&xsec_source=pc_search&source=web_search_result_notes","likes":2,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131307/7d9bd70ca04b3ff57c54c8b3fa200f65/notes_uhdr/1040g3qo31u4gv2phiq7g4a1mfk5aklajutk6tb8!nd_dft_wlteh_webp_3","keyword":"最忆香氛","commentList":[]},{"id":"69d46efc0000000023017e8c","title":"上海气味香水展","content":"第一次参加香水展，最后一天下午去，逛了五个小时，还是有收获了\n图一：我买的，因为快收摊了，这个泰国品牌的沐浴露身体乳香包都是打折买的，香薰是漂亮小姐姐送给我的\n买了两个国内品牌的香水，法颂@法颂 的绯夜，被黑醋栗一下就吸引住了；颂境@颂境CHARM NOTES 是帅气的主理人亲自接待，买到了最后一瓶风刻檀崖，忘记拍照了～\n图二：薅羊毛的\n最后一张：我喜欢但还没下手的\n品牌太多，还有很多品牌没有逛到，人不算特别多，因为最后一天，很多品牌的小样都送完了，甚至试香卡都没有了～但是，会有品牌收摊前把样品试香打折卖，也是很划算的，下次参加的话，我应该会收获更多\n#上海气味展 #来上海品全球 #理想香气艺术生活 #如果香水有故事 #香氛艺术理想家 #法颂 #颂境 #让爱香起来 #小众香水","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"57ff57bf50c4b45919d0d1c6","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d46efc0000000023017e8c?xsec_token=ABvIecttFK4GDtaG4Gp4UwNNDlxgDK0Sf-L7zXSf0LNVw=&xsec_source=pc_search&source=web_search_result_notes","likes":5,"collects":0,"comments_count":3,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131307/f7002749c5e5844e860f4590ba73385a/notes_uhdr/1040g3qo31ul4p35viof048p3vubrvke6aau27lg!nd_dft_wlteh_webp_3","keyword":"最忆香氛","commentList":[{"user":"更隔蓬山","userId":"5f9820a2000000000100948a","text":"收摊之前去最划算 学会了","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo314q3ravf1a005nso42h0954aft2p2to?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"黄小胖Hyy","userId":"57ff57bf50c4b45919d0d1c6","text":"只是赠品小样几乎没有了，买香水的话，还是很划算的，我本来看到一个土耳其的品牌，因为商品卖完了只剩一个样品，原价2140老板卖850，因为是木质香，我就没买，现在有点后悔了所以我说下次去，我会买更多","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31r7smkp5no0g48p3vubrvke6asb2k90?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69ccd960000000002301e9fa","title":"点一支东方线香，让时间暂停一下。","content":"不是刻意的静止\n是香气铺开的这一瞬间\n轻轻兜住了喧嚣\n\n点上的这一刻\n外界的嘈杂褪去 只剩下此刻\n檀香沉静 带着古木的体温\n沉香幽幽 像旧书页里藏着的往事\n在空气里写下看不见的诗行\n\n看着烟缕缓缓上升 变幻、消散\n空气里渐渐填满温柔的木质调\n心也跟着柔软下来\n\n原来安宁这么简单——\n一柱香的时间 足够让紧绷的神经松绑\n忙碌生活里的小缝隙\n就留给这一抹东方香气吧\n\n#小众线香 #用香气触碰情绪 #沉香线香 #东方韵味 #片隅 #静下来感受 #室内香薰 #静物摄影 #治愈系 #浪漫生活记录","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"58e23b2850c4b41518f8573f","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69ccd960000000002301e9fa?xsec_token=ABHT61_jxs94O7m_eiru6zyadEBUcMFJslCM9OjjiIth0=&xsec_source=pc_search&source=web_search_result_notes","likes":93,"collects":50,"comments_count":54,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131307/7d46451d27af9651e60d012bf9ba8ce0/1040g2sg31udnn0h1iq9g49c3ketiglpvr071d50!nd_dft_wlteh_webp_3","keyword":"最忆香氛","commentList":[{"user":"南风.","userId":"5895c1795e87e756837b0df8","text":"这种是怎么拍的呢 好好看啊😻","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ulgo8qvis10493mb10ni3foqmvb74g?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"Jiajia+","userId":"58e23b2850c4b41518f8573f","text":"背景板拍的~","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31l4biua12u0049c3ketiglpvt455pqo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"琼岛香事","userId":"602cb711000000000101f603","text":"是什么味道的","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ug7hol6ia005o1cms8gbtg3nsvkllg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"Jiajia+","userId":"58e23b2850c4b41518f8573f","text":"卡片上写的这些味道哦 基本上是檀香木质调","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31l4biua12u0049c3ketiglpvt455pqo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"张上明🐷","userId":"64cb6905000000000b00514f","text":"喜欢线香， 适合独处 喝茶、冥想🧘‍♀️","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31a74j0anmu0g5p6bd42iokafj7ue750?ima ":"normal","author":"最忆香氛小助理（宠粉版）03-27","authorId":"5ab26dab4eacab15863fd125","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31qdt4aq372605q9arp6do9s6fareaog?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/68b05095000000001d010104?xsec_token=AB7606RjSwDphYhCT_-A_sqMKbTQVuChrYQ_qMxDsFta0=&xsec_source=pc_search&source=web_search_result_notes","likes":0,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-backup.xhscdn.com/202604131309/27f6574c2c7f18ed697f6b736b68fd70/notes_pre_post/1040g3k831lns1cv5ks704a3pj3mqnk95k4am1v0!nc_n_webp_mw_1","keyword":"最忆 香氛礼盒","commentList":[]},{"id":"69db97e5000000002300463b","title":"宋朝香氛","content":"避雷……什么乱七八糟的…#香氛 #香薰 #无火香薰推荐\n本来就是因为质量问题…精油杯壁有黄色物质附着…提出补发一瓶 还能拒绝…奇葩#宋朝香薰","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"654fb2d4000000000800220f","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69db97e5000000002300463b?xsec_token=AB5N_GvVmvyEbq-Xx7PIzKq4OWxcPZ1aDc77L0VASVas8=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131312/6281ad2ed363b941b3de8236cd46f06c/notes_pre_post/1040g3k031us4f4ahia305pafmba208gfcn8p898!nd_dft_wlteh_webp_3","keyword":"最忆 国风香薰","commentList":[]},{"id":"69bb4eaa0000000021038fdf","title":"「一方厢隅，灯影生香」","content":"“在小小的空间里，灯影摇曳，香气弥漫，把宋代的雅致生活美学，搬进了现代日常。”\n\n秉持着物尽其用的原则，今天翻出这个「重力无火」香薰，过年时朋友送的。查了一下它的寓意，瞬间感动，仿佛穿越古代，与古人座谈。于是，好好感受我的《资治通鉴》。氛围感就来了","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"5c5c016a00000000180273e2","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69bb4eaa0000000021038fdf?xsec_token=ABwD9zfDgWeWu16cqjSc9tpKkBOWO0tp8OMmfLnWX7p_A=&xsec_source=pc_search&source=web_search_result_notes","likes":0,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131312/113183e8bcf1b7b77cacb607afb5a820/notes_pre_post/1040g3k031tsjdlm37q0g5n2s05l64sv2eipmm7o!nd_dft_wlteh_webp_3","keyword":"最忆 国风香薰","commentList":[]},{"id":"69d38e97000000002200e041","title":"气味上海｜把东方美学，穿在身上的东方香","content":"这次气味上海春展，真的被国货东方香狠狠拿捏了✨\n越来越多的本土品牌，把中式风雅揉进香氛里，一器一香，都是刻在骨子里的东方雅致。\n🔖 戳中我的东方香清单\n▫️三祈门·月泉\n鼠尾草/玫瑰/红茶/冷杉/香柠檬调，木质茶香太高级！\n最绝的是红木榫卯结构的香盒，厚重又精致，香水更像一件艺术品，仪式感拉满。\n▫️织蔚·临安橘颂\n中国独有红橘萃取，一喷就是刚剥开的鲜橘气，清冽又鲜活！\n瓶身以中式花窗为灵感，东方人文感直接拉满，一秒穿越旧时光。\n▫️述之有味·寻游系列\n植物还原香薰，把草木光阴、橘园四季的烟火气都封进瓶里，松弛感拉满。\n试香是中式印章造型，还有可开合的香氛项链，细节控狂喜！\n▫️香故·如梦令\n以李清照爱梅为灵感，清冷梅香，把宋式意境焊在身上。\n瓶身复刻宋代插花花器造型，线香还以宋词命名（少年游/定风波），宋式美学狠狠拿捏。\n▫️齐一·竹影成双香薰蜡烛\n一对青竹造型蜡烛，相互成趣，禅意感拉满。\n清冽竹香，放在家里就是自带氛围感的东方禅意空间。\n🎋 必看两大特展\n✅ IFF宋雅香韵特展\n围绕宋词、宋画、宋瓷、宋茶做嗅觉创作，沉浸式回望宋人生活的审美风骨，宋式美学爱好者必冲！\n✅ 芬美意·香氛艺术特展「一息邸悦」\n以果香、米香、谷物香为核心，直抵情绪的治愈香。\n超爱「糯言」，红豆+枸杞+蒸汽香调，一口就回到小时候的怀旧感。\n好的东方香，从来不是简单的元素堆砌，而是把中式风雅穿在身上，让每一缕香气，都成为东方美学的延伸。\n\nps:展是个好展，可以看出香水行业兴兴向荣的繁华景象。一度人山人海。走路通道都没有。展馆闷热。现场次序混乱。希望主办方加强管理。多加派志愿者。保证安全有次序的观展。加油！\n#今日是看展人 #气味上海 #万物皆可审美积累 #香水展 #软装设计 #宋代美学  #东方香气美学  #三祈门香水  #述之有味#织慰香水  @气味上海NOTESSHANGHAI @齐一ONENESS @香故","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"5cd401d600000000120356b2","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d38e97000000002200e041?xsec_token=ABMkRFibqMuCI77Yk_GS1j1vU6-WfnIQzXriJt6Uw2Wpw=&xsec_source=pc_search&source=web_search_result_notes","likes":24,"collects":15,"comments_count":3,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131312/e67981f48ca395f57421988b34ece26d/1040g2sg31uk8qh48hmn05n6k07b4mlli0vfomog!nd_dft_wlteh_webp_3","keyword":"最忆 国风香薰","commentList":[{"user":"齐一ONENESS","userId":"6545decd000000000200f6b3","text":"感谢宝子分享呀～谢谢喜欢","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6892f362994d9400015cb81a.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"cool魔","userId":"560f76073f0f3c15adc8b4df","text":"东方美学，东方香调东方美学，东方香调","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5d9affb029c8dc00013b4f2d.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"打工小🐱","userId":"596c2fda82ec391bad607873","text":"宋式美学香水.","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t3kjb07lm0049m82fntku3jk5j51ao?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69cf39d4000000001a02f42c","title":"哦莫！收到这个礼物的幸福感拉满啦～","content":"就素介个宋朝香薰礼盒\n名字也好好听 月下赴桂玲珑杯扩香石\n扩晶石被玻璃玲珑罩着 好有氛围感\n晶石和金元宝的搭配好精致\n滴上桂花味的香薰精油 好治愈\n礼盒包装仪式感满满的 我觉得送礼物也是蛮不错滴！#高颜值礼物 #送礼指南 #小众高级礼物 #平价生日礼物 #礼物是爱意的具象化 #送给闺蜜的礼物","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"6923336600000000370299ff","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69cf39d4000000001a02f42c?xsec_token=ABrmnnOsK7oz7g8i7tY_KQi27DGyP0PEoeCVcnTU0rXr4=&xsec_source=pc_search&source=web_search_result_notes","likes":10,"collects":2,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131312/1c4a5f9169133d91799f3cc6425ab994/notes_pre_post/1040g3k831ug213pk2iag5q936djdt6fvt77b7u0!nd_dft_wlteh_webp_3","keyword":"最忆 国风香薰","commentList":[]},{"id":"68aec18a000000001d0065cb","title":"日出东方｜国风香薰｜手写","content":"#字体  ﻿ ﻿#排版   ﻿ ﻿ #手写字体  ﻿ ﻿ #手写  ﻿ ﻿#国风   ﻿ ﻿#设计   ﻿ ﻿ #每日手写  ﻿ ﻿#手写文案  ﻿ ﻿ #海报设计  ﻿ ﻿#摄影","type":"normal","author":"我在时尚圈边缘的日子03-07","authorId":"57593907bd0da5745b5265d3","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/6282461603bc2e9b2bc87296.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/68aec18a000000001d0065cb?xsec_token=AB5UHPyT3sCa_w4ctO_7MwjB1lKfovNoLG8MXrtOH6SpM=&xsec_source=pc_search&source=web_search_result_notes","likes":140,"collects":117,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604131313/2c73d0d71e156682ac191a5797d2528d/spectrum/1040g34o31lmb90mnks3g48fn0psgepej71hk68g!nd_dft_wlteh_webp_3","keyword":"最忆 国风香薰","commentList":[{"user":"Schiele","userId":"5e97cef00000000001005b58","text":"好看 好有才华","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/62c8eb21c4a391b26c7eaadb.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"Boring-mu","userId":"57593907bd0da5745b5265d3","text":"谢谢","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31kvjqoi5j40048fn0psgepej3465ff0?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]}]</script>
<script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');

    // 作者链接
    const authorLink=n.authorId?'https://www.xiaohongshu.com/user/profile/'+n.authorId:'#';
    const authorHtml='<div class="card-author">@<a href="'+authorLink+'" target="_blank">'+esc(n.author)+'</a></div>';

    // 评论（带作者链接）
    const cms=(n.commentList||[]).slice(0,5).map(c=>{
      const cLink=c.userId?'https://www.xiaohongshu.com/user/profile/'+c.userId:'#';
      return '<div class="comment-item"><span class="user"><a href="'+cLink+'" target="_blank" style="color:#667eea;text-decoration:none">'+esc(c.user)+'</a></span><span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    }).join('');

    return '<div class="card"><div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div>'+authorHtml+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
