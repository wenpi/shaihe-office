"liked_count": "87", "collected_count": "162", "comment_count": "25", "share_count": "59", "nickname": "旺旺大礼包组合", "user_id": "5bc2c041b891c3000184155c", "note_url": "https://www.xiaohongshu.com/explore/697feded000000000a02ece9?xsec_token=AB-oTAzOzNPLP0f6fMykjjaR2q2MNDsSR7oy1oJZB82zU=&xsec_source=pc_search"}, {"note_id": "67dee3bf000000001b024615", "title": "易贡藏布", "desc": "西藏最美的峡谷：\n尼屋乡-八盖乡：几千米垂直落差带来了一条汇聚了雪山、冰川、瀑布、原始森林、峡谷的宝藏穿越路线。只可惜未来不久这里可能会随着水电站的修建而淹没，这样的世界级美景也终将消失在时间长河中#西藏[话题]# #易贡藏布[话题]# #易贡藏布峡谷[话题]#\n#易贡[话题]# #易贡乡[话题]# #八盖[话题]#", "type": "video", "liked_count": "76", "collected_count": "28", "comment_count": "12", "share_count": "80", "nickname": "途乐自驾 韩队", "user_id": "64885f4f0000000011003671", "note_url": "https://www.xiaohongshu.com/explore/67dee3bf000000001b024615?xsec_token=ABm_hdAjsTzBiWBjryKdgmleRrWLbXMuHr1NnzHHcZw-U=&xsec_source=pc_search"}, {"note_id": "671ba748000000002100afc5", "title": "日卡村｜悬崖上的村子，这不比雨崩香吗？", "desc": "日卡村是位于西藏林芝市波密县八盖乡的一个传统村落，四面被雪山冰川环绕，人们称它为“悬崖上的村子”，有着独特的自然风光和文化特色\n\t\n因为偏远和山路崎岖，这里是连导航信号也没有的世外桃源，到过的人大多数是因为偶尔路过误入的\n\t\n这里保留着上百年历史的木屋，这些是村民们代代相传的粮仓，他们在粮仓里储存青稞、酥油、藏香猪肉等生活必需品，这里的木锁是一项有趣的发明，村民用它来保护粮仓安全，木锁制作工艺2008年被列为非物质文化遗产\n\t\n2020年，政府投资150余万元对日卡村传统村落进行修复保护，在粮仓附近修建了游步道、观景台，村里的民宿和旅游服务设施逐渐提升改善\n\t\n如果你也不小心误入这里，如果你刚...", "type": "normal", "liked_count": "72", "collected_count": "78", "comment_count": "15", "share_count": "29", "nickname": "竹黎青的旅行笔记", "user_id": "5b8eaf7f9b5ea20001e7dcf1", "note_url": "https://www.xiaohongshu.com/explore/671ba748000000002100afc5?xsec_token=ABhBgoi2u4Sw97KUMeScHeGYSA8a3ZY2ZR4NjfHSTM6dA=&xsec_source=pc_search"}, {"note_id": "67a0faf500000000180060b7", "title": "今天早上八盖乡的#日照金山[话题]# 绝了", "desc": "今天早上八盖乡的#日照金山[话题]# 绝了", "type": "normal", "liked_count": "67", "collected_count": "35", "comment_count": "5", "share_count": "8", "nickname": "阿标", "user_id": "574fb1f250c4b45d5c0ecb1c", "note_url": "https://www.xiaohongshu.com/explore/67a0faf500000000180060b7?xsec_token=ABHYm-FHgivgpGx0HoPFQagb3MMePpLRoHs_7ffNpwPAE=&xsec_ , "desc": "犹记得年初穿行在易贡藏布之间时\n在崖壁下的羊肠小道里\n看见日卡村的路牌，再盘旋直上\n.\n在数个回头弯后豁然开朗\n一座体积庞大的白雪金字塔赫然矗立\n很好的让我感受到站在半山腰\n才是体验巨大落差的最佳点位\n.\n回去以后我一直想知道这座山的名字\n经过很多次对比，我觉得这应该就是地图上标注为\n“炯巴隆”的那座山\n虽然标高仅有5814米，但是气势磅礴\n是日卡村所见最为壮观的山峰\n#西藏[话题]# #雪山[话题]# #向雪山走去[话题]#\n#八盖乡[话题]# #日卡村[话题]# #易贡藏布[话题]#", "type": "normal", "liked_count": "44", "collected_count": "21", "comment_count": "34", "share_count": "4", "nickname": "Matt7hew", "user_id": "633b1a780000000012025c98", "note_url": "https://www.xiaohongshu.com/explore/68bc4bb2000000001d027cc6?xsec_token=ABoNgPtjahobHflf7D964sjJUp7LaptTbbBZlJfrSVxaM=&xsec_source=pc_search"}, {"note_id": "69ac38400000000022031563", "title": "不见日光见桃光，易贡正好。", "desc": "#交换春天[话题]# #林芝[话题]# #西藏旅游[话题]# #易贡[话题]# #林芝桃花[话题]# #桃花[话题]# #一键播放春天[话题]# #花情实况播报[话题]# #波密桃花[话题]# #人面桃花相映红[话题]#", "type": "video", "liked_count": "40", "collected_count": "2", "comment_count": "15", "share_count": "6", "nickname": "寻措的鱼", "user_id": "5e2bf279000000000100a824", "note_url": "https://www.xiaohongshu.com/explore/69ac38400000000022031563?xsec_token=ABzyk8IVxdhTHV-h5yrnedpPZ2X4zwQxpzoxTuWznxvWc=&xsec_source=pc_search"}, {"note_id": "67dd3a9500000000090161a5", "title": "易贡真的别来！我怕你从此看不上其他春天", "desc": "人少到包场！我宣布这里才是西藏桃花的天花板！\n🚗 「赶路？不！这是开往春天的桃花隧道」\n“从波密去易贡乡的70公里，千万别睡觉！！😭沿途风景足够惊艳\n🚗 【交通狠活】\n📍 坐标：西藏波密县易贡乡（距林芝200km，波密70km）\n💡 硬核提醒：\n✅ 必须开SUV！通麦段有落石+泥路，轿车分分钟刮底盘\n🌸 【暴击时间轴】\n⚠ 最佳赏花期：3月底-4月中旬（比林芝晚7-10天，完美错峰）\n⚠ 天气预警：白天15℃+，夜间-5℃！羽绒服和吊带裙必须共存！\n🌄 【桃花疯拍地图】（附GPS坐标！）\n📌 核爆级机位：\n1⃣ 【通麦段S弯悬崖】\n⚠ 早8点冲！晨雾+桃花+翡翠色帕隆藏布江，长焦拍出「国家地理...", "type": "normal", "liked_count": "37", "collected_count": "53", "comment_count": "1", "share_count": "30", "nickname": "荒野印记4x4", "user_id": "63b3dc180000000026013901", "note_url": "https://www.xiaohongshu.com/explore/67dd3a9500000000090161a5?xsec_token=ABYoswGBc6Tj7MUTXNhFuv5cm6Df7KENpqXNSd7cccUDM=&xsec_source=pc_search"}, {"note_id": "6611441f0000000004018cf3", "title": "林芝 D2：易贡乡/索通村，隐匿峡谷的桃花村", "desc": "🚍 林芝包车第二天：\n鲁朗扎西岗村—易贡乡—索通村—波密。\n\t\n由于海拔较低，易贡和索通是林芝所有桃花沟里最早绽放的。由于我们去时日期较早，波密的桃花还未绽放，为不让旅途遗憾，特意寻访这片小众的桃花村落。易贡隐匿在通麦北侧峡谷深处，奔腾的易贡藏布在此处变得温婉平缓，形成一片开阔的湖泊。这里游人罕至，桃花与菜花交错重叠，远处的雪山烟云缭绕，腾云起雾，遗世独立。\n\t\n📷 拍摄图源：\n易贡茶场首块茶田（图2-3）\n易贡甲中（图1，4-8）\n易贡柏村（图9-15）\n索通村（图16-18）\n\t\n1⃣ 易贡乡\n在318国道到达通麦特大桥之前右转向下，经305省道即可到达。全线水泥路，在通麦附近的路面有多处...", "type": "normal", "liked_count": "36", "collected_count": "59", "comment_count": "6", "share_count": "24", "nickname": "Skyline", "user_id": "5c00b89f44363b7d7e1bafcd", "note_url": "https://www.xiaohongshu.com/explore/6611441f0000000004018cf3?xsec_token=ABnsInaOby2oUZSE6fcLDGeaIuGbXVvG4W4rXqj3Cfu9w=&xsec_source=pc_search"}, {"note_id": "69a6fed1000000002603d033", "title": "林芝波密易贡的桃花 油菜花 杜鹃花全都开啦", "desc": "林芝的春天真的太美了#交换春天[话题]# #花情实况播报[话题]# #有一种春天叫油菜花开[话题]# #梅花盛开的季节[话题]# #油菜花的季节[话题]# #万亩油菜花织就田园画卷[话题]# #林芝桃花[话题]#", "type": "video", "liked_count": "36", "collected_count": "16", "comment_count": "25", "share_count": "44", "nickname": "牦牛阿晶", "user_id": "5c071a0d000000000500d7f4", "note_url": "https://www.xiaohongshu.com/explore/69a6fed1000000002603d033?xsec_token=ABDPmJi1ibxe_DOA8PsSyFTne2XHI9ojY56qlBDUEtArk=&xsec_source=pc_search"}, {"note_id": "660e302e000000001a015cca", "title": "八盖乡靓仔—扎西朗隆", "desc": "八盖乡最靓的仔-扎西朗隆6170#八盖乡[话题]# #波密[话题]# #雪山[话题]# #自驾游[话题]# #西藏旅游[话题]#", "type": "video", "liked_count": "36", "collected_count": "38", "comment_count": "13", "share_count": "14", "nickname": "三哥啊", "user_id": "606e782f000000000101da32", "note_url": "https://www.xiaohongshu.com/explore/660e302e000000001a015cca?xsec_token=ABQrWmtaBK4H1FUxaLAW4yiYOKrJAKzn9_2WeWmypdjyI=&xsec_source=pc_search"}, {"note_id": "68c1a3b9000000001d01a356", "title": "纳雍嘎波｜四千米落差下的日照金山🌄", "desc": "犹记得年初穿过易贡藏布大峡谷的303省道\n在一天行程的尾声里，已然坐在民宿庭院间\n卸下一天的疲劳与惊喜\n静静地看着浮日西沉\n\t\n这夕阳温柔的斜晖褪去了高照时的刺眼\n刻画了这座神山丝丝缕缕的线条\n视线从6388米的峰顶坠入2100米的湖畔\n竟也不觉得令人悍然生畏\n\t\n他叫纳雍嘎波\n藏文名写作：ལྷ་གཡང་དཀར་པོ།\n是守护圣地的护卫\n是为脚下雪域田园带来福禄的善神\n如果你来到波密县的易贡乡\n请一定为他停留驻足\n#西藏[话题]# #波密[话题]# #易贡乡[话题]#\n#易贡湖[话题]# #雪山[话题]# #日照金山[话题]#", "type": "normal", "liked_count": "35", "collected_count": "4", "comment_count": "22", "share_count": "3", "nickname": "Matt7hew", "user_id": "633b1a780000000012025c98", "note_url": "https://www.xiaohongshu.com/explore/68c1a3b9000000001d01a356?xsec_token=AB0eWkiHi5KRMirLpyeOrf2MVk97EllT3CCXN-S2W3z7c=&xsec_source=pc_search"}, {"note_id": "69a29c4d000000001503bf7a", "title": "桃花节", "desc": "🌸家人们，现在易贡的桃花已经开啦！再过两周，桃花沟就该醒了，在雪山脚下，十万株野生桃花一开，整片山谷都是粉色的，美得没办法用语言形容。\n[呲牙]赶不上的也别急，更高地区海拔还能晚桃\n🌺去年我在易贡发现一大片杜鹃林，晚桃开的时候来，我带你们去看，真的特别美！\n#松赞桃花季[话题]# #松赞旅行[话题]# #松赞波密山居[话题]#", "type": "video", "liked_count": "35", "collected_count": "4", "comment_count": "9", "share_count": "6", "nickname": "松赞旅行牦牛", "user_id": "5fb6a8e400000000010089e7", "note_url": "https://www.xiaohongshu.com/explore/69a29c4d000000001503bf7a?xsec_token=ABe1hnTBc8ZVEa6Dq98Y7tFGwVQTDFKmwlmnygfVpp7u8=&xsec_source=pc_search"}, {"note_id": "68faefeb00000000070022bb", "title": "青藏高原的特异点，林芝波密易贡乡", "desc": "两千二的易贡在高原上显得特别舒服，没有高反，换来的是风景没有特别壮美。易贡茶场、铁山、纳雍嘎簸，易贡措，比较舒适。#高原的雪域佳节[话题]# #远山的呼唤[话题]# #探索世界屋脊[话题]# #雪山下小镇生活[话题]# #易贡[话题]# #易贡藏布[话题]# #林芝旅游[话题]# #易贡茶场[话题]# #波密[话题]# #林芝[话题]#", "type": "normal", "liked_count": "35", "collected_count": "13", "comment_count": "12", "share_count": "6", "nickname": "Sylphid", "user_id": "609216cc0000000001002fcf", "note_url": "https://www.xiaohongshu.com/explore/68faefeb00000000070022bb?xsec_token=ABlgwjJ_FRTOtZU9ALcDnwLFlwCWDFTbmIMpOjGyKwcb0=&xsec_source=pc_search"}, {"note_id": "67c6a52f000000002901ede1", "title": "2025年3月4日 林芝波密县易贡乡桃花", "desc": "#林芝包车[话题]# #山桃花开了[话题]# #桃花[话题]#", "type": "video", "liked_count": "33", "collected_count": "11", "comment_count": "22", "share_count": "36", "nickname": "西藏林芝桑旦", "user_id": "5f4b6a18000000000100bbfa", "note_url": "https://www.xiaohongshu.com/explore/67c6a52f000000002901ede1?xsec_token=ABVlrNmoO6H62YL9dYlFd83xqmzr61iBnjuRPlMIXDdFU=&xsec_source=pc_search"}, {"note_id": "6898089b0000000023039ba7", "title": "差点错过的易贡大峡谷穿越：易贡-八盖-龙普", "desc": "从通麦到易贡到尼屋，沿着易贡藏布，有一条易贡大峡谷的自驾穿越路线。这条线单程全程一百四十多公里，虽然距离不长，但据穿越过的网友说需要八到十小时，主要是路况不好。\n这条路线导航软件直接搜起点通麦和终点尼屋的话是查不到，导航推荐会是一个极绕的800多公里路线，但直接导航从通麦到八盖乡这段路线是可以有的，但从八盖导航到尼屋导航地图上就没有了。\n自驾行程原因，当晚要回林芝，原本不打算走，可查了查，本着“走过路过不要错过”，尤其是得知这条线路可能将来因为修水电站水位上升就走不了，更不能错过了！\n不过考虑了时间，就没走全程，实际上龙普村再继续开三四十公路就能到尼屋了，但在从尼屋回林芝就太折腾了，所以就走了...", "type": "video", "liked_count": "32", "collected_count": "31", "comment_count": "15", "share_count": "38", "nickname": "Chris大鹏", "user_id": "5dc3afe40000000001001533", "note_url": "https://www.xiaohongshu.com/explore/6898089b0000000023039ba7?xsec_token=AB2m3EC4lGtetj6sckVVzz8Iz4NvIO_TiX191_jrI5N6U=&xsec_source=pc_search"}, {"note_id": "6937609a000000001e0316e3", "title": "恰青冰川", "desc": "洽青冰川位于波密县易贡乡，据说当年冒险王有一根登山杖遗弃在这里。该冰川的冰舌非常壮观。23年到了山谷入口，没有去近距离一睹风采，只能在飞机上远远眺望#冰川[话题]# 注:冰川另一侧是炯拉错", "type": "normal", "liked_count": "32", "collected_count": "16", "comment_count": "6", "share_count": "4", "nickname": "背包客0515", "user_id": "645b7e1b0000000012036d02", "note_url": "https://www.xiaohongshu.com/explore/6937609a000000001e0316e3?xsec_token=AB6uoXTRscMQsiO-CwLQnohyLklVy4HtS511hLgRJm2x4=&xsec_source=pc_search"}, {"note_id": "65feed820000000012035bcb", "title": "西藏第一块茶田——林芝易贡茶场", "desc": "🍃🍃🍃\n历史上，西藏并不产茶。茶叶在川、滇等地被制作成茶砖、茶饼，经茶马古道入藏。西藏和平解放后，才正式开启种植茶叶的历史。\n古时西藏不产茶，主要与地理环境、气候环境和种植技术有关。相传文成公主入藏时曾尝试在西藏种茶，但未能成功。西藏真正告别不产茶的历史，是在和平解放以后。1960年，原十八军部分部队留驻林芝市，负责建设易贡军垦农场。“当时的军垦农场有屯垦戍边任务，主要种植青稞、小麦等粮食作物。”\n1963年，部队官兵为响应“开发边疆、建设边疆”的号召，从四川省蒙顶茶场引进了四川中小叶茶树，并试种成功，由此开启了西藏种植茶叶的历史。1971年，原西藏工委作出《关于在西藏大力发展茶叶生产的决定》...", "type": "normal", "liked_count": "32", "collected_count": "20", "comment_count": "2", "share_count": "16", "nickname": "波罗的茶笔记", "user_id": "603f5976000000000100bb13", "note_url": "https://www.xiaohongshu.com/explore/65feed820000000012035bcb?xsec_token=AB70ctCo8TXuJjAC4-BmdYvxDcDaUct_UVeeHiXLcWuCU=&xsec_source=pc_search"}, {"note_id": "632f31ac0000000018003bb3", "title": "318国道边的宝藏💙西藏林芝波密·易贡湖～", "desc": "·\n波密·易贡湖区💙\n挨着波密318国道，\n从通麦大桥边的岔路，往西北方向，\n穿过狭窄的森林峡谷，\n就可以通往这个豁然开朗的桃花源～\n·\n整个湖区都是易贡国家地质公园🏔️，\n湖的南岸有西藏最早的茶场——易贡茶场🍃，\n茶场里还有解放军进藏早期的指挥部🏯，\n北岸山坡上的村子，是国家级非遗藏刀的唯二的原产地🏡，\n往沟谷里走，还有世界级的海洋性冰川群❄️，\n真是一个神奇接着一个神奇～\n·\n❤️五大必看❤️👇🏻👇🏻👇🏻\n·\n1⃣️世界级泥石流大滑坡1⃣️\n这个大滑坡历史不长，就是2000年的地震形成的，却是一个世界级的地质遗迹。\n大滑坡直接堵塞了河道，让易贡湖水位提高了几十米！318国道通麦天险上的司机...", "type": "normal", "liked_count": "31", "collected_count": "47", "comment_count": "1", "share_count": "32", "nickname": "左拉在旅行", "user_id": "58fccf6b50c4b4460f727a52", "note_url": "https://www.xiaohongshu.com/explore/632f31ac0000000018003bb3?xsec_token=ABAKDKPJy5UsvdXAGx3hYmkiXe97P0p4DAmlVZ3CdQyvo=&xsec_source=pc_search"}, {"note_id": "680a323e000000001d02c7df", "title": "波密八盖乡｜雪线之上，遇见浪漫💕杜鹃", "desc": "#ourspring[话题]# #春天拍照[话题]# #交换春天[话题]# @摄影薯\n拍摄地🎬：八盖乡，4.24实拍\n今年的杜鹃基本接近尾声，因为今年开的比较早，去年我记得4月底我来的时候都才开杜鹃大会，今年花开的早，所以大家可以明年再来了！\n八盖乡的杜鹃，是大自然给予心灵的治愈良药。在雪山的怀抱中，杜鹃花肆意生长，它们的娇艳与坚韧，仿佛在诉说着生命的顽强。漫步花海间，听风声掠过雪山，嗅着杜鹃的清香。#杜鹃花[话题]# #漫山遍野的杜鹃花有多美[话题]# #西藏[话题]# #西藏旅游[话题]##林芝[话题]# #春天就要上春山[话题]#", "type": "normal", "liked_count": "30", "collected_count": "10", "comment_count": "43", "share_count": "15", "nickname": "youyou的旅行", "user_id": "580e20e26a6a6922263948e1", "note_url": "https://www.xiaohongshu.com/explore/680a323e000000001d02c7df?xsec_token=AB-jYtoP9RBYwm1Zr9RnBUL20w5CVu3QWYclye3c0fcq4=&xsec_source=pc_search"}, {"note_id": "69b03efd000000002603d239", "title": "三月的林芝桃花，粉色的诗与远方", "desc": "途经漫山桃花、油菜花盛开，\n便会懂得易贡乡的浪漫。\n\t\n#波密文旅[话题]#\n#西藏林芝[话题]#\n#林芝桃花[话题]#\n#易贡乡[话题]#", "type": "normal", "liked_count": "28", "collected_count": "5", "comment_count": "8", "share_count": "8", "nickname": "aron", "user_id": "5569e1b4f5a2635214e6ddbc", "note_url": "https://www.xiaohongshu.com/explore/69b03efd000000002603d239?xsec_token=ABPZ9oIodOZXi13lbJnsNSo1eAej4ScM9uAqWMq7rK4jE=&xsec_source=pc_search"}, {"note_id": "67e27ad2000000001d016870", "title": "《行前必看》通麦大桥-易贡乡-八盖乡-尼屋乡（通麦-尼屋穿越线），连接川藏南线318和川藏中线最近的距离。全程路书攻略，跟拍视觉了解沿途地形地貌和重要节点。配套拿看都方便的大字体小尺寸《互助旅行路线图》。#藏东[话题]##林芝桃花节[话题]# #川藏南线[话题]# #川藏中线[话题]#", "desc": "《行前必看》通麦大桥-易贡乡-八盖乡-尼屋乡（通麦-尼屋穿越线），连接川藏南线318和川藏中线最近的距离。全程路书攻略，跟拍视觉了解沿途地形地貌和重要节点。配套拿看都方便的大字体小尺寸《互助旅行路线图》。#藏东[话题]##林芝桃花节[话题]# #川藏南线[话题]# #川藏中线[话题]#", "type": "video", "liked_count": "28", "collected_count": "41", "comment_count": "22", "share_count": "22", "nickname": "山羊的路书", "user_id": "6569f2e2000000002002ccec", "note_url": "https://www.xiaohongshu.com/explore/67e27ad2000000001d016870?xsec_token=ABo2LXGxVlruzAtUOPebq8XcVePjL81UoE05mvs4j8il4=&xsec_source=pc_search"}, {"note_id": "67e424b2000000000900d163", "title": "林芝的世外桃源易贡非常值得推荐", "desc": "🚖交通：从318国道通麦大桥左拐下路基，路边有易贡乡的路牌，一路往前走十公里左右，到了西藏第一块茶田，再继续沿易贡藏布大峡谷一路前行，约十公里就到了易贡湖，再继续前行大约十公里就是易贡乡。\n🌈这里海拔仅2100米，空气清新，仿佛是一处藏在深山峡谷中的室外桃园，三月中下旬，这里桃花盛开，还有大片的油菜花和绿色的青稞苗，形成了一副春意盎然的绝美画卷。\n✔️住宿：乡里新建了一处旅游酒店，设施良好，干净卫生，十分舒适。#易贡西韵茶谷[话题]# 味酒店\n✔️餐饮：就在乡政府对面有一家藏餐，这里的青稞饼、酥油茶、牛肉汤都是十分美味，有早餐，也有中餐和晚餐。另外将军楼附近也有一家很好吃的藏餐馆，图一图二就是...", "type": "normal", "liked_count": "25", "collected_count": "27", "comment_count": "9", "share_count": "18", "nickname": "华班长", "user_id": "621a35370000000010008155", "note_url": "https://www.xiaohongshu.com/explore/67e424b2000000000900d163?xsec_token=ABkzaYY5rVNe-bi6omF5uK4lzFDqK6Fh8gLLR5Hx4SFPY=&xsec_source=pc_search"}, {"note_id": "68cd6fa9000000000e00fcf5", "title": "八盖乡到尼屋乡", "desc": "分享一下林芝八盖乡到尼屋乡303省道非铺装路穿越情况，这条路大概是修了踏，踏了修的情况。50km开了5个小时，非常难走。一路没有人家和任何光亮。走夜路，只能听见波涛汹涌的河水声，却不知道山路下面是多高的深渊。", "type": "video", "liked_count": "25", "collected_count": "7", "comment_count": "54", "share_count": "15", "nickname": "JohnStrong约翰强", "user_id": "61f98e430000000010008aab", "note_url": "https://www.xiaohongshu.com/explore/68cd6fa9000000000e00fcf5?xsec_token=ABhUmUQKNL6OGIcJHr7Rn94GyJuVS2YFmkfCyRAwdw1Wo=&xsec_source=pc_search"}, {"note_id": "6878e063000000001c0350e5", "title": "扎西朗隆-八盖乡的秘境雪山", "desc": "从易贡乡沿易贡藏布峡谷向尼屋方向行驶，开2个小时，可以到达一个雪山下的村落-八盖乡。\n八盖乡南面的雪山便是一年四季有雪的扎西朗隆，据说名气已经走出国门。向尼屋方向去程时扎西朗隆被云雾遮盖，但回程时云雾散去，得见真容！\n\t\n#向雪山走去[话题]# #扎西朗隆[话题]# #八盖乡[话题]# #易贡藏布[话题]# #日卡村[话题]#", "type": "video", "liked_count": "23", "collected_count": "10", "comment_count": "13", "share_count": "4", "nickname": "Chris大鹏", "user_id": "5dc3afe40000000001001533", "note_url": "https://www.xiaohongshu.com/explore/6878e063000000001c0350e5?xsec_token=ABvd9ULgaUmgmMKJySjR4bzUTjLc3PkeNO9Tbi3yJsa5Q=&xsec_source=pc_search"}, {"note_id": "69652bfa000000002200aca9", "title": "1.12易贡藏布大峡谷穿越", "desc": "4pm--9pm，140km，从通麦特大桥拐进尘土飞扬的羊肠土路，路况时好时坏，信号时有时无，碧绿的易贡藏布江水一路相伴，田野、河流、湖泊、雪山、牛马相继出现，目睹了动人心魄的日落金山，在宁静祥和的村落边短暂驻足，暮色四合炊烟袅袅，恋恋不愿离开。致敬这美丽神秘的峡谷，铭记这艰难但完美的一天。感谢帅气的领队们！帅爆", "type": "normal", "liked_count": "22", "collected_count": "14", "comment_count": "36", "share_count": "32", "nickname": "🍭🍋", "user_id": "56bea8a75e87e73d13fdf34c", "note_url": "https://www.xiaohongshu.com/explore/69652bfa000000002200aca9?xsec_token=ABCg5pvBzUndw0FHJkT4RnBUpKkV_hsWKIPrZCZMIiWU4=&xsec_source=pc_search"}, {"note_id": "65f2b5e1000000000d00da15", "title": "西藏.林芝波密县易贡乡桃花", "desc": "#林芝桃花[话题]#", "type": "normal", "liked_count": "22", "collected_count": "1", "comment_count": "21", "share_count": "10", "nickname": "西藏林芝桑旦", "user_id": "5f4b6a18000000000100bbfa", "note_url": "https://www.xiaohongshu.com/explore/65f2b5e1000000000d00da15?xsec_token=AB7qRG4YXpy_SHsPVHy9KantjLJ4-ZDdkjrz3vfxkIkg0=&xsec_source=pc_search"}, {"note_id": "67a439d7000000002901552f", "title": "易贡-八盖-尼屋地图都看不到的路美呆了", "desc": "我们前一天晚上住在「易贡夏卡客栈」\n很舒服的一个小院子\n背靠铁山，前方的山坡很多桃花树\n乡里还种了很多油菜花春天肯定很美\n然后就出发途径八盖尼屋的土路，终点是边坝\n还是在小红书搜到的土路\n前几天路上也一直打听是不是能走\n答案都是肯定的\n如果不走这段土路，到边坝得13个小时\n土路非常难开我们是2.0排量二驱\n很多很多的连续发夹弯加上大坑\n我们包车师傅有一段方向盘都打冒烟了\n途中遇到的坦克大哥都说我们开上来不容易[笑哭R]\n还是建议四驱车来闯噢\n而且夏天雨季这条路应该是不能走的\n快到尼屋之前，会经过#炯拉错[话题]# 风景超级治愈\n可以飞无人机去看冰川\n也可以坐在岸边发呆\n#易贡[话题]# #八盖...", "type": "normal", "liked_count": "22", "collected_count": "25", "comment_count": "19", "share_count": "13", "nickname": "糯米稀姐姐💅🏻", "user_id": "5771eac4a9b2ed0eec513bde", "note_url": "https://www.xiaohongshu.com/explore/67a439d7000000002901552f?xsec_token=ABJ1qWlI26DsjLXLumK9h2VtbyT0dtO6y-re2glE1RXGQ=&xsec_source=pc_search"}, {"note_id": "69bc1630000000001a024826", "title": "🌸2026.3.19｜波密易贡乡  桃树下有棵桃树", "desc": "正午   对影\n落英缤纷   树影斑驳映花\n桃花仙儿   也会给自己一些时间自我欣赏\n金海雪山   深红浅红纷纷扬扬\n\t\n这两天不看南迦巴瓦～\n走，我们去波密探花！🌸\n\t\n📍林芝波密县易贡乡通加村  海拔2250m\n\t\n#交换春天[话题]# #ourspring[话题]# #路上的春天[话题]#\n#林芝桃花[话题]# #追着春天去旅行[话题]# #倒影里的春天[话题]#\n#波密桃花沟[话题]# #自驾探索编辑部[话题]# #春天就要上春山[话题]#", "type": "normal", "liked_count": "22", "collected_count": "8", "comment_count": "5", "share_count": "8", "nickname": "康英拉孜", "user_id": "654286e5000000000400b040", "note_url": "https://www.xiaohongshu.com/explore/69bc1630000000001a024826?xsec_token=ABImReskLVZPZ88ZtSSf1pJkXuEZCeiYfRH7Dpwl73G6s=&xsec_source=pc_search"}, {"note_id": "688f4f470000000005007e57", "title": "在易贡，我用一整天观察吴氏岩蜥", "desc": "在易贡乡的路上偶遇吴氏岩蜥，我用一整天的时间尝试走进它们的世界，观察它们的形态和行为。虽然岩蜥和鬃狮蜥是鬣蜥科分化位置遥远的两个分支，但通过对比它们的行为，也让我更了解拽根的世界 #蜥蜴[话题]# #爬行动物[话题]# #自然观察[话题]# #野生动植物[话题]# #易贡乡[话题]#", "type": "video", "liked_count": "21", "collected_count": "2", "comment_count": "", "share_count": "2", "nickname": "野生隐刀", "user_id": "5c7ac0ab0000000012017d87", "note_url": "https://www.xiaohongshu.com/explore/688f4f470000000005007e57?xsec_token=ABx-yc0il7muoiby64o-tfeqrZEFwHQQe3pueZwkiPmx8=&xsec_source=pc_search"}, {"note_id": "697dced9000000001a023657", "title": "藏东南到藏北的秘境穿越：林芝波密八盖乡至", "desc": "", "type": "normal", "liked_count": "21", "collected_count": "45", "comment_count": "8", "share_count": "8", "nickname": "懶回顾", "user_id": "60901792000000000100922b", "note_url": "https://www.xiaohongshu.com/explore/697dced9000000001a023657?xsec_token=ABh86yAFuOa-_QR60Le-5URYxWYqNCWMXmOPVa9cd6ZeY=&xsec_source=pc_search"}, {"note_id": "65fef4e90000000013027c7b", "title": "3.23日林芝桃花拍摄于易贡乡", "desc": "目前为止林芝地区桃花开得最好的地方！\n那就当属易贡乡啦！\n以上图片拍摄于易贡乡，柏村，甲中等区域！\n相比波密桃花沟，雅鲁藏布江沿岸，这里桃花稍逊一筹。\n不过胜在桃花目前处于盛花期，非常的漂亮，为了弥补遗憾，建议大家前往这里观赏！\n门票:🈚\n林芝各地区桃花近期播报，欢迎关注！", "type": "normal", "liked_count": "20", "collected_count": "7", "comment_count": "3", "share_count": "13", "nickname": "如期旅行", "user_id": "5bf9380d969bbf0001ea2e31", "note_url": "https://www.xiaohongshu.com/explore/65fef4e90000000013027c7b?xsec_token=AB70ctCo8TXuJjAC4-BmdYv-6CCWkkK2-iklobz2ViYo8=&xsec_source=pc_search"}, {"note_id": "65fd9a0200000000140065a8", "title": "林芝桃花 | 易贡满足了我对桃花的一切幻想", "desc": "《桃花源记》在这一刻终于具象化了\n只怪自己文化储备不够\n不知道该怎么形容\n易贡的桃花以及环境满足了我的一切幻想\n完全不想离开\n路边随便一棵花树都能发呆半天\n📍坐标：易贡乡\n🚘交通：自驾（环了易贡措一圈，村落里随机散落的桃花树，由白到红搭配着房屋栅栏真的很绝）\n🎫门票：免费🆓\n❗tips：山路偏窄，找到适合停车的地方再欣赏风景哦，可以带点零食随时补充能量\n#林芝[话题]# #林芝桃花[话题]# #林芝旅游[话题]# #易贡[话题]# #桃花[话题]# #西藏[话题]# #春日追花攻略[话题]# #春天[话题]# #旅行[话题]# #318川藏线[话题]# #摄影[话题]# #人像[话题]# #桃...", "type": "normal", "liked_count": "20", "collected_count": "8", "comment_count": "10", "share_count": "9", "nickname": "杉树的杉📷", "user_id": "559f36ef67bc6533821b5dcd", "note_url": "https://www.xiaohongshu.com/explore/65fd9a0200000000140065a8?xsec_token=AB9G1IUvU0ehFdOsYKugGvKn_gJuRKmW5jqAwBhjYQ-Ls=&xsec_source=pc_search"}, {"note_id": "69a71263000000001d01357d", "title": "13.5h穿越🌪️易贡藏布峡谷😢波密-拉萨", "desc": "…\n\t\n关于穿越行程——\n波密-八盖3.5h左右\n八盖-尼屋2h左右\n八盖途径日卡、龙普2村游玩及往返时间1.5h左右\n\t\n路况——\n基本良好，有几段涉水路要注意，从日卡村出来下山的弯道很急需要注意，以及遇到强风要注意落石和其他爆胎可能\n（以上皆为有穿越经验、装备保障的情况下的时间参考）\n\t\n13.5h从波密穿到拉萨，其中峡谷段7h\n（再也不敢了版）\n原本计划2天的行程，因为实际情况临时变成晚8点还在穿5000M垭口的故事……\n\t\n9:00波密出发➡️12:30左右抵达八盖乡，在雄吉村村口吃了便饭，跟客车司机了解到除去2个村的游玩时间和路程，穿越仅需2小时之后，我们临时改变了留宿的计划。\n\t\n...", "type": "normal", "liked_count": "20", "collected_count": "13", "comment_count": "19", "share_count": "6", "nickname": "怕困", "user_id": "5beff35fe2b9300001dccfa1", "note_url": "https://www.xiaohongshu.com/explore/69a71263000000001d01357d?xsec_token=ABzDa7IKNZKdJSSya8Npjqn42sSzzDws8s0y2b63n6Wmg=&xsec_source=pc_search"}, {"note_id": "6630fe0a000000001e03a117", "title": "Day 3 那曲-嘉黎-巴达村-尼屋乡-八盖乡", "desc": "今天的主要安排是山峰考察，所以路程没有走很远（其实也很远了），中途看到了很多不常见的景色\n\t\n今日亮点:\n\t\n图一/二: 从那曲往嘉黎县，要先从4500米海拔缓慢爬升到5000米，途径的150余公里的高原牧场充满空旷感，配合远处的雪山背景，非常赏心悦目。S302省道道路质量很高，开起来很舒服。到了嘉黎县城记得去加满油，是这一路上唯一的国营大油站哦\n\t\n图三: 从嘉黎县城出发后，天空开始飘雪，虽然景观很好，但是云层聚集在5000米左右海拔，把萨普和乃朗两块山脉片区的大部分山峰给遮住了。我们一度十分沮丧，等了很久天空放晴，我们赶紧取车到八达村，沿着村里土路开了八公里左右，沿途看到了令人忍俊不禁的限...", "type": "normal", "liked_count": "20", "collected_count": "16", "comment_count": "2", "share_count": "5", "nickname": "谢熊猫君", "user_id": "616ff69e0000000002024354", "note_url": "https://www.xiaohongshu.com/explore/66 KdgmlTMFQC-5LXj8uB7yillhIvY=&xsec_source=pc_search"}, {"note_id": "67f45f32000000001c0075d9", "title": "高山峡谷间奇遇杜鹃花海", "desc": "沿着易贡藏布溯流而上，江水奔涌，切割出深邃的高山峡谷地貌，在这片隐秘天地中，邂逅自然的野性与浪漫。#杜鹃[话题]#", "type": "normal", "liked_count": "18", "collected_count": "1", "comment_count": "", "share_count": "1", "nickname": "行者陈锐", "user_id": "6167e6710000000002027827", "note_url": "https://www.xiaohongshu.com/explore/67f45f32000000001c0075d9?xsec_token=ABx5rS8Ylv9_JJv1bASd1Y0uZSF1eBHn522EOcZbegI0M=&xsec_source=pc_search"}, {"note_id": "683f0ea700000000230037be", "title": "易贡藏布穿越:八盖乡到尼屋乡", "desc": "这一段绝对是易贡藏布穿越的精华!这个季节的易贡藏布，已经不是温润如玉和缓的祖母绿色，而是汹涌澎湃夹杂着沙石的灰白色~如果要看蓝色的易贡藏布，一定要在枯水季来!\n这段道路是非铺装道路 ，路窄 陡坡多 炮弹坑多 碎石多，雨季穿越，还是四驱吧\n一定不要错过日卡村，​日卡村是位于西藏林芝市波密县八盖乡的一个传统村落，四面被雪山冰川环绕，人们称它为“悬崖上的村子”\n这里保留着上百年历史的木屋，这些是村民们代代相传的粮仓，他们在粮仓里储存青稞、酥油、藏香猪肉等生活必需品，这里的木锁是一项有趣的发明，村民用它来保护粮仓安全，木锁制作工艺2008年被列为非物质文化遗产\n\t\n#易贡藏布[话题]# #2025藏东...", "type": "normal", "liked_count": "18", "collected_count": "8", "comment_count": "18", "share_count": "6", "nickname": "寒山残雪", "user_id": "5e1ffaed00000000010043e7", "note_url": "https://www.xiaohongshu.com/explore/683f0ea700000000230037be?xsec_token=ABL7RWcwlfN95rYRqapYQjFgoxQUu9BHUM2-KbNCrYacI=&xsec_source=pc_search"}, {"note_id": "69af8e870000000026033a31", "title": "🌸我用易贡桃源，和你交换春天🌼", "desc": "#跟着兴趣去旅行[话题]# #林芝[话题]# #西藏旅游[话题]# #林芝桃花[话题]# #易贡[话题]# #万亩油菜花织就田园画卷[话题]# #我在波密打卡[话题]# #交换春天[话题]# #追着春天去旅行[话题]# #我想和你交换春天[话题]#", "type": "video", "liked_count": "17", "collected_count": "", "comment_count": "10", "share_count": "1", "nickname": "寻措的鱼", "user_id": "5e2bf279000000000100a824", "note_url": "https://www.xiaohongshu.com/explore/69af8e870000000026033a31?xsec_token=AB8FgpLT-w_KmTb7ffss3ADfO2Z8utUl_jNGw0vV4ETCM=&xsec_source=pc_search"}, {"note_id": "682b1afb000000002100d31b", "title": "嘉黎尼屋（忠玉）到通麦，易贡藏布大峡谷穿越", "desc": "从G349川藏中线嘉黎线直接穿到G318川藏南线通麦大桥，方便南下到波密附近或者北上去边坝，走这条路就不用绕道7～8百公里从邦达或者工布江达那边走了。\n\t\n线路全长160公里左右，前面1/3尼屋-八盖是临崖峡谷穿越路，八盖乡-通麦大桥是铺装路。\n\t\n雨季容易塌方，非雨雪季节走应该风景很不错。\n\t\n适应车型：有看到油罐车，普通suv在 峡谷的样子。在易贡茶场附近，道路将分为两条，两条...", "type": "normal", "liked_count": "13", "collected_count": "27", "comment_count": "4", "share_count": "18", "nickname": "囧尼爱旅行", "user_id": "5ce36408000000001001cbea", "note_url": "https://www.xiaohongshu.com/explore/63e737db000000001303049f?xsec_token=AB1ap059oBziKxAWSIlKLgsviTV_pSfPR_ok0ZoQNVeiw=&xsec_source=pc_search"}, {"note_id": "68bd7b36000000001b03f276", "title": "雨中八盖乡，真实的世外桃源", "desc": "#旅途中的风景[话题]#\n藏东南自驾，经过了S303的惊险刺激，到达八盖乡，果断随停。\n这是一个隐秘在雪山下的美丽村落，雪山桃花，村舍云雾，大概就是人们心中的“世外桃源”。\n#自驾探索编辑部[话题]# #雨雾缭绕人间仙境[话题]# #神仙居住的地方[话题]# #西藏自驾游[话题]# #八盖乡[话题]##人间最后一片净土[话题]# #雨中即景[话题]# #云雾缭绕人间仙境美如画[话题]# #世外桃源[话题]#", "type": "video", "liked_count": "13", "collected_count": "1", "comment_count": "5", "share_count": "", "nickname": "盛牛牛", "user_id": "5bf29f18465bb4000194e463", "note_url": "https://www.xiaohongshu.com/explore/68bd7b36000000001b03f276?xsec_token=ABhtuOikclnWVmm6BLf0fvH9B5fGY5ZGBuRcF-YyPj7Uk=&xsec_source=pc_search"}, {"note_id": "699af2a8000000001a0331e4", "title": "穿越易贡藏布｜人间最后秘境", "desc": "告别易贡的晨雾，一头扎进藏东最极致的山路风光里。这段从易贡到尼屋乡的旅程，一半是柏油山路的蜿蜒，一半是非铺装路面的狂野，却藏着此生难忘的风景。\n🚙【易贡→八盖乡】\n58公里的S303，1小时40分的盘山而行。柏油路虽平整，却窄弯密集，一侧是悬崖峭壁，偶有落石与浅坑相伴。\n不必赶路，慢下来，让风带着雪山的清冽，吹过每一个转弯。\n🚙【八盖乡→尼屋乡】\n真正的考验从这里开始，50公里路要走4小时。\n柏油褪去，是颠簸的砂石搓衣板路，炮弹坑与陡坡接踵而至，唯有四驱硬派越野能从容应对。\n全程无信号，提前下好离线地图，把自己完全交给山野。\n🏔️【途中惊喜·日卡村】\n行至半途，便会与这座“悬崖上的明珠”不期而...", "type": "normal", "liked_count": "13", "collected_count": "7", "comment_count": "5", "share_count": "5", "nickname": "LillLian", "user_id": "59a93cf96a6a69035e8917be", "note_url": "https://www.xiaohongshu.com/explore/699af2a8000000001a0331e4?xsec_token=AB2OKhsKK3hnQ5FASY7Lm0BR2vU1sbyKI4nvynDUA0nRI=&xsec_source=pc_search"}, {"note_id": "68dbebfd000000000703364b", "title": "易贡 八盖 尼屋 穿越完毕 一路风景还是很不错 在八盖乡的罗布小木屋吃的午饭 老板是藏族同胞 之前在林芝学过川菜 做得一手好川菜 砂锅排骨也很美味。\n八盖到尼屋路况基本是土路碎石路加炮弹坑 开了3个多小时 路上塌方路段还是比较多 下雨不建议走 越野车没什么压力 就是慢", "desc": "易贡 八盖 尼屋 穿越完毕 一路风景还是很不错 在八盖乡的罗布小木屋吃的午饭 老板是藏族同胞 之前在林芝学过川菜 做得一手好川菜 砂锅排骨也很美味。\n八盖到尼屋路况基本是土路碎石路加炮弹坑 开了3个多小时 路上塌方路段还是比较多 下雨不建议走 越野车没什么压 <script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  const el=document.getElementById('cardList');
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(query){const q=query.toLowerCase();return(n.title+n.desc+n.nickname).toLowerCase().includes(q)}
    return true;
  });
  const totalLikes=filtered.reduce((s,n)=>s+parseInt(n.liked_count||0),0);
  const totalCollect=filtered.reduce((s,n)=>s+parseInt(n.collected_count||0),0);
  const totalComment=filtered.reduce((s,n)=>s+parseInt(n.comment_count||0),0);
  const videos=filtered.filter(n=>n.type==='video').length;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="num">${filtered.length}</div><div class="label">篇笔记</div></div>`+
    `<div class="stat"><div class="num">${totalLikes.toLocaleString()}</div><div class="label">总点赞</div></div>`+
    `<div class="stat"><div class="num">${totalCollect.toLocaleString()}</div><div class="label">总收藏</div></div>`+
    `<div class="stat"><div class="num">${videos}</div><div class="label">视频</div></div>`;
  el.innerHTML=filtered.map((n,i)=>{
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=n.desc.replace(/\n/g,'<br>').replace(/#[^#]+\[话题\]#/g,t=>`<span style="color:#667eea">${t}</span>`);
    return `<div class="card"><div class="card-header"><div class="card-title"><span class="rank">#${i+1}</span> <a href="${n.note_url}" target="_blank" rel="noopener">${n.title||'(无标题)'}</a>${badge}</div></div><div class="card-author">@${n.nickname}</div><div class="card-desc" id="desc${i}">${desc}</div><button class="expand-btn" onclick="const d=document.getElementById('desc${i}');d.classList.toggle('expanded');this.textContent=d.classList.contains('expanded')?'收起':'展开全文'">展开全文</button><div class="metrics"><div class="metric">❤️ <span>${n.liked_count}</span></div><div class="metric">⭐ <span>${n.collected_count}</span></div><div class="metric">💬 <span>${n.comment_count}</span></div><div class="metric">🔗 <span>${n.share_count||0}</span></div></div></div>`;
  }).join('');
}
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render();
  });
});
document.getElementById('searchInput').addEventListener('input',e=>{query=e.target.value;render()});
render();
</script>
