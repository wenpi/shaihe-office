n\t\n💡tip：\n古镇不大，半天可走完，但是真的很安逸让人特别舒服，值得住上几日\n———————————————————\n\t\n📸【机位分享】\nⓟ②东寨门.日出时分随拍\nⓟ③南寨门. 许红豆牵马同款\nⓟ④南古宗巷.📍“渡鸦”\nⓟ⑤ 古戏台. 古镇中心标志\nⓟ⑥- ⑧四方街. 古戏台，兴教寺，阿瑞👵都在这，茶马古道沧桑感十足\nⓟ⑨-⑩树屋☕.📍“沙溪粮食管理所”\nⓟ①①玉津桥晨雾.沿途旅人及湖面倒影\nⓟ①②欧阳大院.茶马古道上的马帮老宅院\nⓟ①③叁一. 文艺空间，适合发呆\nⓟ①④四方街.街角抓拍\nⓟ①⑤沙溪卓别林·有趣的人物瞬间\nⓟ①⑥- ①⑦巷弄里的小猫小狗·随时偶遇\nⓟ①⑧先锋📖局\n\t\n#小众旅行地 #去有风地方 #沙溪古镇 #沙溪拍照 #大理 #云南旅行 #假期去哪玩  #云南旅居推荐官 #最美古镇攻略 #大理旅行","type":"normal","author":"一只野生Peng01-15","authorId":"5ef5c1c200000000010066ed","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6968cf3f000000001a0342c5?xsec_token=ABZWoJwfBf8Gkuz85-vJNgzKqHWP27T9kEEz-ea41MtBA=&xsec_source=pc_search&source=web_search_result_notes","likes":2855,"collects":2691,"comments_count":251,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161253/06cba74cb97aebcc9f7ed7c2c7bc621e/notes_pre_post/1040g3k831rc1fvcgg0cg5nnlo7108pnduri1qb0!nd_dft_wgth_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"66d82e9900000000120126fb","title":"在沙溪10天！一个人也好好玩 附上保姆级攻略","content":"沙溪被我纳入了人生旅行地\n很奇妙 这个古镇真的太治愈了\n来到这里 心突然就静了下来\n晒晒太阳发发呆 觉得人生好像没什么事值得焦虑\n一个人在沙溪待了10天，整理了一份吃住行攻略\n姐妹们直接抄就行\n🚗交通如何到达：\n飞机到达大理，约车80r一人 路程大概两个小时，全程山路 晕车的姐妹可以包车走高速\n🔺一日游路线攻略：\n整个古镇不大，半天可以逛完！很多打卡地都在一起。\n路线：古镇入口—薄荷咖啡馆—阿瑞奶奶的店—戏台—有狸杂货铺—东寨门—玉津桥—先锋书店—山风院子—山里有座咖啡馆\n🔺经典机位：\n1️⃣阿瑞奶奶的店：（图2-8）\n途中会路过薄荷咖啡馆，是有风的地方剧中刘亦菲打工的那家店。店门口旁边有沙溪打卡墙可以拍照！\n阿瑞奶奶的店需要消费才能拍照📸古戏台-大槐树-有狸杂货铺-都在这一片。可以集中拍照\n2️⃣玉津桥：（图10-13）\n步行几分钟到。桥边坐着吹吹风，有缘分的话还能碰到歌手，席地而坐一起吹风听歌。这边还有骑马的，可以体验。走过桥就有一颗歪脖子树。也很出片\n3️⃣山风院子：（图15）\n这家咖啡店比较远，在古镇口乘小黄车，车程半个小时，有个树屋很出片，老板是台湾人。一群比较有意思的年轻人。点单拍照。如果不想拍树屋，可以不去\n4️⃣山里有座咖啡馆：（图16-18）\n这家咖啡馆强烈推荐！自然风光绝美！布景真的很好看。图放不下。可以蹲一下下一篇～咖啡略贵。车程略远，但去这里待一个下午，心情真的很美好\n5️⃣先锋书店：（图11.12）\n打卡李现同款机位！离古镇不远。书店很有设计感。值得一去。小黄车15元一人，记得讨价还价\n🔺美食推荐：\n菌汤火锅🍲滇西云厨野生菌餐吧：锅底是散养黑乌鸡，黑乌鸡搭配野生菌，浓浓的汤，好喝到连喝三碗！！干椒见手青是新鲜见手青。比肉还好吃的野生菌，这家店我吃了两天。超推荐\n小吃市场的不晚米线 ：本地人推荐的！味道很棒\n古镇人家：推荐这家腊三拼特别好吃\n必得的小管：披萨蛮好吃🍕适合下午去坐一坐\n🔺住宿推荐：\n三只狗：在古镇外边 环境很不错 老板人也很好！\n今生有你：古镇里 古色古香的装修！阳台很舒服\n静谧水舍：短租可以定她家。环境还不错\n不想住古镇里面的话。也可以找村子里的～\n#沙溪古镇 #最美古镇攻略 #云南旅游推荐 #大理沙溪古镇 #最美古镇攻略 #旅行日记 #我的小众旅行攻略","type":"normal","author":"思芸✨","authorId":"63380f16000000001802ff5f","avatar":"","url":"https://www.xiaohongshu.com/explore/66d82e9900000000120126fb?xsec_token=AB92Hqe7uGJaD8MgFmqw_jLNWu3-1oDjKXu2f4rhNL5rs=&xsec_source=pc_search&source=web_search_result_notes","likes":2740,"collects":3184,"comments_count":185,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161352/05428a5bb15d5a8254aeaef943d49d4f/1040g00831b2bjq066m005opo1sb65vqvtk79mig!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6739745d0000000019019aa2","title":"去有风的地方带火了沙溪 还值得去吗？","content":"这是一篇被问了无数遍的沙溪古镇攻略，到现在还有好多网友问，火了以后的沙溪还值得去吗? 最近刚好去回来，一个视频告诉你!\n#大理旅游攻略 #沙溪古镇 #沙溪古镇旅游攻略 #去有风的地方 #刘亦菲 #许红豆","type":"video","author":"刘茜茜的小迷弟","authorId":"5aa76daf11be104455b93478","avatar":"","url":"https://www.xiaohongshu.com/explore/6739745d0000000019019aa2?xsec_token=ABXBhv4zQOWWCLZ2r7XjFndFpkjFf55jeCnpaNHTP40qo=&xsec_source=pc_search&source=web_search_result_notes","likes":2719,"collects":3087,"comments_count":93,"shares":0,"cover":"","keyword":"沙溪古镇","commentList":[]},{"id":"67e57170000000001c02c781","title":"沙溪美好时光🍃","content":"#有风的地方 #沙溪古镇 #沙溪拍照机位","type":"normal","author":"刘茜茜的小迷弟","authorId":"5c0e28f9000000000503ff67","avatar":"","url":"https://www.xiaohongshu.com/explore/67e57170000000001c02c781?xsec_token=AB0Aiza2jnJqVrbL1L1E3feSB2dx6NQhXJW-l86q-ymeA=&xsec_source=pc_search&source=web_search_result_notes","likes":2621,"collects":975,"comments_count":139,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161358/3fb60e6408e3965e96aba4e43671d7fb/notes_pre_post/1040g3k031fho6p8o7e304buv6dkfjvr7saemofo!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"68e25e3d000000000301c3a9","title":"“在沙溪，做一天的许红豆。”🌳","content":"这个国庆，我们一路向西，去大理。\n在这里短暂的逃离生活\n找一个喜欢的院子，作一幅扎染\n找到属于自己的治愈时光\n.\n【沙溪古镇】\n沙溪老街—欧阳大院—薄荷咖啡馆—古戏台—玉津桥—先锋书店\n1️⃣从玉津桥走过，可以在桥上看全景，树荫下吹吹风\n再进入沙溪老街，咖啡馆，书屋，还有许红豆生活过的地方逛一逛，薄荷咖啡馆就在附近\n2️⃣然后几分钟的车程就到了先锋书店打卡李现同款，诗歌塔在对面的咖啡馆后面\n3️⃣最后回到古镇随便逛逛，古镇不大，一天可以从大理往返\n.\n国庆出游，我喜欢带上安慕希🥛黄桃燕麦爆珠酸奶，里面含有Q弹的爆珠和大颗黄桃果肉，一口下去口感丰富，每一口都好喝到爆\n走累了就坐在古镇的石阶上，喝一口安慕希酸奶，感受视觉和味蕾的双重享受！\n我会记得，在草原上，在洱海边，在慢时光的古镇里，一口，就能喝到幸福的治愈时光～\n#安慕希 #安慕希酸奶 #安慕希黄桃燕麦爆珠酸奶 #去有风的地方旅行 #沙溪古镇 #云南 #大理 #最美古镇攻略 #浪漫生活的记录者#国庆出游","type":"video","author":"李星儿Clara","authorId":"5cbbefb00000000010018a3a","avatar":"","url":"https://www.xiaohongshu.com/explore/68e25e3d000000000301c3a9?xsec_token=ABIRt2UJjxvjwui8t4BSfk2KPbBW581z2pKnDIscp9SLI=&xsec_source=pc_search&source=web_search_result_notes","likes":2527,"collects":597,"comments_count":102,"shares":0,"cover":"","keyword":"沙溪古镇","commentList":[]},{"id":"691fd6a8000000001e005491","title":"秋日限定🍁沙溪古镇又到了最美的季节！","content":"11月中下旬-12月，又迎来了沙溪古镇最美的季节，快来大理感受这份秋日限定的美好吧！\n📍拍摄地点：沙溪古镇老街，玉津桥，古戏台，寺登街\n\t\n#旅游编辑部 #秋日到站计划 #小城之秋 #治愈系风景 #沙溪古镇 #大理 #大理旅行 #秋天 #追着秋天去旅行 #沙溪古镇旅行","type":"video","author":"roro03-11","authorId":"59a6cb275e87e77e065d77c5","avatar":"","url":"https://www.xiaohongshu.com/explore/691fd6a8000000001e005491?xsec_token=ABrxW6OkdAYUhuuCVwhwb7jiHs_rjR5hhbyeDM2ppek-U=&xsec_source=pc_search&source=web_search_result_notes","likes":2336,"collects":1005,"comments_count":175,"shares":0,"cover":"","keyword":"沙溪古镇","commentList":[]},{"id":"69d3b847000000001a037b2e","title":"hi 我正在沙溪古镇","content":"欢迎收看我的朋友圈～～～\n在沙溪唱传奇🙋‍♀️🙋‍♀️\n#小田今日的开心 #大理 #去有风的地方","type":"video","author":"李星儿Clara","authorId":"67380b4b000000001d02e246","avatar":"","url":"https://www.xiaohongshu.com/explore/69d3b847000000001a037b2e?xsec_token=ABMkRFibqMuCI77Yk_GS1j1vt1wvO8LG8PViBR3OsLrSo=&xsec_source=pc_search&source=web_search_result_notes","likes":2251,"collects":288,"comments_count":195,"shares":0,"cover":"","keyword":"沙溪古镇","commentList":[]},{"id":"6946b75d000000001e0095aa","title":"如果大理只能选一个古镇过夜 我一定选沙溪","content":"这里是有风的地方，是我真正向往的云南，\n也是离开后还会念念不忘的灵魂栖息地。\n\t\n没有喧嚷的叫卖声，没有十二点了还在笙歌的酒馆；没有花花绿绿的各种光带，也没有横冲直撞的电瓶车……\n\t\n和谐的、暖黄的灯笼，成为天黑后的唯一光源。你会在古戏台听见手碟和卓别林唱歌，会拥有最安静的时光，会看见小猫悄悄走进店里……\n会爱上这一切。\n\t\n如果我告诉你，沙溪还特别适合看星空，\n你会不会更喜欢？\n\t\n天越黑，星星越亮。\n当一切都归于寂静的时候，整个世界只剩星空和你 —— 承包了整个宇宙。\n\t\n天一亮，玉溪桥边晨雾上场。\n太阳一点一点爬起，在旅行团到来前宁静的沙溪还是属于你。阳光不刺眼，过桥米线冒着热气。\n\t\n是我爱的沙溪，\n是我在云南最喜欢的古镇没有之一。\n我会魂牵梦萦，所以也推荐给你。\n\t\n#沙溪古镇 #云南 #大理旅行 #云南旅游攻略 #中国传统古村落 #最美古镇攻略 #收集古城里的烟火气 #找个古镇来场与世隔绝 #古镇慢生活 #治愈","type":"normal","author":"一只野生Peng01-15","authorId":"6016508e000000000100ae6c","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6946b75d000000001e0095aa?xsec_token=ABUVijgpV8umG8nDwoc9aOd0omaUQ8AeOjtrkjqSt8iIo=&xsec_source=pc_search&source=web_search_result_notes","likes":2119,"collects":867,"comments_count":158,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161253/2deb8f1942fa92698ae02edbed3bd51e/notes_pre_post/1040g3k031qanvhiln45g5o0ma2709bjcabam3h0!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69101d4a0000000004017127","title":"丰收的秋 🍅","content":"我们都热爱丰收\n因为丰收是天地写给每一个有所付出的人\n最温柔的回信～🦊\n在沙溪 村边·合\n深深的感受到了秋意\n推开窗是无边的金色稻田\n\t\n最jue的是楼顶那棵柿子树\n橙红色的果实挂满枝头\n民宿小姐姐还摘了柿子给我们吃\n甜到心里去啦～\n\t\n房间的落地窗正对稻田\n早上被阳光唤醒的感觉太美好了\n在露台上喝杯咖啡☕️\n看稻田里的光影跳舞\n时间在这里慢了下来☀️\n#秋色入我家 #住进风景里 #秋天的足迹 #秋天的自愈法则 #秋冬 #秋冬穿搭 #云南#沙溪古镇 #冬日穿搭 #慢生活","type":"video","author":"麻辣不烫11小时前","authorId":"5e58e5030000000001002636","avatar":"","url":"https://www.xiaohongshu.com/explore/69101d4a0000000004017127?xsec_token=ABwtdJPKU9NpOJX9F8cAz1DOXvYofwnjWTYwd7KoV5jgY=&xsec_source=pc_search&source=web_search_result_notes","likes":2055,"collects":569,"comments_count":58,"shares":0,"cover":"","keyword":"沙溪古镇","commentList":[]},{"id":"69b917f5000000001d01edde","title":"“美人如玉 剑如虹”","content":"在沙溪古镇走走～\n想走个温婉路线 画了个红棕色的眼线和下至\n但是略微失败哈哈哈 有点显肿\n#来拍照了 #随手拍 #记录生活 #沙溪古镇 #云南 #大理 #氛围感 #我的日常 #旅游 #拍照姿势不重样","type":"video","author":"刘茜茜的小迷弟","authorId":"569064596a6a6943174d32fd","avatar":"","url":"https://www.xiaohongshu.com/explore/69b917f5000000001d01edde?xsec_token=ABlzKpDSlw5UKVRYDbPi_mcPzVEISM6OWyFSCiyw_dl-k=&xsec_source=pc_search&source=web_search_result_notes","likes":1969,"collects":526,"comments_count":80,"shares":0,"cover":"","keyword":"沙溪古镇","commentList":[]},{"id":"6961e390000000001a0249e6","title":"不巧 我在等你","content":"沙溪古镇真的太美了～第一次拍胶片#胶片 #沙溪古镇 #来拍照了 #氛围感","type":"normal","author":"roro03-11","authorId":"5c8bc643000000001201403e","avatar":"","url":"https://www.xiaohongshu.com/explore/6961e390000000001a0249e6?xsec_token=AB87lyQZd8KhkDkRsl3n4GQoiFkM2wNW2sDNit0b5hwPU=&xsec_source=pc_search&source=web_search_result_notes","likes":1822,"collects":400,"comments_count":54,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161346/00054c1827415efded1770c684a8c6a0/notes_pre_post/1040g3k031r5974tu0a405n4bop1kig1ucvkpsc8!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"68690da0000000001703424a","title":"沙溪宝藏拍照出片点（含攻略）","content":"沙溪的美，藏在巷弄里，也藏在一些特别的小角落！\n今天掏心窝子分享几个亲测的📸宝藏机位，姐妹们码住不亏呀！\n📍 P1-P4: 山风院子\n机位亮点：\n✅晴天必出片！出发前记得看天气预报，如果下雨或者多云的话质感会差很多\n✅免费提供拍摄帽子\n✅网红机位：站在靠近前台的位置上仰拍，注意把大树拍全\n⚠️至少需要2个人合作拍摄\n⚠️除网红机位外，还可以从树屋内向外拍摄，站在楼梯上进行仰拍，如P4，绝美\n💰ps:进店有30元低消，离古镇距离4.4公里\n-\n📍 P5-P8: 药也书屋 (文艺癌必冲！)\n来沙溪不要只知道先锋书局，这家藏在巷子里的书店也超出片\n机位亮点：\n✅这家店的灯光很好地衬出了书卷气\n✅周围可出片点多，楼上天台视野也超棒！\n✅店家把每本书用“药方”纸包装，就像“治愈精神世界的良药”，是在其他书店见不到的新奇巧思，适合留念或者送朋友\n-\n📍 P9-P14: 森熹酒店 (尊嘟值得来！)\n机位亮点：\n✅住在这里去镇上景点步行仅需1分钟，逛累了也可以很快回来休息\n✅侘寂风mix新中式装修风格让每个角落都很出片\n✅店里也有很多有意思的书，拿来看或者当道具都合适\n✅30万意大利进口咖啡机和台湾精选咖啡豆，不喝真的亏了\n-\n最近刚好是森熹酒店周年庆活动🔥回馈住客房价优惠力度空前🔥\n想体验沙溪高端文艺民宿的，闭眼冲森熹酒店！\n更多惊喜，快进森熹主页丝丝解锁呀~\n\t\n#森熹酒店 #沙溪古镇 #在有风的地方  #沙溪旅游攻略 #沙溪拍照打卡地   #沙溪民宿推荐 #出片好地方","type":"normal","author":"李星儿Clara","authorId":"66b3342b000000001d03209c","avatar":"","url":"https://www.xiaohongshu.com/explore/68690da0000000001703424a?xsec_token=ABHorgD4Go_MJMhWWQWD43hu8XZJLabr6M48g9dNMHoaY=&xsec_source=pc_search&source=web_search_result_notes","likes":1747,"collects":874,"comments_count":34,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161350/84dd94248e3af834d6b2f4ce527ba8f1/notes_ ","keyword":"沙溪古镇","commentList":[]},{"id":"68b9072c000000001d00d782","title":"在古镇的日子，慢下来也很好","content":"质朴的小镇，充满情怀的乡村书局，古老的戏台，还有热情的民宿主人和小伙伴洛洛🐶，怀念那几天在沙溪古镇的慢节奏日子，怀念白天漫无目的逛市场，夜晚去桥上散步看满天星的治愈生活～#明星嘉年华 #明星生活实验室 #云南旅游 #治愈 #慢生活","type":"video","author":"刘茜茜的小迷弟","authorId":"5cf62c5f0000000016009703","avatar":"","url":"https://www.xiaohongshu.com/explore/68b9072c000000001d00d782?xsec_token=AButzK5rV3KdEn_Hc-JS23cq1Q4cr6oOkQ5EROLYt1V2w=&xsec_source=pc_search&source=web_search_result_notes","likes":1317,"collects":236,"comments_count":70,"shares":0,"cover":"","keyword":"沙溪古镇","commentList":[]},{"id":"695926f8000000002103ede2","title":"去有风的地方 | 沙溪生活千金不换","content":"在沙溪度过了如梦般悠闲且灿烂的两天。\n\t\n古戏台旁树影斑驳，阿瑞奶奶安静地编织着手工艺品，咖啡店门前暖洋洋晒太阳睡午觉的小金毛，柳树与柿子树交杂着摇曳，坐着10元一趟的小黄车穿梭在田园风光中，感受微风拂在脸上的美好，早上闹钟一响匆匆忙忙从被窝里爬起来欣赏玉津桥的晨雾，下午漫步到山平线咖啡俯瞰这座金黄大地，夜晚在布多鱼围坐在篝火旁，聆听着民谣与远方。\n\t\n你说沙溪为何如此让人流连忘返？因为沙溪的一切都是如此美好、祥和，抚平了我内心的不安与疲惫，深深地治愈我。\n\t\n亲爱的沙溪，还会再见面的，一定一定。\n\t\n#有风的地方 #做一个精神村民 #乡村生活美学 #有风的小院 #沙溪古镇","type":"normal","author":"一只野生Peng01-15","authorId":"5deb0329000000000100b074","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/695926f8000000002103ede2?xsec_token=ABk-4sBRlcYKLhdj4XMqajUImrXFIfmz7edakwmRj-2dw=&xsec_source=pc_search&source=web_search_result_notes","likes":672,"collects":153,"comments_count":11,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161254/ffcb91a3d778719ac0a69f7ef3d508a7/1040g00831qso043ag0005nfb0ckg9c3kppue77g!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"68cbe855000000001301ca58","title":"沙溪才是我印象中慢悠悠的云南大理🫶🏻","content":"这次云南旅游zui喜欢的是沙溪！\n好喜欢好喜欢好喜欢沙溪 每一处的风景都是一幅画\np1-2山平线咖啡馆🏞️\np3-4山有依臣家🏠\np5-6我家稻田咖啡🌾\np7-8叁一咖啡☕️\np9-10山里有座咖啡馆🏔️\np11-12玉津桥🪴\np13-14柿喜小院🎃\np15-16白天的小镇☁️\np17-18晚上的小镇✨\n沙溪真的很舒服，在洱海边呆了四天没感受到宁静，来沙溪古镇才感受到了真正的放松\n#宝藏旅游地 #云南旅游 #大理旅居 #沙溪古镇 #沙溪旅居 #去有风的地方 #大理洱海 #沙溪探店 #云南大理 #咖啡店日常","type":"normal","auth ,"content":"从大理来到了沙溪，完全不一样的感觉，古朴的小镇子，更原始，先去了山边有座咖啡馆，吹吹大山的风，品品山里的咖啡，又是惬意的下午，抵消每位48.直接过去就可以，从沙溪镇需要坐黄蓬蓬车过去（去程20左右，预留司机电话，走时候会来接，往返40）\n晚饭选在喜宝赏饭，味道很棒，搭配风花雪月啤酒，完美\n吃过晚饭在镇子里闲逛，镇子不大，溜达溜达，看到了民族写真，在考虑明天给糖豆小姐姐来一套#山边边咖啡 #乡村咖啡厅 #沙溪古镇 #生活在山下 #大理 #山脚下的咖啡店 #农场咖啡馆#喜宝赏饭 #山里有座咖啡馆","type":"normal","author":"麻辣不烫11小时前","authorId":"58edda9150c4b45b338f1db0","avatar":"","url":"https://www.xiaohongshu.com/explore/6870df4a000000001202070e?xsec_token=ABfhoTbkzpLynAGGwMcgcT2mEUwspWPCWo4AfUKOEWRek=&xsec_source=pc_search&source=web_search_result_notes","likes":306,"collects":241,"comments_count":6,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161356/b620eb2023031d9a38115e0ce71ec711/1040g00831jq30b3930m049cv4qd927dg156gnto!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"68f7113c0000000005033acd","title":"带老妈住进沙溪","content":"沙溪是一个可以让时光变慢的地方，喜欢这里，不仅有沧桑历史，还有秀美风光，更能感受到当地人的平静生活！#沙溪古镇","type":"video","author":"多肉04-02","authorId":"584c01715e87e72c59e0bd99","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ij4ksf97q004atb9f6f502u6mofd2g?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/68f7113c0000000005033acd?xsec_token=ABSCinf85SLkeSN5T6qFu8jAT3fE1alKU24aP2uom9bok=&xsec_source=pc_search&source=web_search_result_notes","likes":290,"collects":132,"comments_count":24,"shares":0,"cover":"","keyword":"沙溪古镇","commentList":[]},{"id":"688ecc4d000000002502b7f3","title":"1.沙溪商业化","content":"1.根据村子里人口述和查阅网络资料整理，可能会有错漏\n2.本人外地嫁来沙溪的媳妇，随手写的心得感悟，没有任何政治色彩，切勿较真#中国传统古村落 #沙溪旅游 #地域建筑文化","type":"normal","author":"roro03-11","authorId":"60549cd1000000000101ee6a","avatar":"","url":"https://www.xiaohongshu.com/explore/688ecc4d000000002502b7f3?xsec_token=ABJ_L6iLRoNSlPutYSmGoDJhHvPZF1TQdMLxN2a0XcEvE=&xsec_source=pc_search&source=web_search_result_notes","likes":218,"collects":90,"comments_count":165,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161345/a1928488ba7e183d896f8bebc009508e/notes_pre_post/1040g3k831kn4kna72a005o2kjj8gbrjaffhokrg!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"68d8f9aa000000001101562b","title":"沙溪，真的是我理想中古镇的样子😌","content":"之前安排云南行程的时候\n问了几个朋友👬\n大家都强烈推荐沙溪古镇\n来了之后真的爱上这个让人无比放松和舒适的地方🎈\n\t\n沙溪古镇位于云南省大理白族自治州剑川县\n在大理去往丽江的途中\n是茶马古道上唯一保存完整的古集市\n被誉为“茶马古道上最后的遗珠”\n\t\n与大理的喧嚣不同\n沙溪有一种安静又原始的感觉\n我觉得商业化程度比较克制\n有很多匠心经营的小店可以慢慢逛\n是一处真正能让人慢下来的地方🍵\n\t\n因为沙溪这边早晚温差比较大\n天气变化比较快\n（我就赶上上午下雨下午就天晴了🤷🏻‍♂️\n所以特地带了两件PYE派的衬衫外套\n天然原色好搭配\n上身特别舒适也很保暖\n整体感觉跟这种慢悠悠的状态特别配\n松弛感🈵🈵\n\t\n真想后面找一个大块时间来这边住一阵\n每天咖啡看书发发呆就特别治愈了\n\t\n#PYE派 #古镇 #沙溪 #云南旅游 #理想型 #有风的地方 #古镇慢生活 #旅行穿搭 #秋冬衬衫 #男生穿搭","type":"normal","author":"李星儿Clara","authorId":"59f6d032e8ac2b2373f1f774","avatar":"","url":"https://www.xiaohongshu.com/explore/68d8f9aa000000001101562b?xsec_token=ABzeVtPC4lkrP_x5Y6n6O5PUnYlNV6addtZ12jB5Y6oO0=&xsec_source=pc_search&source=web_search_result_notes","likes":207,"collects":22,"comments_count":51,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161350/1a71be78de523364bcf7a955a82a8b18/notes_pre_post/1040g3k031mvickrkmg1g49v19c835trkjo6294g!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6966e5af0000000022008485","title":"沙溪凉了？？？","content":"没人的沙溪，你可以慢慢独自感受她。不用和别人抢，都是你的。走累了到📍传统火烤月饼买两个新鲜出炉的鲜花饼和白饼，嬢嬢用传统的炭火烧制。看完早晨的玉津桥，坐在这炭火边烤烤手，咬到热乎乎的饼❤️❤️❤️爽\n\t\n#传统手艺过春节 #把非遗搬进冬日厨房 #历史文化古村 #寻找最美古城 #古镇中的民宿 #精神云南人 #沙溪古镇 #鲜花饼 #传统糕点 #百年老院子","type":"normal","author":"一只野生Peng01-15","authorId":"60092647000000000100165c","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6966e5af0000000022008485?xsec_token=ABolcF_mUBHVm_AetSS9jHP0-viSSZHBa2h6xgf5zOMko=&xsec_source=pc_search&source=web_search_result_notes","likes":195,"collects":34,"comments_count":231,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161254/6ab3dc0f62e94d983cec87db2f45a596/notes_uhdr/1040g3qo31ra5opggno705o094p3g85isb18l4do!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"68c79047000000001d02f975","title":"沙溪古城plog","content":"去有风的地方\n等你\n#廓系穿搭 #介绍一个小叔叔 #男生 #记录生活 #在有风的地方 #古镇慢生活 #精神云南人 #小众古村落 #沙溪 #travel","type":"normal","author":"roro03-11","authorId":"656c95280000000020034ea8","avatar":"","url":"https://www.xiaohongshu.com/explore/68c79047000000001d02f975?xsec_token=ABACJ_c2zmF7_8GKhF3YRC8F__LF3_ein9nWBAAWicAdo=&xsec_source=pc_search&source=web_search_result_notes","likes":176,"collects":7,"comments_count":8,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161346/6ec44daf4152b60f3e0eeff623fa5854/1040g00831meijbghlm1g5pbcikk86jl8rk78qmg!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6976125c000000002800a3c8","title":"沙溪｜慢下来，才听得见风的声音🍃","content":"都说淡季的沙溪是人间理想\n茶马古道上斑驳的石板路\n玉津桥下静静流淌的江水\n古戏台前晒太阳的老奶奶\n四方街那棵三百年的老槐树\n去有风的地方\n听见风的声音\n感受慢慢时光🍃🌸🌌\n\t\n✨旅行Tips：\n• 从大理租车或拼车约2小时\n• 早晚温差大，记得带外套\n• 可以租一套民族服饰，边逛边拍\n• 建议住2-3天，才能真正感受慢生活\n\t\n📍慢走路线:\n07:00 玉津桥·晨雾与马蹄声\n09:00 古戏台·喝咖啡看光影爬墙\n11:00 欧阳大院·寻找许红豆的同款角落\n14:00 先锋书局·云影在书页间散步\n17:00 东寨门·追一场稻田日落\n\t\n📸 拍照点位：\n1️⃣ 玉津桥晨雾（8点前的光影魔法）\n2️⃣ 古戏台门框构图（随手拍都像电影）\n3️⃣ 巷子里的柿子树（冬天还在发光）\n4️⃣ 薄荷咖啡馆门口（“有风小馆”原地重现）\n\t\n遗憾的是，没能多停留几天\n沙溪，期待再见~❤️\n\t\n#沙溪古镇 #去有风的地方 #云南慢生活 #治愈系旅行 #小众古镇 #茶马古道 #有一种生活叫大理 #有风的小院 #沙溪拍照 #古镇慢生活","type":"normal","author":"麻辣不烫11小时前","authorId":"5a17b4e54eacab058645b058","avatar":"","url":"https://www.xiaohongshu.com/explore/6976125c000000002800a3c8?xsec_token=ABs_K7eZjQU5JvqxrQZ8r4crfP-MzbVJ8iScTNhNUE3-U=&xsec_source=pc_search&source=web_search_result_notes","likes":173,"collects":64,"comments_count":12,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161355/d20d7c4a3463a4ebb754462a709de255/notes_pre_post/1040g3k031rovq48iiac049vqslqebc2o3usnh0o!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69b154ab000000000600b0d7","title":"去有风的地方｜沙溪古镇攻略","content":"沙溪属于大理剑川县，地址位置上反而离丽江更近些，丽江自驾过去差不多1个半小时，大理古城过去要两个小时。最好住一晚，感受当地的特色民居。\n\t\n来到沙溪，真的体会到这里确实是“有风的地方”，风和阳光☀️配合的刚刚好，坐在玉津桥旁边听民谣，舒服的快要睡着。\n\t\n沙溪必逛：\n1️⃣ 欧阳大院\n清末马帮豪宅，黄墙竹影，拍出复古大片\n\t\n2️⃣兴教寺\n国内唯一明代白族密宗寺，壁画融合了儒释道，古朴宁静\n\t\n3️⃣薄荷咖啡馆\n许红豆打工的同款小院\n\t\n4️⃣ 先锋书店\n离沙溪古镇有两三公里，玉津桥头有很多摆渡车过去，书店是旧粮仓改造，文艺感十足，诗歌塔登顶俯瞰田野，打卡李现同款机位。\n\t\n5️⃣ 阿瑞奶奶的店\n网红打卡点，门口奶奶坐镇，拍照需消费。\n\t\n6️⃣南寨门\n剧中许红豆牵马走过的寨门，古朴厚重，是沙溪的标志性建筑之一\n\t\n7️⃣沙溪集市\n每周五的热闹，摊位林立，可淘物美价廉的特产\n\t\n#沙溪 #沙溪古镇 #去有风的地方 去有风的地方[eoi]# #去有风的地方一起走走 #新年旅行第一站 #云南旅游 #寻找最美古城 #古镇慢生活 #沙溪到大理","type":"normal","author":"思芸✨","authorId":"5b209d7611be1046ed82bd55","avatar":"","url":"https://www.xiaohongshu.com/explore/69b154ab000000000600b0d7?xsec_token=ABlH6H24QdFTY8lWJ2FYYNsnWw4EuthGsbe8I-8U6waGU=&xsec_source=pc_search&source=web_search_result_notes","likes":171,"collects":83,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161352/25968e9fbb622204cf293efb7926bb19/1040g00831tirpjr5mu4g4a6788endfal36n419g!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69c1d74f000000002200210e","title":"去有风的地方上映三年，后劲依然很大！","content":"每当不知该看什么剧时，《去有风的地方》总会成为我的首选。开播三年，至今我仍会不时重访那片屏幕里的温暖。目前，已经完整看过三遍，因为看着很轻柔、治愈。\n\t\n与许多剧集不同，这里没有刻意制造的误解、拉扯与争斗，不靠跌宕起伏来攫取观众的情绪。在现实已经足够疲惫的工作和生活里，不想再透过屏幕去经历另一段艰苦人生；只想安安静静、轻轻松松地看个剧，而《去有风的地方》，恰好温柔地接住了这份期待。\n\t\n因为太喜欢这部剧，特意去了云南大理的沙溪古镇，剧中重要的取景地之一。去时正是淡季，住在古镇里，清晨早早出门，路上遇到的多是本地居民，背着竹篓缓缓走过。古镇里的所有店铺都还未开门营业，整座古镇笼罩在一层清宁之中。石板路向前延伸，两旁的白族老屋静立着，保持着岁月本真的模样。\n\t\n当天天气很好，古戏台边，阳光从树叶的缝隙间漏下来，暖融融地洒了一地。我坐在大树下，静静的等待着兴教寺开门。偶尔有收垃圾的三轮车缓缓驶过，车上播放着用当地方言唱的歌，旋律悠悠地荡在巷子里。那一刻，我真切地觉得，自己就站在“有风的地方”。\n\t\n去到这里才发现\n原来，\n有些故事不仅能被观看，\n也能被抵达。\n\t\n#小众旅行地  #古建筑  #传统文化  #小众古村落  #沙溪古镇  #去有风的地方  #大理  #大理旅行 #古建筑 #周末去哪儿","type":"normal","author":"一只野生Peng01-15","authorId":"5c7395430000000011033d91","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c1d74f000000002200210e?xsec_token=ABTRZsHxRJ6zt9p3Kx51oQdGb8eXtqkPhpqxUT33Bdz-g=&xsec_source=pc_search&source=web_search_result_notes","likes":160,"collects":22,"comments_count":36,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161253/be64ec1d294f33ae511269c19d1e591c/notes_pre_post/1040g3k831u2vnbuv6uc05n3jil1kefchre2jdlg!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6896f4e0000000002501fc5d","title":"沙溪古镇老中医","content":"很多人慕名而来，用的是云南名贵纯天然的中草药。把把脉，调理一下身体，错过岂不是亏了，哈哈哈哈哈。\n\t\n店里有一位\"志愿者\"海哥，是杨医生的粉丝，海哥说他退休后全国各地自驾游，走到这里偶然来调理，住了段时间，居然把身体调理好了！从此这里便是中转站，出去玩一段时间，就回来休息，店里帮帮忙。\n\t\n在等抓药期间，不时有顾客来拿药喝，就是那种住在古镇的游客，每天固定时间过来，根据状态调整药方，等院子里现抓药现熬现喝的。要走的时候，我遇到一个姐姐，攀谈起来，她说连喝了7天，今天又来领药了，她的气色越来越好了（我见到她的时候确实气色很好），刚开始的时候，脸色蜡黄，身体亏虚。\n\t\n当一位老中医不是为了挣钱的时候，那他一定是有悬壶济世的初心的！杨医生慈眉善目，虽然第一次见，但是我相信他。这次开了10付药，期待后续。哦，对了，门口的小溪水清澈见底，小朋友能玩好久，刚好等我排队拿药。\n\t\n哈哈哈哈，我是有不想分享的私心的，你们没问题的不要过去，别给杨医生累着了，他太忙了就没空给我改药方了，哈哈哈哈哈～\n\t\n8.29更新反馈：\n我们8.15从云南回来，我开始熬中药，每天喝，我的情况：例假一直不好，简称月经不调，杨医生把脉后说气血亏虚，坐月子的时候落下的，但是问题不大。\n❤️❤️刚开始喝完，会有脸痒的症状，不是很严重，除了有点痒，也没有起疹子之类的，杨医生说是在排湿气，后来就没有这个症状了。\n❤️❤️我喝第二副的时候，晚上睡觉那个香啊，我家小朋友出生后，这四年从没有睡过整觉，如果起夜带小朋友去小便，回来也很难入睡。那晚我睡的很沉，感觉长途跋涉了很久很久，终于沉沉的睡下了。目前睡眠质量提升，接觉也容易了。\n❤️❤️睡眠提升之后，白天脾气柔和了许多，不容易发脾气，做事不易疲乏，有劲儿了，总之就是不虚了\n❤️❤️我一直担心喝中药会发胖，实际上并没有胖，而且药很顺口，没有苦涩难咽，我儿子说他喜欢闻这个中药的味道，请我不要打开油烟机，每天排便顺畅，没有不适。\n❤️❤️最神奇的是，喝完第5副，我的例假准时来了，而且很顺畅，也不疼，颜色也很好，这应该是我最近一年多，最满意的一次姨妈拜访了，姐妹们懂我的喜悦吗？等结束了我就继续把剩下的5副喝完。","type":"normal","author":"思芸✨","authorId":"598a39af50c4b443a744c539","avatar":"","url":"https://www.xiaohongshu.com/explore/6896f4e0000000002501fc5d?xsec_token=ABRsGV1g2iVBMXu7wuIhfcGTLLp0ZDEBMqcTqHYgCTTts=&xsec_source=pc_search&source=web_search_result_notes","likes":160,"collects":171,"comments_count":25,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161352/de01d519dc7101bcf7fb02c923b0fd86/1040g00831loo9s21502g49nl8dsqvh9pudut0m8!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6754ea1f000000000103ee88","title":"以为大理已经很慢了，直到我去了沙溪～","content":"沙溪 一个可以留住美好岁月的地方\n这里有茶马古道上唯一幸存的古集市\n也有清晨美的像仙境一样的晨雾\n还有玉津桥旁惬意唱歌的小哥\n来到这里，仿佛时光变的很慢\n.\n很适合远离城市喧嚣，小住几日\n它也是电视剧《去有风的地方》拍摄地\n.\n📍地址:  沙溪古镇（大理市剑川县）\n🚙交通:  离大理约1.5h车程，可顺风车过去（80/人）\n🏠住宿：可住在沙溪古镇里面，出行都非常方便；我住的这个小院，有一只超级可爱的猫咪，院子里还有吊床，经常坐在这里看书、撸猫、晒太阳…，十分惬意\n.\n🚶‍♂️‍➡️沙溪古镇游玩路线：\n玉津桥→四方街戏台→阿瑞奶奶的店→ 兴教寺→ 寺登街→北古宗巷→先峰书店\n.\n🖼️关于景点：\n✅玉津桥\n可以看晨雾和日落，晨雾时间约07:40左右（建议选择大晴天去看晨雾会更美）；日落时间约17:30-18:00\n✅四方街戏台\n这个古戏台是沙溪的地标性建筑；旁边还有阿瑞奶奶的店、有狸杂货铺可以拍照\n✅兴教寺\n古戏台对面就是兴教寺，它始建于公元1415年，是三进院明代建筑，是古代滇藏茶马古道上唯一幸存古集市的代表性建筑，开放时间9:00-17:00\n✅北古宗巷\n这条巷子有院子里的柿子树，整个小巷很宁静，游客也很少，十分惬意\n✅寺登街\n茶马古道上唯一幸存的集市，这条街还有很多文艺小店、美食店…，“沙溪”二字也是在这里拍的\n🍱沿着寺登街上坡的右手边那条街有小吃街\n✅先锋书店\n书店离沙溪古镇有2公里，如果没有开车，可以坐路边小黄车大约8分钟就到了\n.\n🏞️沙溪集市\n导航沙溪集市（只有每周五有，早上8点开始，一直到下午3点左右陆续散场）\n.\n我是@诗涵 ，持续分享旅行宝藏地，下期再见哟\n#不为打卡的旅行 #冬日旅行收藏夹 #秋游记 #小众旅行地 #云南旅行 #沙溪古镇攻略 #沙溪古镇 #冬天去哪玩 #大理旅行 #大理小众打卡 @生活薯 @走走薯","type":"normal","author":"思芸✨","authorId":"5dbb9d540000000001007639","avatar":"","url":"https://www.xiaohongshu.com/explore/6754ea1f000000000103ee88?xsec_token=ABu2ffG13Dj1g07QYJYEkXC2t_kVcRY9amCmAGBfpDIWM=&xsec_source=pc_search&source=web_search_result_notes","likes":157,"collects":86,"comments_count":22,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161352/3f680828d232d9c23af0b8f576f54d93/1040g00831b6883ti7g5g5ndrjla08thp436p4bo!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69995ca2000000001a033bff","title":"以为大理已经够美，直到我去了沙溪❗附机位","content":"避雷！云南沙溪古镇\n乱七八糟！厕所排长队！全是人人人人人\n喝的咖啡！贵的要死！28元的柚子茶是果酱兑水\n牛奶咖啡不想评价！\n破停车场全是泥巴土……","type":"normal","author":"一只野生Peng01-15","authorId":"5e8fbf0f0000000001001981","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69995ca2000000001a033bff?xsec_token=ABHapWnMnc8Pa8s_jW2qAQWE56dotaxVtr8xI2W-r04ok=&xsec_source=pc_search&source=web_search_result_notes","likes":131,"collects":91,"comments_count":355,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161253/5e2249fbb6d43df9f39cf6e408f1234e/1040g00831sremr1um2005nkfns7g86c199i5210!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69659b0a000000002203223d","title":"第一次来沙溪不知道怎么拍？","content":"不用担心出片交给我","type":"normal","author":"麻辣不烫11小时前","authorId":"63b5b6280000000026013644","avatar":"","url":"https://www.xiaohongshu.com/explore/69659b0a000000002203223d?xsec_token=ABCg5pvBzUndw0FHJkT4RnBfuednKU_sOqGhRJssD8kWg=&xsec_source=pc_search&source=web_search_result_notes","likes":112,"collects":70,"comments_count":28,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161356/2c88d98199ddb7f9152f0a0a9e5ccdc0/notes_pre_post/1040g3k031r7r2uop00j05otlmok9idi4cnbgm10!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6811803500000000230126ff","title":"沙溪古镇里的沙漠感","content":"走进沙溪古镇，就像翻开一本古老的书。古旧的石板路、斑驳的墙壁，诉说着往昔的故事。时光在这里放慢了脚步，喧嚣被隔绝在外，只剩宁静与安逸\n#去有风的地方 #小众古村落 #最美古镇攻略 #慢节奏旅行 #刘亦菲 #许红豆","type":"normal","author":"roro03-11","authorId":"609537a40000000001005206","avatar":"","url":"https://www.xiaohongshu.com/explore/6811803500000000230126ff?xsec_token=ABjVB99MlORHoL7phaXqtTMMneN_p6eXuQIHd8WqUFqX8=&xsec_source=pc_search&source=web_search_result_notes","likes":111,"collects":26,"comments_count":10,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161346/48e43bd7490f4280c31eb0641b8af32e/notes_pre_post/1040g3k831gsoub7v425g5o4l6ui08kg6fmr79b8!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69b5165f000000001d01ac95","title":"沙溪不只是古镇","content":"走在沙溪的田埂上乡野间，才懂什么是“日子慢得刚好”。脚下是泥土，眼里是星光，心里是久违的平静。#沙溪古镇 #云南","type":"normal","author":"一只野生Peng01-15","authorId":"5a0c1d07e8ac2b7645a2304c","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69b5165f000000001d01ac95?xsec_token=ABsHkUeMr6kKDxdP0IMh5UOsJxEb5T-4_WJVC03NQsV0s=&xsec_source=pc_search&source=web_search_result_notes","likes":110,"collects":22,"comments_count":61,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161253/83e58e03d5f4e5f90a281b2d23899ccf/notes_pre_post/1040g3k031tmdpnql6q3049vki6egec2caq31ldg!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6980885c000000002202d89b","title":"来学📸，沙溪背景墙打卡姿势！速速保存！","content":"沙溪旅行拍照攻略｜姿势构图一站搞定！轻松出片不费力，赶紧存下这份指南，记得@你的拍照队友来抄作业～#沙溪古镇 #去有风的地方 #沙溪跟拍 #小众取景地 #有风小馆 #沙溪打卡墙 #拍照如何摆pose","type":"normal","author":"思芸✨","authorId":"5d2eff0b00000000110143df","avatar":"","url":"https://www.xiaohongshu.com/explore/6980885c000000002202d89b?xsec_token=ABW4BjBfi1j52ck-wWhHehP4_7gIYpUi3Imr2QJfrlHFA=&xsec_source=pc_search&source=web_search_result_notes","likes":105,"collects":133,"comments_count":14,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161353/f1f6ff005ca0df046db6cabbe86f34aa/notes_pre_post/1040g3k831s355h40ko7g5n9evs5kaguvasvkffo!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"68836065000000001202c329","title":"沙溪古镇的村里有一个可以避暑的家","content":"这是我的家，也是我的作品，今年的客房开放季又如约而至，我们有两间客房。\n\t\n我们不是酒店，无法提供您零瑕疵的服务，但是我们会像招待远方朋友一样待您。如果您有私宅或商业空间的设计委托需求，也欢迎通过预约来家里参观作客。\n\t\n更多了解请移步我的置顶笔记和往期笔记\n\t\n#山居生活民宿 #向往的慢生活 #大理旅居 #我在乡下有个院子  #乡下的房子 #沙溪古镇 #建筑师的家","type":"normal","author":"roro03-11","authorId":"5f32a80e0000000001008681","avatar":"","url":"https://www.xiaohongshu.com/explore/68836065000000001202c329?xsec_token=ABhXgui1bVNB2iwTDutQb_dtaMXi-Hf15TfwsO-CI_tCg=&xsec_source=pc_search&source=web_search_result_notes","likes":98,"collects":81,"comments_count":45,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161345/ba046a311f9070f75b58ae0f029a26d4/1040g00831kbpqt5932605npil07091k1crklb8g!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69aa2808000000002801e54c","title":"沙溪ootd 🍐","content":"一个跟其他古镇比起来稍微安静一些的古镇\n\t\n沙溪古镇应该是被《去有风的地方》一下就带火了 可以看到大家都在找同款打卡点 拍照机位 但是我觉得挺好看的 每个古镇的景色都不太一样\n\t\n如果是住在这里一段时间 慢慢的生活\n应该比走马观花的看一下更舒服\n\t\n#ootd #在有风的地方 #去村里探个路 #沙溪古镇 #云南","type":"normal","author":"一只野生Peng01-15","authorId":"5c2982c3000000000703511e","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69aa2808000000002801e54c?xsec_token=ABUKpp-IeO82QnOSzmDNDQ9MqxTJ4-2Md63Ywmr1kDyfc=&xsec_source=pc_search&source=web_search_result_notes","likes":88,"collects":10,"comments_count":10,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161253/d55ca46ace1c5e024b92576a9909f304/1040g2sg31tbrk6fn62705n19gb1huk8um90nhn0!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"699ae08b0000000028009957","title":"沙溪古镇，这些民宿都替你们住了","content":"一家子出行已经很累，而我们是一家族出行！\n每年春节像是在完成一个巨大的campaign\n从前期策划、调研、梳理、搜集比对...每年春节都过的像在渡劫\n待了三四天下来，推荐不搞特种兵的大批人马出行来这里，因为不折腾\n地方不大，村落分散但离的又不远，大人小孩都有可以玩和歇脚的地方\n\t\n因为我们每次出行都会选择困难症很久，而且春节期间基本都包不了院，家里每个人的消费水平也不太一致，一次得定好多个民宿。\n这次六个民宿踩雷二个，但现在小红书就像小县令一样，不能说别人不好，所以这里只说四家我们觉得好的，供大家参考\n另！\n写这篇笔记的时候我查了一下平台，竟然过两天就开始大降价！\n有的比春节便宜了上千元\n真的是苦了春节党，什么时候我们才有那个福气错峰出行啊\n\t\n细节可以看图片，这里简单总结⬇️\n首先，我们推荐的全部都地暖和热水稳定，因为沙溪早晚温差大。其余两家就是因为没有地暖，而且其他民宿人多高峰洗澡时段热水时有时无，体验很差！\n\t\n村边合——小贵（但节后便宜了超多甚至比很多差的都便宜，生气💢），景美，顶美那种。餐食和甜品绝到不行，人多人少都非常适合，因为可以一站式解决餐食、甜品、咖啡、出片、住宿、游玩...位置也很好，离古镇就3分钟车程，喜欢远离喧嚣的一定不要错过。\n\t\n森熹酒店——小贵（也是节后就不贵了！）氛围感圣体，设计细节太强了，跟村边合一样车可以直接停门口，行李不用提半步。而且他们家不接待孩子，真的把我们家里没生孩子的乐坏了，抢破头都要住这里😂而且他们的餐厅只对住客开放，表弟打包了一个黑松露披萨出来给我吃哭太香！\n\t\n沙溪合院——性价比绝的一批，村边合的第一期，东西用的跟村边合三千多一晚的差不多，就是房间没有村边合那么大，35平-40平左右。基本共享村边合所有的软硬件，包括蓝带咖啡厅中餐厅还有豪华车接送，价格只要几百💰真是狠起心来连自己家都卷。而且就在隔壁，连位置都一样😂但就是没有那么美的稻田山景，不过这个价格，要啥自行车呢？\n\t\n听雨小筑——荣登长辈和我二姑最爱，感觉年纪大的人都有古镇情节，这家就在古镇里，也是他们爱的新中式。我也去了一下房间挺古色古香的，院子简直是我妈的梦中情院，搞得她老人家吵吵着以前为了我们读书没有在村里建别墅...原来我们家也有这条件啊。\n\t\n#沙溪古镇 #沙溪旅游攻略 #春节旅游 #民宿推荐 #村边合villa田园度假民宿 #森熹酒店 #沙溪合院 #沙溪听雨小筑","type":"normal","author":"李星儿Clara","authorId":"6772b795000000001801d700","avatar":"","url":"https://www.xiaohongshu.com/explore/699ae08b0000000028009957?xsec_token=AB2OKhsKK3hnQ5FASY7Lm0Bdtpx0TmEH4xQbqYM44uVfE=&xsec_source=pc_search&source=web_search_result_notes","likes":85,"collects":180,"comments_count":14,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161350/51f8c1d98000e2ce562e758f9192c422/notes_pre_post/1040g3k831ssu4g7nlm605primuam3lo0e2acs70!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6627ab08000000000d031d9c","title":"沙溪跟拍｜听了风的话 去了有风的地方","content":"让远方是远方，让生活是生活。这是一个能让人\n静下心来，放慢时光的地方。这里的悠闲惬意会\n让人觉得还有大把时光可以挥霍。沙溪古镇最大\n程度保留了原始风貌，如果你厌倦了商业化气息\n的拥挤和浮躁，可以来古镇感受下这里的质朴生\n活。古镇并不大，若只是拍照打卡半天足矣，但\n想安心度假，这里值得花些时间慢慢走。泡一杯\n咖啡看夕阳与马邦，沙溪古镇一部凝固的茶马古\n道史书。\n\t\n✅游览路线\n\t\n有狸杂货铺：门口拍照很好看！！而且是可以\n免费拍的~\n\t\n古戏台\n有着千年历史的古戏台和百年的树木都挺立在广\n场，是小镇的中心地带，戏台对面是兴教寺。\n\t\n阿瑞奶奶的店\n阿瑞奶奶的店：需要花蜀买了东西才准拍照\n噢‼️\n\t\n寺登街\n古镇的校心街区，两旁低矮的清代民居，脚下的\n明清石板，有时间的记忆。\n\t\n玉津桥\n是刘亦菲剧中拉行李箱的地方，这里\n的景色真滴好美🍃河里还有小鸭子多🦆\n\t\n先锋书店（是浪漫诗意的乡村书店！同时还可以打卡李现同款视角阁楼！\n\t\n山风院子：这个树屋真的太有动漫感啦！拍\n照好出片！！像是闯进了宫崎骏的动画里！但\n是他家消费才能拍照哟。\n\t\n#沙溪古镇 #大理沙溪古镇 #大理约拍 #刘亦非\n#沙溪旅拍 #去有风的地方 #去有风的地方取景地","type":"normal","author":"麻辣不烫11小时前","authorId":"6067403300000000010070c0","avatar":"","url":"https://www.xiaohongshu.com/explore/6627ab08000000000d031d9c?xsec_token=ABuUcdf2gMhVVeUEzUz1hux7_euWt6e035-2TJwykelDU=&xsec_source=pc_search&source=web_search_result_notes","likes":82,"collects":71,"comments_count":30,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161356/e72dce04e0d45cc41bec2765eb436bf6/1040g008311udrqeg2o005o3780pg8s60q20ksbo!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"65cc1c99000000000b01a5bf","title":"从昆明到沙溪公共交通","content":"1.从昆明先到大理，坐高铁\n2.从大理到沙溪坐客运，在小程序“彩云通”可以买票（ 图1），每天都固定班次（图2）\ntips：从大理高铁站到大理汽车客运站很近 地址（图3），距离（图4）步行七八分钟。大理有好几个客运站，别走错了\n3.客运站不大，去了先取票，电子票也可，刷身份证进（图5图6）。然后就可以坐车啦。大客车（图7），每个座位是有编号的，车票上也有座位号，有点像电影院对号入座。\n4.路上差不多三个小时，赶上大理古镇那段路有点堵\n5.沙溪这边下车点是生态停车场，不是客运站。之前给大理那边客运站打电话他们也不知道在哪下车，所以也不知道怎么跟民宿老板说。\n这边都是石头铺的路，对行李箱不太友好。","type":"normal","author":"刘茜茜的小迷弟","authorId":"5ca2df130000000010000d01","avatar":"","url":"https://www.xiaohongshu.com/explore/65cc1c99000000000b01a5bf?xsec_token=ABgiBd7ryFsm0DgubaprGx1TVZQOZ3KckiparnzJm3PHU=&xsec_source=pc_search&source=web_search_result_notes","likes":82,"collects":107,"comments_count":7,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161357/480ad1b3a5b3fb7ce14fb66e4156f459/1040g00830v50ng145c2g5n52rs9k0381d3elieg!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69b10e65000000000800fdbe","title":"大理 ｜沙溪古镇","content":"#去有风的地方 #古镇 #云南 #大理旅行 #穿什么 #大理","type":"normal","author":"roro03-11","authorId":"6444e21b0000000010026f11","avatar":"","url":"https://www.xiaohongshu.com/explore/69b10e65000000000800fdbe?xsec_token=ABlH6H24QdFTY8lWJ2FYYNsvCW0FtqU_hIttFcIXRK0yk=&xsec_source=pc_search&source=web_search_result_notes","likes":71,"collects":15,"comments_count":4,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161345/3fdadfab81bfdcd60f39154c9ca24cc7/1040g2sg31tij7jf05kag5p24s8dk4rohsur5s3g!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"698a2f9d000000000c035c7a","title":"沙溪古镇，去有风的地方","content":"云下村落，沙溪古镇\n于是我一个人再次出发，\n比起大理的商业化和喜洲古镇的烟火人间（麦田绿了添入色调） ，很多地方同质化。\n更喜欢沙溪古镇\n这茶马古道上唯一幸存的古集市，\n保留着古朴模样，\n1️⃣阿瑞奶奶的店\n之前刷到阿瑞奶奶，今天见到了本人她很温柔，沙溪古镇的古朴美和这位奶奶岁月美的痕迹，这里的每个人都很温柔\n2️⃣欧阳大院\n黄土青瓦下被阳光洒进成了最美风景。\n3️⃣玉津桥\n玉津桥下的潺潺流水在夕阳下格外温柔，\n风起铃铛响起的声音在桥边真真切切有感受到。          4️⃣树屋咖啡\n每一处装饰都有自己的风格包括制作咖啡的帅哥穿衣。\n一身牛仔衣格子衬衫、马丁靴和店里风格很搭都很复古，店里坐了两个多小时，注意到一个细节店里的人员对每位来的顾客都会温馨提示上楼小心台阶，添加水湿巾纸巾超越了很多店，离开时提醒每位顾客带好自己随身物品，情绪稳定让人感触很深。  那会坐那想，每天进进出出那么多人他如何做到不厌其烦的温馨提示多少次并且情绪稳定。自己这学期面对每天近40个孩子其中一个顶十几个，和各种事情反复情绪内耗我意识到自己很久没有发自内心的笑过。今天在这里对自己有了新的感触。\n店里的猫很可爱。\n5️⃣菌与花·云南特色主题餐厅清真\n酸木瓜炒小黄牛肉很不错，大理的旅游景点能让我摆脱吃拉面，吃上清真漂亮饭啊哈哈。\n6️⃣小姐姐说情绪真的会影响一个人的健康，\n很多事情是我们的心态，\n不要着急判断这件事情怎么……影响心情，\n而是这件时间无论好的坏的它教会了我们什么，\n这就是好的。\n把时间浪费在宏大的风景上，\n热爱每一个瞬间，\n原来她跟我一样先斩后奏 😃\n周内熬夜加班的牛马，\n周末凌晨的赶车\n每次出发遇到不同的人\n有温度、有趣灵魂人和远程导游姐妹，\n向往一年多的地方一次次因各种原因落空\n在不同时区抵达这座城市。\n每次返程的路上我依旧反复用文字记录。\n#沙溪古镇 #阿瑞奶奶的店  #有风去的地方 #清真美食 #独自旅行","type":"normal","author":"一只野生Peng01-15","authorId":"5cd732da0000000017021bfb","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/698a2f9d000000000c035c7a?xsec_token=ABkhEFo7F-GrqgflTZxsunFA5n9mqyJrUrRMMlcExALdU=&xsec_source=pc_search&source=web_search_result_notes","likes":69,"collects":34,"comments_count":16,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161254/4d5323a7db3f4af3864096ac6a5d2f97/notes_pre_post/1040g3k831scjqeuf585g5n6n6bd5s6vr4s7o9jo!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"66b4abce000000001e0184f2","title":"既有古迹又有风光，大理最值得一去的古镇","content":"剑川沙溪古镇的冬日记忆\n🗓️2024.02.05\n\t\n- 沙溪兴教寺-古戏台 | 国保第六批（图2/图9）\n- 茶马古道-沙溪段/玉津桥 | 国保第七批（图3/图12）\n- 寺登街古建筑群-欧阳大院 | 云南省保（图10）\n- 南寨门（图1/图4）\n- 北寨门（图8）\n\t\n#人文景点分享  #最美古镇攻略  #沙溪古镇  #茶马古道  #大理旅拍  #剑川沙溪  #古建筑  #全国重点文物保护单位","type":"normal","author":"思芸✨","authorId":"5c555713000000001800256b","avatar":"","url":"https://www.xiaohongshu.com/explore/66b4abce000000001e0184f2?xsec_token=AB-4WJhTZOIaUnHbnMa1v0XiUR_o3p3s5f-g1iEk996vI=&xsec_source=pc_search&source=web_search_result_notes","likes":68,"collects":20,"comments_count":6,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161352/79e0d0f0f14ca66e05b29b95623aefc4/1040g2sg316846rqj1edg5n2las9m09bbj9tffso!nd_dft_wgth_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69b0290b0000000006031910","title":"第185站 沙溪古镇","content":"🏚️ 沙溪古镇 · 茶马古道上最后的“活化石”\n走过大理，路过丽江，千万别错过沙溪。这里没有夜店和旅行团，只有红砂石板路、百年古戏台和清晨赶着羊群过玉津桥的当地村民。它是茶马古道上唯一幸存的古集市，也是《去有风的地方》让无数人沦陷的“有风小镇”。\n📌 核心信息\n· 门票：古镇免费！兴教寺20元\n· 开放时间：全天\n· 建议游玩：1-2天（强烈建议住一晚，早晚的沙溪是两个世界）\n📸 必打卡点\n玉津桥（免费）：横跨黑潓江的单孔石拱桥，长35米。清晨7-8点晨雾缭绕时最美，常有村民赶着羊群经过，瞬间穿越回百年之前\n寺登街+古戏台（免费）：古镇中心广场，地面铺红砂石板。始建于清嘉庆年间的三层飞檐古戏台，是沙溪地标\n兴教寺（20元）：建于1415年的明代白族佛教寺院，寺内保存20多幅明代壁画\n欧阳大院：保存完好的马店大院，当年马帮歇脚的地方，木雕门楣刻着“读书耕田”\n先鋒書局沙溪白族書局：由旧粮仓改造，文艺青年必去，登上旁边的诗歌塔可俯瞰沙溪全景\n🍜 吃什么\n· 人均：小吃5-10元，正餐50-80元\n· 必尝：牛乳饼/羊乳饼（当地特色，配菌子炒或直接吃）、沙溪土锅鸡、松茸炖鸡、乳扇沙琪玛\n· 推荐：大众饮食（地道）、芗12西餐厅（牛肉堡好吃，需预约）\n🏡 住哪里\n· 预算：古镇内民宿200-600元/晚\n· 推荐：十然山舍（刘亦菲拍戏住过）、既下山、沙溪古镇客栈\n· 小提示：木结构老宅隔音一般，但体验感满分，建议提前预订\n⚠️ 实用贴士\n1. 晨雾看运气：想拍玉津桥晨雾建议7点前到，但雾浓不浓全凭缘分\n2. 石板路：凹凸不平，穿防滑运动鞋\n3. 温差大：海拔2100米，早晚温差超10℃，夜间需薄羽绒\n4. 医疗：镇上只有卫生院，无24小时药店\n5. 信号：部分区域弱，正好放下手机\n💬 个人观点\n沙溪是那种想私藏起来、又忍不住安利给所有人的地方。它美在刚刚好的分寸感——开发了，但没有过度；出名了，但不喧嚣。清晨看晨雾笼罩玉津桥，傍晚在古戏台边喝咖啡发呆，晚上在石板路上抬头看满天星星。在这里，时间真的会变慢。\n适合：想逃离喧嚣的人、文艺青年、摄影爱好者\n劝退：喜欢夜生活、追求刺激体验、只有半天时间的\n#寻找最美古城 #美丽的古镇美丽的景色 #历史文化名镇 #千年古村落 #美丽的地方 #中国传统古村落 #人生就是一场旅行","type":"normal","author":"一只野生Peng01-15","authorId":"59bd577a82ec3920580d29cf","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69b0290b0000000006031910?xsec_token=ABPZ9oIodOZXi13lbJnsNSowqoX7YClGY6UxFK-2PGXT8=&xsec_source=pc_search&source=web_search_result_notes","likes":64,"collects":54,"comments_count":7,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161254/8bf9f4b9beece9c781caae1e71ec3c31/notes_pre_post/1040g3k031thn7uon5m0049q23rbnkaefk4u9seo!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6970a50f0000000022023417","title":"在大理沙溪古镇,有一家视野无敌的民宿","content":"推开窗就是稻田和山野，出门慢慢逛沙溪\n住在村边·合 Villa，才发现原来沙溪可以住得这么轻松🌾\n那种不用爬山、不用走夜路，但风景一点没少的感觉，真的很加分\n很多客人第一次来都会说一句\n“原来沙溪可以住得这么舒服”\n.\n📍位置：沙溪古镇北龙村与华龙村接壤的村口\n我们在选址的时候，最在意的就是\n既要有开阔的风景，也要住得方便\n所以这里是在村口平地，不用爬山、不走窄路\n.\n🚗 出入古镇我们都会安排豪华专车接送\n座驾是宝马7系/GL8/保时捷卡宴\n客人每次来都会跟我们说\n这一点真的省了不少力气和费用\n冬天坐封闭式的车也不用被寒风袭卷\n.\n房间的窗景，是我们最骄傲的部分之一\n没有遮挡，稻田和山野直接铺开\n西式早餐和下午茶也安排在自家的咖啡厅\n希望大家不用赶行程\n坐着看看风景，就已经很好\n.\n院子的设计我们做得很克制\n不想过度造景\n只是希望大家走进来，会觉得安静、自然\n建筑本身，也尽量融进沙溪的环境里\n.\n房间面积在 70㎡ 左右\n我们希望客人住几天，也能像在家一样自在\n家具选择偏向舒适、美感\n不只好看，而是经得起体验\n.\n细节配置上，我们也尽量做到周全\n地暖、中央空调、壁炉采暖、戴森加湿器\n都是为了让您在冬天的沙溪住起来更友好\n.\n餐饮部分由法国蓝带厨师学院的团队负责\n早餐、烘焙和下午茶都会用心准备\n咖啡机是三十万一台的LaMarzocco\n晚上也可以在村边合酒廊免费享受一杯特调鸡尾酒，放松下来\n.\n我们一直希望，来到沙溪的客人\n不用为了住宿多操心，只需要把时间留给沙溪本身\n.\n如果你计划来沙溪\n想找一个安静、有风景、住得舒服的地方\n欢迎来村边·合 Villa\n我们在这里，等你慢慢住✨\n-\n【图片使用说明】\n本笔记图片综合使用以下素材：\n(1) 由本民宿拍摄的照片；\n(2) 已获得住客授权使用的照片。\n如任何图片侵犯第一原创者权益，请通过私信/官方联系方式与我们联系，我们将第一时间核实并删除\n\t\n#大理沙溪 #沙溪古镇 #去有风的地方 #云南旅游 #民宿推荐 #沙溪民宿 #村边合villa田园度假民宿 #去有风的地方旅行 #让自己住进风景里 #睡进风景里","type":"normal","author":"麻辣不烫11小时前","authorId":"668cb0290000000003032a46","avatar":"","url":"https://www.xiaohongshu.com/explore/6970a50f0000000022023417?xsec_token=ABFVDD751v3XlwDK1KHFsFR32-ivhwUODD4OqYQ2HVZLg=&xsec_source=pc_search&source=web_search_result_notes","likes":59,"collects":21,"comments_count":71,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161356/6077164cfd62710d2c47bc0674bc6a6b/spectrum/1040g34o31rjmc8c8i4eg5pkcm0kguai67gok668!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"67113d600000000021005301","title":"为了这扇窗～特意来了趟沙溪⛰️","content":"每扇窗都像油画🖼️\n\t\n真的超级出片随便拍都好看\n\t\n咖啡不难喝虽然小贵但是值得\n\t\n我们本来想拍个照就走的\n\t\n结果太舒服了就躺平了整个下午\n#山里的咖啡馆  #沙溪古镇 #沙溪拍照打卡地","type":"normal","author":"思芸✨","authorId":"5936c9026a6a690789156569","avatar":"","url":"https://www.xiaohongshu.com/explore/67113d600000000021005301?xsec_token=ABAHwEKNmj8Dulqd4sZh5h66qd8Z75WGwpsHlx3Moi0A4=&xsec_source=pc_search&source=web_search_result_notes","likes":51,"collects":43,"comments_count":3,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161351/a7d4f394fcbe5d8fef907cc9f2d86f20/1040g2sg3192gvar14ob049iruj4g4pb9pesrqkg!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69b2ad3f000000001503a81a","title":"春天来了","content":"春天来了，该绿的都绿了#去有风的地方 #沙溪古镇旅拍","type":"normal","author":"思芸✨","authorId":"68864f00000000000d03ff7e","avatar":"","url":"https://www.xiaohongshu.com/explore/69b2ad3f000000001503a81a?xsec_token=ABLe32UURpNLCpGtVGTCreTG9CzyAzKIiQUE_9fgdA-mc=&xsec_source=pc_search&source=web_search_result_notes","likes":51,"collects":6,"comments_count":7,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161353/6f45b35bc96d5116a01000666851516c/1040g00831tk5r11vmu1g5q469s03fvruv0s5bb8!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69db23a6000000001b021ecb","title":"去云南一定要留一天时间给沙溪！！","content":"这是比大理古城有意思太多的地方\n虽然距离大理车程近两小时\n但当你在玉津桥下坐看蓝天小溪绿草和小憩的山羊时\n当你漫无目的闲步在小镇上偏僻又安静的小巷时\n当你坐在屋顶咖啡店俯瞰大山或小镇时\n你就会知道原来中式美学可以这么美\n原来古镇可以这么有意思\n原来生活可以如此美好又宁静\n如果可以\n来大理或丽江一定要留一天给沙溪古镇\n这里让我对再次来云南又有了新的期待和计划\n虽然我现在还在云南\n但已经在想念沙溪了\n不愧是去有风的地方严选取景地\n#沙溪古镇 #云南 #云南旅游 #去有风的地方 #中国传统古村落 #去有风的地方旅行 #苍山清碧溪 #沙溪","type":"normal","author":"一只野生Peng01-15","authorId":"55ccb1be589446702957457e","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69db23a6000000001b021ecb?xsec_token=AB5N_GvVmvyEbq-Xx7PIzKq_eKBtnXXSTGCnn335x_mFs=&xsec_source=pc_search&source=web_search_result_notes","likes":48,"collects":14,"comments_count":17,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161254/cf9ed31e0f8b87c7340b92a4f7edd387/1040g2sg31urm9tro2qvg412s37orshbugq5kn4g!nd_dft_wgth_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6936ccb4000000001e008345","title":"沙溪古镇｜去有风的地方走一走","content":"来到去有风的地方，走一走许红豆和谢之遥走过的路～太舒服的小镇～\n📍薄荷咖啡馆（图1-3）\n阿遥开的有风小馆，娜娜打工处，剧里出现最多的取景地，点杯咖啡，坐在门口，沉浸式感受剧中的惬意\n📍有狸杂货铺（图4）\n在大广场处，阳光洒下，坐在门口晒太阳，好不惬意\n📍先锋书店（图5-6）\n李现再次去大理旅行摄影，专门去拍了这个地方，很有感觉的书店\n#云南 #去有风的地方 #沙溪古镇 #大理 #大理旅行","type":"normal","author":"思芸✨","authorId":"57be637c7fc5b85d71d9ff83","avatar":"","url":"https://www.xiaohongshu.com/explore/6936ccb4000000001e008345?xsec_token=ABfM3HpKl7FMoXNvS5PBk3TpIg8aSQBwYGl_2uYCJ5jFQ=&xsec_source=pc_search&source=web_search_result_notes","likes":43,"collects":19,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161352/4fccf1e7cf0e1b28d6f5b46555b253df/notes_pre_post/1040g3k031pr6n8tnl43048lhtdhnpvs39iu5qt8!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69d76315000000002301cf5a","title":"曾经的避世小镇，现在也是人来人往📍沙溪","content":"许久之前的我，总是喜欢避开大理丽江的人潮，去沙溪或者束河溜达，独享一份与世无争的慢时光。\n古戏台、玉津桥、白族老宅，处处都是原生态的治愈感。这仿佛是一座从地下破土生长出来的小城镇。\n以前的沙溪，没有过度商业化，只有溪水潺潺、鸟鸣阵阵。巷子里的烟火气，稻田里的清风，随便走走都能抚平内心浮躁。\n先锋书局藏着文艺浪漫，转角的小店满是手作温暖，镇上的集市满是阳光的味道。\n在这里，发呆、晒太阳、漫步，才是我喜欢的方式。\n真正的避世古镇，去过一次，就再也忘不掉。可惜现在已经人潮汹涌，再也回不到从前。\n#沙溪古镇 #云南旅游 #古镇治愈时刻 #大理周边游 #慢生活旅行 #去有故事的地方 #美丽的古镇美丽的景色 #走过的风景","type":"normal","author":"一只野生Peng01-15","authorId":"5f2efaac0000000001003b75","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d76315000000002301cf5a?xsec_token=ABljk4CZBog8kb0JB0xNVVd2EZ31EL2U_lcelrmlTJVYg=&xsec_source=pc_search&source=web_search_result_notes","likes":37,"collects":4,"comments_count":28,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161308/8098c3cc6ab09c03c894043b010c30f3/notes_uhdr/1040g3qg31uo11fisia1g5npevam08erlqas01f8!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6923d35d000000000d039c74","title":"来沙溪拍照，根本不需要你会摆POSE","content":"看到这条笔记的你，就是我在沙溪想找的模特！\n来沙溪古镇需要拍摄可以找我哦～\n#沙溪古镇 #去有风的地方 #旅拍摄影师 #沙溪约拍 #沙溪古镇跟拍 #有风小馆 #刘亦菲","type":"normal","author":"麻辣不烫11小时前","authorId":"5d2eff0b00000000110143df","avatar":"","url":"https://www.xiaohongshu.com/explore/6923d35d000000000d039c74?xsec_token=ABa8jdtZU_EwTStC5XkLWaullVxJ6HVPHQD9RPC2qrU8s=&xsec_source=pc_search&source=web_search_result_notes","likes":37,"collects":21,"comments_count":12,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161355/109504f5898cac80bb222784c7e331ef/notes_pre_post/1040g3k031p8ldfoois6g5n9evs5kaguvn7v14ig!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69d325cb000000001d01edaa","title":"别再认错了！这是太仓沙溪，不是云南沙溪‼","content":"谁懂啊家人们！\n每次说去沙溪古镇，都被问“去云南那么远”\n真的会谢🙏🏻这是江苏太仓的沙溪，藏在江浙沪的千年江南水乡，不用千里迢迢跑云南，周末就能冲！\n没有云南沙溪的偏远难行，这座1300年的古镇，完完全全保留着江南本来的慢模样✨\n一河两街三桥，青石板路延伸向远方\n七浦塘水缓缓流淌，明清老宅临水而建\n白墙黛瓦，小桥流水，摇橹船轻轻划过水面\n没有过度商业化，只有满满的市井烟火气\n逛三里长街，看古桥卧波\n庵桥、义兴桥满是岁月痕迹\n走在老街上，能听见吴侬软语，看见当地老人悠闲晒太阳\n偶尔飘来猪油米花糖、桂花糕的香甜，治愈感拉满\n✅必体验\n▪️逛免费古街，不用门票就能沉浸式感受江南\n▪️吃一口非遗猪油米花糖，香甜酥脆超怀旧\n▪️尝陆家糕团、草头饼、太仓肉松，地道江南味一口沦陷\n▪️傍晚灯笼亮起，夜游古镇，氛围感直接拉满\n▪️临河茶馆坐一坐，喝杯茶，听段评弹，偷得浮生半日闲\n📍坐标：苏州太仓市沙溪古镇\n🚗交通：嘉兴自驾1.5h，高铁到太仓站打车20分钟就到\n真的太爱这种小众又安静的古镇了\n避开人潮，不用远赴云南\n在江浙沪家门口，就能遇见最温柔的江南\n#太仓沙溪古镇 #旅游万粉扶持计划 #古镇 #中国传统古村落 #再好的风景都不及亲眼所见#江浙沪周边 #免费游古镇 #小众古村落 #江南春色处处好 #古镇慢生活  #再好的风景都不及亲眼所见","type":"normal","author":"思芸✨","authorId":"65157f420000000023026fd7","avatar":"","url":"https://www.xiaohongshu.com/explore/69d325cb000000001d01edaa?xsec_token=ABMkRFibqMuCI77Yk_GS1j1vr02Mvwl-ODjxG1-6uDxvg=&xsec_source=pc_search&source=web_search_result_notes","likes":32,"collects":12,"comments_count":26,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161352/b64729363ef3694bf03c3a19f29d680c/notes_pre_post/1040g3k831ujsjd48is005p8lft18srunl8rf5do!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69d46b3f000000001d01c8f6","title":"大理最值得来的地方：沙溪古镇","content":"不同于以往去过的古镇，这里被保护的很好，没有喧嚣的叫卖，更多是轻柔的风、静静的水、缓缓的人。在这里时间像流水一样逝去，随意坐下看来往的人，听悠扬的乐曲让人一下子放松了。\n\t\n#云南 #大理 #寻找最美古城\n#沙溪古镇 #小众古村落 #旅行\n#富士直出 #风景 #古村落风景 #全屏封神挑战\n@摄影薯 @生活薯","type":"normal","author":"一只野生Peng01-15","authorId":"5b55180a11be101542e26664","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d46b3f000000001d01c8f6?xsec_token=ABvIecttFK4GDtaG4Gp4UwNKHmQHtdf9aHLrezLaMhSKQ=&xsec_source=pc_search&source=web_search_result_notes","likes":25,"collects":2,"comments_count":12,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161308/176dc6ce5ad19fba1f5ad48185d903ee/1040g2sg31ul3srcp1mj04a7dimc0kpj4lm4feco!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69be1132000000001f007e51","title":"「去有风的地方」沙溪古镇❗附机位","content":"跟着许红豆的脚步，走进「去有风的地方」\n沙溪古镇，真的给了我意想不到的惊喜\n这里没有拥挤人潮，不见过度商业化\n只有炊烟、小狗、石板路和静静流淌的时光\n仿佛每一步都踩在古老的茶马故事里\n时间在这里好像走得很慢很慢⏰\n而我，就好像走在一部\n永远不想让它结束的治愈系电影里📽️\n如果你也喜欢慢慢走、静静感受\n沙溪，真的值得你为它停留✨\n\t\n——————————————————\n📸【主图九宫格机位分享】\nⓟ1，3，6，7 四方街·阿瑞奶奶的店，沙溪卓别林·有趣的人物瞬间，古戏楼，兴教寺\nⓟ2. 南古宗巷.📍“渡鸦”\nⓟ5 沙溪薄荷咖啡馆门口\nⓟ4 玉津桥\nⓟ8，9 树屋☕.📍“沙溪粮食管理所”\n\t\n#小众旅行地 #去有风地方 #沙溪古镇 #沙溪拍照 #大理 #云南旅行 #假期去哪玩  #云南旅居推荐官 #最美古镇攻略 #大理旅行","type":"normal","author":"思芸✨","authorId":"5d386cf40000000011039862","avatar":"","url":"https://www.xiaohongshu.com/explore/69be1132000000001f007e51?xsec_token=ABSQiwT0iRtCkGNw8CdL67KTU6Z8qKJEdnLiub6QnDoiU=&xsec_source=pc_search&source=web_search_result_notes","likes":25,"collects":16,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161351/c0a2ac5d023fe46468aa5d61fc21ee71/1040g00831tv92d2fnr2g5n9odjq4f632kkaro18!nd_dft_wgth_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"68bd6c15000000001c032f67","title":"在沙溪拍到了我想要的松弛感旅拍🌿","content":"客人说这就是她想要的风格～自然 不是流水线的那种\n-\n📷：@一知夏摄影\n-\n🎈位置：沙溪古镇一知夏摄影（导航可到）\n-\n🍃关于我们「一知夏」摄影工作室\n🙇🏻‍♂️我们可能是全大理沙溪蕞「叛逆」的摄影团队，扎根在沙溪2年，我们一直在坚持什么❓\n：🙌🏻坚持后期手工校色 首家唯一的胶片质感\n：拍摄时跟着光影走 留下你在沙溪的记忆温度🌻\n：保留自然真实的皮肤质感✨ 允许自我瑕疵和解\n：我们尽力留住光影情绪和当下你的状态\n-\n敲重点哦！需要提前预约～\n-\n大理写真｜大理约拍｜彝族写真｜沙溪旅拍｜沙溪古镇约拍｜沙溪约拍\n#沙溪一知夏旅拍#去有风的地方  #沙溪古镇 #拍照技巧 #拍照姿势不重样 #沙溪旅拍#交换春天  #大理写真#跟拍","type":"normal","author":"麻辣不烫11小时前","authorId":"6286777700000000210279ba","avatar":"","url":"https://www.xiaohongshu.com/explore/68bd6c15000000001c032f67?xsec_token=ABhtuOikclnWVmm6BLf0fvH3T843HZ06QANhx2JoBw9dU=&xsec_source=pc_search&source=web_search_result_notes","likes":21,"collects":16,"comments_count":3,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161356/721f85421018b5ab6477e8e590557993/notes_pre_post/1040g3k031m4lkcaa5i1g5ok6etrocudqffn9rho!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69de0de1000000001f0049bf","title":"大提琴🎻","content":"#手工皮具#手作#原创#大提琴#挂饰#大理#沙溪古镇","type":"normal","author":"刘茜茜的小迷弟","authorId":"60a07d7f0000000001005a00","avatar":"","url":"https://www.xiaohongshu.com/explore/69de0de1000000001f0049bf?xsec_token=ABt4TPnfeXnt0HvMDvY0OLzTM1g5iGomuS0PvjMPmHP18=&xsec_source=pc_search&source=web_search_result_notes","likes":21,"collects":17,"comments_count":4,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161357/bcaaef39bf22a3de92d3d2df3e2617a2/notes_pre_post/1040g3k031uuhd8c5iq005o50flvg8mg0n2ff128!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6997abe8000000001503bac9","title":"没人告诉我沙溪古镇这么多人","content":"正月初三，想着大理古城很多人，沙溪古镇应该会安静一点\n到达之后吓我一跳，连停车都好困难……\n整条路都是人\n每个饭店都要排队\n#有风的地方 #新年旅行第一站","type":"video","author":"思芸✨","authorId":"56daec4fa9b2ed7d712dbad6","avatar":"","url":"https://www.xiaohongshu.com/explore/6997abe8000000001503bac9?xsec_token=ABesvf4ykla0r4xF7uvkdO_CS7Gqm1KjPZmd-fv8vqGhg=&xsec_source=pc_search&source=web_search_result_notes","likes":20,"collects":2,"comments_count":93,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161352/ad1581d6f215434caa0f818afc4273d2/1040g00831spps63mlmkg46g81sm4vemms0meapo!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"6953929c000000002203864b","title":"沙溪古镇已经是我最喜欢的古镇啦！","content":"这次有攻略😄\n\t\n交通：\n1.住洱海磻溪这边，提前一天在小红书找了拼车，第二天9点民宿门口接\n2.11点多到达沙溪，约定好4点在原地集合返程\n\t\n行程：\n1.下车后就开始逛，冬日的上午很冷很冷，我们从古戏台这边一路走，每个小店都很有特色\n2.12点多在菌与🌹吃了饭，好好吃饭黑松露炒饭，光盘\n3.吃完饭继续逛，银杏很美，拍了很多很多\n4.小镇很小，路过了市场，里面也有各种美食，二三十可以有炒饭或者面条，但是还是我们的黑松露炒饭美味！\n5.欧阳大院一定要去，木雕很惊艳！\n6.逛得累了就在阿瑞奶奶的店旁边的一个咖啡店喝茶（38元一壶），二楼坐着好安静，坐了一个多小时，老板给续了四次开水\n\t\n总结：\n1.如果喜欢人文风景，喜欢这里，可以在这里住一晚（就是我!要住！）\n2.四个小时绝对够逛，我们只逛了两个多小时，喝茶一个多小时就回了。\n#留住秋天的一百种方式 #在有风的地方 #古村落探秘 #去有风的地方旅行 #沙溪古镇 #沙溪 #大理 #丽江 #古镇","type":"normal","author":"一只野生Peng01-15","authorId":"670fda12000000000d025cad","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6953929c000000002203864b?xsec_token=AB0axb3qm9ohFAfMUVSF66vmfH9HTEVNhpkkvviDNiL2M=&xsec_source=pc_search&source=web_search_result_notes","likes":19,"collects":7,"comments_count":7,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161253/58c6eb1597f8e9894056cfafde000886/notes_pre_post/1040g3k031qn80q8t7oeg5pofr893cn5d5k1h400!nd_dft_wgth_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69abfdc900000000280082a1","title":"来沙溪一定要体验的❗️周五限定🍵茶马集市","content":"如果来沙溪正好赶上周五，那别只逛古街，每周五的集市你一Ding不能错过，没有过度商业化，全是本地白族、彝族乡亲的原生市集，马铃声、叫卖声混着烟火气，一脚踏进千年茶马古道的日常🐎\n1️⃣时间\n每周五 08:00-17:30（上午8-12点Z热闹，下午可轻松砍价）\n2️⃣地点\n沙溪古镇四方街+寺登街延伸段，导航搜「沙溪镇政府」就能找到\n\t\n一路上各种商品琳琅满目，菌菇、茶叶、墨红玫瑰、甘草水果、新鲜蔬菜、冰牛奶还有各种小吃，现烤乳饼配玫瑰酱、稀豆粉油条、沙溪粑粑、烤乳扇还有不少当地非遗手作，白族刺绣小物、竹编背篓、剑川木雕小件、马铃铛，自带马帮氛围感\n如果买野生菌需要注意⚠️市场大部分都是养殖的，注意辨别。\n\t\n太喜欢这种不赶时间慢慢逛的地方了，在沙溪的集市里，找到了最真实的，云南烟火🍃\n#沙溪古镇 #沙溪赶集 #云南小众旅行 #茶马古道 #大理周边游 #古镇烟火气 #大理旅行","type":"normal","author":"roro03-11","authorId":"5a7aede8e8ac2b687c4fb8d3","avatar":"","url":"https://www.xiaohongshu.com/explore/69abfdc900000000280082a1?xsec_token=ABM1zxqWpxDioBKTnrQOM6FbKikuJaPdIwlCUsS4Ote1c=&xsec_source=pc_search&source=web_search_result_notes","likes":15,"collects":6,"comments_count":11,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161345/6980da238e71ad8ce6bbd033b9ac1796/notes_pre_post/1040g3k031tdkv2f7684g4a1b1emuhe6jmdt9fh0!nd_dft_wgth_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69d3dd840000000022029bbf","title":"从大理去有风的沙溪古镇","content":"今天天气好到爆，目之所及都是过曝的光线，太阳之大，感觉是许红豆来了都得晒成许黑豆的程度\n最适合出片的地方就在寺登街那一条路，哪哪都好看但车子得停这个核心街区外面，交通贼差，哪哪都堵，请筒子们机灵点停在路边！\n逛拍了大半天，终于走到沙溪古镇的黑潓江了，是一个从玉津桥底下往上望非常平常甚至提不起兴趣但是登桥看景色绝了的地方～4月的溪水，羊儿在旁边吃草，鸭儿在里面凫水，虽然风巨大，但是好惬意，怪不得有人愿意秋冬来5次拍晨雾呢！\n\t\n但素，大家从大理租车最好选油车，这里的充电站非常少，古镇里路本来就堵，交通还差，能堵到派出所门口的那种。古镇外的导航简直是乱来，最后战战兢兢开回双廊服务区终于畅享充电。\n沙溪古镇和大理古城的感觉很不一样，虽然都是商业化古城，但沙溪的节奏是慢的，它是茶马古镇最后一个幸存的集市，景点不多，所以只能走走逛逛，被刘亦菲带火以后建了无数的院子，总想要慢慢悠悠的吸引游客。但大理有一种需要生存的努力感，10年前来这里寻找梦想摆地摊的文青们现在还是摆摊，只是有了好几个创业园，显得更规整了些，但他们不属于这里，他们来自天南地北。\n#沙溪古镇#去有风的地方 #刘亦菲 #李现 #玉津桥#大理 #大理周边游 #云南","type":"normal","author":"roro03-11","authorId":"5d84d95b0000000001006b27","avatar":"","url":"https://www.xiaohongshu.com/explore/69d3dd840000000022029bbf?xsec_token=ABMkRFibqMuCI77Yk_GS1j1iLSBlGZ2YOoac-uGTdsBpg=&xsec_source=pc_search&source=web_search_result_notes","likes":14,"collects":1,"comments_count":5,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161345/eca52f03dc487b62f2345539793ac50a/note_pre_post_uhdr/1040g3r031uki5l0cii205nc4r5dg8qp7s7qvct8!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69ce82ab0000000023012103","title":"戒断，沙溪","content":"#去有风的地方 #沙溪 #小众古村落","type":"normal","author":"多肉04-02","authorId":"5b95ccf23d401800013d805e","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ij4ksf97q004atb9f6f502u6mofd2g?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69ce82ab0000000023012103?xsec_token=ABmzEyf8tP2jymLs3mtRe9rHwJ9_LS8ER6zuCSVDQYlLI=&xsec_source=pc_search&source=web_search_result_notes","likes":13,"collects":2,"comments_count":18,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161307/43fca6929f1b07bf2cd3d7c37ffdfcc3/note_pre_post_uhdr/1040g3r031ufbi65134504atb9f6f502u2goekp0!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69c3ee3b000000002103b6d3","title":"在沙溪古镇住上了理想中的小院耶","content":"很幸运住上了这么美的小院\n感谢民宿里两个很好的姐姐！\n撸猫 自己做咖啡 和好朋友一起喝下午茶\n在小院度过平静美好的时光…\n#民宿慢生活 #有风的小院 #沙溪古镇民宿","type":"normal","author":"麻辣不烫11小时前","authorId":"5b2e6718f7e8b9383eb42384","avatar":"","url":"https://www.xiaohongshu.com/explore/69c3ee3b000000002103b6d3?xsec_token=ABQWrf31nhO_amV6p3JpasqnhY8B8l2MVT5YheKNpS4Ac=&xsec_source=pc_search&source=web_search_result_notes","likes":13,"collects":2,"comments_count":6,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161355/a15f42770761070afe4b41403c85ea04/notes_uhdr/1040g3qg31u5126goig2g4a6h44jhg8s41nuj61o!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69d4bed60000000023027aef","title":"云南沙溪| 一个时间过得很慢很慢的地方","content":"一个人骑车在镇子追风\n路过一片油麦菜花田\n只享受此刻的平静和自由\n\t\n在沙溪古镇闲逛\n在巷子老奶和小孙子在嬉戏打闹\n被阳光浸透的日子\n每一步都不舍得加快脚步\n\t\n在古镇的一家店坐下来静静做甲马\n跟朋友开玩笑说这是活字印刷术彩绘版\n做完以后惊讶自己的艺术天分\n找个没人认识我的地方\n认认真真当个没用的废人\n\t\n夜晚一群人围着篝火\n弹着吉他唱着民谣\n抬头撞见乡间的漫天星空\n不亚于之前在甘肃鸣沙山裹着睡袋看星空的那片璀璨\n\t\n人生如果可以如此简单该多好\n沙溪是一个真正可以让时光停驻的地方\n恬淡宁静 洗去铅华\n在沙溪 感觉我真正活了一次\n\t\n#沙溪古镇 #去有风的地方 #云南大理 #要春游更要村游","type":"normal","author":"一只野生Peng01-15","authorId":"5fe39b2f000000000100bb71","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d4bed60000000023027aef?xsec_token=ABvIecttFK4GDtaG4Gp4UwNMmfGwKEQoYrJ5hh_aZm2oU=&xsec_source=pc_search&source=web_search_result_notes","likes":12,"collects":2,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161254/0c00571d45b45e1bd075e6be74c91b9e/notes_uhdr/1040g3qg31ulegtjvj4105nv3jcng9erhbqqqp9o!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69ccd6800000000023024983","title":"遇见沙溪 | 在古色古香中穿越（附机位）","content":"#假期去哪玩\n沙溪古镇，坐落于云南省大理白族自治州剑川县，是滇藏茶马古道上唯一幸存、保存最完整的千年古集市，被联合国教科文组织列入“世界濒危建筑遗产”，也被誉为“茶马古道上活着的博物馆”。这里没有大理古城的喧嚣，只有青石板路的马蹄印、夯土老宅的烟火气，是云南最适合慢下来的古镇之一。\n因为电视剧《去有风的地方》中的“云苗村”就在沙溪古镇取景而火遍全国。\n\t\n照片机位：\n图：四方街古戏台，沙溪古镇标志性建筑，侧面照最美\n图：以树身做前景，拍摄古戏台\n图：站在兴教寺内，框架结构拍摄古戏台\n图：长焦镜头拍摄古戏台上部结构\n图：侧面拍摄古戏台\n图：拍摄古戏台局部\n图：以树为前景拍摄巷口“放下”二字\n图：拍摄光影下的古风店铺\n图：拍摄兴教寺旁光影下的店铺\n图–：阳光洒下寺登街街景\n图：薄荷咖啡馆门口的沙溪大字墙\n图：阳光下的南寨门\n图：四方街古戏台斜对面的艾里福小粒咖啡\n图：四方街古戏台一侧的沙溪之眼\n图：爱与故食的店面\n图 ：兰蕙亭\n\t\n拍摄时间：2026年3月18-19日\n拍摄器材：5D4+1635，70200\n#假期去哪玩\n#云南旅游#大理旅游#沙溪古镇#大理沙溪#四方街古戏台#沙溪旅行#沙溪摄影#去有风的地方 #＠摄影薯＠本地薯@人文薯@生活薯＠小红书成长助手＠小红书创作助手","type":"normal","author":"一只野生Peng01-15","authorId":"5b28ddc9e8ac2b70f4ab0458","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69ccd6800000000023024983?xsec_token=ABHT61_jxs94O7m_eiru6zyXtu1bLp2Qu8THaLAumFiSw=&xsec_source=pc_search&source=web_search_result_notes","likes":10,"collects":10,"comments_count":8,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161308/2dacbb24f78ab91fa4aaf7fed600b9e1/notes_pre_post/1040g3k831udnciusj6004a6d63esi12of8au0f0!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69be0422000000002202ac8a","title":"想你的风还是吹到了沙溪","content":"#有风的地方 #去有风的地方旅行 #沙溪古镇#旅行","type":"normal","author":"思芸✨","authorId":"5a20ef824eacab7ff7590cd1","avatar":"","url":"https://www.xiaohongshu.com/explore/69be0422000000002202ac8a?xsec_token=ABSQiwT0iRtCkGNw8CdL67KSv9ANgaTidl17OvIuIZpWA=&xsec_source=pc_search&source=web_search_result_notes","likes":9,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161352/df29548e989143ef169a07d14cda0fa4/1040g00831tv870847q4g4a015rno436hpvk468o!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69dfc16f000000002102d63e","title":"云南大理沙溪古镇最佳机位","content":"是沙溪古镇的山风小院，树屋不是很高，用手机放大就可以拍，披个小披肩就很出片了，一定要下午四五点左右去拍光线特别好，消费大概人均三十左右，地方很偏不好打车建议来的时候留两个三轮车师傅的☎️\n\t\n#小众古村落 #大理沙溪古镇 #沙溪探店 #沙溪古镇拍照点位 #去有风的地方穿搭 #星星掉进洱海里","type":"normal","author":"roro03-11","authorId":"616a67c50000000002024a74","avatar":"","url":"https://www.xiaohongshu.com/explore/69dfc16f000000002102d63e?xsec_token=ABZwT0OvIgh5fovqzUY0YgDSJKhMNDs1GHz7TMnx1bmFg=&xsec_source=pc_search&source=web_search_result_notes","likes":8,"collects":8,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161346/96eb3b148afe5956dda64cbf5f1f63d3/1040g2sg31v06bdoliqgg5obacv2gkijka522c08!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69c3afcd000000001f007fb3","title":"在沙溪住到很喜欢的民宿","content":"基本属于在古镇里了，对面有个收费的停车场，走去哪里也都很方便啦！\n唯一觉得缺点就是房间光线，个人觉得有点暗了。\n早餐可以，咖啡好喝。\n\t\n#古镇中的民宿 #安静的民宿","type":"normal","author":"多肉04-02","authorId":"5b5c8c806b58b771a0d7226a","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ij4ksf97q004atb9f6f502u6mofd2g?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c3afcd000000001f007fb3?xsec_token=ABQWrf31nhO_amV6p3JpasqkThPy214fwutDHIGW8zZwU=&xsec_source=pc_search&source=web_search_result_notes","likes":6,"collects":3,"comments_count":4,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161307/301063193f434bf82b96222b3c0fad24/notes_uhdr/1040g3qg31u4peavq2a4g4a7kf36808ja8glt8h0!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69d5391d000000001a0212b1","title":"沙溪古镇","content":"沙溪古镇（寻找）化妆➕租衣服➕约拍\n\t\n可接受一套都包含的\n也接受单独的化妆师，租衣店，摄影师……这种\n\t\n本人后天中午到沙溪古镇，想约个合适的文艺风妆造，再拍一组照片……\n\t\n求推荐（可以毛遂自荐哦）～\n\t\n#去有风的地方旅行 #沙溪古镇#沙溪古镇旅行 #沙溪古镇约拍 #沙溪古镇化妆师 #沙溪古镇摄影#沙溪古镇租衣#大理#丽江#云南摄影师","type":"normal","author":"多肉04-02","authorId":"5f686876000000000101e08e","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ij4ksf97q004atb9f6f502u6mofd2g?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d5391d000000001a0212b1?xsec_token=AB8Ts00pndBnCD8Y4UPnim0NOP8julvUhIlTXrd5mmo30=&xsec_source=pc_search&source=web_search_result_notes","likes":6,"collects":1,"comments_count":12,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161307/2630ed0949a8696cf71a946580d0f182/notes_pre_post/1040g3k831ulta0ueig705nr8d1r0bo4elkkq8fo!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69dc5a60000000001a023980","title":"沙溪古镇","content":"来大理唯一好玩的古镇！！！！！咖啡店的阿福巨可爱，嘴里叼着一片树叶和我们换水喝，原来树叶是狗狗货币[超喜欢R][超喜欢R]","type":"normal","author":"roro03-11","authorId":"5cb0ab8d0000000010028f26","avatar":"","url":"https://www.xiaohongshu.com/explore/69dc5a60000000001a023980?xsec_token=AB3m0r0gP2cRSGoeiuvYLJ_ItmX60CSM6Ze3kErpT2r6A=&xsec_source=pc_search&source=web_search_result_notes","likes":5,"collects":0,"comments_count":3,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161345/3755f9e62e4081cd256ac7fdbaf79b1c/notes_uhdr/1040g3qg31uss8opgiq0g5n5gle6k53p6kff977g!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69a405a1000000002602d734","title":"沙溪一瞬","content":"#沙溪古镇 #去有风地方","type":"normal","author":"roro03-11","authorId":"5e436ca5000000000100786d","avatar":"","url":"https://www.xiaohongshu.com/explore/69a405a1000000002602d734?xsec_token=AB27vHn6q_0aibq_9Cd4tkmKwE1KPIF1gbdz-l93ViwP4=&xsec_source=pc_search&source=web_search_result_notes","likes":5,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161346/59a4c11632f6777edfd6cb6d916efcd0/1040g2sg31t5rqve8lak05ni3diig8u3del824q0!nd_dft_wgth_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69c3d8f40000000023013e8b","title":"拜托！在沙溪把万亩稻田拽进房间也太奢侈了","content":"在沙溪住久了，其实会对很多“精致”的东西产生免疫，但村边·合给人的感觉不太一样。它像是一个在村口安静等了很久的老友，不急着向你展示什么，只是默默为你撑开了一个足够大的、不被打扰的世界。\n\t\n最直观的，大概就是那种近乎奢侈的“空”。主理人拿下了整整两千多平米的空地，换作旁人，大概会想方设法多塞进几十个房间，但他却极其大方地只留出了五个房间的空间。这种选择，让每一位住进来的人，都拥有了近乎奢侈的私人领地。\n\t\n当你推开那扇小木门，踩在恒温地暖传导出的那份温润上，第一眼撞见的不是家具，而是那面把万亩稻田直接“拽”进屋里的落地窗。这里没有电线杆的切割，没有邻居瓦片的遮挡，只有一线铺开的绿色随四季流转。你在这近百平米的尺度里行走，会发现这种“浪费”其实是为了换取一份绝对的静谧。即便窗外是最原始的村野，只要你退回到这片由冷寂线条围合出的场域里，那种B&O音响流淌出的提琴声，就会让你瞬间从琐碎的旅途中抽离出来。\n\t\n而最让人沉溺的，是那种触碰到皮肤时的惊艳。很多人聊酒店会聊品牌，但在村边·合，主理人更在意的是那层“触感”。像个不计后果的理想主义者，把160织的纯棉铺在了那张厚实的舒达床垫上。这种织数意味着什么？意味着棉线细密到了如同绸缎般的质地，细腻得像第二层皮肤。在商业逻辑里，这种床品洗不了几次就会报废，生命周期短得惊人，但在主理人看来，只要能换来你那一夜如陷云端的包裹感，这种损耗就是值得的。\n\t\n当你洗完热水澡，在宝格丽的香氛里裹进这层细密的柔软，窗外的壁炉火光微微跳动，那一刻，昂贵的硬件已经不再是冷冰冰的数字。它们消融在了一种极其自然的体面里。这种珍贵，不是你花了多少钱去买一个床位，而是当你身处几千公里外的荒原，依然有人愿意为了你那一晚的深睡，去对抗损耗，去留白空间，去为你裁剪出一整片不被打扰的四季。\n\t\n在村边·合，最顶级的度假不是去看了多少风景，而是当你合上眼，发现自己的每一个毛孔，都被温柔地接住了。\n\t\n【图片使用说明】\n本笔记图片综合使用以下素材：\n(1) 由本民宿拍摄的照片；\n(2) 已获得住客授权使用的照片。\n如任何图片侵犯第一原创者权益，请通过私信/官方联系方式与我们联系，我们将第一时间核实并删除\n\t\n#去有风的地方  #大理沙溪  #沙溪古镇  #沙溪民宿推荐  #设计感民宿  #发现宝藏民宿  #云南旅游 #村边合","type":"normal","author":"李星儿Clara","authorId":"668cb0290000000003032a46","avatar":"","url":"https://www.xiaohongshu.com/explore/69c3d8f40000000023013e8b?xsec_token=ABQWrf31nhO_amV6p3JpasqgT6HR72VUkLD_ZiCd5-h0U=&xsec_source=pc_search&source=web_search_result_notes","likes":3,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161350/5080b8defe174384be2c1e375bc2ebf1/spectrum/1040g0k031u4ud1nc2u005pkcm0kguai68pr86bo!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69c52c48000000002202a7f0","title":"以为大理已经很美了，直到我去了沙溪！附攻略","content":"跟随许红豆的脚步，终于来到了有风的地方\n这个茶马古道上唯一幸存的古集市。\n\t\n如果说大理是热闹的乌托邦，那沙溪就是被时光遗忘的世外桃源。这里没有过度商业化，只有青石板路、老槐树和慢悠悠的风。如果你也想找个地方躺平发呆，请收好这份攻略！📝\n\t\n📍位置：大理剑川县沙溪古镇\n🚗交通：距离大理古城2小时车程，自驾或者“彩云通”预约拼车前往\n🚶🏻‍♀️路线：寺登街→欧阳大院→四方街→古戏台→兴教寺→南古宗巷→南寨门→玉津桥→东寨门→先锋书店\n\t\n⭐️隐藏玩法：周五去赶集！\n每周五是沙溪的“街子天”（赶集日）！这是古镇最热闹的时候 。\n👣地点：寺登街外的镇南大街，跟着背竹篮的人流走就行。\n⏱️时间：8:00-18:00\n\t\n🧺怎么逛：第一件事就是买个竹背篮！小号25-30元，拍照超级有感觉 。集市上有各种山货、野生菌（夏季多）、白族手工刺绣、草药，还有烤乳扇、稀豆粉、炸洋芋等小吃，100元能从街头吃到街尾 。\n\t\n📸穿搭：建议穿棉麻、浅色系（白、米、蓝），和白族建筑、青石板路超搭 。\n⏳节奏：不要赶行程！沙溪适合发呆。下午找个咖啡馆坐坐，或者到处散散步也是很舒服 。\n☀️防晒：云南紫外线强，无论什么季节都要做好防晒！\n🌈最佳季节：春秋两季最舒服，3-5月有春花，9-11月有稻田 。\n\t\n沙溪不大，但值得你慢下来~\n\t\n#交换春天 #沙溪古镇 #沙溪 #云南旅游 #古镇 #沙溪攻略 #小众旅行目的地 #小众旅行地 #云南 #去有风的地方","type":"video","author":"一只野生Peng01-15","authorId":"67e4f3c9000000000e013e21","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udjaeo5ii4g5nnlo7108pndpuputs8?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c52c48000000002202a7f0?xsec_token=ABspnWJ3f7DVigdmQxN5GnXZ0vyHl4PNMIX8d18G3GKIM=&xsec_source=pc_search&source=web_search_result_notes","likes":2,"collects":3,"comments_count":1,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161308/27418d4e9ff1efd0914bafe407a11797/1040g00831u67sobu2q0g5pv4uf4jifh13jip7og!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69de11b3000000001a02e645","title":"大理📍沙溪古镇！独门独院花园小院😭","content":"✅位置&交通｜懒人也能轻松玩古镇\n🍃院子就在古镇北寨门口 一分钟走进古镇核心区\n🍃完全是闹中取静的状态 白天逛累了随时可以溜回来躺平\n🚗自驾党友好 有免费停车位和充电桩 不用为车操一点点心\n\t\n✅房间&院子｜每扇窗都是不同的风景\n🌿院子面积蛮大 属于那种进门就会“哇”的大\n🌿房间特别宽敞 私密性做得很到位 庭院氛围感直接拉满\n🌿每个窗户看出去都是不一样的景色 早晚都适合发呆\n🌿晚上很安静 睡得特别实 每天都是自然醒那种\n\t\n-图文均已授权，请不要误判哦谢谢\n\t\n#夏日泡泡滤镜 #大理民宿 #大理住宿 #大理住宿推荐 #大理民宿推荐#大理旅游#大理旅游攻略#大理酒店 #发现宝藏民宿#浪漫生活的记录者#周末去哪儿","type":"normal","author":"李星儿Clara","authorId":"66c6e4a0000000001d023ab7","avatar":"","url":"https://www.xiaohongshu.com/explore/69de11b3000000001a02e645?xsec_token=ABt4TPnfeXnt0HvMDvY0OLza2qOpWNmnIDGRMDD1ZkES8=&xsec_source=pc_search&source=web_search_result_notes","likes":2,"collects":3,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161350/35d9814f3b8f5f76497227b756460509/1040g00831uuhrbl3iq3g5pm6sig7celn90c3n60!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69df7afb000000002003b6d4","title":"大理至沙溪（直达专线）每天往返","content":"4月16\n号大理古城到沙溪古镇拼车差人哦\n#大理\n有一起从大理去沙溪古镇游玩的拼车搭子吗\n我们有车，还有位置\n车是豪华七座商务车小鹏x9，安全干净\n我们是在大理旅居了多年旅行者\n每天大理往返沙溪\n一般早上9:30-10:00左右大理古城出发\n下午5:00左右沙溪古镇返回\n3月份的沙溪古镇，春暖花开，很有古镇的韵味\n拍照打卡都很出片哦\n#大理古城#大理去沙溪#大理拼车去沙溪#沙溪古镇#去有风的地方 #沙溪千年古镇#沙溪青石板#免费游古镇 #大理沙溪拼车包车","type":"normal","author":"李星儿Clara","authorId":"5d2003d7000000001000ca7b","avatar":"","url":"https://www.xiaohongshu.com/explore/69df7afb000000002003b6d4?xsec_token=ABZwT0OvIgh5fovqzUY0YgDZedNidIlF3ighTYoJ7t0Xk=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161350/5a7f1844ac9e96c24ceaf820e706e5ec/notes_pre_post/1040g3k831uvtvmmqjqd05n900fbk1ijrhu70meo!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]},{"id":"69dfd59c000000001d01afdd","title":"大理旅拍丨体验沙溪古镇慢生活","content":"沙溪古镇相比大理古城等，更有本土化风格，更接近原始村落的形态🏔️\n如果来大理时间充裕的话，可以在这住两晚民宿感受下慢节奏生活\n尤其是对于都市上班族，可以好好放空自己\n-\n📸总结几个拍照机位：\nP3沙溪大字报（薄荷咖啡馆门口）\nP4 嘬嘬小馆\nP7 寺登街\nP1 有狸杂货铺\nP5 五月念人文客栈门口\nP9 椿山寂.隐世独院门口\nP5 东寨门街道\n还有就是，\n薄荷咖啡馆（就是刘亦菲打工的有风小馆啦），这个我没拍因为当天人太多啦\n-\n👗穿搭建议：\n古镇整体以大地色为主，穿大红色会很有视觉冲击力，风格会更加突出；或者穿浅色系都可\n-\n‼️要防晒\n云南紫外线很强，🕶️防晒面罩、防晒霜、遮阳伞，提早准备起来，要不真的会晒伤尤其是皮肤敏感的宝宝\n#大理旅行 #沙溪古镇 #有风的地方 #旅拍 #古村落拍照 #小众古村落 #旅拍写真","type":"normal","author":"思芸✨","authorId":"69a1088f000000002100533d","avatar":"","url":"https://www.xiaohongshu.com/explore/69dfd59c000000001d01afdd?xsec_token=ABZwT0OvIgh5fovqzUY0YgDbkJmia700zxBJ5XqBKDrH4=&xsec_source=pc_search&source=web_search_result_notes","likes":0,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604161352/47d0505ca12f1df6b3a0e9b752418387/notes_pre_post/1040g3k031v08ll142s1g5qd1127o8kptgqol8bg!nd_dft_wlteh_webp_3","keyword":"沙溪古镇","commentList":[]}]</script>
<script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');

    // 作者链接
    const authorLink=n.authorId?'https://www.xiaohongshu.com/user/profile/'+n.authorId:'#';
    const authorHtml='<div class="card-author">@<a href="'+authorLink+'" target="_blank">'+esc(n.author)+'</a></div>';

    // 评论（带作者链接）
    const cms=(n.commentList||[]).slice(0,5).map(c=>{
      const cLink=c.userId?'https://www.xiaohongshu.com/user/profile/'+c.userId:'#';
      return '<div class="comment-item"><span class="user"><a href="'+cLink+'" target="_blank" style="color:#667eea;text-decoration:none">'+esc(c.user)+'</a></span><span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    }).join('');

    return '<div class="card"><div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div>'+authorHtml+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
