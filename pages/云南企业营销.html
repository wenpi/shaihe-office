"type":"normal","author":"反射弧绕地球🌍1天前","authorId":"571e462784edcd6822ec1b71","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f6cad2f00000000010092ad.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69bbaed1000000001a02b1ca?xsec_token=ABwD9zfDgWeWu16cqjSc9tpArMIgQMdCrMW7LjV1PWjVs=&xsec_source=pc_search&source=web_search_result_notes","likes":4,"collects":3,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151439/a08ebb2d644a13eeab05f505f12e0c31/notes_pre_post/1040g3k031tsvaag9mu3g48aa7332e6rh9lb8du8!nd_dft_wlteh_webp_3","keyword":"云南企业营销","commentList":[]},{"id":"6900766d000000000503ba5c","title":"云南搞副业最猛的城市：昆明","content":"前阵子去昆明跨境产业园参加了一场出海分享会，本以为大家聊的是鲜花、咖啡、旅游文创，结果全场讨论的焦点都是——TikTok！\n\n有人靠云南特产卖到欧美；有人做民族风饰品爆单出圈；\n还有人用短视频，把“昆明制造”拍成了品牌故事。\n一位做外贸多年的卖家笑着说：“以前靠线下渠道出货，现在靠TikTok自然流也能跑出单。”\n细聊才发现，昆明做TikTok电商的优势非常突出：产品有特色 + 成本低 + 氛围好。\n\n🌸 产品有特色，天然自带故事\n昆明本身是“美学城市”，产品兼具文化与美感：\n• 鲜花干花类：拍“花艺布景+疗愈场景”，海外女性用户喜欢\n• 手工饰品类：结合“民族风+手作故事”，内容极具差异化\n• 咖啡与茶类：用“云南原产地+生活方式”讲故事，容易打动人\n• 旅游文创类：拍“山水风光+生活纪实”，自然流量稳定\n\n🚛 物流成熟，成本友好\n昆明虽在西南，但跨境物流体系已相当完善，\n中老铁路、昆明机场国际航线加持，东南亚方向发货尤其快。\n中小卖家也能用保税仓、海外仓模式控成本。\n\n🎥 内容真实，生活感强\n昆明人拍视频很自然，喜欢用真实生活和自然风光讲故事。\n“花市走拍+手作过程+日常出货”这类视频，在TikTok上特别受欢迎。\n有卖家靠一条展示“鲜花制作干花饰品”的视频，30天自然流量突破百万播放。\n\n💡 政策与资源支持\n昆明跨境综试区、滇中新区电商园提供：\n• TikTok短视频培训与孵化课程\n• 政策补贴、创业指导、产品资源对接\n• 云南特色产品出海品牌扶持计划\n\n👥 创业氛围轻松，合作意识强\n昆明的创业圈特别包容，\n从返乡青年、文创设计师到外贸团队，\n都在用TikTok去展示云南之美，把“地方特色”卖向全球。\n\n⚠️ 避坑提醒\n❌ 不要只拍风景，要结合产品；\n❌ 素材一定要原创或有授权；\n❌ 前期别压货太多，先靠自然流试市场。\n\n现在的昆明跨境氛围，就像一场新的出海花季——把“自然与美”变成“生意与品牌”，让世界看到云南制造的新机会。🌍🌺\n\n#昆明 #昆明跨境电商 #昆明副业 #TikTok小店 #跨境电商 #TikTok跨境 #Tk创业  #独立站 #tiktokshop","type":"normal","author":"反射弧绕地球🌍1天前","authorId":"6853b0e0000000001d00bc21","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f6cad2f00000000010092ad.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6900766d000000000503ba5c?xsec_token=ABw13dlfX \n——————\n🎯项目亮点：\n✅ 创新“游中学·玩中签”模式\n✅ 首日签约率突破历史峰值\n✅ 客户反馈“远超预期的商业价值”\n客户说：“原本只是想做一场会，没想到鸿途给我们造了一个‘商业场’！”\n——————\n🎯 鸿途专业服务\n为50+知名品牌定制高端会奖旅游，年服务50000+人次\n✅ 招商会议策划 ✅ 特色场地搭建 ✅ 民族文化体验 ✅ 全流程执行 ✅ 整合营销赋能\n\n👉 戳我聊聊你的情况，开启专属会议旅游升级计划！\n﻿#鸿途会议旅游   ﻿ ﻿#会议旅游   ﻿ ﻿#西双版纳     ﻿#旅游   ﻿ ﻿#活动策划   ﻿ ﻿#旅游万粉扶持计划   ﻿ ﻿#薯队长求流量  #企业文化","type":"normal","author":"反射弧绕地球🌍1天前","authorId":"684fb51c000000001e038331","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f6cad2f00000000010092ad.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/68b05238000000001b03445a?xsec_token=AB7606RjSwDphYhCT_-A_sqL8Wyx2cSIcbboUmTnEn2XA=&xsec_source=pc_search&source=web_search_result_notes","likes":5,"collects":2,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151439/fb4e2ba7e3720d0d5cffaf449df2d529/spectrum/1040g34o31lns50g4507g5q2fmke7n0ph4m3foj0!nd_dft_wlteh_webp_3","keyword":"云南企业营销","commentList":[]},{"id":"65efaf77000000001203fe20","title":"腾讯授权云南区域营销中心","content":"本集团是 全国第四家 西南第一家\n腾讯授权的区域营销中心\n腾讯广告 阿里巴巴 抖音 小红书 百度 快手\n线上一站式服务 要推广找我就✓啦\n腾讯西南区域营销中心  区域经理:杨子\n☎:18487303681\n☎:18083813864\n#腾讯广告如何投放推广 #腾讯抖音百度头条快手等广告投放 #网络营销网络推广运营技术 #私域流量运营 #线上广告投放 #腾讯抖音百度高德快手","type":"normal","author":"反射弧绕地球🌍1天前","authorId":"653f6f0a000000000d0071b2","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f6cad2f00000000010092ad.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/65efaf77000000001203fe20?xsec_token=ABPrLvrgwsCPr1VymwY_v9GULNldlwM5TGlU9mJ5zQ9fw=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":1,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151439/b8b60fb99f7a110bc206bfcc8197b0b8/1040g2sg3107od7e0m23g5p9vds538sdiofoife8!nd_dft_wgth_webp_3","keyword":"云南企业营销","commentList":[{"user":"线上全域运营 小曼","userId":"653f6f0a000000000d0071b2","text":"获客找我高效精准","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo311m57glg766g5p9vds538sdi0cb9of8?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69dddae6000000001f003e80","title":"云南双飞6天，旅游撬动业绩暴涨，老板稳赚","content":"#无感折痕看云南 #OPPOFind6 #无感折痕看OPPO#我的春天时刻 好活动，好企业","type":"normal","author":"反射弧绕地球🌍1天前","authorId":"5d50ac210000000012002768","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f6cad2f00000000010092ad.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69dddae6000000001f003e80?xsec_token=ABl83VseKS2uPMLZTSoiF_hHQTVgE6th0Z0eLNc5SUDJM=&xsec_source=pc_search&source=web_search_result_notes","likes":0,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151439/a5bc1f37ac9ba2be850019cc2f9e6b2e/1040g2sg31uub4ssc2q5g5naglggkg9r8mjjekh0!nd_dft_wgth_webp_3","keyword":"云南企业营销","commentList":[]},{"id":"68610ab9000000001c031de9","title":"听说现在京东酒旅很火热？","content":"来个云南红河的京东酒旅BD咨询业务！！！#互联网旅游 #酒店旅游 #云南酒店推荐 #云南旅游","type":"normal","author":"反射弧绕地球🌍1天前","authorId":"5fa000c400000000010034f3","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f6cad2f00000000010092ad.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/68610ab9000000001c031de9?xsec_token=ABVvMp_YtQmy7FJWYQW00Zym688Mmj_SYaoxqie3CblXo=&xsec_source=pc_search&source=web_search_result_notes","likes":0,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151439/69076fe11397afe7caf0fd3bc3b1b0af/1040g00831jaemgap323g5nt003208d7jvf48gto!nd_dft_wlteh_webp_3","keyword":"云南企业营销","commentList":[]},{"id":"699da7c0000000000b011c8a","title":"招聘","content":"也想请你，来云南，做云澜·间的伙伴。\n在云南洱海的某个地方，天很低，云走得慢，山峦起伏如大地呼吸的弧度。我的店就落在这里——不是在城市里，是在天地之间，山水之间。\n取名云澜·间，是因清晨看云漫过山岗，午后见光影在澜沧江支流上碎成金箔，而我们恰好站在这一切的中间。做一杯咖啡，泡一壶茶，再为远道而来的客人端上一份用本地食材做的轻食。\n这里不是打卡式景点，而是一处可以呼吸、扎根的地方；这里也不是让你来“工作”的地方，是让你来生活的地方。\n我在找这样的人\n不一定懂咖啡或茶，但愿意在磨豆声里辨认不同产地的性格；不一定擅长烹饪，但乐意用云南的菌子、香草和熟透的果子，做一道简单却真诚的料理；不一定有植物经验，但会为一片新发的叶子停下来多看两眼。\n日常的事，不过是：晨起开门让山风吹进来，给植物浇水，预热咖啡机，煮一壶今年的春茶。午后最忙，客人来了又走，你为他们做吃的喝的，偶尔也坐下来聊几句。傍晚收拾完，如果天气好，可以在门口看晚霞一寸一寸把山染成紫色。\n我需要你在这里久一点。至少，要足够看完四季的变化——看云雾何时升起又何时散去，看同一座山在晨雾与夕阳里如何呈现不同的蓝。\n报酬不算丰厚，但足够你在云南过得不错。更重要的是，你会拥有一个被山水、好茶和真诚食物包围的日子。\n店铺还在准备中，将于2026年10月1日前备妥。现在加入，你可以参与它从无到有的过程，亲手布置一处角落，决定豆子的选择，甚至为菜单添一道你的家乡味。\n如果你动了心，请私信我，我们慢慢聊。\n云澜·间 ｜ 咖啡 茶 轻食 ｜ 在天地之间，山水之间","type":"normal","author":"反射弧绕地球🌍1天前","authorId":"5c9230210000000012000969","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f6cad2f00000000010092ad.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/699da7c0000000000b011c8a?xsec_token=ABTYkm_CC3GRQ1jOAm3rzb6SI2qpikZZtb6eyODTi2I4A=&xsec_source=pc_search&source=web_search_result_notes","likes":193,"collects":113,"comments_count":59,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151439/17c48023f5ad06c32a64e1ebe38df121/1040g00831svkundj5a005n4i60gkg2b94101jmg!nd_dft_wlteh_webp_3","keyword":"云南企业营销","commentList":[{"user":"月亮数小猪","userId":"5c9230210000000012000969","text":"女生暂时不招啦！男生可以联系我","likes":6,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5c942ce4ab65af0001180f05.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"子如","userId":"621c895500000000100047a9","text":"您好，男生这里，人在大理","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pr7p4kmkk605ogsh5ak0ht9rvdo4c8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"下辈子是煎妮吧","userId":"5a8c1d7e4eacab50e0c6a4b6","text":"包吃住吗？","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo316ve671iju004a1kdsent95mc8vom88?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"月亮数小猪","userId":"5c9230210000000012000969","text":"包吃不包住哒","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5c942ce4ab65af0001180f05.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"Ericwei","userId":"5d10dc38000000001602f405","text":"你好，还招吗？","likes":0,"avatar":"https://sns-avata 79fac1893093.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"英茂康康拍了拍绣球","userId":"64feab7f000000000402643b","text":"有经验的喔","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo3170ekv1rjm605p7uldvh4p1rdfaar58?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69a7ad06000000000d009892","title":"AI深度应用，才是真正云南创业蓝海","content":"云南酒店民宿：AI深度应用，才是真正的决胜蓝海\n云南酒店民宿属高投入、中长期回报业态，全省民宿超3.2万家、大理民宿存量超6000家，行业普遍面临40%-70%运营成本集中在人力与营销的刚性压力：人力占营收20%-35%，OTA佣金与推广占15%-25%，淡旺季波动大、人效低、获客贵，成为盈利天花板。\n\n未来行业胜负手，不止在装修与地段，而在AI使用深度。AI精准切入两大成本核心：人力上，AI智能接待、房务调度、24小时客服，可替代60%以上重复性工作，人力成本直降20%-40%；营销上，AI动态定价、精准内容、私域运营，让RevPAR提升15%-35%，营销成本减半，有效平衡云南淡旺季落差。\n\n海外成熟市场已验证，AI能把人从繁琐事务中解放，把成本转化为利润与体验。对云南而言，AI不是可选工具，是重构成本结构、穿越周期的核心引擎。\n\n当下云南民宿同质化率高、回本周期拉长，AI赋能仍是未被充分挖掘的蓝海。谁先把AI用深、用透，谁就能以更低成本、更高效率、更稳收益，在云南文旅赛道锁定长期胜局。\n#云南创业 #民宿#酒店管理 #人工智能替代人工 #昆明创业搭子 #云南创业","type":"normal","author":"反射弧绕地球🌍1天前","authorId":"694b11e60000000037001741","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f6cad2f00000000010092ad.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69a7ad06000000000d009892?xsec_token=ABzDa7IKNZKdJSSya8Npjqnxf0ULmbYVhNBb590jxGkyE=&xsec_source=pc_search&source=web_search_result_notes","likes":4,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151439/be4a9899d7bf4f16a4be83f63c700049/notes_pre_post/1040g3k831t9dtiabls705qab27jdo5q1a2f9si0!nd_dft_wlteh_webp_3","keyword":"云南企业营销","commentList":[]},{"id":"69d8a45b000000002003a132","title":"云南双飞6天，旅游撬动业绩暴涨，老板稳赚","content":"有好的景区项目，怎么联系各大景区项目负责人？#景区#项目 #景区招商","type":"normal","author":"反射弧绕地球🌍1天前","authorId":"650c19490000000017021fb3","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f6cad2f00000000010092ad.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d8a45b000000002003a132?xsec_token=ABLF0TiCNZ_MrMvEuypngFop3Vihabj5XPUTLviDoWk28=&xs 40/4cca599fa87c554c09a7ad6e8a941d81/1040g00831tgdd520ls605ptg7avhi9fd1oln0ug!nd_dft_wlteh_webp_3","keyword":"云南企业营销","commentList":[]},{"id":"6979831d000000000a031b54","title":"旅游赛道，请尽量不择手段","content":"现在的游客刷小红书、抖音，要的是“避坑指南”和“省钱妙招”，而不是你的景区硬广。想抓精准客，就得抛开“传统旅行社思维”，玩点“新路子”。🌿\n🌿主号打造人设+素人矩阵种草\n🌿主号：爆款选题，照着发就对了\n避坑指南：《旅游从业者偷偷藏的XX地6个避坑技巧，看完少花2000》\n秘境推荐：《90%游客没发现！XX地这个免费打卡点，比网红栈道还出片！》\n省钱攻略：《土著私藏：这4家宝藏民宿，人均80住出轻奢感》\n获客心法，戳中用户痛点\n痛点要扎心：别只晒美景！要“帮用户省钱/省心/避雷”！比如“同样去厦门，朋友被坑3千？我帮客人避开所有小吃摊套路！”\n钩子带地域：精准抓本地客！比如“杭州出发1.5h亲子秘境”“深圳周末出逃计划”\n🌿素人矩阵放大：比如用云机，一台相当于几十台手机，账号用低成本的批量号，像一群真实素人，以种草带转化的方式放大业务，既符合平台规则，又能提升转化效率。\n🌿线上线下齐开花，多渠道引流\n除了内容种草，还能通过多种方式扩客源。\n线上平台，精准触达\n小红书/抖音：利用平台种草属性，小红书的深度图文攻略、抖音的沉浸式短视频或实时直播，都是引流好帮手。\nOTA平台：在携程、去哪儿等平台优化店铺页面，提升产品展示吸引力。\n精准投放：用小红书聚光平台、抖音信息流，精准触达目标用户，但要注意投流成本和承接能力。\n线下合作，资源联动\n🌿异业合作：和周边民宿、租车行、特色餐厅做流量互换或联合推广活动。\n🌿行业展会：参加旅游博览会，设置特色展位，做现场互动体验，快速扩大品牌认知。\n🌿打造信任链，让流量变“留量”\n有了流量，转化是关键。用户要的是专业可靠的建议，不是硬广。\nKOL/KOC合作：邀请旅行博主或本地达人体验线路，用真实分享增加可信度，快速提升曝光。\n私域流量运营：建立客户社群，定期分享旅行故事、专属优惠，鼓励老客带新客，形成口碑传播。\n专业人设打造：朋友圈用“生活+专业”比例（比如4:6）分享内容，塑造靠谱形象。背景图放联系方式和slogan，比如“专注华南小众游3年”。#旅游获客 #旅游赛道","type":"normal","author":"反射弧绕地球🌍1天前","authorId":"6978779f000000002102d581","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f6cad2f00000000010092ad.jpg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6979831d000000000a031b54?xsec_token=ABN73uzzPHsjxAnT-1K0sTJ6xqPMqZRf6kE3peDWwnn9A=&xsec_source=pc_search&source=web_search_result_notes","likes":26,"collects":20,"comments_count":1,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151440/6605a73bd16d7e8307d5c574d78a7d8a/1040g2sg31rsbehjki0dg5qboeufodlc1ncpmo5o!nd_dft_wlteh_webp_3","keyword":"云南企业营销","commentList":[{"user":"小红薯69785A8C","userId":"68f76906000000003201fa43","text":"滴滴","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/645b7f3c86578b8c6ab3b068.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69deff02000000001a0259ad","title":"不是一阵风的3个云南品牌，让我愿意长期关注","content":"助力云南品牌崛起，赋能云品价值跃升！\n扎根彩云之南，深挖本土特色，以品牌、创意、营销全链路赋能，让云茶、云咖、云药、云花、云食等好产品出山入海走向全国乃至全世界！#文创礼品 #文创设计 #云南旅游","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"6948296d000000003702f531","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69deff02000000001a0259ad?xsec_token=ABt4TPnfeXnt0HvMDvY0OLzW4Lq8vWL2eEhocV_Bq24Q0=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151440/16872ef0215f39ea4ce077ebf31a9bd1/notes_pre_post/1040g3k031uveg3n22q405qa855mttt9hfm25ogg!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[{"user":"静静的西洱河","userId":"681c24460000000006010a7e","text":"什么东西","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31i7lim437a6g5q0s4h31i2jumcnj5j0?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"首善","userId":"65064c120000000017022c42","text":"","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tigp096565g5p869g95sb22dh46n6o?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"696a18e4000000000a033d5e","title":"不是一阵风的3个云南品牌，让我愿意长期关注","content":"由于工作和个人兴趣的双重驱动，我日常会持续关注一些云南在地品牌的动态。\n\n在我看来，一个能够稳健成长的品牌，往往需要成为“六边形战士”，在视觉系统、产品结构、空间与活动、内容表达、社群关系等多个维度，都围绕同一套核心价值观展开，长期保持一致性与可辨识度。只有这样，品牌才能在层出不穷、快速更替的品牌洪流中，真正站稳脚跟，而不是被热度裹挟着走。\n\n近几年，云贵地区被频繁看见、被反复讨论，有更多目光投向这片土地，本身是一件令人高兴的事。与此同时，也催生了大量与“风土”“在地”“自然”相关的新品牌。热闹之下，如何不被标签化、不流于表面叙事，考验的正是品牌是否具备长期主义的能力。\n\n图中提到的这几个品牌，在我看来，恰好在不同层面上体现了我所说的“六边形战士”特质，或许会成为许多在地叙事品牌的重要参照系。\n\n其实我觉得，品牌可贵的地方都在于「一以贯之」。在品牌发展日益艰难的当下，如何确立并持续坚守自己的价值观，坚定不移地贯彻到产品、视觉与日常运营的方方面面，真正做到有知有行，或许可以作为在地品牌长期思考的方向。\n\n#精神云南人 #品牌背后的故事 #品牌策划 #品牌故事 #策划思考 #云南在地品牌 #在地文化 #品牌观察#长期主义#品牌方法论\n#长期主义 #品牌文案","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"5e9da3b000000000010006aa","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/696a18e4000000000a033d5e?xsec_token=ABV3YQdXowo_92HJoZBL1kCQwLvQLp9J0-iXlccUZatXs=&xsec_source=pc_search&source=web_search_result_notes","likes":5,"collects":3,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151440/1c9977cd0a22662889b043dc6bbc5d0e/notes_pre_post/1040g3k831rd83pr274d05nktkeo081la9spmb9g!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[]},{"id":"69d7bd22000000001a035c5e","title":"🏔️云南徒步丨怎么在小红书大量获客？","content":"⚠️致专注的户外徒步商家 | 官方增长计划开启\n各位在山野间耕耘的户外主理人：\n你是否也在业务中遇到这些“山路十八弯”？\n• 路线同质化严重，缺乏独特资源，陷入低价竞争\n• 内容获客成本高，笔记小眼睛时好时坏，转化全靠运气。\n• 服务链路不完整，从咨询、成团到售后，消耗大量精力。\n小红书官方团队愿成为你的“徒步向导”\n我们期待与专注、有资源、有服务能力的户外商家深度携手——\n√ 内容扶持：针对徒步节令、热门目的地，提供官方选题。\n√ 全链路服务支持：从专业号装修、笔记方向到计划搭建，数据分析，全程陪跑。\n……\n想加入官方合作计划？\n❶ 点击下方【立即咨询】\n❷ 私信发送【徒步合作】【资源介绍】\n❸ 填写意向表单，即可获得\n➜ 1V1免费运营诊断\n➜ 专属徒步行业营销方案\n➜ 平台绿色通道开放资格\n活动时间：即日起至2026年12月31日\n我们期待与认真扎根户外的你，一起把小红书变成生意增长的新营地。\n@小红书生态营销顾问-绘里\n\n#户外徒步#云南徒步#云南旅游  #小红书运营#旅行社 #合作招募 #户外官方扶持#广告投放 #合规获客 #小红书企业号运营","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"666d34740000000007006a41","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d7bd22000000001a035c5e?xsec_token=ABljk4CZBog8kb0JB0xNVVd5N4XkLn-2ZrQOVUOIPm9uo=&xsec_source=pc_search&source=web_search_result_notes","likes":3,"collects":1,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151441/c61ea390afd451f4f2a1c7a6839be426/notes_pre_post/1040g3k831uobn6ag2qa05pjd6hq1oqi1jto9d6o!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[]},{"id":"69ca40f7000000002301f0db","title":"不是一阵风的3个云南品牌，让我愿意长期关注","content":"昆明-恒隆\n有成熟项目\n却市场推广\n欢迎来聊\n\n#合作共赢共同发展 #项目 #创业项目 #挑战创新创业的人","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"69b8ef70000000003201bb58","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69ca40f7000000002301f0db?xsec_token=AB-TzZCzi29onM8uExlqjXM3gEiCpOp0dAaC3oZQPnRDE=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151441/781d7c3782df0ba0550b6192febfd69b/1040g00831ub6khp4iq005qdottocjeqoa4q526g!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[]},{"id":"694b568c000000001e02367a","title":"人在昆明，今年做了30多个不同行业的运营","content":"如题所示：有的！昆明有做小红书运营的！本人就是\n然后也不是说只能做昆明或者云南这边的业务，全国也有客户在合作\n今年的话，北京还有石家庄，还有山东、深圳那边都有客户在合作。而且他们都是不同行业的\n\n其实跟很多老板沟通下来，大家最关心的一个问题是到底有没有效果？\n\n那这个就要具体分析了：\n你对于效果的定义是什么？\n以云南这边具体的行业举个例子：全屋定制行业！这个行业在云南这边，70~80%左右客户群体正常能接受的客单价是500左右一个平方的投影面积。然后平均下来一个单子的话是在小万到中万。那么他在红书平台，正常一个咨询的成本是在50~80左右，留资成本都是200左右 如果你给一天500的预算，那基本上就是有七八个咨询的，然后有两三个留资的。这个就是合理合规的一个行业情况！\n同行业的话，以这个作为参考，从您自己的客单价，产品定位来推导——只要出入不是很大，那就是有效果\n所谓效果，是要根据具体的行业以及客单价以及你的转化情况这些来考量的。\n\n你想得到什么结果？与之对应的，你需要付出什么？\n如果你想做自然流，那你肯定要付出时间、精力去把图片，视频这些素材做好，然后把文案这些内容去打磨好。这个事情要么自己亲力亲为，要么找人来做，要么也是找代运营来做。\n如果你想做聚光投流，也是要付出一定的预算，然后要么有专门的投手或者团队。要么找代运营来做。\n\n而且以上所说还只是运营工作的一部分。\n其他关键的点，比如说：你要运营的这个业务或者这个品  他到底o不ok？客户会不会认可？以及你的转化过程有没有问题？你的沟通情况，沟通效率怎么样？公司的商业模式有没有问题？公司内部流程这些需不需要优化？甚至包括像一些转化的节奏，话术，这些都是非常重要的！\n\n综上所述，想要做好小红书运营，要具体问题具体分析，需要彼此沟通，了解清楚具体的情况，付出该付出的东西，才能得到自己想要的结果！\n#昆明 #小红书企业号运营 #小红书代运营 #小红书运营 #小红书运营干货 #运营 #广告投放 #小红书投流 #昆明小红书运营 #云南小红书运营","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"5e1ee254000000000100588f","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/694b568c000000001e02367a?xsec_token=AB1bBRtWOLVBg6jg-DQFF2O3F7yzJECyrHiGx59PdcJNA=&xsec_source=pc_search&source=web_search_result_notes","likes":2,"collects":2,"comments_count":6,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151441/f4680ae619bcd1463f534427714a48fe/1040g00831qf7m9kpng605ngus9a08m4fl5stpjg!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[{"user":"阿普很靠谱(小红书云南代理商服务商)","userId":"5e1ee254000000000100588f","text":"大家如果有什么好的想法或者经验，欢迎分享","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31q8qqapoga2g5ngus9a08m4fnc7o09o?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"茶叶质检员小万","userId":"663f7da7000000000700494f","text":"想了解一下运营模式","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo316nk56ge3c605phvfmjhoiaf9qp5qfo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"阿普很靠谱(小红书云南代理商服务商)","userId":"5e1ee254000000000100588f","text":"好的","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31q8qqapoga2g5ngus9a08m4fnc7o09o?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"至康陪诊～丹","userId":"656d74c5000000002002e228","text":"了解一下运营模式","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tka0il47q005pbdej2o5oh829978c8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"缺","userId":"60b25525000000000101c3e3","text":"可以面聊不？","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31qdtpi5gga605o5iakigbgv3bvaqkb8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"阿普很靠谱(小红书云南代理商服务商)","userId":"5e1ee254000000000100588f","text":"可以","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31q8qqapoga2g5ngus9a08m4fnc7o09o?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69d621eb00000000210056e1","title":"云南省乡村振兴促进会旅创赋能平台答疑之01","content":"1. 问：旅创赋能平台的定义是什么？\n答：旅创赋能平台是云南省乡村振兴促进会打造的实体化枢纽，以“政府引导、协会赋能、市场运作、村企联动”为原则，通过五大核心板块（成果展、初心学院、会客厅、品牌店、旅创村）链接资源、培育人才、孵化项目，推动“旅居+乡村振兴”融合，实现“物质富裕+精神富有”双目标。\n\n2. 问：百城百站战略的核心目标是什么？\n答：以元江第一站为样板，逐步在云南全域建成100个县域级旅创赋能平台站点，形成“覆盖全省、特色鲜明、效能联动”的旅创赋能网络，打造“中国旅居产业驱动乡村振兴与精神共富”全国标杆。\n\n3. 问：旅创赋能平台的建设原则是什么？\n答：坚持“政府引导、协会赋能、市场运作、村企联动”，以“精神共富”为内核，通过“共建共创共享”机制激活资源、培育人才、孵化项目。\n\n4. 问：旅创赋能平台的五大核心板块包括哪些？\n答：乡村振兴成果展、初心学院、旅居旅创会客厅、在地品牌专门店、旅创村共建。\n\n5. 问：乡村振兴成果展的核心功能是什么？\n答：以“全国视野、本土实践、精神印记”为核心，沉浸式展陈产业、人才、文化振兴成果，设“初心项目成果区”展示精神共富实践案例，打造认知县域的“第一印象空间”。\n\n6. 问：初心学院的定位与核心理念是什么？\n答：定位为“精神共富型学习机构”，以“寻找初心—践行初心—升华初心”为闭环，通过“共学、共修、共创”让参与者从“外来客”变为“新旅居旅创人”，成为“和美乡村”建设“火种”。\n\n7. 问：旅居旅创会客厅的主要功能有哪些？\n答：集成“政务直通、资源匹配、社群运营、初心分享”四大功能，打造“旅创资源集市”与“精神共富社群高地”，实现多方高效对接与情感共鸣。\n\n8. 问：在地品牌专门店的核心价值是什么？\n答：以“在地优品+初心好物”为核心，共创区域品牌，线上线下展销农产品、加工品、文创产品，联农助农，助力云品出滇，为各县域打造区域公共品牌“信任载体”与“精神价值符号”。\n\n9. 问：旅创村共建的运营模式是什么？\n答：以云南省乡村振兴促进会会员单位已经在云南各乡村落地成功的六大村落整体运营模型开展融合复制，联动更多旅创平台运营官，新旅居旅创人，赋能各种业态，包括民宿改造、体验工坊、乡村博物馆、主客共享空间等，实现“闲置资产盘活—村民增收—风貌提升—精神共同体构建”。\n\n#旅创赋能平台","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"6342899100000000180237fc","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69d621eb00000000210056e1?xsec_token=ABkGOhsyvJPTvSuWhDrxLIAtudJYXv56LRo0b01YPDwfw=&xsec_source=pc_search&source=web_search_result_notes","likes":9,"collects":1,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151441/42285a5610499a01d82adef2b062f491/1040g2sg31umfrvvr1mig5oq2h68m4dvsdd98ch0!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[]},{"id":"69da81c70000000023014f3c","title":"旅游目的地营销案例","content":"#小红书搜索 #万能的小红书 #问一问","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"687c8a0a000000001d016c53","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69da81c70000000023014f3c?xsec_token=ABqAthnrpmzs8j6ck71SqQQmvkl7epNCeoNMQrIDkSxNs=&xsec_source=pc_search&source=web_search_result_notes","likes":2,"collects":1,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151441/2bf04faf75b69cc9cd53d29149a4c84c/1040g2sg31ur2ikaqiajg5q3sh857ar2jm5h2t0g!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[]},{"id":"69533f1000000000210297fc","title":"媒体PR必备|云南62家主流媒体精准对接表","content":"今天直接上干货，将自己梳理的云南省主流媒体资源（共62家）整合分享给大家。这份清单已按类型与区域分类，方便快速匹配项目需求，建议收藏备用。\n📋 一、核心省级媒体（覆盖全省，影响力广）\n• 新闻网站：云南网、云视网、昆明信息港、开屏新闻、乐云网\n• 权威报刊：云南日报、春城晚报、云南法制报、云南信息报、云岭先锋杂志\n• 广播电视：云南广播电视台\n• 客户端/平台：掌上春城、文旅头条\n🗺️ 二、各州市主力媒体（本地渗透强，适合区域性传播）\n【昆明】昆明日报、都市时报、昆明广播电视台\n【玉溪】玉溪网、玉溪日报\n【红河】红河网、红河日报、红河广播电视台、无限红河网\n【大理】大理日报、大理广播电视台、大理电视网\n【丽江】丽江日报、丽江市广播电视台、丽江日报网\n【西双版纳】西双版纳新闻网、西双版纳报\n【普洱】普洱新闻网、普洱日报、普洱广播电视台\n【昭通】昭通新闻网、昭通日报\n【文山】文山新闻网、文山日报、视听文山\n【曲靖】曲靖珠江网、曲靖新闻网、曲靖日报\n【保山】保山日报网、保山日报、保山市广播电视台\n【德宏】德宏网、德宏团结报\n【临沧】临沧新闻网、临沧广播电视台\n【楚雄】云南楚雄网、楚雄日报\n【怒江】怒江大峡谷网、怒江广播电视台\n【迪庆】香格里拉网、迪庆日报\n🎯 三、垂直领域媒体（针对专业内容）\n• 政务党建：云岭先锋网\n• 法治政法：云南法治网\n• 政协资讯：云南政协新闻网、云南政协报\n💼 四、高效使用指南（发稿/邀约实战建议）\n精准匹配：省级事件/品牌新闻找省级媒体；落地活动、本地资讯优先对接对应州市媒体，采用率更高。\n了解平台：多数报纸有对应新闻网，可同步发布；广电媒体适合视频新闻及节目访谈合作。\n沟通准备：联系时请直接说明来意，准备好新闻稿/活动方案、时间地点等基本信息，提升沟通效率。\n持续维护：可关注目标媒体的官方网站、公众号，了解其栏目设置和内容风格，便于长期合作。\n希望这份整理能为大家在云南地区的媒体工作提供切实便利。资源在于活用，清晰列表配合有效沟通，事半功倍。\n#品牌推广 #媒体资源 #公关实操 #品牌传播 #商务拓展 #职场干货 #公关必备 #TOB #企业服务 品牌服务","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"6386e517000000001f01a33d","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69533f1000000000210297fc?xsec_token=AB0axb3qm9ohFAfMUVSF66vhIDZ81rMq__MgOE0N4gyzM=&xsec_source=pc_search&source=web_search_result_notes","likes":15,"collects":8,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151441/e262a4e10bf0dd9501ae84ff438f5606/notes_pre_post/1040g3k831qmvm4ul7gd05os6skbnr8ptcg3vcno!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[]},{"id":"691bf63c0000000007020df6","title":"云南鲜花和咖啡的新打法","content":"#云南 #鲜花 #咖啡 #文旅 #云财财沙龙 #怎么卖云南","type":"video","author":"云南自信云科技有限公司3小时前","authorId":"60dec7e100000000010047f9","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/691bf63c0000000007020df6?xsec_token=ABVe2LOZ8U7j3imd6oz8iULOFA6SzeZ1itQvT9BZWr2t0=&xsec_source=pc_search&source=web_search_result_notes","likes":111,"collects":85,"comments_count":5,"shares":0,"cover":"","keyword":"云南品牌营销","commentList":[{"user":"光影心拍客","userId":"5f11b512000000000101ff92","text":"精准，精细，专注，投入，厉害了","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/63f7739748fe215887372835.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"真知坦","userId":"556c5344b7ba224ee5bde5c2","text":"深耕很多","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31hmu8h6q3a6g40nl019k9pe2lquui60?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"小红薯6744B23C","userId":"67446b98000000001c018df2","text":"鲜花就被他搞死了","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/645b7ea002c16c941e0bcb05.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"momo","userId":"62276d8000000000100082ce","text":"在腾冲开店，还敢用日本的设计师，还引以为傲，识相点就别用这个做宣传。","likes":8,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31tm9m6mj786g5oh7dm0410melage62o?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"_白羽","userId":"5a05eb9e11be101a53659553","text":"人家说的是常驻日本的设计师 不是日本的设计师","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ivu1ck01g0049vchclpt5ajfmn4ipg?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"682b070e000000000f032fbd","title":"快手x欧莱雅，一个案例学会怎么做内容IP","content":"做自媒体3年，\n我越来越发现\n一、做内容IP不容易，但把IP商业化是大趋势但更难\n二、做内容IP需要纯粹和真诚，但要长期做下去一定要商业化。\n.\n个人IP如此，品牌IP亦如此。\n我一直关注的品牌型内容IP——快手的「500个家乡」，\n最近和巴黎欧莱雅合作，完成了这个IP的第一次商业化尝试\n.\n这个案例给我的启发远不止“如何做植入”，\n而是解答了内容IP商业化的三个本质问题👇\n1️⃣IP商业化第一步：内容场景如何转化为消费场景？图2-4\n1️⃣ 如何选择合适的品牌与代言人合作？图5\n3️⃣ 什么时候是内容IP商业化的合适时机？图6-8\n.\n说点实在的\n见过太多急着变现的IP，\n在第一阶段就接低质合作，最终消耗用户信任。\n快手这次的案例告诉我们，做商业化不能急于求成，需要克制，也需要深入。\n对于我们普通人想做自媒体赚钱也是一样的：\n变现的契机往往就出现在：\n当有用户主动地问你的衣服是哪家店的；当你分享干货，用户催着你开课时，\n记得抓住这个机会。\n\n#营销案例 #保山不恼火 #500个家乡 #文旅设计 #品牌营销 #杨蓉 #IP打造 #tvc #欧莱雅安瓶面膜  #巴黎欧莱雅","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"5efc1ac50000000001006bc3","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/682b070e000000000f032fbd?xsec_token=ABqNCWAvg_CVOBU8UpxCxzZdZCZ9jWs7LMZYT1_h-sfW0=&xsec_source=pc_search&source=web_search_result_notes","likes":66,"collects":39,"comments_count":2,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151441/abaf54112ed10dca9f7f5be77ad92bc0/1040g00831hlmr9pd3q3g5nns3b2g8qu344kpra8!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[{"user":"周五","userId":"5dac488400000000010078ba","text":"这个面膜的植入确实花了心思了","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5dac48a70890790001ca3295.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"知了Kinsey","userId":"5efc1ac50000000001006bc3","text":"是的！还是很尊重内容本身的","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31721oebkjm0g5nns3b2g8qu3u8mr93o?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"66bdee2c000000000901438d","title":"云南这些本土茶饮品牌，你最希望谁能走出去","content":"云南作为茶叶和咖啡的原产地大省，诞生了不少不错的茶饮和咖啡品牌，像火遍全国的霸王茶姬。除去霸王之外还有不少本地茶饮也在崭露头角，你最希望谁能代表云南走出去走向全国呢？\n\n上山喝茶:\n目前以昆明为核心，在昆明已有14家门店，省内扩张至大理和版纳，去年以来网上风很大，今年有望出省。\n麒麟大口茶：\n独特的糯香柠檬茶火遍全省，在昆明已有78家门店，省内拓展至曲靖、玉溪、大理、版纳等地州，省外已在郑州、贵阳、徐州、温州、呼市等地开设门店。\n象子茶铺茶：\n同样已昆明为核心，在昆明已有11家门店，省内扩张至曲靖、玉溪、保山等多个地州，尚未出省。\n柠気 ：\n以昆明为核心，在昆明已有29家门店，省内扩张至曲靖、大理、丽江等多个地州，省外在上海、广州、兰州、石家庄等城市开设门店。\n山野泡泡：\n以滇橄榄和云南泡菜为特色出圈，在昆明已有32家门店，省内扩张至曲靖、德宏、红河等地州，省外已在上海、广州、深圳、成都等地开设门店。\n四叶咖：\n主打云南咖啡豆，目前为云南本土连锁第一大咖啡品牌，在昆明已有55家门店，省内扩张至曲靖、丽江、红河等地州，省外则在成都、重庆、武汉、西安等地开设门店。\n@上山喝茶 @麒麟大口茶 @象子茶铺茶 @柠気糯米香柠檬茶 @山野泡泡 @CLOVES COFFEE\n\n#上山喝茶 #麒麟大口茶 #象子茶铺 #柠気糯米香柠檬茶 #山野泡泡 #四叶咖 #昆明咖啡 #昆明奶茶 #小红薯 #生活薯","type":"normal","author":"云南自信云科技有限公司3小时前","authorId": "5e5f4ea00000000001004934","text":"哭死","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo3100hekgmm2005niv9qg08i9kj8c1vd8?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69ca7af3000000002102c38e","title":"实践任务三","content":"CMAU市策大赛实践任务三：昭通城市品牌小红书笔记专业创作与提交指南\n本任务核心是以年轻化视角打造昭通城市品牌小红书出圈内容，聚焦高原特色农业/文旅产品，融合社交媒体营销逻辑与乡村振兴内核，同时严格遵循赛事标题、文案、配图、标签规范，以下为专业落地方案，含可直接复用的笔记创作模板+全流程提交步骤：\n一、核心创作原则（贴合赛事目标+小红书流量逻辑）\n1. 受众锚定：聚焦年轻打卡族、周末短途游爱好者、小众秘境探索者，语言风格轻松治愈，拒绝生硬宣传；\n2. 内容聚焦：单篇笔记只突出一个核心主题（文旅/农产二选一），避免内容杂乱，强化记忆点；\n3. 转化导向：通过具体地标/特产+沉浸式体验描述，让用户产生“想去打卡/想尝试”的意愿，实现流量向乡村振兴的转化；\n4. 规范必守：标题+文案+配图缺一不可，必须带齐赛事指定6个标签，关键词紧扣昭通城市品牌定位。\n二、小红书笔记专业创作模板（2套高适配版，文旅/农产各1套）\n模板1：文旅聚焦「大山包+清凉避暑」（适配小众秘境、治愈系定位）\n标题（吸睛+关键词）\n乌蒙山里的清凉秘境✨昭通大山包承包整个夏天的治愈\n文案（沉浸式体验+核心亮点+打卡指引，适配小红书短句风格）\n谁懂啊！挖到云南昭通这个小众避暑天堂🌿\n乌蒙山深处的大山包，真的把“凉”刻进了骨子里\n清晨追云海日出，看黑颈鹤在草甸上翩飞，风里都是草木的清香\n午后逛昭通古城，踩青石板路，吃一碗地道\n这里没有人山人海，只有青山绿水和治愈的慢时光\n天赐“凉”机·昭您避暑，这才是周末短途游的正确打开方式✅\n💡打卡小tips：\n1. 大山包建议穿薄外套，早晚温差稍大；\n2. 古城旁的昭通小肉串一定要尝，香到舔签！\n配图（4张高清图，视觉连贯+突出亮点）\n1. 主图：大山包云海日出全景（抓眼球，定调小众秘境）\n2. 图2：大山包草甸/黑颈鹤实拍（核心地标特色）\n3. 图3：昭通古城青石板路/古建细节（城市人文）\n模板2：农产聚焦「昭通苹果+高原特色」（适配农产推广+乡村振兴内核）\n标题（吸睛+关键词）\n云南昭通藏不住了！高原苹果甜到心坎里🍎\n文案（产地优势+产品特色+体验感，链接乡村振兴）\n被昭通的高原苹果狠狠惊艳到！\n这不仅是一颗苹果，更是昭通高原特色农业的小美好✨\n除了苹果，昭通的竹笋、天麻、小碗红糖也都是宝藏农产\n每一口新鲜，都是助力乡村振兴的温暖力量。#CMAU市策大赛；#邵通；#小众秘境；#宝藏小城；#周末去哪儿；#为城市代言","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"64ca00f3000000000e025b11","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69ca7af3000000002102c38e?xsec_token=AB-TzZCzi29onM8uExlqjXM7HDpxdbI_czVJbxz2l7KLs=&xsec_source=pc_search&source=web_search_result_notes","likes":1,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151441/0c153ef3c74af955d9e10cbcbd3e2b80/1040g00831ubcdaemiqa05p6a03pjkmohvtvg560!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[]},{"id":"69dcd3c10000000022029ba7","title":"云南思茅菜品牌设计｜棕扇归山，和味天然","content":"#民族美学 #餐饮品牌设计 #品牌VI设计 #品牌全案设计 #自然灵感设计 #品牌视觉符号 #品牌形象 #logo设计 #品牌视觉策划","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"69d0af74000000003303817d","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69dcd3c10000000022029ba7?xsec_token=AB3m0r0gP2cRSGoeiuvYLJ_MK4m6lc51iplCCJ62Q7TEY=&xsec_source=pc_search&source=web_search_result_notes","likes":31,"collects":15,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151442/adde266bab45d5bfc63657ac1cf5d373/notes_pre_post/1040g3k031utausuu2i2g5qegltqcv0btknue75o!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[]},{"id":"6829d0340000000012002ad1","title":"不浪费脑洞，营销如何为品牌创造可持续创意","content":"营销工作最重要也是最核心的模块就是想创意，每天要浪费超多脑细胞在想创意上\n与其“打一枪换一炮”的营销创意构思，想出一个“可持续营销创意”才能进一步让营销工作得以深化\n\n一、某手﻿#品牌营销﻿ 可持续创意——﻿#500个家乡﻿\n阶段一\n一个创意：从公司员工关怀视角出发，为员工在家乡树立一块广告牌，强调品牌人文文化，重拾家乡的美好\n阶段二\n一个节点：不再局限于公司内部文化，而考虑基于春节节点的品牌整合营销。通过明星合作、广告投放做传播\n阶段三\n一个系列：真正落地“500个家乡”的具体概念，从快手头部达人中筛选KOL，针对其家乡做定制化的内容创意制作\n阶段四\n首个商业：除了系列化的内容制作之外，开始引入其他品牌的商业化合作。﻿#云南保山﻿ 篇引入了﻿#巴黎欧莱雅﻿ 做深度合作\n\n二、杨蓉X欧莱雅X云南保山\n某手「500个家乡」与巴黎欧莱雅达成商业化合作，邀请演员、快手创作者@杨蓉作为家乡主讲人，打造一支讲述云南保山的家乡短片，推广全新﻿#欧莱雅安瓶面膜﻿\n叙事主线：从杨蓉视角讲述﻿#保山不恼火﻿ 的特点\n创意主线：保山不恼火\n可是，这和巴黎欧莱雅有什么关系？\n\n三、欧莱雅如何丝滑植入广告内容\n选题切入：共同的痛点\n本次巴黎欧莱雅植入的产品是安瓶面膜，主打特点就是：解决皮肤干、敏、红等问题，也就是如何给皮肤“去火”\n而整个保山介绍的主题也是“不恼火”\n\n恰当植入：产品的露出\n整个视频涉及了多个旅游场景，包括泡温泉、晒太阳、收拾行李...\n在这些镜头中，欧莱雅安瓶面膜都恰好到处做了露出，且就是产品使用的主要场景\n\n结尾定镜：明确主题带动转化\n去生活的广袤里，修护世间的火气\n\n四、「500个家乡」为什么每一个都好看？\n城市选择：在整个系列所介绍过的城市中，绝对不会出现一线城市，都是“节奏慢”“逃离北上广”的小城市\n用家乡共情大众：我们看的是500个家乡，但本质上是500种向往的生活。把一线城市打工人向往的生活拍出来\n用明星但接地气：每一部片子都会由一位明星进行主讲和演绎，但这些明星都很接地气，他们用最真诚的情绪介绍自己的家乡\n台词+镜头绝了：深入了解每一座城市，将城市文化用精准的台词和拍摄画面进行提炼；节奏：切入——讲解——沉浸\n\n总结：营销就是共情和共鸣\n一个优秀的营销一定是非常能共情，也非常喜欢做观察的人，这就是我们常说的﻿#洞察能力﻿\n不仅如此，在共情之后还需要能用精准的文案进行总结，把你的情绪表达出来，让其他人可以一起共鸣\n\n﻿#内容创意﻿ ﻿#快手500个家乡﻿ ﻿#广告片","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"5e155e1100000000010086cd","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6829d0340000000012002ad1?xsec_token=ABjb5VBAriJgOlaigUC81UZldtmntrLwg5iK0T2n2qu24=&xsec_source=pc_search&source=web_search_result_notes","likes":26,"collects":26,"comments_count":1,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151442/59d8f3d0847748de1a4f043c362bb999/spectrum/1040g0k031hju6ef54q2g5nglbo8g91mdf36lmig!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[{"user":"木子李","userId":"64f83fc70000000005003efc","text":"从场景到卖点，面膜的植入很巧妙~","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31kook2rsiu6g5p7o7v3h8fnsn0lif0g?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69904084000000001a02be18","title":"昆明松赞林卡｜建议可以再等等","content":"下午四点落地长水，直接去了10号刚试营业的昆明松赞林卡。朋友去年加入松赞后就在筹备这个项目，朋友圈常放“谍照”吊胃口，这次正好约在这里吃晚饭。\n项目选址滇池度假区内王树操盘的首个云南项目，荒废十余年，前几年被松赞拿下，定位为“喜马拉雅文化会客厅”，是松赞目前体量最大的综合体项目，同时也是集团未来的运营大本营——产品研发、餐饮研发部门都设在这里，还配套了一个运动表现训练中心，规模和野心都不小。\n🍴试运营期间开放了三间餐厅分别是：西餐厅「曲尼卡」、中餐厅「地平线」和粤菜餐厅「景」（由米其林二星主厨黄景辉团队主理）。这次选择了「地平线」，主打滇藏食材本味表达，整体思路很清晰，但个人觉得食材选择和调味逻辑都偏克制。之前在几间松赞餐厅的感受都是那种“wow在这里竟然能吃到这样的东西”😋，但作为首个城市项目，餐厅自然被期待和拿去跟昆明众多美食选择正面PK，这是一大挑战。\n🍷酒单值得，杯卖选项很有诚意，喝到了岫光酒庄的霞多丽，产量不高，风格干净有矿物感，完成度不错。之前听朋友说松赞请了吕杨做葡萄酒文化大使，也在筹备自己的红酒品牌，看来餐酒体系会是未来的重点。\n🏋️运动表现训练中心这个部分其实是我觉得最有想法的。除了常规的健身房和泳池，还有冥想疗愈课程和防高反适应训练项目等特色。如果未来要去香格里拉、梅里或更高海拔区域的松赞，在昆明先做几天适应过渡，产品逻辑是成立的。试营业期间免费体验了30分钟深睡疗程。体验感很特别——身体像被抽离，只剩下意识的重量，醒来之后很松弛，恢复感明显。\n🛏️定制藏毯、手打黄铜装饰，这些松赞标志性的视觉元素都被带到了昆明，整体气质还是那个熟悉的松赞体系。室外建筑考虑到基本维持王树项目的方案，多了几分中式山水意境。\n🔔但必须客观说一句：目前离正式成熟运营还有距离。空间里仍有明显装修气味，细节处可见未清理的施工尘土，甚至施工痕迹还未完全遮蔽。能理解赶春节档期的节奏压力，但在3000+的房价区间，消费者期待值一定会非常高。如果是抱着完整松赞体验预期入住，建议再等等。\n⏰整体来看，这个项目的野心和定位是清晰的——如果调整到位，它会是昆明市场真正意义上的旗舰文化酒店产品。现在的问题只剩一个：需要多快的打磨速度，才能配得上它想成为的样子。\n#松赞 #松赞昆明林卡 #昆明酒店 #昆明美食 #昆明探店","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"5b248d28f7e8b92a9ff 什么藏毯或者说毛绒元素放在昆明这个号称春城的城市有一种不清爽的感觉？这是第一个让我觉得没有wow的松赞","likes":13,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo316urm6ip3q604a94ijhi9al2hm8o53g?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"野风吹乱发","userId":"5bfa9cabf7e8b9280aa1d4f0","text":"据我了解 也不是藏毯，成本太高了，应该是尼泊尔生产的","likes":4,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5c4bc7fa34cf910001ee60fc.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"Joy","userId":"61a62f690000000010004686","text":"我这个4680一晚的价格入住的 ，还不如亚朵服务好，太憋屈了","likes":6,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/61a62f690000000010004686.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"用户197730173","userId":"548ae93ce779892907a1972f","text":"真的吗 刚要定 避雷了","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31u5k6sau2q00400sffkjp5pf2bclf58?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69ace06d0000000015038986","title":"在大理   寻找“理想合伙人”","content":"你是否想象过，在大理拥有一个属于自己的家？\n可以在欣赏苍山洱海的茶室，午后在院子里晒太阳，与来自四海的朋友谈天说地的，现在，这个机会来了。\n我们不是招聘员工，而是在寻找一位 “理想合伙人”。一位能将这个院子，变得更有温度、更有故事、被更多人看见的同行者。\n关于院子: 房东本人，没有二房东的各种使用运营限制，装修有质感，位置古城南门，闹中取静。\n我们期待的合伙人，是这样的你：\n【A面：民宿主理人】\n· 你热爱民宿行业，理解“管家式服务”的精髓，能用心打理客人的大理之旅。\n· 你有优秀的运营思维，能在控制成本的前提下，提升入住体验和客户满意度。\n· 你或许有独特的资源（如主题旅行、在地文化体验、跨界合作），能为民宿注入新的活力。\n【B面：生活记录家】\n· 你擅长用镜头和文字讲述故事，是小红书、抖音、视频号等平台的深度玩家。\n· 你愿意出境，自然、真诚地分享在大理和民宿里的日常、风景与感悟。\n· 你懂得如何通过内容，构建一个吸引人的品牌形象，而不仅仅是卖房间。\n我们承诺给你的：\n1. 一个零成本的起点：无需任何资金投入，你的才华和精力就是最好的“投资”。\n2. 一份真正的事业归属感：你是民宿的“联合主理人”，你的名字将和它紧密相连。\n3. 一个极具吸引力的回报机制：无底薪，不坐班，但享有民宿经营净利润的分成。\n如果你心动了，请让我们看到你：\n请用你认为最合适的介绍方式，你是谁，你为什么适合成为这样的“合伙人”，如果由你来运营，你将如何让这间民宿变得不同？（可以是一个具体的点子、一个内容策划或一个运营思路）告诉我。","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"65916797000000001f03b828","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69ace06d0000000015038986?xsec_token=ABzyk8IVxdhTHV-h5yrnedpDL7c9m 理\n运营：中央厨房标准化+门店执行\n内容：持续输出云南文化故事\n📦 关键资源 • 实体：食材基地+门店网络 • 虚拟：品牌IP+会员数据系统 ——看得见的是餐厅，看不见的是系统\n🤝 合作伙伴网络 • 供应链：云南农户+物流+商场 • 跨界：非遗项目+旅游平台+公益计划 ——从田间到餐桌，从餐厅到文化平台\n💰 财务结构 • 成本：租金/人力/食材/研发 • 收入：堂食+外卖+会员+特产+联名 ——多元收入对冲餐饮波动\n【顺便聊聊云南小酒馆模式特点🍶】\n业态：“餐+酒+艺”三合一\n毛利：自酿酒水占比高、利润厚\n时段：白天轻食+夜间酒馆，坪效优化\n运营：重社群、强互动、高复购\n规模：投资灵活、风格质朴、易复制\n一坐一忘的模型，本质是： 用文化做溢价，用系统做规模， 用体验做壁垒，用外交事件做信任背书。\n它或许给餐饮人一个启示： 在今天，卖氛围可能比卖饱腹更持久。\n你觉得这类“文化餐厅”能走多远？ 欢迎评论区聊聊👇\n#一坐一忘 #英国首相斯塔默抵京第一餐 #商业模式 #商业模式画布  #餐饮创业 #品牌拆解 #商业思维","type":"normal","author":"云南自信云科技有限公司3小时前","authorId":"5cc7fb180000000012024a1a","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uveg0bbig6g5qa855mttt9hb93pag0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/697ef074000000001a020a43?xsec_token=ABHO0szGpcQEWYqONQKifmtFRNNAqcO71A6nwfk4qJDRs=&xsec_source=pc_search&source=web_search_result_notes","likes":5,"collects":6,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151442/071da570331132b3c32994c82e74430d/spectrum/1040g34o31s1ksg94k4105n67vcc4kigqn29345g!nd_dft_wlteh_webp_3","keyword":"云南品牌营销","commentList":[]},{"id":"69c4a259000000001f0054e0","title":"一家把「共生」刻进骨血的云南本土旅行社","content":"别再把云南旅行，活成千篇一律的打卡\n我们扎根滇域群山，不做山水的旁观者，只做山与人的联结者\n你的每一步，都在与大地共鸣，都在为在地发光\n.\n🌿 我们是谁\n她与山齐，一家把「共生」刻进骨血的云南本土旅行社\n.\n她：是大地之母，是山野间坚韧生长的在地女性\n山：是滇域群峰，是千年民族文化的根脉\n齐：是人与山平等对话，是旅者与在地者同频共振\n.\n🌿 为什么选我们？\n.\n✨ 小众深度，拒绝走马观花\n循季而行，顺俗而游，把云南的四季与民族节律，揉进每一段旅程：\n春赴傣寨泼水、采春茶\n夏入彝村徒步、燃火把\n秋至白族村落扎染、晒秋\n冬到纳西古寨围炉、听东巴故事\n小团定制，每一条路线都藏着本地人私藏的秘境\n.\n✨ 在地同行，才是真・深度\n核心团队由本地少数民族同胞组成携程：\n彝族阿哥带你走无人秘境，白族阿姐讲千年扎染，纳西阿嬷煮最地道山野滋味。\n我们不雇佣，只共生 —— 为在地者提供培训，让他们以文化立身，成为民族自信的讲述者携程。\n.\n✨ 每一步，都是公益\n你的旅行，自带善意\n每一笔订单，都有资金注入她与山齐慈善基金：\n资助非遗传承、民族语言保护\n赋能乡村女性创业与技能培训\n改善山区教育与村寨文旅设施\n旅行不再是消费，而是温柔的赋能 —— 你走过的路，都在照亮大山里的「她」\n.\n✨ 可带走的山海，可传承的温度\n精选「山物集」在地风物：扎染方巾、刺绣荷包、高原松茸、手工红糖……\n每一件都由少数民族手工制作，收益反哺在地创作者\n把云南的美好带回家，也把温暖留在山里\n.\n🌿 我们的愿景\n成为城市与山野、现代与民族的共生桥梁\n让每一次向山而行，都成为深度感知土地、赋能在地生命的起点\n不做山水征服者，只做土地陪伴者；不做文化搬运工，只做民族智慧转译者\n. 间\n与当地村民交流互动\n体验云南特色的农耕文化、民俗风情和美食文化\n深入了解了这片土地的过去、现在和未来\n6月15日\n在孔雀山垭口\n✨共同开启了“小红书村民开村仪式”\n孔雀山\n一半是已经红透半边天的迪庆\n一半是云南的旅游处女地怒江\n“做一次精神村民”活动\n不仅是对两地文旅资源的一次深入挖掘和宣传推广\n更是对“有一种叫云南的生活”文旅品牌的一次生动诠释和有力推广\n最后感谢@松赞  对本次活动的大力支持，希望能够让更多的人了解云南、认识云南、爱上云南！\n\n#有一种叫云南的生活 #美好生活在云南 #做一次精神村民 #被低估的宝藏小城","type":"normal","author":"THree03-03","authorId":"629eeb76000000002102a203","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pmp05s0kk0g5q1c67sint4cuvsb0rg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/666ff480000000000d00c654?xsec_token=AB8vPU3olNw7ZWmUtkQT5UN6igr62j3mBveVmS02nYeu8=&xsec_source=pc_search&source=web_search_result_notes","likes":157,"collects":57,"comments_count":32,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151446/0c845291ec20569515ec858c3e581818/1040g2sg31450qiu0he705okutdr8d8g30jlflhg!nd_dft_wgth_webp_3","keyword":"云南品牌推广","commentList":[{"user":"董磊","userId":"6302292d000000001200dfc1","text":"云南大美，我们今年一定要把怒江州生物多样性的自然纪录片做出来！","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/630417258b7fbb8c74ecfc47.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"云南省文化和旅游厅","userId":"629eeb76000000002102a203","text":"非常期待！","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo316orpst40o4g5okutdr8d8g3barivj0?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"粒粒go","userId":"58e85fdf50c4b46b74a73d1b","text":"精神云南人报道🏃","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo312r98o05ks0049ch9eftuf8r66m85mg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"云南省文化和旅游厅","userId":"629eeb76000000002102a203","text":"要一直精精神神！","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo316orpst40o4g5okutdr8d8g3barivj0?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"历历山河","userId":"5e3d83e400000000010020de","text":"图7的自拍","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo3107b0o9als005nhtgfi0886u76 ]},{"id":"69c00140000000002301f016","title":"🔍云南居然有4家～始祖鸟Arc'teryx","content":"不亏是主打高山攀登、徒步、滑雪等极限场景的品牌，在香格里拉门店品牌logo看出去正好是雪山🏔️，这一刻已经没有任何广告如此生动彰显品牌调性～\n\n做品牌有时候不仅是产品\n或许比做产品更重要的\n理解并掌握逃脱产品本身的用户心智\n比如身份认同、比如社交属性、再比如品牌力量～\n\n希望中国有更多更好的品牌出围—出海🚢—\n#昆明探店 #云南探店 #鸟人集合#户外品牌","type":"normal","author":"THree03-03","authorId":"5b2a0c0e11be1057b3a0e51b","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pmp05s0kk0g5q1c67sint4cuvsb0rg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c00140000000002301f016?xsec_token=AB5ZiaiJ2wZ8H9FFIdUTCcdn4-ruheYIpZOWi-23wcnas=&xsec_source=pc_search&source=web_search_result_notes","likes":124,"collects":16,"comments_count":58,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151447/8417f7cc93e3f593b4a91b3d4c277a02/notes_pre_post/1040g3k031u15snnsnq0g4a6dsp60tp8rlr2qk68!nd_dft_wlteh_webp_3","keyword":"云南品牌推广","commentList":[{"user":"大大大可耐🎻🎹","userId":"5c87ecf800000000160302d1","text":"好像万象城也有吧 我记得之前围挡了 不知道开业没有","likes":9,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/62e29f5606693d338d46f05c.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"昆明Ｒ姐","userId":"5b2a0c0e11be1057b3a0e51b","text":"挡好久了，估计难了～","likes":5,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31mur1btumg004a6dsp60tp8rsuk16hg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"渴望自由的小驴","userId":"5cd2b5e80000000016001841","text":"顺城、迪庆、恒隆，还有哪家？","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31lq5vgbt5e005n6imnk5g621tihfk28?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"beardidi","userId":"59e70d3d4eacab430c2ec78a","text":"迪庆有两家","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31nc3etrc5m0g49ul1l6jrhsaun7avfg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"小红薯6868D3E9","userId":"6868a0b4000000001d016925","text":"","likes":5,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31oicoqtelm5g5q38k2q7aq95rr5s1ig?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"昆明Ｒ姐","userId":"5b2a0c0e11be1057b3a0e51b","text":"第一☝️","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31mur1btumg004a6dsp60tp8rsuk16hg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"momo","userId":"69a46392000000002401be7f","text":"松赞梅里的鸟来一个","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/645b7ea002c16c941e0bcb05.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"昆明Ｒ姐","userId":"5b2a0c0e11be1057b3a0e51b","text":"好美","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31mur1btumg004a6dsp60tp8rsuk16hg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"Jfa","userId":"5b404d0911be100b41bb31fe","text":"西安6家厉害啊👍","likes":3,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pdpljugis004a6tug6gicfuaca535o?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"昆明Ｒ姐","userId":"5b2a0c0e11be1057b3a0e51b","text":"的确","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31mur1btumg004a6dsp60tp8rsuk16hg?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69ca487200000000230174c9","title":"云南邵通","content":"CMAU市策大赛实践任务三：昭通城市品牌小红书笔记专业创作与提交指南\n本任务核心是以年轻化视角打造昭通城市品牌小红书出圈内容，聚焦高原特色农业/文旅产品，融合社交媒体营销逻辑与乡村振兴内核，同时严格遵循赛事标题、文案、配图、标签规范，以下为专业落地方案，含可直接复用的笔记创作模板+全流程提交步骤：\n一、核心创作原则（贴合赛事目标+小红书流量逻辑）\n1. 受众锚定：聚焦年轻打卡族、周末短途游爱好者、小众秘境探索者，语言风格轻松治愈，拒绝生硬宣传；\n2. 内容聚焦：单篇笔记只突出一个核心主题（文旅/农产二选一），避免内容杂乱，强化记忆点；\n3. 转化导向：通过具体地标/特产+沉浸式体验描述，让用户产生“想去打卡/想尝试”的意愿，实现流量向乡村振兴的转化；\n4. 规范必守：标题+文案+配图缺一不可，必须带齐赛事指定6个标签，关键词紧扣昭通城市品牌定位。\n二、小红书笔记专业创作模板（2套高适配版，文旅/农产各1套）\n模板1：文旅聚焦「大山包+清凉避暑」（适配小众秘境、治愈系定位）\n标题（吸睛+关键词）\n乌蒙山里的清凉秘境✨昭通大山包承包整个夏天的治愈\n文案（沉浸式体验+核心亮点+打卡指引，适配小红书短句风格）\n谁懂啊！挖到云南昭通这个小众避暑天堂🌿\n乌蒙山深处的大山包，真的把“凉”刻进了骨子里\n清晨追云海日出，看黑颈鹤在草甸上翩飞，风里都是草木的清香\n午后逛昭通古城，踩青石板路，吃一碗地道\n这里没有人山人海，只有青山绿水和治愈的慢时光\n天赐“凉”机·昭您避暑，这才是周末短途游的正确打开方式✅\n💡打卡小tips：\n1. 大山包建议穿薄外套，早晚温差稍大；\n2. 古城旁的昭通小肉串一定要尝，香到舔签！\n配图（4张高清图，视觉连贯+突出亮点）\n1. 主图：大山包云海日出全景（抓眼球，定调小众秘境）\n2. 图2：大山包草甸/黑颈鹤实拍（核心地标特色）\n3. 图3：昭通古城青石板路/古建细节（城市人文）\n模板2：农产聚焦「昭通苹果+高原特色」（适配农产推广+乡村振兴内核）\n标题（吸睛+关键词）\n云南昭通藏不住了！高原苹果甜到心坎里🍎\n文案（产地优势+产品特色+体验感，链接乡村振兴）\n被昭通的高原苹果狠狠惊艳到！\n这不仅是一颗苹果，更是昭通高原特色农业的小美好✨\n除了苹果，昭通的竹笋、天麻、小碗红糖也都是宝藏农产\n每一口新鲜，都是助力乡村振兴的温暖力量。#CMAU市策大赛#治愈系#小众秘境#慢生活","type":"normal","author":"THree03-03","authorId":"648558e400000000110034c0","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pmp05s0kk0g5q1c67sint4cuvsb0rg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69ca487200000000230174c9?xsec_token=AB-TzZCzi29onM8uExlqjXM8nMaeOelpNoFOCzBS0GhAQ=&xsec_source=pc_search&source=web_search_result_notes","likes":0,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151448/ecd9361a7ca85d232835c7422b95027b/1040g2sg31ub6sksfiqa05p45b3i48d600ksssuo!nd_dft_wlteh_webp_3","keyword":"云南品牌推广","commentList":[]},{"id":"6902e0f90000000007003e36","title":"茶叶品牌在腾讯广告的投放分享","content":"“不投放没流量，投放又怕没钱赚。”某茶叶品牌老板上半年找到我们投放的时候，说的第一句话让我印象深刻。\n这次投的品是客单价300+的头春古树云南普洱生茶饼，算是处于普洱茶的中等价位，不如低价茶吸引价格敏感的客户，也缺乏高端茶的奢侈品属性的优势。\n\n一、背景信息\n投放目标：目标下单ROI不低于1.5；在高净值人群中建立品牌形象；积累可重复触达的客户资产\n预算规划：测试期日预算5000；稳定放量期日预算15000\n\n二、客户痛点\n1、300元单价需建立信任感，普通广告难以说服用户冲动下单。\n2、朋友圈流量昂贵，定向宽泛导致成本虚高。\n3、转化路径长，用户流失率高；起量困难。\n\n三、打法：朋友圈广告+微信小店\n朋友圈广告：\n1、定向：25-45岁，一线/新一线城市。上传一方数据进行再营销。\n2、创意：\nABtest：使用客户工作台高潜新品推荐板块，做选品与创意参考。\n视频创意：展示茶叶细节、冲泡过程等，突出专业和品质感，也可结合春日送礼、夏日解腻、秋季宴请等场景。\n\n微信小店：\n挂送礼订单：在创意中明确文案：可直接送好友，激发礼品场景的需求。\n店铺与商品优化：完成企业认证，利用新人建设和店铺装修突出品牌调性。\n详情页优化：详细说明古树来源、工艺、仓储，附上实物图、证书，同时强调价值。\n促销策略：设置“买茶赠茶具”或“两件包邮”等优惠，提升客单价。\n\n四、实战分享\n清明节前，项目开始，客户要求多版位，多链路进行投放，我们计划用朋友圈、pcad，再结合微信小店一起投。\n\n第一阶段 1-4天\n多创意+多版位，投放第一天就先上线了25+创意素材，在朋友圈围绕春茶尝鲜、商务解腻、贴心好礼着 三大场景做差异化，覆盖不同兴趣偏好的潜在客群。\n\n第二阶段 5-10天\n等朋友圈流量成本稳定，把版位扩展到pcad和优量汇。\n两三天后，pcad版位带来的订单占比接近30%，单次下单成本比朋友圈低16%左右，新客比例超80%。\n\n第三阶段 11-14天\n临近五一节点，在微信小店上了送礼单，文案：五一访友，下单直送微信好友。转化率高出25%。\n\n小结：\n1、充分利用平台的阶段性扶持政策，以低成本换取高曝光。\n2、积极测试新版位，跳出朋友圈的内卷。\n3、中高客单价商品，通过多创意覆盖多元场景，降低决策门槛，提升转化。\n\n#信息流广告 #腾讯广告 #广告投放 #品牌推广 #品牌营销 #公众号运营 #品牌公关 #媒介投放 #信息流投放 #营销策略","type":"normal","author":"THree03-03","authorId":"66165c6e0000000007005f47","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pmp05s0kk0g5q1c67sint4cuvsb0rg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/6902e0f90000000007003e36?xsec_token=ABekx2kfCEPrGAGlmW3w1YDz2Vr274g80LOFsGcyRpTHM=&xsec_source=pc_search&source=web_search_result_notes","likes":17,"collects":20,"comments_count":15,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151448/e857286285d202bf23640a139033391b/spectrum/1040g34o31o8etpm34q105pgmbhn1onq75li85bo!nd_dft_wlteh_webp_3","keyword":"云南品牌推广","commentList":[{"user":"KinkWong","userId":"56347f9f0bf90c26603cda8b","text":"平台扶持政策真的香！","likes":1,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo30rj6265gio6g4205srvpvmkbqmr3ho8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"野生投手（爆量版）","userId":"66165c6e0000000007005f47","text":"还是背靠大树才好乘凉啊。","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ikfnbfdnm005pgmbhn1onq7gc1bt20?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"郑伯安","userId":"617debe7000000001f03f3e0","text":"拍的很棒学习了","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31o0p52dn6m6g5obttfjnvsv0r5kfrjo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"野生投手（爆量版）","userId":"66165c6e0000000007005f47","text":"爆量爆量。","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ikfnbfdnm005pgmbhn1onq7gc1bt20?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":".🎀.Fion.🎀 .","userId":"5571c8ce3f95a30a4dbe2ec4","text":"茶叶客户在小店确实很适合小蓝包这个功能","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31uubn6jujq0040of114csbm4g20n5ug?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"野生投手（爆量版）","userId":"66165c6e0000000007005f47","text":"真的好用，订单转化率、客单价都噌噌噌提升。","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ikfnbfdnm005pgmbhn1onq7gc1bt20?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"野生枳","userId":"5f0698c6000000000100511f","text":"好滴学习了。[心心眼R]","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/5f0699492b2d240001627640.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"野生投手（爆量版）","userId":"66165c6e0000000007005f47","text":"","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ikfnbfdnm005pgmbhn1onq7gc1bt20?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"Lisadeng小助理","userId":"6731882f000000001c01be98","text":"天呐！原来投放还能蹭平台扶持打折流量！！！","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31udqv6ccii005pphh0nn3fkolkga5b0?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"野生投手（爆量版）","userId":"66165c6e0000000007005f47","text":"是滴，当时官方有小店扶持政策，对近7天小店直购日耗1000-5000元/天，\n补充当时官方发布的扶持背景\n①扶持对象：近7天小店直购日耗1000-5000元/天\n②基建要求：小店直购链路下展开创意数≥20个\n③扶持说明：\n扶持链路：推广产品=【微信小店商品】；落地页类型=【微信小店商品页】\n扶持周期：即日起至4月10日\n扶持形式：自动生效eCPM扶持，提升广告竞价能力，获取更多曝光和转化","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ikfnbfdnm005pgmbhn1onq7gc1bt20?imageView2/2/w/120/format/jpg|imageMogr2/strip"}]},{"id":"69c637ef000000001d01fe0e","title":"CMAU市策实训纪实 | 关于昭通","content":"本次CMAU市策大赛昭通城市品牌实训已圆满完成。相较于单纯的比赛培训，这次的实训更像是一次深度的城市观察与实践。核心目标非常明确：用青年视角，梳理并传递这座滇东北城市的价值，让流量成为助力地方发展的一份微小但切实的力量。\n在实训中，我们围绕农文旅融合这一核心方向，对昭通的城市禀赋进行了系统性梳理。以下是关于昭通城市品牌推广的核心思考，也是一份理性的出行参考。\n1. 核心价值：天赐之凉，静守自然\n昭通最显著的标签，是其优越的气候与自然资源。\n这里拥有20℃+的夏季平均气温，是天然的避暑胜地。核心景观区大山包不仅有壮阔的云海日出，更是黑颈鹤的越冬栖息地，自然生态的纯粹性极强。\n在策划中，我们提炼出“天赐‘凉’机·昭您避暑”的核心主张，希望将这份远离喧嚣的清凉，转化为可被感知的旅行体验。\n2. 城市风物：从土地到餐桌的质朴\n城市的魅力，往往藏在烟火气里。昭通的风物，带着乌蒙山的印记。\n- 特色农产品：昭通苹果 脆甜多汁，是高原阳光的味道；昭通天麻 品质上乘，是当地著名的药食同源特产。\n​\n- 地方风味：昭通小肉串 是夜宵文化的代表，炭火烤制，风味浓郁；此外，小碗红糖、盐津乌骨鸡等，共同构成了昭通独特的味觉谱系。\n推广这些风物，不仅是推广美食，更是推广城市的产业与民生。\n3. 文化脉络：历史与红色的交融\n昭通的人文底蕴深厚且多元。\n一方面，昭通古城的青石板路，保留了南丝绸之路的历史脉络，漫步其中能感受到老城的生活温度。\n另一方面，扎西会议会址承载着重要的红色历史，是了解革命精神、感受厚重岁月的重要场所。\n自然景观与人文底蕴的结合，构成了昭通丰富的旅行层次。\n4. 青年行动：让创意落地，让价值传递\n本次实训的意义，在于将上述分析转化为具体的传播方案。\n我们主张，年轻人的打卡不应是盲目跟风，而应是对城市真实价值的认可。通过小红书等新媒体渠道，分享昭通的风光、风物与故事，让更多人了解这座宝藏小城。\n让每一次分享，都成为一次微小的公益实践，用专业的策划能力，为地方品牌传播贡献一份力量。\n昭通是一座需要慢下来读的城市。希望这份梳理能为你的出行提供参考，也期待更多人能发现并爱上这份来自滇东北的纯粹。\n#CMAU市策大赛 #昭通#小众秘境#宝藏小城#周末去哪儿#为城市代言","type":"normal","author":"THree03-03","authorId":"68f1f86b0000000032019361","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pmp05s0kk0g5q1c67sint4cuvsb0rg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c637ef000000001d01fe0e?xsec_token=AB4cCF1CRmhW_4GF8334-Jz9CLdpCJV1GITj-pWave5Ko=&xsec_source=pc_search&source=web_search_result_notes","likes":0,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151448/7d0f5c53fc96019c47e1484524fef949/1040g00831u78e9t81m205q7hv1lsj4r1vmv6788!nd_dft_wlteh_webp_3","keyword":"云南品牌推广","commentList":[]},{"id":"69c9e25b000000001a02872c","title":"昭通","content":"CMAU市策大赛实践任务三：昭通城市品牌小红书笔记专业创作与提交指南\n本任务核心是以年轻化视角打造昭通城市品牌小红书出圈内容，聚焦高原特色农业/文旅产品，融合社交媒体营销逻辑与乡村振兴内核，同时严格遵循赛事标题、文案、配图、标签规范，以下为专业落地方案，含可直接复用的笔记创作模板+全流程提交步骤：\n一、核心创作原则（贴合赛事目标+小红书流量逻辑）\n1. 受众锚定：聚焦年轻打卡族、周末短途游爱好者、小众秘境探索者，语言风格轻松治愈，拒绝生硬宣传；\n2. 内容聚焦：单篇笔记只突出一个核心主题（文旅/农产二选一），避免内容杂乱，强化记忆点；\n3. 转化导向：通过具体地标/特产+沉浸式体验描述，让用户产生“想去打卡/想尝试”的意愿，实现流量向乡村振兴的转化；\n4. 规范必守：标题+文案+配图缺一不可，必须带齐赛事指定6个标签，关键词紧扣昭通城市品牌定位。\n二、小红书笔记专业创作模板（2套高适配版，文旅/农产各1套）\n模板1：文旅聚焦「大山包+清凉避暑」（适配小众秘境、治愈系定位）\n标题（吸睛+关键词）\n乌蒙山里的清凉秘境✨昭通大山包承包整个夏天的治愈\n文案（沉浸式体验+核心亮点+打卡指引，适配小红书短句风格）\n谁懂啊！挖到云南昭通这个小众避暑天堂🌿\n乌蒙山深处的大山包，真的把“凉”刻进了骨子里\n清晨追云海日出，看黑颈鹤在草甸上翩飞，风里都是草木的清香\n午后逛昭通古城，踩青石板路，吃一碗地道\n这里没有人山人海，只有青山绿水和治愈的慢时光\n天赐“凉”机·昭您避暑，这才是周末短途游的正确打开方式✅\n💡打卡小tips：\n1. 大山包建议穿薄外套，早晚温差稍大；\n2. 古城旁的昭通小肉串一定要尝，香到舔签！\n配图（4张高清图，视觉连贯+突出亮点）\n1. 主图：大山包云海日出全景（抓眼球，定调小众秘境）\n2. 图2：大山包草甸/黑颈鹤实拍（核心地标特色）\n3. 图3：昭通古城青石板路/古建细节（城市人文）\n模板2：农产聚焦「昭通苹果+高原特色」（适配农产推广+乡村振兴内核）\n标题（吸睛+关键词）\n云南昭通藏不住了！高原苹果甜到心坎里🍎\n文案（产地优势+产品特色+体验感，链接乡村振兴）\n被昭通的高原苹果狠狠惊艳到！\n这不仅是一颗苹果，更是昭通高原特色农业的小美好✨\n除了苹果，昭通的竹笋、天麻、小碗红糖也都是宝藏农产\n每一口新鲜，都是助力乡村振兴的温暖力量。#CMAU市策大赛；#邵通；#小众秘境；#宝藏小城；#周末去哪儿；#为城市代言","type":"normal","author":"THree03-03","authorId":"65d2fff30000000005033476","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pmp05s0kk0g5q1c67sint4cuvsb0rg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/69c9e25b000000001a02872c?xsec_token=AB-WGTon7gLY81hUJxIJ1pcAusKlL9L87fue1RXCh3lRE=&xsec_source=pc_search&source=web_search_result_notes","likes":0,"collects":0,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151448/8a0c81d4081a28df2348e65a69d9db41/notes_pre_post/1040g3k831uar3liaiicg5peivvphed3mvh58jb0!nd_dft_wlteh_webp_3","keyword":"云南品牌推广","commentList":[]},{"id":"699ef3c1000000001d027911","title":"安纳果品牌分析册","content":"微醺经济X精致山野\n小而美云南bistro的精准扩张\n#学习#分享#艺术#品牌#自我提升#审美积累#文案#策划#设计#餐饮","type":"normal","author":"THree03-03","authorId":"61b19550000000001000b3b3","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pmp05s0kk0g5q1c67sint4cuvsb0rg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/699ef3c1000000001d027911?xsec_token=ABmoZbhPHGgZ_3Z2WIg0Dbj_lV8wLH0cmsRLqhw679suU=&xsec_source=pc_search&source=web_search_result_notes","likes":5,"collects":1,"comments_count":0,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151448/59b721553860ac3649836756c3c7e0ba/1040g00831t0tdbnj5m4g5odhil841ctj68hm9cg!nd_dft_wgth_webp_3","keyword":"云南品牌推广","commentList":[]},{"id":"68c934e1000000001003eccc","title":"快手又来贡献三农传播案例了","content":"三农传播这块，除了快手我真想不出其他更好的案例。\n\n特别是近年来，无论是“500个家乡”“幸福乡村带头人计划”还是“了不起的家乡土特产”等IP的尝试与实践，都能看出快手对下沉市场、在地文化的挖掘，以及多元化家乡可见性的重视。\n\n🤔 我们之前在分析类似案例的时候也讲到，在当下 “烟火气”营销标签被过度滥用的传播语境中，家乡、城市形象传播正面临着同质化困境，快手也尝试去打破这种叙事，制作出一系列新鲜但有亲和力、小众但不猎奇的TVC。\n\n🌰 比如2024年首季「了不起的家乡土特产」邀请多位三农创作者出境，以四支正能量反转短片，为家乡土特产代言，让「云南玉溪蓝莓」「山东临沂大樱桃」「黑龙江抚远鱼子酱」「安徽六安鹅肝」获得了更多的可见性，借此打破“原产地羞耻”的观念，让人们知道所谓的异国风味高端菜品，其实食材是中国原产，“袪魅”进口滤镜。这组整合营销项目全网总曝光达到2.6 亿，全网自然播放量9500 万。\n\n而2025年了不起的家乡土特产第2季《仅淮安人可见？》，快手则与淮安洪泽文旅达成合作，进一步实现了三农传播中平台、内容、电商、文旅、品牌的嵌合，拍摄了一支对外展现「洪泽湖大闸蟹」主题的土特产宣传片，协助当地政府推广淮安当地土特产品类「洪泽湖大闸蟹」，同时对外扩大淮安洪泽湖文旅的声量。\n\n片子一反常态，并未邀请本地三农创作者与名人作为讲述者，而是在外地人姜妍来到淮安做创意设定中，呈现出“他者叙事”——因姜研还未了解到洪泽湖大闸蟹的好，所以在她的眼里有关洪泽湖大闸蟹的一切都宛如透明无物，由此展开戏剧性地「无实物表演」。\n\n🔍复盘要点\n\n他者叙事与作为“客人”的姜研\n“皇帝的大闸蟹”：透明隐喻展现品质因名气所累\n有破有立：打破刻板印象\n立意逆推：让更多宝藏家乡土特产实现“可见性”\n\n与上一季不同的是，之前强调“祛魅”——所谓法国鹅肝其实是六安鹅肝，来强调家乡土特产在质量上不输，而今年所讲述的「洪泽湖大闸蟹」则目标是将已经被标签化的象征性礼品，重新“赋魅”为好品质的美食。\n\n片中姜研视角里透明的“大闸蟹”蕴含一种隐喻，即在追求名气的今天，很多美食与洪泽湖大闸蟹一样，因为「名气」所累成为一种只为送人的象征物，但其本真性与好品质不该因为名气而被忽视。\n\n#了不起的家乡土特产 #姜妍 #仅淮安人可见 #淮安特产洪泽湖大闸蟹","type":"normal","author":"THree03-03","authorId":"5e48b2b80000000001001671","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31pmp05s0kk0g5q1c67sint4cuvsb0rg?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/68c934e1000000001003eccc?xsec_token=ABP50djethqUKXsQDiaWmfbbaZqq7b8OJ9vu6hzvn-hkU=&xsec_source=pc_search&source=web_search_result_notes","likes":774,"collects":439,"comments_count":25,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151448/2ce9434a7b117278120d99683fd9051a/1040g2sg31mg5s76u5m205ni8mas085jhob83ufg!nd_dft_wlteh_webp_3","keyword":"云南品牌推广","commentList":[{"user":"momo","userId":"6783afb1000000000803ea81","text":"扣 在新传案例这块 你就是我的神","likes":4,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ut62ffsia005ps3luoi7qk158dl9pg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"抓马扣叔","userId":"5e48b2b80000000001001671","text":"","likes":0,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo30v3tqbc8le005ni8mas085jhrt4v830?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"我们喆","userId":"6444b57f0000000029010aa2","text":"嚯","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31umi3pgl2s005p24mlvqa2l2336imq8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"抓马扣叔","userId":"5e48b2b80000000001001671","text":"","likes":2,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo30v3tqbc8le005ni8mas085jhrt4v830?imageView2/2/w/120/format 、物流账、人才账。算到企业觉得“不去昆明就亏了”。\n这叫“专业招商”。不是靠喝酒，是靠算账。\n所以，申论如果考“招商引资的成功经验”，别只会写“领导重视、政策优惠”。\n写这三个层次：\n国家战略的“势”、市场规律的“利”、专业服务的“诚”。\n这才是高分答案的格局。#热点 #时政热点 #申论素材 #面试素材","type":"normal","author":"克文探索中国","authorId":"69384a090000000037033e6f","avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1000g2jo2ikilajuiu06g5nu3hmqg8v4tto9gle0?imageView2/2/w/80/format/jpg?imageView2/2/w/60/format/webp|imageMogr2/strip","url":"https://www.xiaohongshu.com/explore/699fd55b000000001600aa6a?xsec_token=AB6gqjSlApFTG7zA3rhcbsFrEO4tdeX3RKcn21zfaGbXg=&xsec_source=pc_search&source=web_search_result_notes","likes":614,"collects":316,"comments_count":123,"shares":0,"cover":"https://sns-webpic-qc.xhscdn.com/202604151450/5c4c8936ee5005ed631c0e4718456467/notes_pre_post/1040g3k831t1p17rblmdg5q9o984tufjfeakhsb0!nd_dft_wlteh_webp_3","keyword":"云南企业品牌","commentList":[{"user":"不吃肉肉z","userId":"624bcce1000000001000d894","text":"昆明，工资不会又3000，4000吧","likes":18,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31ulnmho9io6g5oibpjgk1m4kp4tdsjo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"luckymomo","userId":"642e9dd90000000012013b2b","text":"工资基本会和贵州一样","likes":18,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31u6b3qf3hs005p1ejnckiepb84thtjg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"小红薯6593","userId":"5f3d2fc30000000001007f24","text":"啊，锂电池是重污染行业吧……","likes":13,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31sjfmncdle005npt5v1g8vp40udtiu8?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"木兰矫蕙","userId":"66a1cd980000000024020808","text":"那是上游，宁德就只负责组装能有多大污染","likes":13,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/645b7e90e29f7d0acadad8aa.jpg?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"重启人生","userId":"659439a50000000022010b2e","text":"昆明的气候我认为至少就值两千，看得我都心动了","likes":16,"avatar":"https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31rlt1dr322605pck76ioi2pekgjldjo?imageView2/2/w/120/format/jpg|imageMogr2/strip"},{"user":"木头大厦","userId" <script>
const notes=JSON.parse(document.getElementById('noteData').textContent);
let filter='all',query='';
function render(){
  query=document.getElementById('search').value.toLowerCase();
  const filtered=notes.filter(n=>{
    if(filter!=='all'&&n.type!==filter)return false;
    if(!query)return true;
    return(n.title+n.author+(n.content||'')).toLowerCase().includes(query)});
  const tL=filtered.reduce((s,n)=>s+(n.likes||0),0);
  const tC=filtered.reduce((s,n)=>s+(n.collects||0),0);
  const tCm=filtered.reduce((s,n)=>s+(n.comments_count||0),0);
  const vids=filtered.filter(n=>n.type==='video').length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat"><div class="num">'+filtered.length+'</div><div class="label">篇笔记</div></div>'+
    '<div class="stat"><div class="num">'+tL+'</div><div class="label">总点赞</div></div>'+
    '<div class="stat"><div class="num">'+tC+'</div><div class="label">总收藏</div></div>'+
    '<div class="stat"><div class="num">'+vids+'</div><div class="label">视频</div></div>';
  const el=document.getElementById('cardList');
  el.innerHTML=filtered.map((n,i)=>{
    const rank=i+1;
    const badge=n.type==='video'?'<span class="badge badge-video">视频</span>':'<span class="badge badge-note">图文</span>';
    const desc=hl(esc(n.content||'')).replace(/\n/g,'<br>');

    // 作者链接
    const authorLink=n.authorId?'https://www.xiaohongshu.com/user/profile/'+n.authorId:'#';
    const authorHtml='<div class="card-author">@<a href="'+authorLink+'" target="_blank">'+esc(n.author)+'</a></div>';

    // 评论（带作者链接）
    const cms=(n.commentList||[]).slice(0,5).map(c=>{
      const cLink=c.userId?'https://www.xiaohongshu.com/user/profile/'+c.userId:'#';
      return '<div class="comment-item"><span class="user"><a href="'+cLink+'" target="_blank" style="color:#667eea;text-decoration:none">'+esc(c.user)+'</a></span><span>'+esc(c.text)+'</span>'+(c.likes?'<span class="likes">❤'+c.likes+'</span>':'')+'</div>'
    }).join('');

    return '<div class="card"><div class="card-header"><span class="rank">#'+rank+'</span>'+
      '<div class="card-title">'+(n.url?'<a href="'+esc(n.url)+'" target="_blank">'+esc(n.title||'(无标题)')+'</a>':esc(n.title||'(无标题)'))+'</div>'+badge+
      '</div>'+authorHtml+
      '<div class="card-desc" id="d'+i+'">'+desc+'</div>'+
      '<button class="expand-btn" onclick="tog('+i+')">展开全文</button>'+
      '<div class="metrics"><div class="metric">❤ <span>'+n.likes+'</span></div><div class="metric">⭐ <span>'+n.collects+'</span></div><div class="metric">💬 <span>'+n.comments_count+'</span></div><div class="metric">🔗 <span>'+n.shares+'</span></div></div>'+
      (cms?'<div class="card-comments">'+cms+'</div>':'')+'</div>'
  }).join('')}
function tog(i){const el=document.getElementById('d'+i);el.classList.toggle('expanded');el.nextElementSibling.textContent=el.classList.contains('expanded')?'收起':'展开全文'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function hl(s){return s.replace(/#([^#\[]+?)\[话题\]#/g,'<span class="topic">#$1</span>').replace(/#([^#]+?)#/g,'<span class="topic">#$1</span>')}
document.getElementById('search').addEventListener('input',render);
document.querySelectorAll('.filters button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;render()})});
render()
</script></body></html>
